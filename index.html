<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rummikube.com - Elite Club</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 950: '#020617', 900: '#0f172a', 800: '#1e293b', 700: '#334155' },
                        gold: { 400: '#facc15', 500: '#eab308' },
                        rummikub: '#10b981'
                    },
                    fontFamily: { 
                        sans: ['Heebo', 'sans-serif'], 
                        rubik: ['Rubik', 'sans-serif'] 
                    }
                }
            }
        }
    </script>

    <style>
        body, html {
            background-color: #020617; 
            color: #f8fafc; margin: 0; padding: 0;
            height: 100dvh; 
            width: 100vw; overflow: hidden; overscroll-behavior: none;
            touch-action: none; /* Prevents pull-to-refresh and global scrolling */
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        
        .glass-panel { 
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6); 
        }

        .scrollable-content { overflow-y: auto; -webkit-overflow-scrolling: touch; height: 100%; padding-bottom: 150px; pointer-events: auto; touch-action: auto; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        .animate-pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes flashRed { 0%, 100% { border-color: rgba(239, 68, 68, 0.3); box-shadow: none; } 50% { border-color: rgba(239, 68, 68, 0.8); box-shadow: 0 0 15px rgba(239,68,68,0.5); } }
        .board-invalid-group { animation: flashRed 1.5s infinite; border: 2px solid #ef4444 !important; background: rgba(239, 68, 68, 0.05); }
        
        .rummy-tile {
            background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
            box-shadow: 2px 4px 8px rgba(0,0,0,0.4), inset -1px -2px 3px rgba(0,0,0,0.1), inset 1px 1px 2px rgba(255,255,255,1);
            border-bottom: 5px solid #cbd5e1; border-right: 1px solid #e2e8f0; border-radius: 8px; 
            font-family: 'Rubik', sans-serif; font-weight: 900;
            transition: transform 0.1s ease, box-shadow 0.1s ease; user-select: none;
            text-shadow: 0 1px 1px rgba(0,0,0,0.15);
            touch-action: none; 
        }
        .rummy-tile:active, .rummy-tile.dragging {
            box-shadow: 0 20px 30px rgba(0,0,0,0.6); transform: scale(1.1) translateY(-8px); z-index: 999;
        }
        
        @keyframes wave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .loading-dot { display: inline-block; animation: wave 1.2s infinite ease-in-out; }
        .loading-dot:nth-child(1) { animation-delay: 0s; }
        .loading-dot:nth-child(2) { animation-delay: 0.15s; }
        .loading-dot:nth-child(3) { animation-delay: 0.3s; }

        .board-tile {
            width: calc(2.25rem * var(--board-scale, 1));
            height: calc(3rem * var(--board-scale, 1));
            font-size: calc(1.25rem * var(--board-scale, 1));
            margin-left: calc(2px * var(--board-scale, 1));
            margin-right: calc(2px * var(--board-scale, 1));
            transition: width 0.3s ease, height 0.3s ease, font-size 0.3s ease, margin 0.3s ease;
        }
        @media (min-width: 640px) {
            .board-tile {
                width: calc(2.75rem * var(--board-scale, 1));
                height: calc(4rem * var(--board-scale, 1));
                font-size: calc(1.5rem * var(--board-scale, 1));
            }
        }
        .board-group {
            padding: calc(0.75rem * var(--board-scale, 1));
            border-radius: calc(0.75rem * var(--board-scale, 1));
            transition: transform 0.2s, padding 0.3s ease, border-radius 0.3s ease, background-color 0.2s, border-color 0.2s;
        }

        .rack-grid {
            display: grid;
            grid-template-columns: repeat(14, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 4px;
            width: 100%; max-width: 900px;
            padding: 8px;
            background: linear-gradient(to bottom, #d4a373 0%, #bc8a5f 40%, #8b5a2b 100%);
            border-bottom: 14px solid #4a2e15; border-top: 1px solid #e6ccb2;
            border-left: 3px solid #704728; border-right: 3px solid #704728;
            border-radius: 12px 12px 6px 6px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 5px 15px rgba(0,0,0,0.3);
            direction: ltr; /* CRITICAL: Fixes RTL number sorting visually */
        }
        
        .rack-slot {
            aspect-ratio: 9/13;
            background-color: rgba(0,0,0,0.15);
            border-radius: 6px;
            border: 1px dashed rgba(255,255,255,0.1);
            position: relative;
        }
        .rack-slot.hover-target { background-color: rgba(16, 185, 129, 0.4); border-color: rgba(16, 185, 129, 0.8); }

    </style>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, onSnapshot, query, where, updateDoc, addDoc, deleteDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBldyf-FW8DI2DX90tM9XIDCEij5riiYOk",
            authDomain: "rummikube-5c138.firebaseapp.com",
            projectId: "rummikube-5c138"
        };
        const app = initializeApp(firebaseConfig);
        window.fb = { auth: getAuth(app), db: getFirestore(app), googleProvider: new GoogleAuthProvider(), signInWithPopup, onAuthStateChanged, signOut, collection, doc, setDoc, getDoc, getDocs, onSnapshot, query, where, updateDoc, addDoc, deleteDoc, runTransaction };
        
        window.dispatchEvent(new Event('firebase-ready'));
    </script>
</head>
<body class="bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 to-slate-950 h-full w-full">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const ROLES = { SUPER_ADMIN: 'super_admin', CLUB_OWNER: 'club_owner', MANAGER: 'manager', AGENT: 'agent', PLAYER: 'player' };
        const BOT_NAMES = ['Alex_Pro', 'TileMaster99', 'RummyKing', 'Sara_Play', 'PokerFace_Dan', 'Lucky_Jim', 'AceOfSpades', 'JokerQueen', 'Max_Bet', 'Fast_Hand'];

        const formatMoney = (amount) => {
            if (amount === undefined || amount === null) return '0.00';
            const num = Number(amount);
            if (isNaN(num)) return String(amount);
            if (num === 0) return '0.00';
            return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        };

        const generateDeck = () => {
            const colors = ['#ef4444', '#3b82f6', '#f59e0b', '#0f172a'];
            let d = [];
            for (let set=0; set<2; set++) { for(let c=0; c<4; c++) { for(let v=1; v<=13; v++) d.push({id:`t_${set}_${c}_${v}_${Math.random()}`, val:v, color:colors[c]}); } }
            d.push({id:`j1_${Math.random()}`, val:'☻', color:'#ef4444'}); d.push({id:`j2_${Math.random()}`, val:'☻', color:'#0f172a'});
            return d.sort(()=>Math.random()-0.5);
        };

        const Coin = ({ amount, className="", size="md" }) => (
            <span className={`inline-flex items-center gap-1 font-bold ${className}`}>
                <i className={`fa-solid fa-coins text-gold-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.5)] ${size==='lg'?'text-xl':''}`}></i>
                {formatMoney(amount)}
            </span>
        );

        function App() {
            const [fbReady, setFbReady] = useState(false);
            const [dbUser, setDbUser] = useState(null);
            const [currentView, setCurrentView] = useState('auth'); 
            const [tablesDB, setTablesDB] = useState([]);
            const [activeTable, setActiveTable] = useState(null);
            const [toasts, setToasts] = useState([]);
            
            const viewRef = useRef(currentView);
            useEffect(() => { viewRef.current = currentView; }, [currentView]);

            const showToast = (msg, type = 'info') => {
                const id = Date.now(); 
                setToasts(prev => [...prev, { id, msg, type }]);
                setTimeout(() => { setToasts(prev => prev.filter(t => t.id !== id)); }, 4000);
            };

            const changeView = (view, tableObj = null) => {
                setCurrentView(view);
                setActiveTable(tableObj);
                if (view !== 'auth' && view !== 'pending') {
                    window.history.pushState({ view, tableId: tableObj?.docId }, "", `?v=${view}`);
                }
            };

            useEffect(() => {
                const handlePopState = (event) => {
                    if (event.state && event.state.view) {
                        setCurrentView(event.state.view);
                        if (event.state.view !== 'table') setActiveTable(null);
                    } else if (dbUser && dbUser.status === 'approved') {
                        setCurrentView('lobby');
                    }
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, [dbUser]);

            useEffect(() => {
                if (window.fb) setFbReady(true);
                else window.addEventListener('firebase-ready', () => setFbReady(true));
            }, []);

            useEffect(() => {
                if (!fbReady) return;
                const unsub = window.fb.onAuthStateChanged(window.fb.auth, async (user) => {
                    if (user) await fetchOrInitUser(user); 
                    else { setDbUser(null); setCurrentView('auth'); }
                });
                return () => unsub();
            }, [fbReady]);

            const fetchOrInitUser = async (user) => {
                const ref = window.fb.doc(window.fb.db, "users", user.uid);
                const snap = await window.fb.getDoc(ref);
                if (snap.exists()) {
                    setDbUser({ uid: user.uid, ...snap.data() });
                } else {
                    const q = await window.fb.getDocs(window.fb.collection(window.fb.db, "users"));
                    const role = user.email === 'aaci.yoni@gmail.com' ? ROLES.SUPER_ADMIN : (q.empty ? ROLES.SUPER_ADMIN : ROLES.PLAYER);
                    const newUser = { 
                        username: user.displayName || 'Player', 
                        email: user.email || '', 
                        role, 
                        status: role === ROLES.SUPER_ADMIN ? 'approved' : 'pending', 
                        balance: role === ROLES.SUPER_ADMIN ? 10000000 : 0,
                        clubProfits: 0, 
                        isBot: false,
                        stats: { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 }
                    };
                    await window.fb.setDoc(ref, newUser); 
                    setDbUser({ uid: user.uid, ...newUser });
                }
            };

            useEffect(() => {
                if (!fbReady || !dbUser) return;
                const unsubT = window.fb.onSnapshot(window.fb.collection(window.fb.db, "tables"), (s) => {
                    setTablesDB(s.docs.map(d => ({ docId: d.id, ...d.data() })));
                });
                
                const unsubU = window.fb.onSnapshot(window.fb.doc(window.fb.db, "users", dbUser.uid), (d) => {
                    if(d.exists()) {
                        const data = d.data(); 
                        setDbUser({ uid: d.id, ...data });
                        if(data.status === 'pending') changeView('pending');
                        else if (viewRef.current === 'auth' || viewRef.current === 'pending') {
                            changeView('lobby');
                        }
                    }
                });
                return () => { unsubT(); unsubU(); };
            }, [fbReady, dbUser?.uid]);

            if (!fbReady) return <div className="h-full w-full flex items-center justify-center text-emerald-500"><i className="fa-solid fa-circle-notch fa-spin text-4xl"></i></div>;

            return (
                <div className="h-full w-full flex flex-col relative overflow-hidden">
                    
                    {}
                    {dbUser && dbUser.status === 'approved' && currentView !== 'table' && (
                        <nav className="bg-slate-900/90 backdrop-blur-md px-4 py-3 z-40 shrink-0 border-b border-slate-800 shadow-xl flex justify-between items-center">
                            <div className="flex items-center gap-2 sm:gap-4">
                                <button onClick={() => window.fb.signOut(window.fb.auth)} className="w-10 h-10 rounded-xl bg-slate-800 text-slate-400 border border-slate-700 hover:text-white hover:bg-rose-600 transition-colors flex items-center justify-center">
                                    <i className="fa-solid fa-sign-out-alt"></i>
                                </button>
                                
                                {[ROLES.SUPER_ADMIN, ROLES.CLUB_OWNER, ROLES.MANAGER, ROLES.AGENT].includes(dbUser.role) && (
                                    <button onClick={() => changeView(currentView === 'backoffice' ? 'lobby' : 'backoffice')} className={`w-10 h-10 rounded-xl border flex items-center justify-center transition-colors ${currentView === 'backoffice' ? 'bg-blue-600 text-white border-blue-500 shadow-[0_0_10px_rgba(37,99,235,0.5)]' : 'bg-slate-800 text-blue-400 border-slate-700 hover:text-white'}`} title="ניהול מועדון">
                                        <i className="fa-solid fa-chart-line"></i>
                                    </button>
                                )}

                                <button onClick={() => changeView(currentView === 'profile' ? 'lobby' : 'profile')} className={`w-10 h-10 rounded-xl border flex items-center justify-center transition-colors ${currentView === 'profile' ? 'bg-emerald-600 text-white border-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]' : 'bg-slate-800 text-emerald-400 border-slate-700 hover:text-white'}`} title="אזור אישי">
                                    <i className="fa-solid fa-user"></i>
                                </button>

                                <div className="flex flex-col items-end mr-1 hidden sm:flex">
                                    <span className="text-sm font-bold text-white flex items-center gap-1">
                                        {dbUser.username}
                                        {dbUser.role === ROLES.SUPER_ADMIN && <i className="fa-solid fa-crown text-amber-400 text-[10px]"></i>}
                                    </span>
                                    <Coin amount={dbUser.balance} className="text-sm" />
                                </div>
                            </div>

                            <div className="flex flex-col items-end cursor-pointer" onClick={() => changeView('lobby')}>
                                <h1 className="text-xl sm:text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-300">RUMMIKUBE</h1>
                                <p className="text-[10px] text-slate-400 font-bold tracking-[0.2em] uppercase leading-none mt-[-2px]">Elite Club</p>
                            </div>
                        </nav>
                    )}

                    <main className="flex-1 overflow-hidden relative z-0">
                        {currentView === 'auth' && <AuthView />}
                        {currentView === 'pending' && <PendingView />}
                        {currentView === 'lobby' && <LobbyView user={dbUser} tables={tablesDB} onJoin={(t) => changeView('table', t)} showToast={showToast} />}
                        {currentView === 'profile' && <ProfileView user={dbUser} />}
                        {currentView === 'backoffice' && <BackofficeView user={dbUser} showToast={showToast} />}
                        {currentView === 'table' && <RummyTable tableDocId={activeTable?.docId} user={dbUser} onLeave={() => changeView('lobby')} showToast={showToast} />}
                    </main>
                    
                    {}
                    <div className="fixed bottom-8 left-1/2 transform -translate-x-1/2 z-[99999] flex flex-col gap-2 pointer-events-none w-[90%] max-w-sm">
                        {toasts.map(t => (
                            <div key={t.id} className={`animate-fade-in px-6 py-3 rounded-2xl shadow-2xl font-bold text-sm text-center border backdrop-blur-md ${t.type === 'error' ? 'bg-rose-900/95 border-rose-500 text-white' : 'bg-slate-800/95 border-emerald-500/50 text-emerald-400'}`}>
                                {t.msg}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function AuthView() {
            return (
                <div className="h-full w-full flex flex-col items-center justify-center p-4">
                    <div className="glass-panel p-10 sm:p-14 rounded-3xl text-center relative z-10 w-full max-w-md animate-fade-in">
                        <h2 className="text-4xl font-black text-white mb-2 tracking-widest drop-shadow-lg">Rummikube</h2>
                        <p className="text-emerald-400 mb-10 font-bold tracking-[0.3em] uppercase text-xs">Elite Private Club</p>
                        <button onClick={()=>window.fb.signInWithPopup(window.fb.auth, window.fb.googleProvider)} className="w-full bg-white hover:bg-slate-100 transition-transform transform hover:scale-105 text-slate-900 font-black py-4 px-6 rounded-xl shadow-xl flex items-center justify-center gap-3">
                            <i className="fa-brands fa-google text-blue-500 text-xl"></i> התחברות לחברים
                        </button>
                    </div>
                </div>
            );
        }

        function PendingView() {
            return <div className="h-full w-full text-slate-300 flex justify-center items-center font-bold text-xl flex-col gap-4">
                <i className="fa-solid fa-clock-rotate-left text-4xl text-amber-500 animate-spin"></i>
                ממתין לאישור מנהל המועדון...
            </div>;
        }

        function ProfileView({ user }) {
            const stats = user.stats || { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 };
            const winRate = stats.gamesPlayed > 0 ? Math.round((stats.gamesWon / stats.gamesPlayed) * 100) : 0;

            return (
                <div className="scrollable-content p-4 sm:p-8">
                    <div className="max-w-4xl mx-auto glass-panel p-6 rounded-3xl animate-fade-in">
                        <div className="text-center mb-8">
                            <div className="w-24 h-24 bg-slate-800 rounded-full mx-auto border-4 border-emerald-500 flex items-center justify-center shadow-[0_0_20px_rgba(16,185,129,0.4)] mb-4">
                                <i className="fa-solid fa-user text-4xl text-slate-400"></i>
                            </div>
                            <h2 className="text-3xl font-black text-white">{user.username}</h2>
                            <p className="text-slate-400 font-bold uppercase tracking-widest text-sm mt-1">{user.role}</p>
                        </div>

                        <div className={`grid grid-cols-2 ${[ROLES.SUPER_ADMIN, ROLES.CLUB_OWNER].includes(user.role) ? 'sm:grid-cols-5' : 'sm:grid-cols-4'} gap-4 mb-6`}>
                            <div className="bg-slate-900/80 p-4 rounded-2xl border border-slate-700 text-center">
                                <p className="text-slate-400 text-xs font-bold mb-1">יתרה נוכחית</p>
                                <p className="text-xl font-black text-emerald-400" dir="ltr">{formatMoney(user.balance)}</p>
                            </div>
                            <div className="bg-slate-900/80 p-4 rounded-2xl border border-slate-700 text-center">
                                <p className="text-slate-400 text-xs font-bold mb-1">משחקים ששוחקו</p>
                                <p className="text-xl font-black text-white">{stats.gamesPlayed}</p>
                            </div>
                            <div className="bg-slate-900/80 p-4 rounded-2xl border border-slate-700 text-center">
                                <p className="text-slate-400 text-xs font-bold mb-1">אחוז ניצחונות</p>
                                <p className="text-xl font-black text-blue-400">{winRate}%</p>
                            </div>
                            <div className="bg-slate-900/80 p-4 rounded-2xl border border-slate-700 text-center">
                                <p className="text-slate-400 text-xs font-bold mb-1">רווח/הפסד כולל</p>
                                <p className={`text-xl font-black ${stats.totalProfit >= 0 ? 'text-emerald-400' : 'text-rose-400'}`} dir="ltr">
                                    {stats.totalProfit > 0 ? '+' : ''}{formatMoney(stats.totalProfit)}
                                </p>
                            </div>
                            
                            {[ROLES.SUPER_ADMIN, ROLES.CLUB_OWNER].includes(user.role) && (
                                <div className="bg-slate-900/80 p-4 rounded-2xl border border-amber-500/50 text-center shadow-[0_0_15px_rgba(245,158,11,0.2)]">
                                    <p className="text-amber-400 text-xs font-bold mb-1">רווחי מועדון (Rake)</p>
                                    <p className="text-xl font-black text-amber-500" dir="ltr">{formatMoney(user.clubProfits || 0)}</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function LobbyView({ user, tables, onJoin, showToast }) {
            const [showCreate, setShowCreate] = useState(false);
            const [newTableOptions, setNewTableOptions] = useState({ maxPlayers: 4, stakes: 0.10 });

            const handleCreate = async () => {
                const calculatedBuyIn = newTableOptions.stakes * 100; 
                await window.fb.addDoc(window.fb.collection(window.fb.db, "tables"), { 
                    type: 'rummikub', maxPlayers: newTableOptions.maxPlayers, 
                    minBuyIn: calculatedBuyIn, stakes: newTableOptions.stakes, 
                    players: {}, board: [], deck: [], phase: 'waiting', createdAt: Date.now()
                });
                setShowCreate(false); showToast("שולחן נפתח בהצלחה!", "success");
            };

            const handleDelete = async (e, t) => {
                e.stopPropagation(); 
                const playersCount = Object.keys(t.players || {}).length;
                if (playersCount > 0 || t.phase === 'playing') {
                    if (!window.confirm(`⚠️ חכה רגע!\nיש כרגע ${playersCount} שחקנים שיושבים בשולחן הזה (או שהמשחק באוויר).\nאם תמחק את השולחן, הכסף שלהם עלול לא לחזור לארנק!\nהאם אתה בטוח שברצונך למחוק?`)) return;
                } else {
                    if (!window.confirm("למחוק שולחן זה?")) return;
                }
                await window.fb.deleteDoc(window.fb.doc(window.fb.db, "tables", t.docId));
                showToast("שולחן נמחק בהצלחה");
            };

            return (
                <div className="scrollable-content p-4 sm:p-6">
                    <div className="max-w-6xl mx-auto animate-fade-in">
                        <div className="flex justify-between items-center mb-8">

        function RummyTable({ tableDocId, user, onLeave, showToast }) {
            const [tableState, setTableState] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isGodMode, setIsGodMode] = useState(false); 
            
            const [rack, setRack] = useState(Array(28).fill(null)); 
            const [board, setBoard] = useState([]); // Array of { id, x, y, tiles: [] }
            const [startTurnBoard, setStartTurnBoard] = useState([]);
            const startTurnRef = useRef(null); 
            
            const [dragData, setDragData] = useState(null); 
            const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
            const [hoverTarget, setHoverTarget] = useState(null); 
            const [timeLeft, setTimeLeft] = useState(60);
            const [showVictory, setShowVictory] = useState(false);
            
            const longPressTimer = useRef(null);
            const dragDataRef = useRef(null);
            const synthRef = useRef(null);
            const tableRef = useRef(null);

            // Auto-Scale engine based on number of groups and tiles
            const boardScale = useMemo(() => {
                if (!board || board.length === 0) return 1.0;
                const totalTiles = board.reduce((sum, g) => sum + g.tiles.length, 0);
                const scale = 1.2 - (board.length * 0.02 + totalTiles * 0.01);
                return Math.max(0.5, Math.min(1.0, scale)); 
            }, [board]);

            useEffect(() => { dragDataRef.current = dragData; }, [dragData]);

            useEffect(() => {
                if (user.role !== ROLES.SUPER_ADMIN || tableState?.phase !== 'waiting') return;
                
                const interval = setInterval(async () => {
                    const tblRef = window.fb.doc(window.fb.db, "tables", tableDocId);
                    const tblSnap = await window.fb.getDoc(tblRef);
                    if (!tblSnap.exists()) return;
                    const t = tblSnap.data();
                    
                    const playersCount = Object.keys(t.players || {}).length;
                    if (playersCount === 0 || playersCount >= t.maxPlayers || t.phase !== 'waiting') return;

                    const botQ = window.fb.query(window.fb.collection(window.fb.db, "users"), window.fb.where("isBot", "==", true));
                    const botSnaps = await window.fb.getDocs(botQ);
                    if (botSnaps.empty) return;
                    
                    const bots = botSnaps.docs.map(d => ({id: d.id, ...d.data()}));
                    const availableBots = bots.filter(b => !t.players[b.id]);
                    if (availableBots.length === 0) return;

                    const randomBot = availableBots[Math.floor(Math.random() * availableBots.length)];
                    const buyInAmount = Number(t.minBuyIn);

                    const newPlayers = { ...t.players, [randomBot.id]: { username: randomBot.username, cards: [], hasDropped: false, stack: buyInAmount, isBot: true } };
                    const updates = { players: newPlayers };
                    
                    if (Object.keys(newPlayers).length === t.maxPlayers) {
                        const d = generateDeck();
                        const uids = Object.keys(newPlayers);
                        uids.forEach(uid => { 
                            const initial = d.splice(0, 14);
                            const padded = [...initial]; while(padded.length<28) padded.push(null);
                            newPlayers[uid].cards = padded; 
                        });
                        updates.phase = 'playing';
                        updates.deck = d;
                        updates.currentTurn = uids[0];
                        updates.turnStartedAt = Date.now();
                    }
                    
                    await window.fb.updateDoc(tblRef, updates);
                }, 3000); 
                
                return () => clearInterval(interval);
            }, [tableState?.phase, user.role, tableDocId]);

            useEffect(() => {
                let interval;
                if (tableState?.phase === 'playing' && tableState?.turnStartedAt) {
                    interval = setInterval(() => {
                        const elapsed = Math.floor((Date.now() - tableState.turnStartedAt) / 1000);
                        const remaining = Math.max(0, 60 - elapsed);
                        setTimeLeft(remaining);
                        
                        if (remaining <= 10 && remaining > 0 && tableState.currentTurn === user.uid) {
                            try {
                                if (window.Tone && window.Tone.context.state !== 'running') window.Tone.context.resume();
                                if (!synthRef.current && window.Tone) {
                                    synthRef.current = new window.Tone.Synth({ oscillator: { type: 'square' } }).toDestination();
                                    synthRef.current.volume.value = -15;
                                }
                                synthRef.current?.triggerAttackRelease("E6", "0.05");
                            } catch(e) {}
                        }
                        if (remaining === 0 && tableState.currentTurn === user.uid) {
                            clearInterval(interval);
                            handleTimeoutPenalty();
                        }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [tableState?.phase, tableState?.turnStartedAt, tableState?.currentTurn, user.uid]);

            useEffect(() => {
                if (tableState?.phase === 'playing' && user.role === ROLES.SUPER_ADMIN) {
                    const currentUid = tableState.currentTurn;
                    const currentPlayer = tableState.players[currentUid];
                    
                    if (currentPlayer && currentPlayer.isBot) {
                        const botTimer = setTimeout(async () => {
                            try {
                                const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                                const tblSnap = await window.fb.getDoc(tblRef);
                                const currentTbl = tblSnap.data();
                                
                                const newDeck = [...(currentTbl.deck || [])];
                                const tile = newDeck.length > 0 ? newDeck.pop() : null;
                                
                                const botCards = currentTbl.players[currentUid].cards || [];
                                const newRack = [...botCards];
                                if(tile) {
                                    const emptyIdx = newRack.findIndex(t=>t===null);
                                    if(emptyIdx !== -1) newRack[emptyIdx] = tile; else newRack.push(tile);
                                }
                                
                                const uids = Object.keys(currentTbl.players); 
                                const nextTurn = uids[(uids.indexOf(currentUid) + 1) % uids.length];
                                
                                await window.fb.updateDoc(tblRef, { 
                                    deck: newDeck, 
                                    [`players.${currentUid}.cards`]: newRack, 
                                    currentTurn: nextTurn, 
                                    turnStartedAt: Date.now() 
                                });
                            } catch(e) {}
                        }, 4000); 
                        return () => clearTimeout(botTimer);
                    }
                }
            }, [tableState?.phase, tableState?.currentTurn, user.role]);

            useEffect(() => {
                if(!tableDocId) return;
                const unsub = window.fb.onSnapshot(window.fb.doc(window.fb.db, "tables", tableDocId), doc => { 
                    if(doc.exists()) {
                        setTableState({id: doc.id, ...doc.data()});
                        setLoading(false);
                    } else { 
                        showToast("השולחן נסגר", "error"); 
                        onLeave(); 
                    }
                });
                return () => unsub();
            }, [tableDocId]);

            useEffect(() => {
                if(!tableState) return;
                
                if (!dragDataRef.current) {
                    // Normalize Board (backward compatibility + Absolute Positioning support)
                    const rawBoard = tableState.board || [];
                    const normBoard = rawBoard.map((g, i) => {
                        if (Array.isArray(g)) return { id: `grp_${i}_${Math.random()}`, x: 10 + (i*10), y: 10 + (i*10), tiles: g };
                        return g;
                    });
                    
                    setBoard(normBoard);
                    
                    const dbCards = tableState.players?.[user.uid]?.cards || [];
                    const fullRack = [...dbCards];
                    while(fullRack.length < 28) fullRack.push(null);
                    setRack(fullRack);
                    
                    // Snapshot the board at the EXACT moment your turn begins
                    if (tableState.currentTurn === user.uid) {
                        if (startTurnRef.current !== tableState.turnStartedAt) {
                             setStartTurnBoard(normBoard);
                             startTurnRef.current = tableState.turnStartedAt;
                        }
                    }
                }
                setShowVictory(tableState.phase === 'showdown');
            }, [tableState, user.uid]);

            const validateGroup = (group) => {
                if (!group || group.length < 3) return false;
                const jokers = group.filter(t => t.val === '☻');
                const regulars = group.filter(t => t.val !== '☻');
                if (regulars.length === 0) return true; 
                if (group.length > 13) return false; 

                const isSameValue = regulars.every(t => t.val === regulars[0].val);
                const uniqueColors = new Set(regulars.map(t => t.color)).size === regulars.length;
                if (isSameValue && uniqueColors && group.length <= 4) return true;

                const isSameColor = regulars.every(t => t.color === regulars[0].color);
                if (isSameColor) {
                    const sortedRegulars = [...regulars].sort((a,b) => Number(a.val) - Number(b.val));
                    const hasDuplicates = new Set(sortedRegulars.map(t=>t.val)).size !== sortedRegulars.length;
                    if (hasDuplicates) return false;

                    let gaps = 0;
                    for(let i=0; i<sortedRegulars.length-1; i++) {
                        gaps += (Number(sortedRegulars[i+1].val) - Number(sortedRegulars[i].val) - 1);
                    }
                    if (gaps <= jokers.length) return true;
                }
                return false;
            };

            const isBoardValid = useMemo(() => { 
                if (board.length === 0) return true; 
                return board.every(g => validateGroup(g.tiles)); 
            }, [board]);

            const calculateBoardPoints = (boardData) => {
                let total = 0;
                boardData.forEach(g => {
                    const arr = Array.isArray(g) ? g : (g.tiles || []);
                    arr.forEach(t => { total += (t.val === '☻' ? 30 : Number(t.val)); });
                });
                return total;
            };

            useEffect(() => {
                const handlePointerMove = (e) => { 
                    if (dragDataRef.current) { 
                        setDragPos({ x: e.clientX, y: e.clientY }); 
                        
                        if (longPressTimer.current) {
                            const dist = Math.hypot(e.clientX - dragDataRef.current.startX, e.clientY - dragDataRef.current.startY);
                            if (dist > 10) { // Tolerant shock absorber
                                clearTimeout(longPressTimer.current);
                                longPressTimer.current = null;
                            }
                        } 

                        const ghost = document.getElementById('drag-ghost');
                        const ghostGroup = document.getElementById('drag-ghost-group');
                        if(ghost) ghost.style.pointerEvents = 'none';
                        if(ghostGroup) ghostGroup.style.pointerEvents = 'none';

                        const elem = document.elementFromPoint(e.clientX, e.clientY);
                        if (elem) {
                            const dropZone = elem.closest('[data-drop]');
                            if (dropZone) setHoverTarget(dropZone.getAttribute('data-drop'));
                            else setHoverTarget(null);
                        }
                    } 
                };
                
                const handlePointerUp = async (e) => {
                    if (longPressTimer.current) clearTimeout(longPressTimer.current);
                    const currentDrag = dragDataRef.current;
                    if (!currentDrag) return;
                    
                    const isMyTurn = tableState?.currentTurn === user.uid;
                    
                    // Hide ghost to detect actual drop zone
                    const ghost = document.getElementById('drag-ghost');
                    const ghostGroup = document.getElementById('drag-ghost-group');
                    if (ghost) ghost.style.pointerEvents = 'none';
                    if (ghostGroup) ghostGroup.style.pointerEvents = 'none';
                    
                    const elemUnder = document.elementFromPoint(e.clientX, e.clientY);
                    const dropZone = elemUnder ? elemUnder.closest('[data-drop]') : null;
                    let actualTarget = dropZone ? dropZone.getAttribute('data-drop') : null;

                    // Absolute Board Magnet (Fallback if they missed a specific group but hit the board)
                    const boardArea = document.getElementById('felt-board');
                    let dropX = 50, dropY = 50;
                    if (boardArea && actualTarget !== 'rack' && !actualTarget?.startsWith('rack-slot-')) {
                        const rect = boardArea.getBoundingClientRect();
                        if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                            dropX = Math.max(5, Math.min(95, ((e.clientX - rect.left) / rect.width) * 100));
                            dropY = Math.max(5, Math.min(95, ((e.clientY - rect.top) / rect.height) * 100));
                            if (!actualTarget || (!actualTarget.startsWith('board-group-'))) {
                                actualTarget = 'board-new';
                            }
                        }
                    }

                    // Strict Turn Protection for Board interaction
                    if (!isMyTurn) {
                        if (actualTarget === 'board-new' || actualTarget?.startsWith('board-group-') || currentDrag.source === 'board') {
                            showToast("המתן לתורך כדי להוריד או להזיז אבנים בשולחן", "error");
                            actualTarget = null; 
                        }
                    }
                    
                    let newRack = [...rack]; 
                    let newBoard = board.map(g => ({...g, tiles: [...g.tiles]}));
                    let tilesToAdd = [];
                    
                    // 1. Remove from source
                    if (currentDrag.type === 'single') {
                        tilesToAdd = [currentDrag.tile];
                        if (currentDrag.source === 'rack') newRack[currentDrag.tileIndex] = null;
                        else if (currentDrag.source === 'board') {
                            const grp = newBoard.find(g => g.id === currentDrag.groupId);
                            if(grp) {
                                // Split Melds logic!
                                if (currentDrag.tileIndex > 0 && currentDrag.tileIndex < grp.tiles.length - 1 && grp.tiles.length >= 4) {
                                     const left = grp.tiles.slice(0, currentDrag.tileIndex);
                                     const right = grp.tiles.slice(currentDrag.tileIndex + 1);
                                     grp.tiles = left;
                                     newBoard.push({ id: `grp_${Date.now()}_split`, x: grp.x + 4, y: grp.y + 4, tiles: right });
                                } else {
                                     grp.tiles.splice(currentDrag.tileIndex, 1);
                                     if (grp.tiles.length === 0) newBoard = newBoard.filter(g => g.id !== currentDrag.groupId);
                                }
                            }
                        }
                    } else { // type === 'group'
                        tilesToAdd = currentDrag.tiles;
                        if (currentDrag.source === 'board') {
                            newBoard = newBoard.filter(g => g.id !== currentDrag.groupId);
                        }
                    }
                    
                    // 2. Add to target
                    if (actualTarget && actualTarget.startsWith('board-group-')) {
                        const targetId = actualTarget.replace('board-group-', '');
                        const targetGrp = newBoard.find(g => g.id === targetId);
                        if (targetGrp) targetGrp.tiles.push(...tilesToAdd);
                        else newBoard.push({ id: `grp_${Date.now()}`, x: dropX, y: dropY, tiles: tilesToAdd });
                    } 
                    else if (actualTarget === 'board-new') {
                        newBoard.push({ id: `grp_${Date.now()}`, x: dropX, y: dropY, tiles: tilesToAdd });
                    } 
                    else if (actualTarget && actualTarget.startsWith('rack-slot-')) {
                        let slotIdx = parseInt(actualTarget.split('-')[2]);
                        if (currentDrag.type === 'single') {
                             if (newRack[slotIdx] !== null && currentDrag.source === 'rack') {
                                 newRack[currentDrag.tileIndex] = newRack[slotIdx]; 
                             } else if (newRack[slotIdx] !== null) {
                                 slotIdx = newRack.findIndex(t=>t===null);
                             }
                             if(slotIdx !== -1) newRack[slotIdx] = tilesToAdd[0];
                        } else {
                             tilesToAdd.forEach(t => {
                                 const emptyIdx = newRack.findIndex(r=>r===null);
                                 if(emptyIdx !== -1) newRack[emptyIdx] = t;
                             });
                        }
                    } else {
                        // Return to source
                        if (currentDrag.source === 'rack') {
                            if(currentDrag.type === 'single') {
                                const eIdx = newRack.findIndex(t=>t===null);
                                newRack[eIdx !== -1 ? eIdx : 0] = tilesToAdd[0];

                        } else {
                            newBoard.push({ id: currentDrag.groupId, x: currentDrag.startX_pct || 50, y: currentDrag.startY_pct || 50, tiles: tilesToAdd });
                        }

                    setRack(newRack); 
                    setBoard(newBoard);

                            await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), {
                                board: newBoard,
                                [`players.${user.uid}.cards`]: newRack
                            });
                        } catch(err) {}
                    }
                };
                
                if (dragData) { 
                    window.addEventListener('pointermove', handlePointerMove, { passive: false }); 
                    window.addEventListener('pointerup', handlePointerUp); 
                }
                return () => { 
                    window.removeEventListener('pointermove', handlePointerMove); 
                    window.removeEventListener('pointerup', handlePointerUp); 
                };
            }, [dragData, hoverTarget, rack, board, tableState?.id, user.uid, tableState?.currentTurn]);

            const startDrag = (e, tile, source, groupId, tileIndex) => {
                if (e.pointerType === 'touch') e.target.releasePointerCapture(e.pointerId); 
                try { if (window.Tone && window.Tone.context.state !== 'running') window.Tone.context.resume(); } catch(err){}
                
                let pctX = 50, pctY = 50;

                if (boardArea) {

                }

                            if (navigator.vibrate) navigator.vibrate(50);

                        }, 400); 
                    }
                }
            };

                let activeTiles = rack.filter(t => t !== null);
                activeTiles.sort((a,b) => {
                    if (a.val === '☻') return 1; if (b.val === '☻') return -1;

                setRack(activeTiles);
                try { await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { [`players.${user.uid}.cards`]: activeTiles }); } catch(e){}
            };

            const handleSort789 = async () => {

                        t.update(uRef, { balance: uSnap.data().balance - buyInAmount });

                        }, 1500); 
                    }
                } catch(e) { showToast(typeof e === 'string' ? e : "שגיאה", "error"); }

            };

                if (isFirstDrop) {

                    const currentBoardPoints = calculateBoardPoints(board);
                    const startBoardPoints = calculateBoardPoints(startTurnBoard);
                    const dropValue = currentBoardPoints - startBoardPoints;

                    if (dropValue <= 0) {
                        return showToast("לא הורדת אבנים מהלוח שלך, עליך למשוך קופה.", "error");

                    if (dropValue < 30) {

                         updates[`players.${uid}.stack`] = pData.stack - penalty;
                         totalPot += penalty;
                         updates[`stats.${uid}`] = { incrementGames: 1, profit: -penalty };

                            <button onClick={handleLeave} className="text-slate-300 hover:text-white px-3 py-1.5 rounded bg-slate-800/50 border border-slate-700/50 transition-colors text-sm font-medium"><i className="fa-solid fa-angle-right ml-1.5 text-xs"></i> {isSeated ? (isPlaying ? <span className="text-rose-400">כניעה / עזוב שולחן</span> : 'קום מהשולחן') : 'חזור ללובי'}</button>
                            {user.role === ROLES.SUPER_ADMIN && (
                                <button onClick={() => setIsGodMode(!isGodMode)} className={`px-3 py-1.5 rounded text-sm font-bold border transition-colors ${isGodMode ? 'bg-purple-600 text-white border-purple-400 shadow-[0_0_10px_purple] animate-pulse' : 'bg-slate-800 text-slate-400 border-slate-700'}`}>GOD</button>
                            )}
                        </div>
                        <div className="flex flex-col items-center">
                            <span className="text-sm font-bold text-slate-200 opacity-80 tracking-widest uppercase">רמיקוב</span>
                            <span className="text-[10px] text-emerald-400 font-semibold" dir="ltr">ערך נקודה: {formatMoney(tableState.stakes)}</span>
                        </div>
                        <div className="w-[80px] text-left flex flex-col items-end">
                            {isSeated && <div className="text-emerald-400 text-xs font-bold bg-slate-950/50 px-2 py-1 rounded inline-block border border-slate-800"><Coin amount={tableState.players[user.uid]?.stack}/></div>}
                        </div>
                    </div>

                    {/* Opponents HUD (Moved Outside the Board) */}
                    {tableState.phase === 'playing' && (
                        <div className="flex justify-center items-start gap-4 sm:gap-8 pt-4 pb-2 z-20 shrink-0 pointer-events-none bg-slate-950/50">
                            {/* MY Avatar (Hero) */}
                            {isSeated && (
                                <div className="flex flex-col items-center">
                                    <div className="w-12 h-12 rounded-full bg-emerald-900 border-2 border-emerald-500 mb-1 flex items-center justify-center relative shadow-[0_0_15px_#10b981]">
                                        <i className="fa-solid fa-user text-white text-lg"></i>
                                        <div className="absolute -bottom-2 bg-emerald-500 text-slate-900 text-[10px] font-black px-2 rounded-full border border-slate-900">אתה</div>
                                    </div>
                                    <span className="text-xs font-bold text-emerald-400 mt-1">{user.username}</span>
                                    <span className="text-[10px] bg-emerald-900/40 px-2 py-0.5 rounded text-emerald-300 border border-emerald-500/30 mt-1">📦 {myTileCount} אבנים</span>
                                </div>
                            )}

                            {Object.entries(tableState.players || {}).filter(([uid]) => uid !== user.uid).map(([uid, pData]) => {
                                const tileCount = pData.cards ? pData.cards.filter(c => c !== null).length : 0;
                                const isTurn = tableState.currentTurn === uid;
                                
                                return (
                                    <div key={uid} className={`flex flex-col items-center transition-all ${isTurn ? 'scale-110' : 'opacity-80'}`}>
                                        <div className={`w-12 h-12 rounded-full border-2 mb-1 flex items-center justify-center shadow-md ${isTurn ? 'bg-slate-800 border-amber-500 ring-2 ring-amber-500 ring-offset-2 ring-offset-slate-950 shadow-[0_0_15px_#f59e0b]' : 'bg-slate-800 border-slate-600'}`}>
                                            <i className={`fa-solid fa-user text-lg ${isTurn ? 'text-white' : 'text-slate-400'}`}></i>
                                        </div>
                                        <span className={`text-xs font-bold ${isTurn ? 'text-white' : 'text-slate-400'} mt-1`}>
                                            {pData.username}
                                        </span>
                                        <span className="text-[10px] bg-slate-800/80 px-2 py-0.5 rounded text-slate-300 border border-slate-700/50 mt-1">
                                            📦 {tileCount} אבנים
                                        </span>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {/* FREE FORM ABSOLUTE BOARD */}
                    <div 
                        id="felt-board"
                        data-drop="board-new" 
                        className="flex-1 relative overflow-hidden border-b-2 border-t-2 border-emerald-900/50 mt-2"
                        style={{ background: 'radial-gradient(circle at center, #0f172a 0%, #020617 100%)' }}
                    >
                        {/* BIG SHOT CLOCK */}
                        {tableState.phase === 'playing' && (
                            <div className="absolute top-4 right-4 bg-slate-950/80 border border-slate-800 rounded-2xl px-5 py-3 flex flex-col items-center justify-center shadow-2xl z-30 backdrop-blur-sm pointer-events-none">
                                <span className={`text-xs font-black uppercase tracking-widest mb-1 ${isMyTurn ? 'text-emerald-400 animate-pulse' : 'text-slate-500'}`}>
                                    {isMyTurn ? 'התור שלך' : 'תור היריב'}
                                </span>
                                <div className="flex items-center gap-2">
                                    <span className={`font-mono text-4xl sm:text-5xl font-black tracking-tight ${timeLeft <= 10 && isMyTurn ? 'text-rose-500 drop-shadow-[0_0_15px_#f43f5e] animate-pulse' : 'text-white'}`}>
                                        00:{timeLeft.toString().padStart(2, '0')}
                                    </span>
                                </div>
                            </div>
                        )}

                        {/* Center Stack waiting animation */}
                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center pointer-events-none z-0 w-full px-4">
                            {tableState.phase === 'playing' ? (
                                <div className="flex flex-col items-center justify-center mb-8 opacity-10">
                                    <div className="w-10 h-14 border-2 border-emerald-400/60 rounded bg-emerald-900/30 backdrop-blur-sm relative z-10 shadow-[0_0_15px_rgba(16,185,129,0.3)]"></div>
                                </div>
                            ) : (
                                <div className="bg-slate-900/80 backdrop-blur border border-emerald-500/30 px-6 py-5 rounded-2xl shadow-[0_0_30px_rgba(16,185,129,0.1)] text-center max-w-sm mx-auto">
                                    <h2 className="text-lg sm:text-xl font-bold text-emerald-400 flex items-center justify-center gap-1">
                                        ממתינים לשחקנים 
                                        <span className="flex items-end h-full gap-0.5 ml-1">
                                            <span className="loading-dot">.</span><span className="loading-dot">.</span><span className="loading-dot">.</span>
                                        </span>
                                    </h2>
                                    <p className="text-slate-400 text-xs sm:text-sm mt-2 font-medium">
                                        {Object.keys(tableState.players||{}).length} מתוך {tableState.maxPlayers} התיישבו
                                    </p>
                                </div>
                            )}
                        </div>

                        {/* GOD MODE PANEL (Fixed to float everywhere) */}
                        {isGodMode && tableState.phase === 'playing' && (
                            <div className="fixed inset-0 pointer-events-none z-[9999] flex flex-wrap justify-center items-center gap-4 px-4 bg-purple-900/20 backdrop-blur-sm">
                                {Object.entries(tableState.players || {}).filter(([uid]) => uid !== user.uid).map(([uid, pData]) => (
                                    <div key={uid} className="flex flex-col items-center bg-purple-950/95 p-4 rounded-xl border-2 border-purple-400 shadow-[0_0_50px_purple] max-w-[300px]">
                                        <div className="text-center text-[10px] text-purple-200 font-black mb-3 uppercase tracking-widest border-b border-purple-500/50 pb-1 w-full"><i className="fa-solid fa-eye mr-1"></i> God Mode: {pData.username}</div>
                                        <div className="flex flex-wrap justify-center gap-1" dir="ltr">
                                            {pData.cards?.filter(c=>c!==null).map((c, idx) => (
                                                <div key={idx} className="w-8 h-10 bg-white rounded flex flex-col items-center justify-center text-lg font-bold shadow-md" style={{ color: c.color }}>
                                                    <span>{c.val}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                        
                        {!isSeated && tableState.phase === 'waiting' && (
                            <div className="absolute inset-0 z-20 flex items-center justify-center">
                                <button onClick={handleSit} className="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-3 rounded-xl font-bold shadow-xl transition-transform hover:scale-105">
                                    התיישב בשולחן ({Object.keys(tableState.players||{}).length}/{tableState.maxPlayers})
                                </button>
                            </div>
                        )}

                        {showVictory && (
                             <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm px-4 animate-fade-in">
                                 <div className="bg-slate-900 border border-emerald-500/50 p-6 rounded-2xl shadow-2xl text-center w-full max-w-sm">
                                     <i className="fa-solid fa-award text-4xl text-amber-400 mb-3 drop-shadow-md"></i>
                                     <h2 className="text-xl font-bold text-white mb-4">{tableState.players[tableState.winner]?.username} ניצח!</h2>
                                 </div>
                             </div>
                        )}
                        
                        {/* Auto-scaling Absolute Board Area */}
                        {isPlaying && (
                            <div className="w-full h-full relative" style={{ '--board-scale': boardScale }} dir="ltr">
                                {board.map((groupObj) => (
                                    <div key={groupObj.id} data-drop={`board-group-${groupObj.id}`} 
                                         className={`absolute flex bg-slate-900/30 border transition-colors board-group ${hoverTarget === `board-group-${groupObj.id}` ? 'border-emerald-500/80 bg-emerald-500/20 shadow-[0_0_20px_rgba(16,185,129,0.3)]' : !validateGroup(groupObj.tiles) ? 'board-invalid-group' : 'border-transparent'}`}
                                         style={{ left: `${groupObj.x}%`, top: `${groupObj.y}%`, transform: 'translate(-50%, -50%)' }}>
                                        {groupObj.tiles.map((t, tIdx) => (
                                            <div key={t.id} 
                                                 onPointerDown={(e) => startDrag(e, t, 'board', groupObj.id, tIdx)} 
                                                 className={`rummy-tile board-tile flex items-center justify-center cursor-grab active:cursor-grabbing ${dragData?.type === 'group' && dragData.groupId === groupObj.id ? 'opacity-30' : dragData?.tile?.id === t.id ? 'opacity-30' : ''}`} 
                                                 style={{ color: t.color }}>{t.val}</div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* User's Rack & Controls */}
                    <div className="relative z-10 shrink-0 bg-slate-950 pt-3 pb-4 border-t-2 border-emerald-900/30 shadow-[0_-15px_40px_rgba(0,0,0,0.8)]">
                        {isSeated && isPlaying && (
                            <div className="flex justify-between items-center px-4 pb-3">
                                <div className="flex gap-2">
                                   <button onClick={handleSort777} className="bg-slate-800 text-slate-300 px-4 py-2 rounded-lg font-bold text-xs hover:text-white hover:bg-slate-700 transition-all border border-slate-700 shadow-sm flex items-center gap-1"><i className="fa-solid fa-list-ol text-blue-400"></i> סדר 777</button>
                                   <button onClick={handleSort789} className="bg-slate-800 text-slate-300 px-4 py-2 rounded-lg font-bold text-xs hover:text-white hover:bg-slate-700 transition-all border border-slate-700 shadow-sm flex items-center gap-1"><span className="text-red-500 text-xl leading-none -mt-1">■</span> סדר 789</button>
                                </div>
                                <div className="flex gap-2 items-center">
                                    {isMyTurn && <button onClick={()=>{
                                        setBoard(startTurnBoard);
                                        const dbCards = tableState.players?.[user.uid]?.cards || [];
                                        const fullRack = [...dbCards]; while(fullRack.length<28) fullRack.push(null);
                                        setRack(fullRack);
                                        window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { board: startTurnBoard, [`players.${user.uid}.cards`]: dbCards });
                                    }} className="bg-slate-800 text-slate-300 px-4 py-2 rounded-lg text-sm font-bold shadow-md border border-slate-700 hover:bg-slate-700 hover:text-white transition-colors" title="בטל מהלכים"><i className="fa-solid fa-undo"></i> ביטול</button>}
                                    {isMyTurn && <button onClick={handleDraw} className="bg-slate-800 text-slate-200 border border-slate-700 px-5 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-slate-700 transition-colors">קופה ({tableState.deck?.length || 0})</button>}
                                    {isMyTurn && <button onClick={handleEndTurn} className={`px-6 py-2 rounded-lg font-black shadow-lg text-white text-sm transition-colors bg-emerald-600 hover:bg-emerald-500`}>סיום תור</button>}
                                </div>
                            </div>
                        )}

                        <div className="px-2 sm:px-4 flex justify-center">
                            <div className="rack-grid">
                                {rack.map((tile, index) => (
                                    <div key={index} data-drop={`rack-slot-${index}`} className={`rack-slot flex items-center justify-center ${hoverTarget === `rack-slot-${index}` ? 'hover-target' : ''}`}>
                                        {tile && (
                                            <div onPointerDown={(e) => startDrag(e, tile, 'rack', null, index)} className={`rummy-tile w-[90%] h-[90%] flex items-center justify-center text-xl sm:text-3xl z-10 cursor-grab active:cursor-grabbing ${dragData?.tile?.id === tile.id ? 'opacity-20' : dragData?.type === 'group_from_rack' && index >= dragData.startIndex && index < dragData.startIndex + dragData.tiles.length ? 'opacity-20' : ''}`} style={{ color: tile.color }}>
                                                {tile.val}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    
                    {/* Ghost Elements for Dragging */}
                    {dragData && dragData.type === 'single' && (
                        <div id="drag-ghost" className="fixed z-[9999] rummy-tile w-12 h-16 sm:w-16 sm:h-24 flex items-center justify-center text-3xl font-bold shadow-[0_20px_40px_rgba(0,0,0,0.6)]" style={{ left: dragPos.x, top: dragPos.y, transform: 'translate(-50%, -50%) rotate(3deg) scale(1.1)', color: dragData.tile.color, pointerEvents: 'none' }}>{dragData.tile.val}</div>
                    )}
                    {(dragData && (dragData.type === 'group' || dragData.type === 'group_from_rack')) && (
                        <div id="drag-ghost-group" className="fixed z-[9999] flex bg-slate-900/60 p-2 rounded-xl border border-emerald-500/50 shadow-2xl backdrop-blur-sm" style={{ left: dragPos.x, top: dragPos.y, transform: 'translate(-50%, -50%) scale(1.1)', pointerEvents: 'none' }} dir="ltr">
                            {dragData.tiles.map(t => (<div key={t.id} className="rummy-tile w-10 h-14 flex items-center justify-center text-2xl mx-0.5" style={{ color: t.color }}>{t.val}</div>))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
