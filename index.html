                                                <button onClick={()=>setShowCreateDurak(false)} className="px-6 py-2 text-slate-400 hover:text-white font-bold">ביטול</button>
                                                <button onClick={handleCreateDurak} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-2 rounded-xl font-bold shadow-lg">אשר ופתח</button>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                                    {durakTables.map(t => {
                                        const s = t.settings || {};
                                        return (
                                            <div key={t.docId} className="grad-card cursor-pointer" onClick={()=>onJoinDurak(t)}>
                                                <div className="grad-card-inner p-5 relative">
                                                    {canManageGame(user, 'durak') && (
                                                        <button onClick={(e) => handleDelete(e, t)} className="absolute top-3 left-3 w-8 h-8 rounded-lg bg-slate-800/80 text-slate-500 hover:text-rose-400 flex items-center justify-center z-10"><i className="fa-solid fa-trash text-xs"></i></button>
                                                    )}
                                                    {t.players && t.players[user.uid] && <div className="absolute top-3 right-3 bg-emerald-500/20 border border-emerald-500 text-emerald-400 text-[10px] px-2 py-0.5 rounded-full animate-pulse font-bold z-10">🟢 אתה יושב כאן</div>}
                                                    <div className="flex items-center gap-3 mb-4 mt-3">
                                                        <div className="w-11 h-11 rounded-xl bg-blue-900/30 border border-blue-700/40 flex items-center justify-center"><i className="fa-solid fa-chess-king text-blue-400"></i></div>
                                                        <div>
                                                            <h3 className="text-lg font-black text-white leading-tight">דוראק {s.variant === 'perevodnoy' ? 'העברה' : 'רגיל'}</h3>
                                                            <p className="text-slate-400 text-xs font-bold" dir="ltr">Buy-in {formatMoney(s.buyIn)} · {s.deckSize} cards</p>
                                                        </div>
                                                        {t.status === 'playing' && <span className="mr-auto text-[10px] text-amber-400 font-black bg-amber-500/10 border border-amber-500/30 px-2 py-1 rounded-full">● LIVE</span>}
                                                    </div>
                                                    <div className="flex justify-between items-center">
                                                        <AvatarsRow players={t.players} />
                                                        <span className="text-blue-400 font-bold text-xs bg-blue-900/20 border border-blue-700/40 px-3 py-1 rounded-full">{Object.keys(t.players||{}).length}/{s.maxPlayers || 6}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                    {durakTables.length === 0 && <div className="col-span-full text-center py-16 text-slate-500 font-bold glass-panel rounded-3xl border-dashed">אין שולחנות דוראק פתוחים.</div>}
                                </div>
                                <div className="border-t border-white/5 my-8"></div>
                                <TournamentsTab game="durak" user={user} tournaments={tournaments} tables={tables} clubSettings={clubSettings} showToast={showToast} onJoinTable={onJoinDurak} />
                            </div>
                        )}

                        {/* ===== טאב שש-בש ===== */}
                        {tab === 'shesh' && (
                            <div className="animate-fade-in">
                                <div className="flex justify-between items-center mb-5">
                                    <h2 className="text-xl font-black text-white">שולחנות שש-בש</h2>
                                    {canManageGame(user, 'shesh') && (
                                        <button onClick={()=>setShowCreateShesh(!showCreateShesh)} className="bg-gradient-to-b from-amber-500 to-amber-700 hover:from-amber-400 text-white px-5 py-2.5 rounded-xl font-bold shadow-[0_6px_20px_rgba(245,158,11,0.3)] text-sm">
                                            <i className="fa-solid fa-plus ml-2"></i>שולחן חדש
                                        </button>
                                    )}
                                </div>

                                {showCreateShesh && (
                                    <div className="glass-panel p-6 rounded-2xl mb-6 border border-amber-500/30 animate-pop-in">
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                                            <div>
                                                <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">Buy-in (המנצח לוקח הכל)</label>
                                                <select value={sheshOpts.buyIn} onChange={e=>setSheshOpts({...sheshOpts, buyIn: parseFloat(e.target.value)})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-amber-500 font-bold">
                                                    {[50,100,250,500,1000,2500,5000].map(b => <option key={b} value={b}>{formatMoney(b)}</option>)}
                                                </select>
                                            </div>
                                            <div className="flex items-end">
                                                <p className="text-xs text-slate-500 font-bold pb-2">2 שחקנים · {SHESH_TIME} שניות לתור · רייק {clubSettings?.rakePct ?? DEFAULT_RAKE_PCT}%</p>
                                            </div>
                                        </div>
                                        <div className="flex justify-end gap-3 pt-3 border-t border-white/5">
                                            <button onClick={()=>setShowCreateShesh(false)} className="px-6 py-2 text-slate-400 hover:text-white font-bold">ביטול</button>
                                            <button onClick={handleCreateShesh} className="bg-amber-600 hover:bg-amber-500 text-white px-8 py-2 rounded-xl font-bold shadow-lg">אשר ופתח</button>
                                        </div>
                                    </div>
                                )}

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                                    {sheshTables.map(t => {
                                        const s = t.settings || {};
                                        return (
                                            <div key={t.docId} className="grad-card cursor-pointer" onClick={()=>onJoinShesh(t)}>
                                                <div className="grad-card-inner p-5 relative">
                                                    {canManageGame(user, 'shesh') && (
                                                        <button onClick={(e) => handleDelete(e, t)} className="absolute top-3 left-3 w-8 h-8 rounded-lg bg-slate-800/80 text-slate-500 hover:text-rose-400 flex items-center justify-center z-10"><i className="fa-solid fa-trash text-xs"></i></button>
                                                    )}
                                                    {t.players && t.players[user.uid] && <div className="absolute top-3 right-3 bg-emerald-500/20 border border-emerald-500 text-emerald-400 text-[10px] px-2 py-0.5 rounded-full animate-pulse font-bold z-10">🟢 אתה יושב כאן</div>}
                                                    <div className="flex items-center gap-3 mb-4 mt-3">
                                                        <div className="w-11 h-11 rounded-xl bg-amber-900/30 border border-amber-700/40 flex items-center justify-center"><i className="fa-solid fa-dice text-amber-400"></i></div>
                                                        <div>
                                                            <h3 className="text-lg font-black text-white leading-tight">שש-בש · ראש בראש</h3>
                                                            <p className="text-slate-400 text-xs font-bold" dir="ltr">Buy-in {formatMoney(s.buyIn)} · Rake {s.rakePercent ?? clubSettings.rakePct}%</p>
                                                        </div>
                                                        {t.status === 'playing' && <span className="mr-auto text-[10px] text-amber-400 font-black bg-amber-500/10 border border-amber-500/30 px-2 py-1 rounded-full">● LIVE</span>}
                                                    </div>
                                                    <div className="flex justify-between items-center">
                                                        <AvatarsRow players={t.players} />
                                                        <span className="text-amber-400 font-bold text-xs bg-amber-900/20 border border-amber-700/40 px-3 py-1 rounded-full">{Object.keys(t.players||{}).length}/2</span>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                    {sheshTables.length === 0 && <div className="col-span-full text-center py-16 text-slate-500 font-bold glass-panel rounded-3xl border-dashed">אין שולחנות שש-בש פתוחים.</div>}
                                </div>
                                <div className="border-t border-white/5 my-8"></div>
                                <TournamentsTab game="shesh" user={user} tournaments={tournaments} tables={tables} clubSettings={clubSettings} showToast={showToast} onJoinTable={onJoinShesh} />
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        /* ================================================================
           Backoffice - דשבורד, תפקידים לפי משחקים, הגדרות רייק
           ================================================================ */
        function BackofficeView({ user, clubSettings, showToast }) {
            const [usersList, setUsersList] = useState([]);
            const [search, setSearch] = useState('');
            const [roleEditUser, setRoleEditUser] = useState(null);
            const [roleDraft, setRoleDraft] = useState({ role: ROLES.PLAYER, managedGames: [] });
            const [rakeDraft, setRakeDraft] = useState(clubSettings.rakePct);
            const [clubNameDraft, setClubNameDraft] = useState('');
            const [expFrom, setExpFrom] = useState('');
            const [expTo, setExpTo] = useState('');
            const [exporting, setExporting] = useState(false);

            const exportClubCSV = async () => {
                setExporting(true);
                try {
                    const s = await window.fb.getDocs(window.fb.collection(window.fb.db, "gameLog"));
                    let all = s.docs.map(d => d.data());
                    if (expFrom) all = all.filter(l => l.at >= new Date(expFrom).getTime());
                    if (expTo) all = all.filter(l => l.at <= new Date(expTo).getTime() + 24 * 3600 * 1000);
                    all.sort((a, b) => (a.at || 0) - (b.at || 0));
                    const rows = [['תאריך', 'שעה', 'שחקן', 'משחק', 'רווח/הפסד']];
                    all.forEach(l => {
                        const d = new Date(l.at);
                        rows.push([d.toLocaleDateString('he-IL'), d.toLocaleTimeString('he-IL'), l.username || l.uid, GAME_LABEL(l.game), l.profit]);
                    });
                    rows.push([]);
                    rows.push(['סיכום לפי שחקן', '', '', '', '']);
                    const byUser = {};
                    all.forEach(l => { const k = l.username || l.uid; if (!byUser[k]) byUser[k] = { count: 0, profit: 0 }; byUser[k].count++; byUser[k].profit = round2(byUser[k].profit + (l.profit || 0)); });
                    Object.entries(byUser).forEach(([name, t]) => rows.push(['', '', name, t.count + ' משחקים', t.profit]));
                    downloadCSV(rows, `club-report-${new Date().toISOString().slice(0,10)}.csv`);
                    showToast(`יוצאו ${all.length} רשומות`, "success");
                } catch(e) { showToast("שגיאה בייצוא", "error"); }
                setExporting(false);
            };

            useEffect(() => { setRakeDraft(clubSettings.rakePct); }, [clubSettings.rakePct]);

            useEffect(() => {
                const memQ = window.fb.query(window.fb.collection(window.fb.db, "memberships"), window.fb.where("clubId", "==", CLUB_ID));
                const unsub = window.fb.onSnapshot(memQ, (snap) => {
                    setUsersList(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => unsub();
            }, []);

            const isOwner = [ROLES.SUPER_ADMIN, ROLES.CLUB_OWNER].includes(user.role);

            const handleApprove = async (uid) => {
                try { await window.fb.updateDoc(window.fb.doc(window.fb.db, "memberships", uid), { status: 'approved' }); showToast("שחקן אושר", "success"); }
                catch(e) { showToast("שגיאה באישור", "error"); }
            };
            const handleReject = async (u) => {
                if (!window.confirm(`לדחות ולמחוק את ${u.username}?`)) return;
                try { await window.fb.deleteDoc(window.fb.doc(window.fb.db, "memberships", u.id)); showToast("הבקשה נדחתה", "info"); }
                catch(e) { showToast("שגיאה בדחייה", "error"); }
            };

            const adjustBalance = async (target, isDeposit) => {
                const raw = window.prompt(isDeposit ? `כמה צ'יפים להפקיד ל-${target.username}? (יורד מהיתרה שלך)` : `כמה צ'יפים למשוך מ-${target.username}? (עובר ליתרה שלך)`, "100");
                const amount = parseFloat(raw);
                if (!amount || isNaN(amount) || amount <= 0) return;
                try {
                    await window.fb.runTransaction(window.fb.db, async (tr) => {
                        const ownerRef = memDoc(user.uid);
                        const targetRef = window.fb.doc(window.fb.db, "memberships", target.id);
                        const ownerSnap = await tr.get(ownerRef);
                        const targetSnap = await tr.get(targetRef);
                        let ownerBal = ownerSnap.data().balance || 0;
                        let targetBal = targetSnap.data().balance || 0;
                        if (isDeposit) {
                            if (ownerBal < amount) throw "אין לך מספיק יתרה להפקדה זו.";
                            ownerBal -= amount; targetBal += amount;
                        } else {
                            if (targetBal < amount) throw "לשחקן אין מספיק יתרה למשיכה זו.";
                            ownerBal += amount; targetBal -= amount;
                        }
                        tr.update(ownerRef, { balance: round2(ownerBal) });
                        tr.update(targetRef, { balance: round2(targetBal) });
                    });
                    showToast(isDeposit ? `הופקדו ${formatMoney(amount)} ל-${target.username}` : `נמשכו ${formatMoney(amount)} מ-${target.username}`, "success");
                } catch (e) { showToast(typeof e === 'string' ? e : "שגיאה בפעולה", "error"); }
            };

            const saveClubSettings = async () => {
                const pct = parseFloat(rakeDraft);
                if (isNaN(pct) || pct < 0 || pct > 20) return showToast("אחוז רייק לא חוקי (0-20)", "error");
                try {
                    await window.fb.setDoc(window.fb.doc(window.fb.db, "clubs", CLUB_ID), { rakePct: pct }, { merge: true });
                    showToast(`הרייק עודכן ל-${pct}%`, "success");
                } catch(e) { showToast("שגיאה בשמירת הגדרות", "error"); }
            };

            const openRoleEditor = (u) => {
                setRoleEditUser(u);
                setRoleDraft({ role: u.role || ROLES.PLAYER, managedGames: u.managedGames || [], agentUid: u.agentUid || '', agentPct: Number(u.agentPct) || 0 });
            };
            const censorPhoto = async (u) => {
                if (!window.confirm(`לאפס את תמונת הפרופיל של ${u.username}?`)) return;
                try {
                    await window.fb.updateDoc(window.fb.doc(window.fb.db, "memberships", u.id), { photo: '', avatarSeed: '' });
                    if (u.uid) await window.fb.updateDoc(window.fb.doc(window.fb.db, "users", u.uid), { photo: '', avatarSeed: '' });
                    showToast("התמונה אופסה", "success");
                } catch(e) {}
            };
            const toggleGame = (gid) => {
                setRoleDraft(prev => ({ ...prev, managedGames: prev.managedGames.includes(gid) ? prev.managedGames.filter(g => g !== gid) : [...prev.managedGames, gid] }));
            };
            const saveRole = async () => {
                try {
                    const managedGames = [ROLES.MANAGER, ROLES.AGENT].includes(roleDraft.role) ? roleDraft.managedGames : [];
                    const agentPct = Math.min(100, Math.max(0, Number(roleDraft.agentPct) || 0));
                    await window.fb.updateDoc(window.fb.doc(window.fb.db, "memberships", roleEditUser.id), { role: roleDraft.role, managedGames, agentUid: roleDraft.agentUid || '', agentPct: roleDraft.agentUid ? agentPct : 0 });
                    showToast(`${roleEditUser.username} עודכן ל${ROLE_LABELS[roleDraft.role]}`, "success");
                    setRoleEditUser(null);
                } catch(e) { showToast("שגיאה בעדכון תפקיד", "error"); }
            };

            const handleCreateBots = async () => {
                try {
                    showToast("מייצר בוטים...", "info");
                    for (let i = 0; i < 20; i++) {
                        const botName = BOT_NAMES[i % BOT_NAMES.length] + Math.floor(Math.random() * 100);
                        await window.fb.addDoc(window.fb.collection(window.fb.db, "users"), {
                            username: botName, email: `bot${i}@rummikube.com`, role: ROLES.PLAYER,
                            status: 'approved', balance: 50000, isBot: true, managedGames: [],
                            stats: { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 }
                        });
                    }
                    showToast("20 בוטים נוצרו!", "success");
                } catch (e) { showToast("שגיאה ביצירת בוטים", "error"); }
            };
            const handleDeleteBots = async () => {
                if(!window.confirm("למחוק את כל הבוטים?")) return;
                try {
                    const botQ = window.fb.query(window.fb.collection(window.fb.db, "users"), window.fb.where("isBot", "==", true));
                    const snaps = await window.fb.getDocs(botQ);
                    for (const d of snaps.docs) { await window.fb.deleteDoc(d.ref); }
                    showToast("כל הבוטים נמחקו.", "info");
                } catch(e) { showToast("שגיאה במחיקת בוטים", "error"); }
            };

            const pendingUsers = usersList.filter(u => u.status !== 'approved' && !u.isBot);
            const realPlayers = usersList.filter(u => u.status === 'approved' && !u.isBot);
            const players = usersList.filter(u => u.status === 'approved' && u.uid !== user.uid)
                .filter(u => !search || (u.username||'').toLowerCase().includes(search.toLowerCase()) || (u.email||'').toLowerCase().includes(search.toLowerCase()) || (u.playerId||'').toLowerCase().includes(search.toLowerCase()));

            const statTiles = [
                { label: 'היתרה שלך', value: formatMoney(user.balance), icon: 'fa-wallet', color: 'text-white' },
                { label: 'סה"כ אצל שחקנים', value: formatMoney(players.reduce((s, p) => s + (p.balance || 0), 0)), icon: 'fa-users', color: 'text-blue-400' },
                { label: 'רווחי מועדון (Rake)', value: formatMoney(user.clubProfits || 0), icon: 'fa-building-columns', color: 'text-amber-400' },
                { label: 'שחקנים רשומים', value: realPlayers.length, icon: 'fa-id-card', color: 'text-emerald-400' },
            ];

            return (
                <div className="scrollable-content aurora-bg p-4 sm:p-6">
                    <div className="max-w-5xl mx-auto animate-fade-in relative z-10">
                        <div className="flex items-center justify-between mb-6 flex-wrap gap-3">
                            <div>
                                <h2 className="text-2xl sm:text-3xl font-black text-white">ניהול מועדון</h2>
                                <p className="text-sm text-slate-400 font-bold">יתרות · תפקידים · הגדרות · בוטים</p>
                            </div>
                            {user.role === ROLES.SUPER_ADMIN && (
                                <div className="flex gap-2">
                                    <button onClick={handleCreateBots} className="bg-gradient-to-b from-purple-500 to-purple-800 hover:from-purple-400 text-white px-4 py-2.5 rounded-xl text-sm font-bold shadow-lg"><i className="fa-solid fa-robot ml-2"></i>20 בוטים</button>
                                    <button onClick={handleDeleteBots} className="bg-slate-800/80 hover:bg-rose-900/80 border border-white/10 text-slate-300 hover:text-white px-4 py-2.5 rounded-xl text-sm font-bold"><i className="fa-solid fa-trash"></i></button>
                                </div>
                            )}
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                            {statTiles.map((t, i) => (
                                <div key={i} className="stat-tile p-5 rounded-2xl">
                                    <div className="flex items-center justify-between mb-2">
                                        <span className="text-slate-400 text-[11px] font-bold">{t.label}</span>
                                        <i className={`fa-solid ${t.icon} ${t.color} opacity-60`}></i>
                                    </div>
                                    <p className={`text-xl sm:text-2xl font-black ${t.color}`} dir="ltr">{t.value}</p>
                                </div>
                            ))}
                        </div>

                        {/* הגדרות מועדון - רייק גלובלי (Owner בלבד) */}
                        {isOwner && (
                            <div className="glass-panel p-6 rounded-3xl mb-6 border border-amber-500/20">
                                <h3 className="text-lg font-black text-white mb-4 flex items-center gap-2">
                                    <span className="w-8 h-8 rounded-lg bg-amber-500/15 border border-amber-500/30 flex items-center justify-center"><i className="fa-solid fa-sliders text-amber-400 text-sm"></i></span>
                                    הגדרות מועדון
                                </h3>
                                <div className="flex items-end gap-4 flex-wrap mb-4 pb-4 border-b border-white/5">
                                    <div>
                                        <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">שם הקלאב</label>
                                        <input value={clubNameDraft} onChange={e=>setClubNameDraft(e.target.value)} maxLength={30} placeholder={clubSettings?.name || ''} className="bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-white font-black w-56 outline-none focus:border-emerald-500/60" />
                                    </div>
                                    <button onClick={async () => { const nm = clubNameDraft.trim(); if (nm.length < 2) return showToast("שם בין 2 ל-30 תווים", "error"); try { await window.fb.updateDoc(window.fb.doc(window.fb.db, "clubs", CLUB_ID), { name: nm }); setClubNameDraft(''); showToast("שם הקלאב עודכן!", "success"); } catch(e) { showToast("שגיאה", "error"); } }} className="bg-gradient-to-b from-emerald-500 to-emerald-700 hover:from-emerald-400 text-white px-6 py-3 rounded-xl font-bold shadow-lg">שנה שם</button>
                                </div>
                                <div className="flex items-end gap-4 flex-wrap">
                                    <div>
                                        <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">רייק גלובלי (%) - לכל המשחקים</label>
                                        <input type="number" min="0" max="20" step="0.5" value={rakeDraft} onChange={e=>setRakeDraft(e.target.value)} className="bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-white font-black w-32 outline-none focus:border-amber-500/60" dir="ltr" />
                                    </div>
                                    <button onClick={saveClubSettings} className="bg-gradient-to-b from-amber-500 to-amber-700 hover:from-amber-400 text-white px-6 py-3 rounded-xl font-bold shadow-lg">שמור</button>
                                    <p className="text-xs text-slate-500 font-bold basis-full">הרייק חל על רמיקוב, פוקר וכל המשחקים העתידיים. שולחנות פוקר קיימים שומרים על הרייק שנקבע בפתיחתם.</p>
                                </div>
                            </div>
                        )}

                        {/* ייצוא דוח מועדון (Owner) */}
                        {isOwner && (
                            <div className="glass-panel p-6 rounded-3xl mb-6 border border-blue-500/20">
                                <h3 className="text-lg font-black text-white mb-4 flex items-center gap-2">
                                    <span className="w-8 h-8 rounded-lg bg-blue-500/15 border border-blue-500/30 flex items-center justify-center"><i className="fa-solid fa-file-export text-blue-400 text-sm"></i></span>
                                    ייצוא דוח מועדון מלא
                                </h3>
                                <div className="flex flex-wrap items-end gap-3">
                                    <div>
                                        <label className="text-slate-400 text-[10px] font-bold mb-1 block uppercase">מתאריך</label>
                                        <input type="date" value={expFrom} onChange={e=>setExpFrom(e.target.value)} className="bg-slate-900 text-white border border-white/10 rounded-xl px-3 py-2 text-sm font-bold outline-none" />
                                    </div>

                        {/* בקשות הצטרפות */}
                        <div className="glass-panel p-6 rounded-3xl mb-6">

                        {/* שחקנים: העברות צ'יפים + תפקידים */}
                        <div className="glass-panel p-6 rounded-3xl mb-6">
                            <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
                                <h3 className="text-lg font-black text-white flex items-center gap-2">
                                    <span className="w-8 h-8 rounded-lg bg-emerald-500/15 border border-emerald-500/30 flex items-center justify-center"><i className="fa-solid fa-money-bill-transfer text-emerald-400 text-sm"></i></span>
                                    שחקנים · צ'יפים · תפקידים
                                </h3>

                                    <i className="fa-solid fa-magnifying-glass absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                                    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="חיפוש שחקן..." className="bg-slate-900/80 border border-white/10 rounded-full pr-9 pl-4 py-2 text-sm text-white w-52 outline-none focus:border-emerald-500/50" />
                                </div>

                            <div className="flex flex-col gap-2 max-h-96 overflow-y-auto pl-1">
                                {players.map(u => (
                                    <div key={u.id} className="flex items-center justify-between bg-slate-900/70 rounded-2xl p-3 border border-white/5 hover:border-emerald-500/30 transition-colors">
                                        <div className="flex items-center gap-3 min-w-0">
                                            <img src={avatarUrl({ ...u, uid: u.id })} className={`w-10 h-10 rounded-xl bg-slate-800 shrink-0 ${u.isBot ? 'ring-1 ring-purple-500' : ''}`} />
                                            <div className="min-w-0">
                                                <div className="font-bold text-white truncate text-sm flex items-center gap-1.5">
                                                    {u.username}
                                                    {u.isBot && <span className="text-purple-400 text-[10px]">(Bot)</span>}
                                                    {isGodUser(u) && <i className="fa-solid fa-eye text-purple-400 text-[10px]" title="GOD MODE"></i>}
                                                    {u.role && u.role !== ROLES.PLAYER && <span className="text-[9px] bg-blue-500/15 border border-blue-500/40 text-blue-300 px-2 py-0.5 rounded-full font-bold">{ROLE_LABELS[u.role]}</span>}
                                                </div>

                                        <div className="flex items-center gap-2 sm:gap-3 shrink-0">
                                            <Coin amount={u.balance} className="text-sm hidden sm:inline-flex" />
                                            <button onClick={()=>adjustBalance(u, true)} className="w-9 h-9 rounded-xl bg-gradient-to-b from-emerald-500 to-emerald-800 hover:from-emerald-400 text-white font-black shadow-md" title="הפקד צ'יפים">+</button>
                                            <button onClick={()=>adjustBalance(u, false)} className="w-9 h-9 rounded-xl bg-slate-800 hover:bg-rose-900 text-white font-black border border-white/10" title="משוך צ'יפים">−</button>
                                            {isOwner && !u.isBot && (

                                            )}
                                            {isOwner && (u.photo || u.avatarSeed) && (

                                            )}

                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* מודל עריכת תפקיד + בחירת משחקים לניהול */}
                    {roleEditUser && (
                        <div className="fixed inset-0 z-[500] bg-black/70 backdrop-blur-sm flex items-center justify-center p-4" onClick={()=>setRoleEditUser(null)}>
                            <div className="glass-panel rounded-3xl p-6 w-full max-w-sm animate-pop-in" onClick={e=>e.stopPropagation()}>
                                <div className="flex items-center gap-3 mb-5">
                                    <img src={avatarUrl({ ...roleEditUser, uid: roleEditUser.id })} className="w-12 h-12 rounded-xl bg-slate-800" />
                                    <div>

                                <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">תפקיד</label>
                                <select value={roleDraft.role} onChange={e=>setRoleDraft({...roleDraft, role: e.target.value})} className="w-full bg-slate-900 text-white border border-white/10 rounded-xl p-3 outline-none focus:border-blue-500/60 font-bold mb-4">
                                    <option value={ROLES.PLAYER}>שחקן</option>
                                    <option value={ROLES.AGENT}>סוכן</option>
                                    <option value={ROLES.MANAGER}>מנהל</option>
                                    {user.role === ROLES.SUPER_ADMIN && <option value={ROLES.CLUB_OWNER}>בעל מועדון</option>}
                                </select>

                                <div className="bg-slate-900/60 rounded-2xl border border-amber-500/20 p-4 mb-4">
                                    <label className="text-amber-300 text-xs font-black mb-2 block uppercase tracking-widest"><i className="fa-solid fa-handshake ml-1"></i>שיוך לסוכן</label>
                                    <div className="flex gap-2 items-center flex-wrap">
                                        <select value={roleDraft.agentUid} onChange={e=>setRoleDraft({...roleDraft, agentUid: e.target.value})} className="flex-1 min-w-[140px] bg-slate-900 text-white border border-white/10 rounded-xl p-2.5 outline-none focus:border-amber-500/60 font-bold text-sm">
                                            <option value="">ללא סוכן (הכל לבית)</option>
                                            {usersList.filter(x => !x.isBot && x.id !== roleEditUser.id && [ROLES.AGENT, ROLES.MANAGER, ROLES.CLUB_OWNER, ROLES.SUPER_ADMIN].includes(x.role)).map(x => (
                                                <option key={x.id} value={x.uid}>{x.username} ({ROLE_LABELS[x.role]})</option>
                                            ))}
                                        </select>
                                        {roleDraft.agentUid && (
                                            <div className="flex items-center gap-1.5">
                                                <input type="number" min="0" max="100" value={roleDraft.agentPct} onChange={e=>setRoleDraft({...roleDraft, agentPct: e.target.value})} className="w-20 bg-slate-900 text-white border border-white/10 rounded-xl p-2.5 text-center font-bold text-sm outline-none focus:border-amber-500/60" />
                                                <span className="text-slate-400 text-xs font-bold">% מהרייק לסוכן, היתרה לבית</span>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {[ROLES.MANAGER, ROLES.AGENT].includes(roleDraft.role) && (
                                    <div className="mb-4">
                                        <label className="text-slate-400 text-xs font-bold mb-2 block uppercase tracking-widest">אילו משחקים {roleDraft.role === ROLES.MANAGER ? 'ינהל' : 'ישרת'}?</label>
                                        <div className="flex flex-col gap-2">
                                            {GAMES.map(g => (
                                                <label key={g.id} className={`flex items-center justify-between bg-slate-900/70 rounded-xl px-4 py-3 border cursor-pointer transition-colors ${roleDraft.managedGames.includes(g.id) ? 'border-emerald-500/60' : 'border-white/5'} ${!g.live ? 'opacity-60' : ''}`}>
                                                    <span className="font-bold text-sm text-white">{g.label}</span>
                                                    <input type="checkbox" checked={roleDraft.managedGames.includes(g.id)} onChange={()=>toggleGame(g.id)} className="w-5 h-5 accent-emerald-500 cursor-pointer" />
                                                </label>
                                            ))}
                                        </div>
                                        <button onClick={()=>setRoleDraft({...roleDraft, managedGames: GAMES.map(g=>g.id)})} className="text-xs text-emerald-400 font-bold mt-2 underline">סמן הכל</button>
                                    </div>
                                )}

                                <div className="flex gap-3">
                                    <button onClick={saveRole} className="flex-1 bg-gradient-to-b from-blue-500 to-blue-700 hover:from-blue-400 text-white py-3 rounded-xl font-black">שמור</button>
                                    <button onClick={()=>setRoleEditUser(null)} className="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl font-black border border-white/10">ביטול</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        /* ================================================================
           שולחן רמיקוב
           ================================================================ */
        function RummyTable({ tableDocId, user, clubSettings, onLeave, showToast }) {
            const [tableState, setTableState] = useState(null);
            const [loading, setLoading] = useState(true);
            const [godOpen, setGodOpen] = useState(false);

            const [rack, setRack] = useState(Array(28).fill(null));
            const [board, setBoard] = useState([]);

            const [startTurnBoard, setStartTurnBoard] = useState([]);
            const [startTurnRackCount, setStartTurnRackCount] = useState(0);
            const [startTurnRack, setStartTurnRack] = useState([]);
            const startTurnRef = useRef(null);

            const [dragData, setDragData] = useState(null);
            const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
            const [hoverTarget, setHoverTarget] = useState(null);
            const [timeLeft, setTimeLeft] = useState(TURN_SECONDS);
            const [showError, setShowError] = useState("");

            const longPressTimer = useRef(null);
            const dragDataRef = useRef(null);
            const synthRef = useRef(null);
            const endingRef = useRef(false);
            const liveRef = useRef(null);
            useEffect(() => { liveRef.current = tableState; }, [tableState]);

            const isGod = isGodUser(user);
            const me = tableState?.players?.[user.uid];
            const hasDropped = !!me?.hasDropped;
            const rakeFrac = ((clubSettings?.rakePct ?? DEFAULT_RAKE_PCT) / 100);

            const startIdsSet = useMemo(() => new Set(startTurnBoard.map(g => g.id)), [startTurnBoard]);

            const flashError = (msg) => { setShowError(msg); setTimeout(()=>setShowError(""), 4000); };

            const boardScale = useMemo(() => {
                if (!board || board.length === 0) return 1.0;
                const totalTiles = board.reduce((sum, g) => sum + g.tiles.length, 0);
                const scale = 1.0 - (board.length * 0.01 + totalTiles * 0.003);
                return Math.max(0.45, Math.min(1.0, scale));
            }, [board]);

            useEffect(() => { dragDataRef.current = dragData; }, [dragData]);

            /* ---------- מוח הבוטים (רץ רק בדפדפן של הסופר-אדמין) ---------- */
            useEffect(() => {
                if (user.role !== ROLES.SUPER_ADMIN || !tableState || tableState.phase === 'showdown') return;

                if (tableState.phase === 'waiting') {
                    const joinInterval = setInterval(async () => {
                        try {
                            const tblRef = window.fb.doc(window.fb.db, "tables", tableDocId);
                            const tblSnap = await window.fb.getDoc(tblRef);
                            if (!tblSnap.exists()) return;
                            const t = tblSnap.data();
                            const playersCount = Object.keys(t.players || {}).length;
                            if (playersCount === 0 || playersCount >= t.maxPlayers || t.phase !== 'waiting') return;

                            const botQ = window.fb.query(window.fb.collection(window.fb.db, "users"), window.fb.where("isBot", "==", true));
                            const botSnaps = await window.fb.getDocs(botQ);
                            if (botSnaps.empty) return;
                            const bots = botSnaps.docs.map(d => ({id: d.id, ...d.data()}));
                            const availableBots = bots.filter(b => !t.players[b.id]);
                            if (availableBots.length === 0) return;

                            const randomBot = availableBots[Math.floor(Math.random() * availableBots.length)];
                            const newPlayers = { ...t.players, [randomBot.id]: { username: randomBot.username, cards: [], hasDropped: false, stack: Number(t.minBuyIn), isBot: true } };
                            if (Object.keys(newPlayers).length === Number(t.maxPlayers)) {
                                await window.fb.updateDoc(tblRef, buildDeal(newPlayers));
                            } else {
                                await window.fb.updateDoc(tblRef, { players: newPlayers });
                            }
                        } catch(e) {}
                    }, 3000);
                    return () => clearInterval(joinInterval);
                }

                if (tableState.phase === 'playing') {
                    const currentUid = tableState.currentTurn;
                    const currentPlayer = tableState.players?.[currentUid];
                    if (currentPlayer && currentPlayer.isBot) {
                        const botTimer = setTimeout(async () => {
                            try {
                                const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                                const tblSnap = await window.fb.getDoc(tblRef);
                                if (!tblSnap.exists()) return;
                                const currentTbl = tblSnap.data();
                                if (currentTbl.currentTurn !== currentUid || currentTbl.phase !== 'playing') return;

                                const newDeck = [...(currentTbl.deck || [])];
                                const tile = newDeck.length > 0 ? newDeck.pop() : null;
                                const newRack = [...(currentTbl.players[currentUid].cards || [])];
                                if(tile) {
                                    const emptyIdx = newRack.findIndex(t=>t===null);
                                    if(emptyIdx !== -1) newRack[emptyIdx] = tile; else newRack.push(tile);
                                }
                                const uids = Object.keys(currentTbl.players).sort();
                                const nextTurn = uids[(uids.indexOf(currentUid) + 1) % uids.length];
                                await window.fb.updateDoc(tblRef, { deck: newDeck, [`players.${currentUid}.cards`]: newRack, currentTurn: nextTurn, turnStartedAt: Date.now(), turnSnapBoard: currentTbl.board || [], turnSnapRack: [...((currentTbl.players[nextTurn] || {}).cards || [])] });
                            } catch(e) {}
                        }, 4000);
                        return () => clearTimeout(botTimer);
                    }
                }
            }, [tableState?.phase, tableState?.currentTurn, user.role, tableDocId]);

            /* ---------- טיימר + צליל ---------- */
            useEffect(() => {
                let interval;
                if (tableState?.phase === 'playing' && tableState?.turnStartedAt) {
                    interval = setInterval(() => {
                        const elapsed = Math.floor((Date.now() - tableState.turnStartedAt) / 1000);
                        const remaining = Math.max(0, TURN_SECONDS - elapsed);
                        setTimeLeft(remaining);
                        if (remaining <= 10 && remaining > 0 && tableState.currentTurn === user.uid) {
                            try {
                                if (window.Tone && window.Tone.context.state !== 'running') window.Tone.context.resume();
                                if (!synthRef.current && window.Tone) {
                                    synthRef.current = new window.Tone.Synth({ oscillator: { type: 'square' } }).toDestination();
                                    synthRef.current.volume.value = -15;
                                }
                                synthRef.current?.triggerAttackRelease("E6", "0.05");
                            } catch(e) {}
                        }
                        if (remaining === 0 && tableState.currentTurn === user.uid) { clearInterval(interval); handleDraw(true); }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [tableState?.phase, tableState?.turnStartedAt, tableState?.currentTurn, user.uid]);

            /* ---------- סנכרון מ-Firebase ---------- */
            useEffect(() => {
                if(!tableDocId) return;
                const unsub = window.fb.onSnapshot(window.fb.doc(window.fb.db, "tables", tableDocId), doc => {
                    if(doc.exists()) { setTableState({id: doc.id, ...doc.data()}); setLoading(false); }
                    else { showToast("השולחן נסגר", "error"); onLeave(); }
                });
                return () => unsub();
            }, [tableDocId]);

            useEffect(() => {
                if(!tableState) return;
                if (!dragDataRef.current) {
                    const rawBoard = tableState.board || [];
                    setBoard(rawBoard);
                    const dbCards = tableState.players?.[user.uid]?.cards || [];
                    const fullRack = [...dbCards];
                    while(fullRack.length < 28) fullRack.push(null);
                    setRack(fullRack);

                    if (tableState.currentTurn === user.uid) {
                        if (startTurnRef.current !== tableState.turnStartedAt) {
                             setStartTurnBoard(JSON.parse(JSON.stringify(rawBoard)));
                             setStartTurnRackCount(dbCards.filter(t=>t!==null).length);
                             setStartTurnRack(JSON.parse(JSON.stringify(fullRack)));
                             startTurnRef.current = tableState.turnStartedAt;
                             setShowError("");
                        }
                    }
                }
            }, [tableState, user.uid]);

            const isBoardValid = useMemo(() => {
                if (board.length === 0) return true;
                return board.every(g => validateGroup(g.tiles));
            }, [board]);

            /* ---------- מנוע גרירה ---------- */
            useEffect(() => {
                const handlePointerMove = (e) => {
                    if (dragDataRef.current) {
                        setDragPos({ x: e.clientX, y: e.clientY });
                        if (longPressTimer.current) {
                            const dist = Math.hypot(e.clientX - dragDataRef.current.startX, e.clientY - dragDataRef.current.startY);
                            if (dist > 15) { clearTimeout(longPressTimer.current); longPressTimer.current = null; }
                        }
                        const ghost = document.getElementById('drag-ghost');
                        const ghostGroup = document.getElementById('drag-ghost-group');
                        if(ghost) ghost.style.pointerEvents = 'none';
                        if(ghostGroup) ghostGroup.style.pointerEvents = 'none';
                        const elem = document.elementFromPoint(e.clientX, e.clientY);
                        if (elem) {
                            const dropZone = elem.closest('[data-drop]');
                            setHoverTarget(dropZone ? dropZone.getAttribute('data-drop') : null);
                        }
                    }
                };

                const handlePointerUp = async (e) => {
                    if (longPressTimer.current) clearTimeout(longPressTimer.current);
                    const currentDrag = dragDataRef.current;
                    if (!currentDrag) return;

                    const isMyTurn = tableState?.currentTurn === user.uid;

                    const ghost = document.getElementById('drag-ghost');
                    const ghostGroup = document.getElementById('drag-ghost-group');
                    if (ghost) ghost.style.pointerEvents = 'none';
                    if (ghostGroup) ghostGroup.style.pointerEvents = 'none';

                    const elemUnder = document.elementFromPoint(e.clientX, e.clientY);
                    const dropZone = elemUnder ? elemUnder.closest('[data-drop]') : null;
                    let actualTarget = dropZone ? dropZone.getAttribute('data-drop') : null;

                    const boardArea = document.getElementById('felt-board');
                    let dropX = 50, dropY = 50;
                    if (boardArea && actualTarget !== 'rack' && !actualTarget?.startsWith('rack-slot-')) {
                        const rect = boardArea.getBoundingClientRect();
                        if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                            dropX = Math.max(4, Math.min(96, ((e.clientX - rect.left) / rect.width) * 100));
                            dropY = Math.max(6, Math.min(94, ((e.clientY - rect.top) / rect.height) * 100));
                            if (!actualTarget || (!actualTarget.startsWith('board-group-'))) actualTarget = 'board-new';
                        }
                    }

                    const droppingToBoard = actualTarget === 'board-new' || actualTarget?.startsWith('board-group-');

                    if (!isMyTurn && (droppingToBoard || currentDrag.source === 'board')) {
                        flashError("המתן לתורך כדי לשחק בלוח המרכזי");
                        actualTarget = null;
                    }

                    // לפני הורדה ראשונה: איסור צירוף רק לקבוצות הוותיקות. לקבוצות שפתחת בתור הזה - מותר!
                    if (isMyTurn && !hasDropped && actualTarget?.startsWith('board-group-')) {
                        const targetId = actualTarget.replace('board-group-', '');
                        if (startIdsSet.has(targetId)) {
                            flashError(`לפני הורדה ראשונה (${FIRST_MELD_MIN} נק') אסור להשתמש באבני השולחן הקיימות`);
                            actualTarget = null;
                        }
                    }

                    let newRack = [...rack];
                    let newBoard = board.map(g => ({...g, tiles: [...g.tiles]}));
                    let tilesToAdd = [];

                    if (currentDrag.type === 'single') {
                        tilesToAdd = [currentDrag.tile];
                        if (currentDrag.source === 'rack') newRack[currentDrag.tileIndex] = null;
                        else if (currentDrag.source === 'board') {
                            const grp = newBoard.find(g => g.id === currentDrag.groupId);
                            if(grp) {
                                if (currentDrag.tileIndex > 0 && currentDrag.tileIndex < grp.tiles.length - 1 && grp.tiles.length >= 3) {
                                     const left = grp.tiles.slice(0, currentDrag.tileIndex);
                                     const right = grp.tiles.slice(currentDrag.tileIndex + 1);
                                     grp.tiles = left;
                                     const splitId = `grp_${Date.now()}_split`;
                                     newBoard.push({ id: splitId, x: Math.min(95, grp.x + 8), y: grp.y, tiles: right });

                        tilesToAdd = currentDrag.tiles;

                        const near = newBoard.find(g => {

                        const nearBlocked = near && isMyTurn && !hasDropped && startIdsSet.has(near.id);

                        let left = tileIndex;

                        const srvSnapRack = Array.isArray(tbl.turnSnapRack) && tbl.turnSnapRack.filter(x => x !== null).length > 0 ? tbl.turnSnapRack : snapRack;
                        const srvSnapBoard = Array.isArray(tbl.turnSnapBoard) ? tbl.turnSnapBoard : snapBoard;
                        const newDeck = [...(tbl.deck || [])];

                        delete newP[user.uid];
                        const remainingUids = Object.keys(newP);

                        let winnerRef = null, winnerSnap = null, adminRef = null, adminSnap = null;
                        const lastManStanding = stillPlaying && remainingUids.length === 1;
                        if (lastManStanding) {
                            const winnerUid = remainingUids[0];
                            if (!newP[winnerUid].isBot) {
                                winnerRef = memDoc(winnerUid);
                                winnerSnap = await t.get(winnerRef);
                            }
                            const ownerUidL = (window.__club || {}).ownerUid;
                            if (ownerUidL) { adminRef = memDoc(ownerUidL); adminSnap = await t.get(adminRef); }
                        }

                        const updates = { players: newP };
                        const uData = uSnap.exists() ? uSnap.data() : {};

                        if (!stillPlaying) {
                            t.update(uRef, { balance: round2((uData.balance || 0) + myStack) });
                        } else {
                            const currentStats = uData.stats || { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 };
                            t.update(uRef, {
                                'stats.gamesPlayed': (currentStats.gamesPlayed || 0) + 1,
                                'stats.totalProfit': round2((currentStats.totalProfit || 0) - myStack)
                            });

                            if (lastManStanding) {
                                const winnerUid = remainingUids[0];
                                const rake = round2(myStack * rakeFrac);
                                const winnerProfit = round2(myStack - rake);
                                newP[winnerUid].stack = round2((newP[winnerUid].stack || 0) + winnerProfit);
                                updates.phase = 'showdown';
                                updates.winner = winnerUid;
                                updates.currentTurn = null;
                                updates.lastResults = { winnerName: newP[winnerUid].username, totalPot: myStack, rake, winnerProfit, details: { [user.uid]: { username: uData.username || user.username, penalty: 0, pay: myStack } }, endedAt: Date.now() };

                                if (winnerRef && winnerSnap && winnerSnap.exists()) {
                                    const wStats = winnerSnap.data().stats || { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 };
                                    t.update(winnerRef, {
                                        'stats.gamesPlayed': (wStats.gamesPlayed || 0) + 1,
                                        'stats.gamesWon': (wStats.gamesWon || 0) + 1,
                                        'stats.totalProfit': round2((wStats.totalProfit || 0) + winnerProfit)
                                    });
                                }
                                if (adminRef && adminSnap && adminSnap.exists()) {
                                    t.update(adminRef, {
                                        balance: round2((adminSnap.data().balance || 0) + rake),
                                        clubProfits: round2((adminSnap.data().clubProfits || 0) + rake)
                                    });
                                }
                            } else if (remainingUids.length >= 2) {
                                const share = round2(myStack / remainingUids.length);
                                remainingUids.forEach(uid => { newP[uid].stack = round2((newP[uid].stack || 0) + share); });
                                if (tblData.currentTurn === user.uid) {
                                    const origUids = Object.keys(tblData.players).sort();
                                    let idx = origUids.indexOf(user.uid);
                                    let next = origUids[(idx + 1) % origUids.length];
                                    while (!newP[next]) { idx++; next = origUids[(idx + 1) % origUids.length]; }
                                    updates.currentTurn = next;
                                    updates.turnStartedAt = Date.now();
                                }
                            }
                        }
                        t.update(tblRef, updates);
                    });
