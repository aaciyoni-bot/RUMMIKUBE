<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rummikube.com - Elite Private Club</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 950: '#050505', 900: '#0f172a', 800: '#1e293b', 700: '#334155' },
                        gold: { 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706' }
                    },
                    fontFamily: { 
                        sans: ['Heebo', 'sans-serif'], 
                        rubik: ['Rubik', 'sans-serif'] 
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #050505;
            color: #e2e8f0;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Heebo', sans-serif;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }
        
        .chip-text {
            color: #fbbf24;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8), 0 0 15px rgba(251, 191, 36, 0.4);
            font-family: 'Rubik', sans-serif;
            font-weight: 900;
        }

        .game-felt {
            background: radial-gradient(circle at center, #0a1120 0%, #03050a 100%);
            box-shadow: inset 0 0 150px rgba(0,0,0,1);
        }
        
        .rummi-tile {
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            border-bottom: 6px solid #64748b;
            border-right: 2px solid #64748b;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-radius: 8px;
            box-shadow: 2px 6px 12px rgba(0,0,0,0.9);
            font-family: 'Rubik', sans-serif;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: transform 0.1s ease-out, box-shadow 0.1s ease-out;
            cursor: grab;
            text-shadow: 0px 1px 1px rgba(0,0,0,0.2);
        }
        
        .rummi-tile:active { cursor: grabbing; }
        
        .dragging-ghost {
            opacity: 0.95;
            transform: scale(1.15) rotate(3deg);
            box-shadow: 10px 20px 30px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 9999;
        }

        .bg-dots {
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .drop-target {
            background-color: rgba(255, 255, 255, 0.1) !important;
            border-color: rgba(255, 255, 255, 0.5) !important;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }
    </style>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, onSnapshot, query, where, updateDoc, addDoc, deleteDoc, orderBy, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBldyf-FW8DI2DX90tM9XIDCEij5riiYOk",
            authDomain: "rummikube-5c138.firebaseapp.com",
            projectId: "rummikube-5c138",
            storageBucket: "rummikube-5c138.firebasestorage.app",
            messagingSenderId: "18995082226",
            appId: "1:18995082226:web:a5e152d748d684fc02f16b",
            measurementId: "G-82FD8FRYDY"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        window.fb = { 
            auth, db, googleProvider, 
            signInWithPopup, onAuthStateChanged, signOut,
            collection, doc, setDoc, getDoc, getDocs, onSnapshot, query, where, orderBy, updateDoc, addDoc, deleteDoc, runTransaction
        };
        
        window.dispatchEvent(new Event('firebase-ready'));
    </script>
</head>
<body class="bg-dots">
    <div id="root" class="h-screen w-screen flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const GAME_TYPES = [
            { id: 'rummikub', name: 'רמיקוב אבנים', hex: '#10b981', borderClass: 'border-emerald-500', shadowClass: 'shadow-[0_0_15px_rgba(16,185,129,0.3)]' },
            { id: 'gin', name: 'ג\'ין רמי', hex: '#3b82f6', borderClass: 'border-blue-500', shadowClass: 'shadow-[0_0_15px_rgba(59,130,246,0.3)]' },
            { id: 'indian', name: 'רמי הודי (13)', hex: '#a855f7', borderClass: 'border-purple-500', shadowClass: 'shadow-[0_0_15px_rgba(168,85,247,0.3)]' },
            { id: 'canasta', name: 'קנסטה', hex: '#f43f5e', borderClass: 'border-rose-500', shadowClass: 'shadow-[0_0_15px_rgba(244,63,94,0.3)]' }
        ];

        const ROLES = { OWNER: 'owner', MANAGER: 'manager', AGENT: 'agent', PLAYER: 'player' };

        const AVATARS = [
            { id: 'av1', icon: 'fa-user-ninja', color: 'text-emerald-400', bg: 'bg-emerald-900/50' },
            { id: 'av2', icon: 'fa-user-astronaut', color: 'text-blue-400', bg: 'bg-blue-900/50' },
            { id: 'av3', icon: 'fa-cat', color: 'text-amber-400', bg: 'bg-amber-900/50' },
            { id: 'av4', icon: 'fa-dog', color: 'text-rose-400', bg: 'bg-rose-900/50' },
            { id: 'av5', icon: 'fa-dragon', color: 'text-purple-400', bg: 'bg-purple-900/50' },
            { id: 'av6', icon: 'fa-robot', color: 'text-cyan-400', bg: 'bg-cyan-900/50' }
        ];

        const formatMoney = (amount) => {
            if (amount === undefined || amount === null) return '🪙 0';
            return amount.toLocaleString();
        };

        const generateClubId = () => {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < 6; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        };

        function App() {
            const [fbReady, setFbReady] = useState(false);
            const [authUser, setAuthUser] = useState(null);
            const [dbUser, setDbUser] = useState(null);
            const [currentView, setCurrentView] = useState('auth'); 
            const [tablesDB, setTablesDB] = useState([]);
            const [usersDB, setUsersDB] = useState([]);
            const [activeTable, setActiveTable] = useState(null);
            const [toast, setToast] = useState('');

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(''), 4000);
            };

            useEffect(() => {
                if (window.fb) setFbReady(true);
                else {
                    const handleReady = () => setFbReady(true);
                    window.addEventListener('firebase-ready', handleReady);
                    return () => window.removeEventListener('firebase-ready', handleReady);
                }
            }, []);

            useEffect(() => {
                if (!fbReady) return;
                const unsubscribe = window.fb.onAuthStateChanged(window.fb.auth, async (user) => {
                    if (user) {
                        setAuthUser(user);
                        await fetchOrInitializeUser(user);
                    } else {
                        setAuthUser(null);
                        setDbUser(null);
                        setCurrentView('auth');
                    }
                });
                return () => unsubscribe();
            }, [fbReady]);

            const fetchOrInitializeUser = async (user) => {
                const userRef = window.fb.doc(window.fb.db, "users", user.uid);
                const userSnap = await window.fb.getDoc(userRef);
                
                if (userSnap.exists()) {
                    let data = userSnap.data();
                    if (data.role === ROLES.OWNER && data.balance < 10000000) {
                         await window.fb.updateDoc(userRef, { balance: 10000000 });
                         data.balance = 10000000;
                    }
                    if (!data.clubId) {
                        const newClubId = generateClubId();
                        await window.fb.updateDoc(userRef, { clubId: newClubId });
                        data.clubId = newClubId;
                    }
                    setDbUser({ uid: user.uid, ...data });
                } else {
                    const usersQuery = await window.fb.getDocs(window.fb.collection(window.fb.db, "users"));
                    const isFirstUser = usersQuery.empty;
                    const isSecondUser = usersQuery.size === 1;
                    
                    let role = ROLES.PLAYER;
                    let status = 'pending';
                    let balance = 0;

                    if (isFirstUser) {
                        role = ROLES.OWNER;
                        status = 'approved';
                        balance = 10000000; 
                    } else if (isSecondUser) {
                        role = ROLES.MANAGER;
                        status = 'approved';
                    }

                    const newClubId = generateClubId();

                    const newUser = {
                        username: user.displayName || 'שחקן_' + newClubId,
                        clubId: newClubId,
                        email: user.email,
                        role: role,
                        status: status,
                        balance: balance,
                        avatarId: 'av' + (Math.floor(Math.random()*6)+1),
                        agentId: null,
                        agentRakeShare: 0,
                        createdAt: new Date().toISOString()
                    };
                    
                    await window.fb.setDoc(userRef, newUser);
                    setDbUser({ uid: user.uid, ...newUser });
                }
            };

            useEffect(() => {
                if (!fbReady || !dbUser) return;
                
                const unsubTables = window.fb.onSnapshot(window.fb.collection(window.fb.db, "tables"), (snapshot) => {
                    setTablesDB(snapshot.docs.map(doc => ({ docId: doc.id, ...doc.data() })));
                });

                const unsubMe = window.fb.onSnapshot(window.fb.doc(window.fb.db, "users", dbUser.uid), (doc) => {
                    if (doc.exists()) {
                        const data = doc.data();
                        setDbUser({ uid: doc.id, ...data });
                        
                        if (data.status === 'pending') setCurrentView('pending');
                        else if (currentView === 'auth' || currentView === 'pending') setCurrentView('lobby');
                    }
                });

                let unsubUsers = () => {};
                if (dbUser.role === ROLES.OWNER || dbUser.role === ROLES.MANAGER) {
                    unsubUsers = window.fb.onSnapshot(window.fb.collection(window.fb.db, "users"), (snapshot) => {
                        setUsersDB(snapshot.docs.map(doc => ({ uid: doc.id, ...doc.data() })));
                    });
                }

                return () => { unsubTables(); unsubMe(); unsubUsers(); };
            }, [fbReady, dbUser?.uid, dbUser?.role, currentView]);

            if (!fbReady) return <div className="h-screen w-screen flex items-center justify-center text-emerald-400 font-bold"><i className="fa-solid fa-spinner fa-spin text-4xl"></i></div>;

            const userAvatar = AVATARS.find(a => a.id === dbUser?.avatarId) || AVATARS[0];

            return (
                <div className="h-full flex flex-col relative bg-slate-950">
                    {dbUser && dbUser.status === 'approved' && currentView !== 'table' && (
                        <nav className="bg-slate-950 p-3 sm:p-4 z-40 shrink-0 border-b border-slate-800 shadow-2xl relative">
                            <div className="absolute inset-0 bg-gradient-to-r from-blue-900/10 to-purple-900/10 pointer-events-none"></div>
                            <div className="max-w-7xl mx-auto flex justify-between items-center relative z-10">
                                
                                <div className="flex items-center gap-3">
                                    <button onClick={() => window.fb.signOut(window.fb.auth)} className="w-10 h-10 rounded-xl bg-slate-900 border border-slate-800 text-rose-500 hover:bg-rose-500/20 transition-all flex items-center justify-center" title="התנתק">
                                        <i className="fa-solid fa-arrow-right-from-bracket"></i>
                                    </button>
                                    
                                    {(dbUser.role === ROLES.OWNER || dbUser.role === ROLES.MANAGER) && (
                                        <button 
                                            onClick={() => setCurrentView(currentView === 'backoffice' ? 'lobby' : 'backoffice')}
                                            className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${currentView === 'backoffice' ? 'bg-slate-200 text-slate-900 shadow-[0_0_15px_rgba(255,255,255,0.5)]' : 'bg-slate-800 text-slate-400 hover:text-white border border-slate-700'}`}
                                            title="ניהול מועדון"
                                        >
                                            <i className="fa-solid fa-users-gear"></i>
                                        </button>
                                    )}

                                    <div 
                                        className="flex items-center gap-3 cursor-pointer bg-slate-900 hover:bg-slate-800 py-1.5 px-3 rounded-2xl border border-slate-700 transition-all shadow-lg group"
                                        onClick={() => setCurrentView('profile')}
                                    >
                                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center border border-slate-600 transition-transform group-hover:scale-110 ${userAvatar.bg}`}>
                                            <i className={`fa-solid ${userAvatar.icon} ${userAvatar.color} text-lg`}></i>
                                        </div>
                                        <div className="flex flex-col items-end pr-1">
                                            <span className="text-sm font-bold text-white flex items-center gap-2">
                                                {dbUser.username}
                                                {dbUser.role === ROLES.OWNER && <i className="fa-solid fa-crown text-gold-400 text-[10px]" title="Owner"></i>}
                                                {dbUser.role === ROLES.MANAGER && <i className="fa-solid fa-shield text-blue-400 text-[10px]" title="Manager"></i>}
                                                {dbUser.role === ROLES.AGENT && <i className="fa-solid fa-handshake text-emerald-400 text-[10px]" title="Agent"></i>}
                                            </span>
                                            <span className="chip-text text-md leading-none tracking-wide"><i className="fa-solid fa-coins text-gold-500 mr-1 text-xs"></i>{formatMoney(dbUser.balance)}</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex flex-col items-end cursor-pointer" onClick={() => setCurrentView('lobby')}>
                                    <h1 className="text-2xl sm:text-3xl font-black tracking-widest uppercase bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-white drop-shadow-[0_0_10px_rgba(59,130,246,0.5)]">
                                        RUMMIKUBE<span className="text-blue-500">.COM</span>
                                    </h1>
                                    <p className="text-[10px] text-slate-400 font-bold tracking-[0.4em] uppercase">Elite Private Club</p>
                                </div>
                            </div>
                        </nav>
                    )}

                    <main className="flex-1 relative overflow-hidden flex flex-col">
                        {currentView === 'auth' && <AuthView />}
                        {currentView === 'pending' && <PendingView />}
                        {currentView === 'lobby' && <LobbyView user={dbUser} tables={tablesDB} onJoin={(t) => {setActiveTable(t); setCurrentView('table');}} showToast={showToast} />}
                        {currentView === 'backoffice' && <BackofficeView user={dbUser} usersDB={usersDB} showToast={showToast} />}
                        {currentView === 'profile' && <ProfileView user={dbUser} onSave={() => setCurrentView('lobby')} showToast={showToast} />}
                        {currentView === 'table' && <GameTableView tableDocId={activeTable?.docId} user={dbUser} onLeave={() => {setActiveTable(null); setCurrentView('lobby');}} showToast={showToast} />}
                    </main>

                    {toast && (
                        <div className="absolute bottom-10 left-1/2 transform -translate-x-1/2 bg-slate-800 border border-slate-600 text-white px-6 py-3 rounded-2xl shadow-2xl z-[9999] font-bold whitespace-nowrap animate-bounce">
                            {toast}
                        </div>
                    )}
                </div>
            );
        }

        function AuthView() {
            const [error, setError] = useState('');
            const handleLogin = async () => {
                try { await window.fb.signInWithPopup(window.fb.auth, window.fb.googleProvider); } 
                catch (e) { setError(`שגיאה בהתחברות: (${e.code})`); }
            };

            return (
                <div className="flex-1 flex items-center justify-center p-4">
                    <div className="glass-panel p-10 rounded-3xl w-full max-w-md text-center border-t-4 border-blue-500 relative overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.8)]">
                        <div className="absolute top-0 left-0 w-full h-32 bg-blue-500/10 blur-3xl"></div>
                        <div className="w-20 h-20 mx-auto bg-slate-900 rounded-2xl flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(59,130,246,0.3)] border border-slate-800 relative z-10">
                             <i className="fa-solid fa-gem text-5xl text-blue-500"></i>
                        </div>
                        <h2 className="text-3xl font-black text-white tracking-widest mb-1 relative z-10">RUMMIKUBE.COM</h2>
                        <p className="text-slate-400 text-xs font-bold tracking-[0.2em] mb-10 relative z-10">ELITE PRIVATE CLUB</p>
                        
                        <button onClick={handleLogin} className="w-full bg-white text-slate-900 font-black py-4 rounded-xl shadow-lg hover:bg-slate-200 transition-transform hover:scale-105 flex items-center justify-center gap-3 relative z-10 text-lg">
                            <i className="fa-brands fa-google text-rose-500"></i> התחבר עם חשבון Google
                        </button>
                        
                        {error && <div className="mt-6 text-rose-400 text-sm font-bold bg-rose-900/20 p-3 rounded-lg border border-rose-900/50 relative z-10">{error}</div>}
                    </div>
                </div>
            );
        }

        function PendingView() {
            return (
                <div className="flex-1 flex items-center justify-center p-4 text-center">
                    <div className="glass-panel p-10 rounded-3xl max-w-sm">
                        <i className="fa-solid fa-clock-rotate-left text-6xl text-gold-500 mb-6 animate-pulse"></i>
                        <h2 className="text-2xl font-black text-white mb-3">ממתין לאישור הנהלה</h2>
                        <p className="text-slate-400 text-sm leading-relaxed mb-8">הבקשה שלך נמצאת אצל מנהלי הקלאב. רק לאחר אישור והפקדת צ'יפים תוכל להיכנס.</p>
                        <button onClick={() => window.fb.signOut(window.fb.auth)} className="text-slate-400 font-bold hover:text-white underline">התנתק וחזור למסך הראשי</button>
                    </div>
                </div>
            );
        }

        function ProfileView({ user, onSave, showToast }) {
            const [username, setUsername] = useState(user.username);
            const [avatarId, setAvatarId] = useState(user.avatarId);

            const handleSave = async () => {
                try {
                    await window.fb.updateDoc(window.fb.doc(window.fb.db, "users", user.uid), {
                        username, avatarId
                    });
                    showToast("פרופיל עודכן בהצלחה");
                    onSave();
                } catch(e) { showToast("שגיאה בעדכון הפרופיל"); }
            };

            return (
                <div className="flex-1 p-4 flex justify-center items-start overflow-y-auto pt-10 pb-20">
                    <div className="glass-panel p-8 rounded-3xl w-full max-w-lg border border-slate-700 shadow-2xl">
                        <div className="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
                            <h2 className="text-2xl font-black text-white">הגדרות פרופיל אישי</h2>
                            <button onClick={onSave} className="text-slate-400 hover:text-white"><i className="fa-solid fa-xmark text-2xl"></i></button>
                        </div>

                        <div className="mb-8 text-center bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                            <p className="text-slate-400 text-xs mb-2 uppercase tracking-widest font-bold">מזהה מועדון קבוע (ID)</p>
                            <code className="text-gold-400 text-2xl font-black tracking-widest">{user.clubId}</code>
                            <p className="text-[10px] text-slate-500 mt-2">זהו המזהה הייחודי שלך לטובת העברות כספים וסטטיסטיקה.</p>
                        </div>

                        <div className="mb-8">
                            <label className="block text-sm font-bold text-slate-300 mb-3">בחר כינוי (Username)</label>
                            <input 
                                type="text" 
                                value={username} 
                                onChange={e => setUsername(e.target.value)}
                                className="w-full bg-slate-950 text-white px-4 py-3 rounded-xl border border-slate-700 outline-none focus:border-blue-500 font-bold text-lg text-center"
                                maxLength={12}
                            />
                        </div>

                        <div className="mb-8">
                            <label className="block text-sm font-bold text-slate-300 mb-3">בחר אווטאר</label>
                            <div className="grid grid-cols-3 gap-4">
                                {AVATARS.map(av => (
                                    <div 
                                        key={av.id} 
                                        onClick={() => setAvatarId(av.id)}
                                        className={`cursor-pointer rounded-2xl flex flex-col items-center justify-center p-4 border-2 transition-all ${avatarId === av.id ? 'border-blue-500 bg-slate-800 scale-105 shadow-[0_0_15px_rgba(59,130,246,0.5)]' : 'border-slate-800 bg-slate-900 hover:border-slate-600'}`}
                                    >
                                        <div className={`w-14 h-14 rounded-full flex items-center justify-center ${av.bg} mb-2`}>
                                            <i className={`fa-solid ${av.icon} ${av.color} text-2xl`}></i>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <button onClick={handleSave} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl shadow-[0_0_20px_rgba(59,130,246,0.4)] transition-transform hover:scale-105 text-lg">
                            שמור שינויים
                        </button>
                    </div>
                </div>
            );
        }

        function BackofficeView({ user, usersDB, showToast }) {
            const [selectedUser, setSelectedUser] = useState(null);
            const [amount, setAmount] = useState('');

            // Zero-Sum Transaction for Chip Transfers
            const handleTransfer = async (type) => {
                if (!selectedUser || !amount || isNaN(amount) || amount <= 0) return showToast("הזן סכום תקין");
                const amt = parseInt(amount);
                const isDeposit = type === 'deposit';

                if (isDeposit && user.balance < amt) return showToast("אין לך מספיק צ'יפים בקופה המרכזית!");
                if (!isDeposit && selectedUser.balance < amt) return showToast("לשחקן אין מספיק צ'יפים למשיכה!");

        const generateRummikubDeck = () => {
            const colors = ['#f43f5e', '#3b82f6', '#fbbf24', '#0f172a']; // Red, Blue, Yellow/Orange, Black
            let deck = [];
            let idCounter = 1;
            
            for (let s = 0; s < 2; s++) { // 2 sets of each
                colors.forEach(hex => {
                    for (let i = 1; i <= 13; i++) {
                        deck.push({ id: `t_${idCounter++}`, val: i, hex });
                    }
                });
            }
            // 2 Jokers
            deck.push({ id: `t_${idCounter++}`, val: '☻', hex: '#ffffff', isJoker: true });
            deck.push({ id: `t_${idCounter++}`, val: '☻', hex: '#ffffff', isJoker: true });
            
            // Shuffle
            return deck.sort(() => Math.random() - 0.5);
        };

        const isValidMeld = (meld) => {
            if (meld.length < 3) return false;
            if (meld.length > 13) return false;

            const jokers = meld.filter(t => t.val === '☻' || t.isJoker);
            const regulars = meld.filter(t => t.val !== '☻' && !t.isJoker);

            if (regulars.length === 0) return true; // All jokers (rare but technically valid)

            // Check if SET (same value, different colors)
            const isSet = () => {
                if (meld.length > 4) return false;
                const val = regulars[0].val;
                const colors = new Set();
                for (let t of regulars) {
                    if (t.val !== val) return false;
                    if (colors.has(t.hex)) return false;
                    colors.add(t.hex);
                }
                return true;
            };

            // Check if RUN (same color, sequential values)
            const isRun = () => {
                const hex = regulars[0].hex;
                const values = [];
                for (let t of regulars) {
                    if (t.hex !== hex) return false;
                    values.push(parseInt(t.val));
                }
                values.sort((a, b) => a - b);
                
                // No duplicates in a run
                if (new Set(values).size !== values.length) return false;

                const span = values[values.length - 1] - values[0] + 1;
                const internalGaps = span - values.length;
                
                if (internalGaps > jokers.length) return false; // Not enough jokers to fill gaps

                const remainingJokers = jokers.length - internalGaps;
                const leftSpace = values[0] - 1;
                const rightSpace = 13 - values[values.length - 1];
                
                if (remainingJokers > leftSpace + rightSpace) return false; // Jokers would push run out of 1-13 bounds

                return true;
            };

            return isSet() || isRun();
        };

        const getGroupValue = (group) => {
            const regulars = group.filter(t => t.val !== '☻' && !t.isJoker);
            if (regulars.length === 0) return 0;
            
            const isSet = regulars.every(t => t.val === regulars[0].val);
            if (isSet) {
                return parseInt(regulars[0].val) * group.length;
            }
            
            // For runs, calculate actual sum including jokers
            const vals = regulars.map(t => parseInt(t.val)).sort((a,b)=>a-b);
            let sum = 0;
            let jokersLeft = group.length - regulars.length;
            
            // Internal gaps
            for (let i = 0; i < vals.length; i++) {
                if (i > 0) {
                    const gap = vals[i] - vals[i-1] - 1;
                    for (let j = 1; j <= gap; j++) {
                        sum += (vals[i-1] + j);
                        jokersLeft--;
                    }
                }
                sum += vals[i];
            }
            
            // Add remaining jokers to edges
            let top = vals[vals.length - 1] + 1;
            let bottom = vals[0] - 1;
            while (jokersLeft > 0) {
                if (top <= 13) { sum += top; top++; }
                else { sum += bottom; bottom--; }
                jokersLeft--;
            }
            return sum;
        };

        function GameTableView({ tableDocId, user, onLeave, showToast }) {
            const [tableState, setTableState] = useState(null);
            const [localRack, setLocalRack] = useState([]); 
            const [dragData, setDragData] = useState(null);
            const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
            const [hoverTarget, setHoverTarget] = useState(null);
            const tableRef = useRef(null);

            const [timeLeft, setTimeLeft] = useState(0);
            const previousTurnRef = useRef(null);
            const originalBoardRef = useRef([]);
            const originalRackRef = useRef([]);

            useEffect(() => {
                if (!tableDocId) return;
                const unsub = window.fb.onSnapshot(window.fb.doc(window.fb.db, "tables", tableDocId), (doc) => {
                    if (doc.exists()) {
                        const data = { id: doc.id, ...doc.data() };
                        setTableState(data);
                        
                        // Sync rack only if we aren't dragging something
                        if (data.players && data.players[user.uid] && data.players[user.uid].rack && !dragData) {
                            setLocalRack(data.players[user.uid].rack);
                        }
                    }
                });
                return () => unsub();
            }, [tableDocId, user.uid]);

            const isSeated = tableState?.players && tableState.players[user.uid];
            const isPlaying = tableState?.status === 'playing';
            const isMyTurn = isPlaying && tableState?.currentTurn === user.uid;
            const myPlayerData = isSeated ? tableState.players[user.uid] : null;

            // Timer and Turn Setup
            useEffect(() => {
                if (isMyTurn && tableState.currentTurn !== previousTurnRef.current) {
                    // New Turn Started for ME. Snapshot the table and my rack!
                    originalBoardRef.current = JSON.parse(JSON.stringify(tableState.board || []));
                    originalRackRef.current = JSON.parse(JSON.stringify(tableState.players[user.uid].rack || []));
                    setTimeLeft(tableState.turnTime || 60);
                    previousTurnRef.current = tableState.currentTurn;
                }
            }, [isMyTurn, tableState]);

            // Timer Countdown
            useEffect(() => {
                if (!isMyTurn || timeLeft <= 0) return;
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            clearInterval(timer);
                            handleEndTurn(true); // Time's up penalty!
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [isMyTurn, timeLeft]);

            // Smart Drag & Drop Engine (Pointer Events)
            useEffect(() => {
                const handlePointerMove = (e) => {
                    if (!dragData || !isMyTurn) return;
                    e.preventDefault(); // Stop scrolling
                    
                    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                    setDragPos({ x: clientX, y: clientY });

                    if (!tableRef.current) return;

                    // Find drop zone using geometry
                    const elements = document.elementsFromPoint(clientX, clientY);
                    let foundZone = null;
                    for (let el of elements) {
                        const zone = el.getAttribute('data-zone');
                        if (zone) { foundZone = zone; break; }
                    }
                    setHoverTarget(foundZone);
                };

                const handlePointerUp = async (e) => {
                    if (!dragData || !tableState || !isMyTurn) return;
                    
                    let newRack = [...localRack];
                    let newBoard = (tableState.board || []).map(g => [...g]); 
                    let boardChanged = false;

                    // Remove from source
                    if (dragData.source === 'rack') {
                        newRack.splice(dragData.tileIndex, 1);
                    } else if (dragData.source === 'board') {
                        newBoard[dragData.groupIndex].splice(dragData.tileIndex, 1);
                        if (newBoard[dragData.groupIndex].length === 0) newBoard.splice(dragData.groupIndex, 1);
                        boardChanged = true;
                    }

                    // Add to target
                    if (hoverTarget && hoverTarget.startsWith('board-group-')) {
                        const targetIdx = parseInt(hoverTarget.replace('board-group-', ''));
                        const actualIdx = (dragData.source === 'board' && dragData.groupIndex < targetIdx && newBoard.length < (tableState.board||[]).length) ? targetIdx - 1 : targetIdx;
                        
                        if(newBoard[actualIdx]) newBoard[actualIdx].push(dragData.tile);
                        else newBoard.push([dragData.tile]);
                        boardChanged = true;
                    } 
                    else if (hoverTarget === 'board-main') {
                        newBoard.push([dragData.tile]); // New group
                        boardChanged = true;
                    } 
                    else if (hoverTarget === 'rack') {
                        newRack.push(dragData.tile);
                    } 
                    else {
                        // Cancel - return to original position
                        if (dragData.source === 'rack') newRack.splice(dragData.tileIndex, 0, dragData.tile);
                        else {
                            newBoard[dragData.groupIndex].splice(dragData.tileIndex, 0, dragData.tile);
                            boardChanged = true; // Still need to sync as it might have shifted
                        }
                    }

                    // Update local state immediately
                    setLocalRack(newRack);
                    
                    // Sync board to Firebase for everyone to see
                    if (boardChanged) {
                        try { await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { board: newBoard }); } 
                        catch(err) { console.error("Sync error", err); }
                    }

                    setDragData(null);
                    setHoverTarget(null);
                };

                if (dragData) {
                    window.addEventListener('pointermove', handlePointerMove, { passive: false });
                    window.addEventListener('pointerup', handlePointerUp);
                    window.addEventListener('touchmove', handlePointerMove, { passive: false });
                    window.addEventListener('touchend', handlePointerUp);
                }
                return () => {
                    window.removeEventListener('pointermove', handlePointerMove);
                    window.removeEventListener('pointerup', handlePointerUp);
                    window.removeEventListener('touchmove', handlePointerMove);
                    window.removeEventListener('touchend', handlePointerUp);
                };
            }, [dragData, hoverTarget, localRack, tableState, isMyTurn]);

            const startDrag = (e, tile, source, groupIndex, tileIndex) => {
                if (!isPlaying) return showToast("המשחק טרם החל.");
                if (!isMyTurn) return showToast("זה לא התור שלך!");
                
                e.stopPropagation();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                setDragData({ tile, source, groupIndex, tileIndex });
                setDragPos({ x: clientX, y: clientY });
            };

            const handleSitDown = async () => {
                if (user.balance < tableState.buyIn && user.role !== ROLES.OWNER) {
                    return showToast("אין לך מספיק צ'יפים להיכנס לשולחן זה.");
                }
                
                const currentPlayers = tableState.players || {};
                if (Object.keys(currentPlayers).length >= 4) return showToast("השולחן מלא.");

                const takenSeats = Object.values(currentPlayers).map(p => p.seat);
                let emptySeat = 0;
                while (takenSeats.includes(emptySeat)) emptySeat++;

                const updatedPlayers = { ...currentPlayers };
                updatedPlayers[user.uid] = {
                    username: user.username,
                    avatarId: user.avatarId,
                    seat: emptySeat,
                    rack: [],
                    hasOpened: false
                };

                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { players: updatedPlayers });
            };

            const handleStartGame = async () => {
                const uids = Object.keys(tableState.players || {});
                if (uids.length < 2) return showToast("צריך לפחות 2 שחקנים כדי להתחיל משחק.");

                const deck = generateRummikubDeck();
                const updatedPlayers = { ...tableState.players };

                uids.forEach(uid => {
                    updatedPlayers[uid].rack = deck.splice(0, 14);
                    updatedPlayers[uid].hasOpened = false;
                });

                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), {
                    status: 'playing',
                    deck: deck,
                    players: updatedPlayers,
                    currentTurn: uids[0], 
                    board: []
                });
                showToast("המשחק התחיל! שיהיה בהצלחה.");
            };

            const handleWin = async () => {
                showToast("🏆 ניצחת! מחשב תוצאות ועמלות קלאב...");
                try {
                    // 1. Setup Data
                    const uids = Object.keys(tableState.players);
                    const losers = uids.filter(uid => uid !== user.uid);
                    
                    // 2. Atomic Transaction for Economy (Zero-Sum + Rake)
                    await window.fb.runTransaction(window.fb.db, async (transaction) => {
                        // Find Owner
                        const ownerQuery = await window.fb.getDocs(window.fb.query(window.fb.collection(window.fb.db, "users"), window.fb.where('role', '==', ROLES.OWNER)));
                        const ownerDocRef = ownerQuery.docs[0].ref;
                        const ownerDoc = await transaction.get(ownerDocRef);

                        // Read all players
                        let playerDocs = {};
                        for (let uid of uids) {
                            playerDocs[uid] = await transaction.get(window.fb.doc(window.fb.db, "users", uid));
                        }

                        // Read Agents (if applicable)
                        let agentDocs = {};
                        for (let uid of losers) {
                            const pData = playerDocs[uid].data();
                            if (pData.agentId && !playerDocs[pData.agentId] && pData.agentId !== ownerDoc.id) {
                                if (!agentDocs[pData.agentId]) {
                                    agentDocs[pData.agentId] = await transaction.get(window.fb.doc(window.fb.db, "users", pData.agentId));
                                }
                            }
                        }

                        let totalPot = 0;
                        let totalRake = 0;
                        let houseProfit = 0;
                        let agentProfits = {}; 
                        let updates = {}; 

                        // Initialize balances
                        updates[ownerDoc.id] = ownerDoc.data().balance || 0;
                        for (let uid of uids) updates[uid] = playerDocs[uid].data().balance || 0;
                        for (let aid in agentDocs) updates[aid] = agentDocs[aid].data().balance || 0;

                        // Calculate Penalties
                        losers.forEach(loserUid => {
                            const loserRack = tableState.players[loserUid].rack || [];
                            let deadwoodPoints = 0;
                            loserRack.forEach(t => {
                                if (t.isJoker || t.val === '☻') deadwoodPoints += 30; // Penalty for joker
                                else deadwoodPoints += parseInt(t.val);
                            });
                            
                            const lossAmount = Math.floor(deadwoodPoints * (tableState.stakes || 10));
                            totalPot += lossAmount;
                            updates[loserUid] -= lossAmount; // Deduct from loser

                            // Rake is 6%
                            const loserRake = Math.floor(lossAmount * 0.06);
                            totalRake += loserRake;

                            // Agent Share
                            const pData = playerDocs[loserUid].data();
                            if (pData.agentId) {
                                const agentCut = Math.floor(loserRake * ((pData.agentRakeShare || 0) / 100));
                                if (!agentProfits[pData.agentId]) agentProfits[pData.agentId] = 0;
                                agentProfits[pData.agentId] += agentCut;
                                houseProfit += (loserRake - agentCut);
                            } else {
                                houseProfit += loserRake;
                            }
                        });

                        const winnerWin = totalPot - totalRake;
                        updates[user.uid] += winnerWin;
                        updates[ownerDoc.id] += houseProfit;
                        for(let aid in agentProfits) updates[aid] += agentProfits[aid];

                        // Apply Writes
                        transaction.update(ownerDocRef, { balance: updates[ownerDoc.id] });
                        for (let uid of uids) transaction.update(window.fb.doc(window.fb.db, "users", uid), { balance: updates[uid] });
                        for (let aid in agentDocs) transaction.update(window.fb.doc(window.fb.db, "users", aid), { balance: updates[aid] });

                        // Reset Table
                        const tableRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const resetPlayers = {};
                        for(let uid of uids) {
                            resetPlayers[uid] = { ...tableState.players[uid], rack: [], hasOpened: false };
                        }
                        transaction.update(tableRef, { status: 'waiting', board: [], deck: [], currentTurn: null, players: resetPlayers });
                    });
                } catch (e) {
                    console.error("Endgame Error:", e);
                    showToast("שגיאה בסליקת המשחק.");
                }
            };

            const applyPenalty = async (reason) => {
                showToast(`קנס: ${reason}`);
                
                let newRack = [...originalRackRef.current];
                let newDeck = [...(tableState.deck || [])];
                
                // Draw 3 penalty cards
                for(let i=0; i<3; i++){
                    if(newDeck.length > 0) newRack.push(newDeck.shift());
                }
                
                setLocalRack(newRack);
                
                const uids = Object.keys(tableState.players);
                const currentIndex = uids.indexOf(user.uid);
                const nextTurnUid = uids[(currentIndex + 1) % uids.length];

                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), {
                    board: originalBoardRef.current, // Revert board
                    deck: newDeck,
                    currentTurn: nextTurnUid,
                    [`players.${user.uid}.rack`]: newRack
                });
            };

            const handleEndTurn = async (isTimeOut = false) => {
                if (!isMyTurn) return;

                if (isTimeOut) {
                    return applyPenalty("נגמר הזמן! הלוח שוחזר וקיבלת עונש 3 אבנים.");
                }

                // 1. Validation Engine: Check entire board
                const currentBoard = tableState.board || [];
                if (currentBoard.length > 0) {
                    const allValid = currentBoard.every(isValidMeld);
                    if (!allValid) return applyPenalty("השולחן אינו חוקי. סדרות שגויות!");
                }

                // 2. Check if player just drew/passed
                const origRack = originalRackRef.current || [];
                if (localRack.length === origRack.length) {
                    return handleDrawTile(); // Auto draw if didn't play
                }

                let updates = {};

                // 3. Opening Validation (First Drop >= 30)
                if (!myPlayerData.hasOpened) {
                    const origBoardStr = JSON.stringify(originalBoardRef.current || []);
                    const currentBoardPrefix = JSON.stringify(currentBoard.slice(0, (originalBoardRef.current || []).length));
                    
                    if (origBoardStr !== currentBoardPrefix) {
                        return applyPenalty("לפני ירידה ראשונה, אסור לשנות אבנים קיימות שעל השולחן!");
                    }

                    const newGroups = currentBoard.slice((originalBoardRef.current || []).length);
                    let totalPoints = 0;
                    newGroups.forEach(g => totalPoints += getGroupValue(g));

                    if (totalPoints < 30) {
                        return applyPenalty(`ירידה ראשונה חייבת להיות לפחות 30 נקודות (הורדת ${totalPoints}).`);
                    }

                    updates[`players.${user.uid}.hasOpened`] = true;
                    showToast("כל הכבוד! פתחת את המשחק (ירידה ראשונה עברה בהצלחה).");
                }

                // 4. WIN CONDITION CHECK
                if (localRack.length === 0) {
                    await handleWin();
                    return; // Stop turn passing, game is over!
                }

                // Pass Turn
                const uids = Object.keys(tableState.players);
                const currentIndex = uids.indexOf(user.uid);
                const nextTurnUid = uids[(currentIndex + 1) % uids.length];

                updates.currentTurn = nextTurnUid;
                updates[`players.${user.uid}.rack`] = localRack;

                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), updates);
            };

            const handleDrawTile = async () => {
                if (!isMyTurn) return;
                
                const origRackStr = JSON.stringify(originalRackRef.current || []);
                const localRackStr = JSON.stringify(localRack);
                
                if (origRackStr !== localRackStr) {
                    return showToast("אי אפשר למשוך מהקופה אחרי שביצעת שינויים. שחזר ידנית או סיים תור לקבלת קנס.");
                }

                const currentDeck = [...(tableState.deck || [])];
                if (currentDeck.length === 0) return showToast("הקופה ריקה!");
                
                const drawnTile = currentDeck.shift(); 
                const newRack = [...localRack, drawnTile];
                setLocalRack(newRack);
                
                const uids = Object.keys(tableState.players);
                const currentIndex = uids.indexOf(user.uid);
                const nextTurnUid = uids[(currentIndex + 1) % uids.length];

                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { 
                    currentTurn: nextTurnUid,
                    deck: currentDeck,
                    [`players.${user.uid}.rack`]: newRack
                });
            };

            if (!tableState) return <div className="flex-1 bg-slate-950 flex items-center justify-center text-white font-sans text-xl">טוען שולחן...</div>;

            const typeInfo = GAME_TYPES.find(g => g.id === tableState.type) || GAME_TYPES[0];
            const hex = typeInfo.hex;
            const sharedBoard = tableState.board || [];
            const playersList = Object.entries(tableState.players || {});

            return (
                <div className="flex-1 flex flex-col relative select-none game-felt overflow-hidden" ref={tableRef} style={{ touchAction: 'none' }}>
                    <div className="absolute inset-0 pointer-events-none opacity-20 mix-blend-screen" style={{ background: `radial-gradient(circle at 50% 30%, ${hex} 0%, transparent 60%)` }}></div>

                    <div className="relative z-20 px-4 py-3 bg-slate-950/80 backdrop-blur-md flex justify-between items-center shadow-[0_10px_30px_rgba(0,0,0,0.8)] border-b border-slate-800">
                        <div className="flex items-center gap-3">
                            <button onClick={onLeave} className="text-slate-400 bg-slate-900 px-4 py-2 rounded-xl border border-slate-800 font-bold hover:text-white transition-colors text-sm flex items-center gap-2">
                                <i className="fa-solid fa-arrow-right"></i> עזוב
                            </button>
                            {isSeated && (
                                <div className="bg-slate-900 border px-4 py-1.5 rounded-xl font-black chip-text shadow-inner hidden sm:block font-rubik" style={{ borderColor: `${hex}50` }}>
                                    {formatMoney(user.balance)}
                                </div>
                            )}
                        </div>
                        
                        <div className="text-center absolute left-1/2 transform -translate-x-1/2">
                            <h2 className="text-lg sm:text-2xl font-black text-white uppercase tracking-widest font-sans" style={{ textShadow: `0 0 20px ${hex}` }}>{typeInfo.name}</h2>
                            <div className="flex items-center justify-center gap-2 mt-0.5 font-sans">
                                <span className="text-[10px] font-bold bg-slate-900 px-2 rounded border border-slate-800 text-slate-300">נקודה: <span style={{color: hex}} className="font-rubik">{tableState.stakes}</span></span>
                                <span className="text-[10px] font-bold bg-slate-900 px-2 rounded border border-slate-800 text-slate-300">כניסה: <span className="font-rubik">{formatMoney(tableState.buyIn)}</span></span>
                            </div>
                        </div>

                        {(user.role === ROLES.OWNER || user.role === ROLES.MANAGER) && (
                            <button onClick={handleWin} className="text-slate-500 hover:text-white bg-slate-900 px-3 py-2 rounded-lg border border-slate-800 transition-colors text-xs font-bold flex items-center gap-2">
                                <i className="fa-solid fa-lock"></i> <span className="hidden sm:inline">הנהלה</span>
                            </button>
                        )}
                    </div>

                    <div 
                        data-zone="board-main" 
                        className={`flex-1 mx-2 sm:mx-6 mt-4 mb-2 rounded-[2rem] border-[4px] relative p-4 sm:p-6 overflow-y-auto transition-all ${hoverTarget === 'board-main' ? 'bg-white/5 scale-[1.01]' : ''}`} 
                        style={{ borderColor: `${hex}30`, backgroundColor: 'rgba(5, 8, 15, 0.7)', boxShadow: `inset 0 0 100px rgba(0,0,0,1)` }}
                    >
                        {!isSeated && (
                            <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm rounded-[1.8rem]">
                                <button onClick={handleSitDown} className="bg-blue-600 hover:bg-blue-500 text-white px-10 py-5 rounded-2xl font-black text-xl shadow-[0_0_30px_rgba(59,130,246,0.6)] flex items-center gap-3 transition-transform hover:scale-105">
                                    <i className="fa-solid fa-chair"></i> שב בשולחן (מינ' {formatMoney(tableState.buyIn)})
                                </button>
                                <p className="mt-4 text-slate-300 font-bold">({playersList.length}/4 שחקנים יושבים)</p>
                            </div>
                        )}

                        {isSeated && !isPlaying && (
                            <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/40 backdrop-blur-sm rounded-[1.8rem]">
                                <h3 className="text-2xl text-white font-black mb-4">ממתין לתחילת משחק...</h3>
                                <p className="text-slate-300 mb-6 font-bold">{playersList.length} שחקנים מחוברים.</p>
                                {(user.role === ROLES.OWNER || user.role === ROLES.MANAGER) && (
                                    <button onClick={handleStartGame} className="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-4 rounded-xl font-black text-lg shadow-[0_0_30px_rgba(16,185,129,0.5)] transition-transform hover:scale-105">
                                        התחל משחק וחלוק 14 אבנים
                                    </button>
                                )}
                            </div>
                        )}

                        {isPlaying && (
                            <div className="absolute top-4 left-4 right-4 flex justify-center gap-8 pointer-events-none opacity-80">
                                {playersList.filter(([uid]) => uid !== user.uid).map(([uid, pData]) => {
                                    const av = AVATARS.find(a => a.id === pData.avatarId) || AVATARS[0];
                                    const isTheirTurn = tableState.currentTurn === uid;
                                    return (
                                        <div key={uid} className={`flex flex-col items-center transition-all ${isTheirTurn ? 'scale-110 drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]' : 'opacity-50'}`}>
                                            <div className={`w-12 h-12 rounded-full flex items-center justify-center border-2 mb-1 ${isTheirTurn ? 'border-white bg-slate-800' : 'border-slate-600 bg-slate-900'}`}>
                                                <i className={`fa-solid ${av.icon} ${av.color}`}></i>
                                            </div>
                                            <span className={`text-[10px] font-bold ${isTheirTurn ? 'text-white' : 'text-slate-400'}`}>{pData.username}</span>
                                            <span className="text-[10px] text-emerald-400 font-rubik bg-slate-900 px-2 rounded-full mt-0.5">{pData.rack?.length || 0} אבנים</span>
                                        </div>
                                    )
                                })}
                            </div>
                        )}

                        <div className="flex flex-wrap gap-4 sm:gap-6 items-start pb-24 mt-20 relative z-10 pointer-events-auto">
                            {sharedBoard.map((group, gIdx) => (
                                <div 
                                    key={gIdx} data-zone={`board-group-${gIdx}`}
                                    className={`flex p-2 sm:p-3 rounded-2xl border-[3px] min-h-[85px] min-w-[70px] transition-all duration-200 pointer-events-auto ${hoverTarget === `board-group-${gIdx}` ? `bg-white/10 scale-110 shadow-[0_0_40px_${hex}80]` : 'bg-black/50 border-white/5'}`}
                                    style={hoverTarget === `board-group-${gIdx}` ? { borderColor: hex } : {}}
                                >
                                    {group.map((tile, tIdx) => (
                                        <div key={tile.id} onPointerDown={(e) => startDrag(e, tile, 'board', gIdx, tIdx)}
                                            onTouchStart={(e) => startDrag(e, tile, 'board', gIdx, tIdx)}
                                            className={`rummi-tile w-12 h-16 sm:w-14 sm:h-20 text-3xl sm:text-4xl mx-0.5 ${dragData?.tile?.id === tile.id ? 'opacity-20' : ''}`}
                                            style={{ color: tile.hex }}>{tile.val}</div>
                                    ))}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div data-zone="rack" className="relative z-20 p-2 sm:p-4 pt-10 sm:pt-12 flex flex-col items-center pb-6 bg-slate-950 border-t-[3px]" style={{ borderTopColor: `${hex}50`, boxShadow: `0 -20px 50px rgba(0,0,0,0.9)` }}>
                        
                        {isPlaying && (
                            <div className="absolute top-[-20px] sm:top-[-24px] flex gap-2 z-30">
                                {!isMyTurn ? (
                                    <div className="bg-slate-900 text-slate-400 px-6 py-2.5 rounded-xl font-bold shadow-2xl border border-slate-800 flex items-center gap-2 text-sm">
                                        <i className="fa-solid fa-hourglass-half fa-spin"></i> ממתין לתור השחקן הבא...
                                    </div>
                                ) : (
                                    <>
                                        <button onClick={handleDrawTile} className="bg-slate-800 hover:bg-slate-700 text-slate-300 px-5 py-2.5 rounded-xl font-bold shadow-2xl border border-slate-600 flex items-center gap-2 text-xs sm:text-sm transition-transform hover:-translate-y-1 font-sans">
                                            <i className="fa-solid fa-layer-group text-gold-400"></i> משיכה (<span className="font-rubik">{tableState.deck?.length || 0}</span>)
                                        </button>
                                        <div className={`px-4 py-2.5 rounded-xl font-black shadow-2xl border flex items-center gap-2 text-xs sm:text-sm ${timeLeft <= 10 ? 'bg-rose-900/80 border-rose-500 text-white animate-pulse' : 'bg-slate-900 border-slate-700 text-slate-300'}`}>
                                            <i className="fa-regular fa-clock"></i> <span className="font-rubik w-5 text-center">{timeLeft}</span>
                                        </div>
                                        <button onClick={() => handleEndTurn(false)} className="text-slate-950 px-6 py-2.5 rounded-xl font-black shadow-[0_0_20px_rgba(16,185,129,0.5)] uppercase text-xs sm:text-sm transition-transform hover:-translate-y-1 font-sans" style={{ backgroundColor: hex }}>
                                            <i className="fa-solid fa-check mr-2"></i> סיום תור
                                        </button>
                                    </>
                                )}
                            </div>
                        )}

                        <div className={`w-[98%] max-w-4xl min-h-[100px] sm:min-h-[130px] bg-gradient-to-b from-slate-800 to-slate-950 rounded-t-3xl border-x-[12px] sm:border-x-[20px] border-b-[10px] sm:border-b-[16px] border-slate-900 shadow-[0_20px_50px_#000] flex flex-wrap justify-center items-end px-2 py-3 sm:py-5 gap-1 relative ${hoverTarget === 'rack' ? `shadow-[0_0_40px_${hex}40]` : ''}`} style={hoverTarget === 'rack' ? {borderColor: `${hex}80`} : {}}>
                            <div className="absolute inset-0 border-t-8 border-black/50 rounded-t-2xl pointer-events-none"></div>

                            {localRack.map((tile, tIdx) => (
                                <div key={tile.id} onPointerDown={(e) => startDrag(e, tile, 'rack', null, tIdx)}
                                    onTouchStart={(e) => startDrag(e, tile, 'rack', null, tIdx)}
                                    className={`rummi-tile w-12 h-16 sm:w-16 sm:h-24 text-3xl sm:text-5xl mx-0.5 z-10 ${dragData?.tile?.id === tile.id ? 'opacity-10 scale-90' : 'hover:-translate-y-3'}`}
                                    style={{ color: tile.hex }}>{tile.val}</div>
                            ))}
                        </div>
                    </div>

                    {dragData && (
                        <div className="fixed dragging-ghost rummi-tile w-16 h-24 sm:w-20 sm:h-28 text-5xl sm:text-6xl z-[99999]"
                            style={{ left: dragPos.x, top: dragPos.y, transform: 'translate(-50%, -50%) rotate(4deg)', color: dragData.tile.hex }}>
                            {dragData.tile.val}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
