<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rummikube.com - Elite Club</title>

    <!-- פונטים נקיים ואלגנטיים -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 950: '#020617', 900: '#0f172a', 800: '#1e293b', 700: '#334155' },
                        gold: { 400: '#facc15', 500: '#eab308' },
                        rummikub: '#10b981'
                    },
                    fontFamily: { 
                        sans: ['Heebo', 'sans-serif'], 
                        rubik: ['Rubik', 'sans-serif'] 
                    }
                }
            }
        }
    </script>

    <style>
        /* Base & Resets - Locking the body, allowing internal scroll */
        body, html {
            background-color: #020617; 
            color: #f8fafc;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            font-family: 'Heebo', sans-serif;
            overflow: hidden; 
            overscroll-behavior: none;
        }

        /* Elegant Scrollbars */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        
        /* Premium UI Components */
        .glass-panel { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5); 
        }
        
        .coin-icon {
            color: #eab308;
            filter: drop-shadow(0 1px 2px rgba(234, 179, 8, 0.3));
        }

        /* Essential for smooth scrolling in Lobby/Backoffice on Mobile */
        .scrollable-content {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            height: 100%;
            padding-bottom: 120px; 
        }
        
        /* Subtle Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes flashRed { 0%, 100% { border-color: rgba(239, 68, 68, 0.3); } 50% { border-color: rgba(239, 68, 68, 0.8); } }
        .board-invalid-group { animation: flashRed 1.5s infinite; border: 1px solid #ef4444 !important; background: rgba(239, 68, 68, 0.05); }
        
        /* Refined Rummy Tiles */
        .rummy-tile {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            box-shadow: 1px 3px 6px rgba(0,0,0,0.3), inset -1px -1px 2px rgba(0,0,0,0.05);
            border-bottom: 4px solid #e2e8f0; 
            border-radius: 6px; 
            font-family: 'Rubik', sans-serif; 
            font-weight: 700;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            user-select: none;
        }
        .rummy-tile:active, .rummy-tile.dragging {
            box-shadow: 0 15px 25px rgba(0,0,0,0.5);
            transform: scale(1.08) translateY(-5px);
            z-index: 999;
        }
        
        /* Elegant Wood Rack */
        .rummy-rack-wood {
            background: linear-gradient(to bottom, #bd9369 0%, #8b5a2b 100%);
            border-bottom: 12px solid #3e220e; 
            border-top: 1px solid #dcb694;
            border-radius: 8px 8px 4px 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), inset 0 5px 15px rgba(0,0,0,0.2);
            position: relative;
        }
        .rummy-rack-wood::after {
            content: ''; position: absolute; inset: 0;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 10px, rgba(0,0,0,0.03) 10px, rgba(0,0,0,0.03) 20px);
            border-radius: inherit; pointer-events: none;
        }

        .timer-ring { transform: rotate(-90deg); transition: stroke-dashoffset 1s linear; }
    </style>

    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase Init -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, onSnapshot, query, where, updateDoc, addDoc, deleteDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBldyf-FW8DI2DX90tM9XIDCEij5riiYOk",
            authDomain: "rummikube-5c138.firebaseapp.com",
            projectId: "rummikube-5c138"
        };
        const app = initializeApp(firebaseConfig);
        window.fb = { auth: getAuth(app), db: getFirestore(app), googleProvider: new GoogleAuthProvider(), signInWithPopup, onAuthStateChanged, signOut, collection, doc, setDoc, getDoc, getDocs, onSnapshot, query, where, updateDoc, addDoc, deleteDoc, runTransaction };
        
        window.dispatchEvent(new Event('firebase-ready'));
    </script>
</head>
<body class="bg-slate-950">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const ROLES = { SUPER_ADMIN: 'super_admin', CLUB_OWNER: 'club_owner', MANAGER: 'manager', PLAYER: 'player' };

        // Formatting utilities
        const formatMoney = (amount) => {
            if (!amount && amount !== 0) return '0';
            if (amount >= 1000000) return (amount / 1000000).toFixed(1) + 'M';
            if (amount >= 1000) return (amount / 1000).toFixed(1) + 'K';
            return amount.toLocaleString();
        };

        const Coin = ({ amount, size = 'sm' }) => (
            <span className={`inline-flex items-center gap-1.5 font-medium ${size === 'lg' ? 'text-xl' : 'text-sm'}`}>
                <i className={`fa-solid fa-coins coin-icon ${size === 'lg' ? 'text-lg' : 'text-xs'}`}></i>
                {formatMoney(amount)}
            </span>
        );

        function App() {
            const [fbReady, setFbReady] = useState(false);
            const [dbUser, setDbUser] = useState(null);
            const [currentView, setCurrentView] = useState('auth'); // auth, pending, lobby, backoffice, table
            const [tablesDB, setTablesDB] = useState([]);
            const [activeTable, setActiveTable] = useState(null);
            const [toasts, setToasts] = useState([]);
            
            // Notification System
            const showToast = (msg, type = 'info') => {
                const id = Date.now(); 
                setToasts(prev => [...prev, { id, msg, type }]);
                setTimeout(() => { setToasts(prev => prev.filter(t => t.id !== id)); }, 3500);
            };

            // Smart Routing logic to handle the back button
            const changeView = (view, tableObj = null) => {
                setCurrentView(view);
                setActiveTable(tableObj);
                
                // Update browser history so back button works smoothly
                if (view !== 'auth' && view !== 'pending') {
                    window.history.pushState({ view, tableId: tableObj?.docId }, "", `?v=${view}`);
                }
            };

            // Listen to browser back button
            useEffect(() => {
                const handlePopState = (event) => {
                    if (event.state && event.state.view) {
                        setCurrentView(event.state.view);
                        if (event.state.view === 'lobby') setActiveTable(null);
                    } else if (dbUser && dbUser.status === 'approved') {
                        setCurrentView('lobby');
                    }
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, [dbUser]);

            useEffect(() => {
                if (window.fb) setFbReady(true);
                else window.addEventListener('firebase-ready', () => setFbReady(true));
            }, []);

            useEffect(() => {
                if (!fbReady) return;
                const unsub = window.fb.onAuthStateChanged(window.fb.auth, async (user) => {
                    if (user) { 
                        await fetchOrInitUser(user); 
                    } else { 
                        setDbUser(null); setCurrentView('auth'); 
                    }
                });
                return () => unsub();
            }, [fbReady]);

            const fetchOrInitUser = async (user) => {
                const ref = window.fb.doc(window.fb.db, "users", user.uid);
                const snap = await window.fb.getDoc(ref);
                if (snap.exists()) {
                    setDbUser({ uid: user.uid, ...snap.data() });
                } else {
                    const q = await window.fb.getDocs(window.fb.collection(window.fb.db, "users"));
                    const role = q.empty ? ROLES.SUPER_ADMIN : ROLES.PLAYER;
                    const newUser = { username: user.displayName || 'Player', role, status: q.empty ? 'approved' : 'pending', balance: q.empty ? 10000000 : 0 };
                    await window.fb.setDoc(ref, newUser); 
                    setDbUser({ uid: user.uid, ...newUser });
                }
            };

            useEffect(() => {
                if (!fbReady || !dbUser) return;
                
                const unsubT = window.fb.onSnapshot(window.fb.collection(window.fb.db, "tables"), (s) => {
                    const tables = s.docs.map(d => ({ docId: d.id, ...d.data() }));
                    setTablesDB(tables);
                });
                
                const unsubU = window.fb.onSnapshot(window.fb.doc(window.fb.db, "users", dbUser.uid), (d) => {
                    if(d.exists()) {
                        const data = d.data(); 
                        setDbUser({ uid: d.id, ...data });
                        
                        if(data.status === 'pending') {
                            changeView('pending');
                        } else if (currentView === 'auth' || currentView === 'pending') {
                            changeView('lobby');
                        }
                    }
                });
                return () => { unsubT(); unsubU(); };
            }, [fbReady, dbUser?.uid]);

            if (!fbReady) return <div className="h-full w-full flex items-center justify-center bg-slate-950"><i className="fa-solid fa-circle-notch fa-spin text-3xl text-emerald-500"></i></div>;

            return (
                <div className="h-full w-full flex flex-col relative bg-slate-950">
                    
                    {/* Refined Elegant Header */}
                    {dbUser && dbUser.status === 'approved' && currentView !== 'table' && (
                        <nav className="bg-slate-900/90 backdrop-blur-md px-4 py-3 z-40 shrink-0 border-b border-slate-800 shadow-md flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <button onClick={() => window.fb.signOut(window.fb.auth)} className="w-9 h-9 rounded-lg bg-slate-800/50 text-slate-400 border border-slate-700 hover:text-white hover:bg-rose-500/20 hover:border-rose-500/50 transition-colors flex items-center justify-center">
                                    <i className="fa-solid fa-sign-out-alt"></i>
                                </button>
                                
                                {[ROLES.SUPER_ADMIN, ROLES.CLUB_OWNER, ROLES.MANAGER].includes(dbUser.role) && (
                                    <button 
                                        onClick={() => changeView(currentView === 'backoffice' ? 'lobby' : 'backoffice')} 
                                        className={`w-9 h-9 rounded-lg border flex items-center justify-center transition-colors ${currentView === 'backoffice' ? 'bg-blue-600/20 text-blue-400 border-blue-500/50' : 'bg-slate-800/50 text-slate-400 border-slate-700 hover:text-white'}`}
                                        title="ניהול"
                                    >
                                        <i className="fa-solid fa-shield-halved"></i>
                                    </button>
                                )}

                                <div className="flex flex-col items-end mr-2">
                                    <span className="text-sm font-bold text-slate-100">{dbUser.username}</span>
                                    <Coin amount={dbUser.balance} />
                                </div>
                            </div>

                            <div className="flex flex-col items-end cursor-pointer" onClick={() => changeView('lobby')}>
                                <h1 className="text-xl font-extrabold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-200">RUMMIKUBE</h1>
                                <p className="text-[9px] text-slate-400 font-semibold tracking-widest uppercase leading-none">Elite Club</p>
                            </div>
                        </nav>
                    )}

                    <main className="flex-1 overflow-hidden relative z-0">
                        {currentView === 'auth' && <AuthView />}
                        {currentView === 'pending' && <PendingView />}
                        {currentView === 'lobby' && <LobbyView user={dbUser} tables={tablesDB} onJoin={(t) => changeView('table', t)} showToast={showToast} />}
                        {currentView === 'backoffice' && <BackofficeView user={dbUser} showToast={showToast} />}
                        {currentView === 'table' && <RummyTable tableDocId={activeTable?.docId} user={dbUser} onLeave={() => changeView('lobby')} showToast={showToast} />}
                    </main>
                    
                    {/* Elegant Toasts */}
                    <div className="fixed bottom-8 left-1/2 transform -translate-x-1/2 z-[9999] flex flex-col gap-2 pointer-events-none w-[90%] max-w-xs">
                        {toasts.map(t => (
                            <div key={t.id} className={`toast-animate px-4 py-3 rounded-xl shadow-lg font-medium text-sm text-center border backdrop-blur-md ${t.type === 'error' ? 'bg-rose-950/90 border-rose-500/50 text-rose-100' : 'bg-slate-800/90 border-slate-600/50 text-emerald-400'}`}>
                                {t.msg}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function AuthView() {
            return (
                <div className="h-full w-full flex flex-col items-center justify-center p-4">
                    <div className="glass-panel p-8 sm:p-12 rounded-2xl text-center relative z-10 w-full max-w-sm animate-fade-in border border-slate-700/50 shadow-2xl">
                        <h2 className="text-3xl font-extrabold text-white mb-1 tracking-wide">Rummikube</h2>
                        <p className="text-emerald-500 mb-8 font-medium tracking-widest uppercase text-xs">Elite Private Club</p>
                        <button onClick={()=>window.fb.signInWithPopup(window.fb.auth, window.fb.googleProvider)} className="w-full bg-slate-50 hover:bg-white transition-colors text-slate-900 font-bold py-3.5 px-6 rounded-xl flex items-center justify-center gap-3 shadow-md">
                            <i className="fa-brands fa-google text-rose-500"></i> התחברות לחברים
                        </button>
                    </div>
                </div>
            );
        }

        function PendingView() {
            return <div className="h-full w-full text-slate-300 flex justify-center items-center font-medium flex-col gap-4">
                <i className="fa-solid fa-hourglass-half text-3xl text-amber-500/70"></i>
                ממתין לאישור מנהל המועדון
            </div>;
        }

        function LobbyView({ user, tables, onJoin, showToast }) {
            const [showCreate, setShowCreate] = useState(false);
            const [newTableOptions, setNewTableOptions] = useState({ maxPlayers: 4, buyIn: 1000 });
            
            const handleCreate = async () => {
                await window.fb.addDoc(window.fb.collection(window.fb.db, "tables"), { 
                    type: 'rummikub', maxPlayers: newTableOptions.maxPlayers, 
                    minBuyIn: newTableOptions.buyIn, stakes: newTableOptions.buyIn / 100, 
                    players: {}, board: [], deck: [], phase: 'waiting', createdAt: Date.now()
                });
                setShowCreate(false); showToast("שולחן נפתח בהצלחה", "success");
            };

            const handleDelete = async (e, id) => {
                e.stopPropagation(); 
                if (window.confirm("למחוק שולחן זה?")) {
                    await window.fb.deleteDoc(window.fb.doc(window.fb.db, "tables", id));
                }
            };

            return (
                <div className="scrollable-content bg-slate-950 p-4 sm:p-6">
                    <div className="max-w-5xl mx-auto w-full animate-fade-in">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-xl sm:text-2xl font-bold text-white flex items-center gap-2">
                                שולחנות רמיקוב
                            </h2>
                            {user.role !== ROLES.PLAYER && (
                                <button onClick={()=>setShowCreate(!showCreate)} className="bg-emerald-600/90 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg font-medium transition-colors flex items-center text-sm">
                                    <i className="fa-solid fa-plus ml-2"></i> שולחן חדש
                                </button>
                            )}
                        </div>
                        
                        {showCreate && (
                            <div className="bg-slate-900 border border-slate-800 p-5 rounded-xl mb-6 shadow-lg">
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                                    <div>
                                        <label className="text-slate-400 text-xs font-medium mb-1 block">שחקנים</label>
                                        <select value={newTableOptions.maxPlayers} onChange={(e)=>setNewTableOptions({...newTableOptions, maxPlayers: parseInt(e.target.value)})} className="w-full bg-slate-950 text-sm text-white border border-slate-700 rounded-lg p-2.5 outline-none">
                                            <option value={2}>2 שחקנים</option>
                                            <option value={3}>3 שחקנים</option>
                                            <option value={4}>4 שחקנים</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-slate-400 text-xs font-medium mb-1 block">דמי כניסה (Buy-In)</label>
                                        <select value={newTableOptions.buyIn} onChange={(e)=>setNewTableOptions({...newTableOptions, buyIn: parseInt(e.target.value)})} className="w-full bg-slate-950 text-sm text-white border border-slate-700 rounded-lg p-2.5 outline-none">
                                            <option value={1000}>1,000 צ'יפים</option>
                                            <option value={5000}>5,000 צ'יפים</option>
                                            <option value={10000}>10,000 צ'יפים</option>
                                        </select>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 pt-3 border-t border-slate-800/50">
                                    <button onClick={()=>setShowCreate(false)} className="px-4 py-2 text-sm text-slate-400 hover:text-white transition-colors">ביטול</button>
                                    <button onClick={handleCreate} className="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 text-sm rounded-lg font-medium transition-colors">אשר ופתח</button>
                                </div>
                            </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {tables.map(t => (
                                <div key={t.docId} onClick={()=>onJoin(t)} className="bg-slate-900 border border-slate-800 p-5 rounded-xl cursor-pointer hover:border-emerald-500/30 transition-colors group relative">
                                    {user.role !== ROLES.PLAYER && (
                                        <button onClick={(e)=>handleDelete(e,t.docId)} className="absolute top-3 left-3 w-7 h-7 rounded bg-slate-800/80 text-slate-500 hover:text-rose-400 transition-colors flex items-center justify-center z-10"><i className="fa-solid fa-trash text-xs"></i></button>
                                    )}
                                    <div className="flex justify-between items-start mb-3">
                                        <div>
                                            <h3 className="text-lg font-bold text-slate-100">Stakes {t.stakes}</h3>
                                            <p className="text-slate-400 text-sm mt-0.5 flex items-center gap-1">כניסה: <Coin amount={t.minBuyIn} /></p>
                                        </div>
                                        <div className="px-2.5 py-1 rounded bg-slate-950 border border-slate-800 text-sm font-medium flex items-center gap-1.5 text-slate-300">
                                            <i className="fa-solid fa-user-group text-xs text-slate-500"></i> {Object.keys(t.players||{}).length}/{t.maxPlayers}
                                        </div>
                                    </div>
                                    <div className="mt-5 flex justify-between items-center">
                                        <span className="text-xs text-slate-500 font-medium">עמלה 6%</span>
                                        <button className="bg-slate-800 group-hover:bg-emerald-600/90 text-white px-5 py-1.5 rounded-lg text-sm font-medium transition-colors">
                                            {t.phase === 'playing' ? 'צפה' : 'היכנס'}
                                        </button>
                                    </div>
                                </div>
                            ))}
                            {tables.length === 0 && <div className="col-span-full text-center py-12 text-slate-500 font-medium bg-slate-900/30 rounded-xl border border-slate-800/50 border-dashed">אין שולחנות פעילים. פתח שולחן חדש לחברים.</div>}
                        </div>
                    </div>
                </div>
            );
        }

        function BackofficeView({ user, showToast }) {
            const [usersList, setUsersList] = useState([]);
            const [selectedUser, setSelectedUser] = useState('');
            const [transferAmount, setTransferAmount] = useState('');
            const [cycle, setCycle] = useState('all');

            useEffect(() => {
                const unsub = window.fb.onSnapshot(window.fb.collection(window.fb.db, "users"), (snap) => {
                    setUsersList(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => unsub();
            }, []);

            const handleApprove = async (uid) => {
                try {
                    await window.fb.updateDoc(window.fb.doc(window.fb.db, "users", uid), { status: 'approved' });
                    showToast("שחקן אושר בהצלחה", "success");
                } catch(e) { showToast("שגיאה באישור", "error"); }
            };

            const handleTransfer = async (isDeposit) => {
                if (!selectedUser) return showToast("בחר שחקן", "error");
                const amount = parseInt(transferAmount);
                if (!amount || amount <= 0) return showToast("סכום לא חוקי", "error");

                try {
                    await window.fb.runTransaction(window.fb.db, async (transaction) => {
                        const ownerRef = window.fb.doc(window.fb.db, "users", user.uid);
                        const targetRef = window.fb.doc(window.fb.db, "users", selectedUser);
                        const ownerSnap = await transaction.get(ownerRef);
                        const targetSnap = await transaction.get(targetRef);

                        let ownerBal = ownerSnap.data().balance;
                        let targetBal = targetSnap.data().balance;

                        if (isDeposit) {
                            if (ownerBal < amount) throw "אין לך מספיק יתרה במועדון להפקדה זו.";
                            ownerBal -= amount; targetBal += amount;
                        } else {
                            if (targetBal < amount) throw "לשחקן אין מספיק יתרה למשיכה זו.";
                            ownerBal += amount; targetBal -= amount;
                        }

                        transaction.update(ownerRef, { balance: ownerBal });
                        transaction.update(targetRef, { balance: targetBal });
                    });
                    showToast(`פעולת ה${isDeposit?'הפקדה':'משיכה'} בוצעה בהצלחה`, "success");
                    setTransferAmount('');
                } catch (e) { showToast(typeof e === 'string' ? e : "שגיאה בפעולה", "error"); }
            };

            const exportToExcel = () => {
                let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
                csvContent += "שם שחקן,מזהה,יתרת צ'יפים,סטטוס\n";
                usersList.forEach(u => {
                    csvContent += `"${u.username}","${u.id}",${u.balance},"${u.status === 'approved' ? 'פעיל' : 'ממתין'}"\n`;
                });
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csvContent));
                link.setAttribute("download", `club_report_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast("דוח אקסל נוצר בהצלחה!", "success");
            };

            const pendingUsers = usersList.filter(u => u.status === 'pending');
            const approvedPlayers = usersList.filter(u => u.status === 'approved' && u.id !== user.uid);

            return (
                <div className="scrollable-content bg-slate-950 p-4 sm:p-6">
                    <div className="max-w-5xl mx-auto w-full animate-fade-in">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-slate-800/50 pb-6">
                            <div>
                                <h2 className="text-2xl font-bold text-white mb-1">ניהול מועדון</h2>
                                <p className="text-sm text-slate-400">ניהול יתרות, אישורים והפקת דוחות סליקה.</p>
                            </div>
                            <div className="flex flex-wrap items-center gap-3 w-full md:w-auto">
                                <select value={cycle} onChange={(e)=>setCycle(e.target.value)} className="bg-slate-900 border border-slate-700 text-sm text-slate-200 rounded-lg px-3 py-2 outline-none">
                                    <option value="all">מחזור: כל הזמנים</option>
                                    <option value="month">מחזור: החודש</option>
                                    <option value="week">מחזור: השבוע</option>
                                </select>
                                <button onClick={exportToExcel} className="bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-200 px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2">
                                    <i className="fa-solid fa-download"></i> אקסל
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                            <div className="bg-slate-900 rounded-xl p-5 border border-slate-800">
                                <h3 className="text-slate-400 text-xs font-medium mb-1.5">היתרה האישית שלך</h3>
                                <p className="text-2xl font-bold text-white"><Coin amount={user.balance} size="lg" /></p>
                            </div>
                            <div className="bg-slate-900 rounded-xl p-5 border border-slate-800">
                                <h3 className="text-slate-400 text-xs font-medium mb-1.5">סך הכל אצל שחקנים</h3>
                                <p className="text-2xl font-bold text-blue-400"><Coin amount={approvedPlayers.reduce((sum, p) => sum + (p.balance || 0), 0)} size="lg" /></p>
                            </div>
                            <div className="bg-slate-900 rounded-xl p-5 border border-slate-800">
                                <h3 className="text-slate-400 text-xs font-medium mb-1.5">ממתינים לאישור</h3>
                                <p className="text-2xl font-bold text-amber-400">{pendingUsers.length}</p>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div className="bg-slate-900 rounded-xl border border-slate-800 p-5">
                                <h3 className="font-bold text-white mb-5 text-sm flex items-center gap-2"><i className="fa-solid fa-money-bill-transfer text-emerald-500"></i> העברת צ'יפים לשחקן</h3>
                                <div className="space-y-4">
                                    <div>
                                        <select value={selectedUser} onChange={(e)=>setSelectedUser(e.target.value)} className="w-full bg-slate-950 text-sm text-slate-200 border border-slate-700 rounded-lg p-3 outline-none focus:border-slate-500">
                                            <option value="">-- בחר מהרשימה --</option>
                                            {approvedPlayers.map(p => (<option key={p.id} value={p.id}>{p.username} - יתרה: {formatMoney(p.balance)}</option>))}
                                        </select>
                                    </div>
                                    <div>
                                        <input type="number" value={transferAmount} onChange={(e)=>setTransferAmount(e.target.value)} placeholder="סכום..." className="w-full bg-slate-950 text-sm text-slate-200 border border-slate-700 rounded-lg p-3 outline-none focus:border-slate-500" />
                                    </div>
                                    <div className="flex gap-2 pt-2">
                                        <button onClick={()=>handleTransfer(true)} className="flex-1 bg-emerald-600/90 hover:bg-emerald-500 text-white py-2.5 rounded-lg text-sm font-medium transition-colors">
                                            הפקד <i className="fa-solid fa-arrow-down ml-1"></i>
                                        </button>
                                        <button onClick={()=>handleTransfer(false)} className="flex-1 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white py-2.5 rounded-lg text-sm font-medium transition-colors">
                                            משוך <i className="fa-solid fa-arrow-up ml-1 text-slate-400"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-slate-900 rounded-xl border border-slate-800 p-5 flex flex-col min-h-[250px]">
                                <h3 className="font-bold text-white mb-4 text-sm flex items-center gap-2"><i className="fa-solid fa-user-check text-amber-500"></i> בקשות הצטרפות</h3>
                                <div className="flex-1 overflow-y-auto space-y-2">
                                    {pendingUsers.length === 0 && <div className="text-center text-slate-500 text-sm py-8 font-medium">אין בקשות בהמתנה.</div>}
                                    {pendingUsers.map(u => (
                                        <div key={u.id} className="bg-slate-950 p-3 rounded-lg border border-slate-800 flex justify-between items-center">
                                            <span className="font-medium text-slate-200 text-sm">{u.username}</span>
                                            <button onClick={()=>handleApprove(u.id)} className="bg-blue-600/90 hover:bg-blue-500 text-white px-4 py-1.5 rounded-md text-xs font-medium transition-colors">אשר קבלה</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function RummyTable({ tableDocId, user, onLeave, showToast }) {
            const [tableState, setTableState] = useState(null);
            const [loading, setLoading] = useState(true);
            
            const [rack, setRack] = useState([]);
            const [board, setBoard] = useState([]);
            const [startTurnBoard, setStartTurnBoard] = useState([]);
            const [startTurnRack, setStartTurnRack] = useState([]);
            
            const [dragData, setDragData] = useState(null); 
            const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
            const [hoverTarget, setHoverTarget] = useState(null);
            const [timeLeft, setTimeLeft] = useState(60);
            const [showVictory, setShowVictory] = useState(false);
            const longPressTimer = useRef(null);

            // Fetch table from Firebase
            useEffect(() => {
                if(!tableDocId) return;
                const unsub = window.fb.onSnapshot(window.fb.doc(window.fb.db, "tables", tableDocId), doc => { 
                    if(doc.exists()) {
                        setTableState({id: doc.id, ...doc.data()});
                        setLoading(false);
                    } else { 
                        showToast("השולחן נסגר", "error"); 
                        onLeave(); 
                    }
                });
                return () => unsub();
            }, [tableDocId]);

            // Sync Local state with Firebase state
            useEffect(() => {
                if(!tableState) return;
                if (!dragData) {
                    setBoard(tableState.board || []);
                    setRack(tableState.players?.[user.uid]?.cards || []);
                    if (tableState.currentTurn === user.uid && tableState.board) {
                        if (startTurnBoard.length === 0 && startTurnRack.length === 0) {
                             setStartTurnBoard(tableState.board || []);
                             setStartTurnRack(tableState.players?.[user.uid]?.cards || []);
                        }
                    } else if (tableState.currentTurn !== user.uid) {
                        setStartTurnBoard([]); setStartTurnRack([]); 
                    }
                }
                setShowVictory(tableState.phase === 'showdown');
            }, [tableState, dragData, user.uid]);

            // Timer logic
            useEffect(() => {
                let interval;
                if (tableState?.phase === 'playing' && tableState?.turnStartedAt) {
                    interval = setInterval(() => {
                        const elapsed = Math.floor((Date.now() - tableState.turnStartedAt) / 1000);
                        const remaining = Math.max(0, 60 - elapsed);
                        setTimeLeft(remaining);
                        if (remaining === 0 && tableState.currentTurn === user.uid) {
                            clearInterval(interval);
                            handleTimeoutPenalty();
                        }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [tableState?.phase, tableState?.turnStartedAt, tableState?.currentTurn, user.uid]);

            // Validation logic
            const validateGroup = (group) => {
                if (!group || group.length < 3) return false;
                const jCount = group.filter(t => t.val === '☻').length;
                const regulars = group.filter(t => t.val !== '☻');
                if(regulars.length === 0) return true;
                const isSet = regulars.every(t => t.val === regulars[0].val) && new Set(regulars.map(t => t.color)).size === regulars.length;
                if (isSet && group.length <= 4) return true;
                const isRunColor = regulars.every(t => t.color === regulars[0].color);
                if (isRunColor) {
                    const sorted = [...regulars].sort((a,b) => a.val - b.val);
                    let neededJokers = 0;
                    for(let i=0; i<sorted.length-1; i++) {
                        if (sorted[i].val === sorted[i+1].val) return false; 
                        neededJokers += (sorted[i+1].val - sorted[i].val - 1); 
                    }
                    if (neededJokers <= jCount && group.length <= 13) return true;
                }
                return false;
            };

            const isBoardValid = useMemo(() => { 
                if (board.length === 0) return true; 
                return board.every(g => validateGroup(g)); 
            }, [board]);

            // Unified Drag & Drop (Touch/Mouse)
            useEffect(() => {
                const handlePointerMove = (e) => { 
                    if (dragData) { setDragPos({ x: e.clientX, y: e.clientY }); if(longPressTimer.current) clearTimeout(longPressTimer.current); } 
                };
                const handlePointerUp = (e) => {
                    if (longPressTimer.current) clearTimeout(longPressTimer.current);
                    if (!dragData) return;
                    let newRack = [...rack]; let newBoard = board.map(g => [...g]);
                    
                    if (dragData.type === 'single') {
                        if (dragData.source === 'rack') newRack.splice(dragData.tileIndex, 1);
                        else if (dragData.source === 'board') {
                            const grp = newBoard[dragData.groupIndex];
                            const tIdx = dragData.tileIndex;
                            if (tIdx > 0 && tIdx < grp.length - 1 && grp.length >= 4) {
                                const left = grp.slice(0, tIdx); const right = grp.slice(tIdx + 1);
                                newBoard.splice(dragData.groupIndex, 1, left, right);
                            } else {
                                grp.splice(tIdx, 1);
                                if (grp.length === 0) newBoard.splice(dragData.groupIndex, 1);
                            }
                        }

                        if (hoverTarget && hoverTarget.startsWith('board-tile-')) {
                            const [,,targetGroupIdx, targetTileIdx] = hoverTarget.split('-');
                            const actualGIdx = (dragData.source === 'board' && dragData.groupIndex < targetGroupIdx && newBoard.length < board.length) ? targetGroupIdx - 1 : targetGroupIdx;
                            if (newBoard[actualGIdx] && newBoard[actualGIdx][targetTileIdx]?.val === '☻') {
                                let tempGroup = [...newBoard[actualGIdx]]; tempGroup[targetTileIdx] = dragData.tile;
                                if (validateGroup(tempGroup)) {
                                    const retrievedJoker = newBoard[actualGIdx][targetTileIdx];
                                    newBoard[actualGIdx][targetTileIdx] = dragData.tile; newRack.push(retrievedJoker); 
                                } else newBoard[actualGIdx].splice(targetTileIdx, 0, dragData.tile);
                            } else if (newBoard[actualGIdx]) newBoard[actualGIdx].splice(targetTileIdx, 0, dragData.tile);
                        } 
                        else if (hoverTarget && hoverTarget.startsWith('board-group-')) {
                            const targetIdx = parseInt(hoverTarget.split('-')[2]);
                            const actualIdx = (dragData.source === 'board' && dragData.groupIndex < targetIdx && newBoard.length < board.length) ? targetIdx - 1 : targetIdx;
                            if (newBoard[actualIdx]) newBoard[actualIdx].push(dragData.tile); else newBoard.push([dragData.tile]);
                        } 
                        else if (hoverTarget === 'board-new') newBoard.push([dragData.tile]);
                        else if (hoverTarget === 'rack') newRack.push(dragData.tile);
                        else if (dragData.source === 'rack') newRack.splice(dragData.tileIndex, 0, dragData.tile); 
                    } 
                    else if (dragData.type === 'group') {
                        const groupTiles = dragData.tiles;
                        if (dragData.source === 'board') newBoard.splice(dragData.groupIndex, 1);
                        if (hoverTarget && hoverTarget.startsWith('board-group-')) {
                            const targetIdx = parseInt(hoverTarget.split('-')[2]);
                            const actualIdx = (dragData.source === 'board' && dragData.groupIndex < targetIdx && newBoard.length < board.length) ? targetIdx - 1 : targetIdx;
                            if (newBoard[actualIdx]) newBoard[actualIdx].push(...groupTiles); else newBoard.push([...groupTiles]);
                        } else if (hoverTarget === 'board-new') newBoard.push([...groupTiles]);
                        else if (hoverTarget === 'rack') newRack.push(...groupTiles);
                        else if (dragData.source === 'board') newBoard.splice(dragData.groupIndex, 0, groupTiles); 
                    }
                    
                    setRack(newRack); setBoard(newBoard); setDragData(null); setHoverTarget(null);
                };
                
                if (dragData) { window.addEventListener('pointermove', handlePointerMove, { passive: false }); window.addEventListener('pointerup', handlePointerUp); }
                return () => { window.removeEventListener('pointermove', handlePointerMove); window.removeEventListener('pointerup', handlePointerUp); };
            }, [dragData, hoverTarget, rack, board]);

            const startDrag = (e, tile, source, groupIndex, tileIndex) => {
                if (tableState.currentTurn !== user.uid) return showToast("המתן לתורך", "error");
                if (e.pointerType === 'touch') e.target.releasePointerCapture(e.pointerId);
                setDragData({ type: 'single', tile, source, groupIndex, tileIndex }); setDragPos({ x: e.clientX, y: e.clientY });
                if (source === 'board') {
                    longPressTimer.current = setTimeout(() => {
                        if (navigator.vibrate) navigator.vibrate(20);
                        setDragData({ type: 'group', tiles: board[groupIndex], source, groupIndex });
                    }, 400); 
                }
            };

            const generateDeck = () => {
                const colors = ['#ef4444', '#3b82f6', '#f59e0b', '#0f172a'];
                let d = [];
                for (let set=0; set<2; set++) { for(let c=0; c<4; c++) { for(let v=1; v<=13; v++) d.push({id:`t_${set}_${c}_${v}`, val:v, color:colors[c]}); } }
                d.push({id:'j1', val:'☻', color:'#ef4444'}); d.push({id:'j2', val:'☻', color:'#0f172a'});
                return d.sort(()=>Math.random()-0.5);
            };

            // Actions
            const handleSit = async () => {
                try { 
                    const buyInAmount = Number(tableState.minBuyIn);
                    await window.fb.runTransaction(window.fb.db, async (t) => {
                        const uRef = window.fb.doc(window.fb.db, "users", user.uid);
                        const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const uSnap = await t.get(uRef);
                        if (uSnap.data().balance < buyInAmount) throw "אין לך מספיק יתרה לכניסה.";
                        t.update(uRef, { balance: uSnap.data().balance - buyInAmount });
                        t.update(tblRef, { [`players.${user.uid}`]: { username: uSnap.data().username, cards: [], hasDropped: false, stack: buyInAmount } });
                    });
                    
                    // Check if table is full to start automatically
                    const currentPlayersCount = Object.keys(tableState.players || {}).length + 1; // +1 for the joining user
                    if (currentPlayersCount === Number(tableState.maxPlayers)) {
                        setTimeout(() => {
                            const d = generateDeck(); const np = { ...tableState.players, [user.uid]: {username: user.username, cards: [], hasDropped: false, stack: buyInAmount} }; 
                            const uids = Object.keys(np);
                            uids.forEach(uid => { np[uid].cards = d.splice(0, 14); });
                            window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { phase: 'playing', deck: d, board: [], players: np, currentTurn: uids[0], turnStartedAt: Date.now() });
                        }, 1500); // Slight delay for UX
                    }
                } catch(e) { showToast(typeof e === 'string' ? e : "שגיאה", "error"); }
            };

            const handleTimeoutPenalty = async () => {
                const newDeck = [...(tableState.deck || [])];
                const tile = newDeck.length > 0 ? newDeck.pop() : null;
                const newRack = tile ? [...startTurnRack, tile] : [...startTurnRack];
                const uids = Object.keys(tableState.players); 
                const nextTurn = uids[(uids.indexOf(user.uid) + 1) % uids.length];
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { deck: newDeck, board: startTurnBoard, [`players.${user.uid}.cards`]: newRack, currentTurn: nextTurn, turnStartedAt: Date.now() });
            };

            const handleDraw = async () => {
                if (tableState.currentTurn !== user.uid) return;
                const newDeck = [...(tableState.deck || [])];
                const tile = newDeck.length > 0 ? newDeck.pop() : null;
                const newRack = tile ? [...startTurnRack, tile] : [...startTurnRack];
                const uids = Object.keys(tableState.players); 
                const nextTurn = uids[(uids.indexOf(user.uid) + 1) % uids.length];
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { deck: newDeck, board: startTurnBoard, [`players.${user.uid}.cards`]: newRack, currentTurn: nextTurn, turnStartedAt: Date.now() });
            };
            
            const handleEndTurn = async () => {
                if (tableState.currentTurn !== user.uid || !isBoardValid) return;
                
                const isFirstDrop = !tableState.players[user.uid].hasDropped;
                if (isFirstDrop) {
                    const currentRackIds = rack.map(t=>t.id);
                    const droppedTiles = startTurnRack.filter(t => !currentRackIds.includes(t.id));
                    if (droppedTiles.length > 0) {
                        const sum = droppedTiles.reduce((s, t) => s + (t.val === '☻' ? 30 : t.val), 0);
                        if (sum < 30) return showToast(`יש צורך ב-30 נקודות לפחות להורדה ראשונה.`, "error");
                    } else return showToast("לא ירדת, חובה למשוך קופה.", "error");
                }

                if (rack.length === 0) { // WIN
                    const losers = Object.entries(tableState.players).filter(([uid]) => uid !== user.uid);
                    let totalPot = 0; const updates = {};
                    losers.forEach(([uid, pData]) => {
                         let dw = pData.cards.reduce((s, t) => s + (t.val === '☻' ? 30 : t.val), 0);
                         let penalty = Math.min(dw * tableState.stakes, pData.stack); 
                         updates[`players.${uid}.stack`] = pData.stack - penalty;
                         totalPot += penalty;
                    });
                    const rake = Math.floor(totalPot * 0.06); const winnerProfit = totalPot - rake;
                    updates[`players.${user.uid}.stack`] = tableState.players[user.uid].stack + winnerProfit;
                    updates[`players.${user.uid}.cards`] = []; updates.phase = 'showdown'; updates.board = board; updates.winner = user.uid; updates.lastResults = { winnerProfit, rake, totalPot };
                    await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), updates);
                    setTimeout(() => { // Auto-restart logic would go here in full prod
                        showToast("המשחק יתחיל מחדש בעתיד");
                    }, 5000); 
                    return;
                }

                const uids = Object.keys(tableState.players); 
                const nextTurn = uids[(uids.indexOf(user.uid) + 1) % uids.length];
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { board: board, [`players.${user.uid}.cards`]: rack, [`players.${user.uid}.hasDropped`]: true, currentTurn: nextTurn, turnStartedAt: Date.now() });
            };

            const handleLeave = async () => {
                if (!tableState?.players?.[user.uid]) { onLeave(); return; }
                if (tableState.phase === 'playing') { showToast("אי אפשר לקום באמצע יד חיה", "error"); return; }
                try {
                    await window.fb.runTransaction(window.fb.db, async (t) => {
                        const uRef = window.fb.doc(window.fb.db, "users", user.uid);
                        const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const myStack = (await t.get(tblRef)).data().players[user.uid]?.stack || 0;
                        let newP = { ...(await t.get(tblRef)).data().players }; delete newP[user.uid];
                        t.update(uRef, { balance: (await t.get(uRef)).data().balance + myStack });
                        t.update(tblRef, { players: newP });
                    });
                    onLeave();
                } catch(e) {}
            };

            if (loading) return <div className="h-full flex items-center justify-center text-emerald-500"><i className="fa-solid fa-spinner fa-spin text-3xl"></i></div>;

            const isSeated = tableState?.players?.[user.uid] !== undefined;
            const isPlaying = tableState.phase === 'playing';
            const isMyTurn = tableState.currentTurn === user.uid;
            const opponents = Object.entries(tableState.players || {}).filter(([uid]) => uid !== user.uid);

            return (
                <div className="h-full w-full flex flex-col relative select-none" style={{ backgroundColor: '#0a101d', touchAction: 'none' }}>
                    
                    {/* Minimalist Header */}
                    <div className="flex justify-between items-center p-3 sm:p-4 bg-slate-900/40 border-b border-white/5 shrink-0 z-20">
                        <button onClick={handleLeave} className="text-slate-300 hover:text-white px-3 py-1.5 rounded bg-slate-800/50 border border-slate-700/50 transition-colors text-sm font-medium"><i className="fa-solid fa-angle-right ml-1.5 text-xs"></i> {isSeated ? 'קום מהשולחן' : 'חזור ללובי'}</button>
                        <div className="flex flex-col items-center">
                            <span className="text-sm font-bold text-slate-200 opacity-80 tracking-widest uppercase">רמיקוב</span>
                            <span className="text-[10px] text-emerald-400 font-semibold">{tableState.stakes} Stakes</span>
                        </div>
                        <div className="w-[80px] text-left">
                            {isSeated && <div className="text-emerald-400 text-xs font-bold bg-slate-950/50 px-2 py-1 rounded inline-block border border-slate-800"><Coin amount={tableState.players[user.uid]?.stack}/></div>}
                        </div>
                    </div>

                    {/* Felt Area */}
                    <div className="flex-1 relative flex flex-col" onPointerEnter={() => setHoverTarget('board-new')}>
                        {/* Opponents Mini Avatars */}
                        <div className="absolute top-2 left-1/2 transform -translate-x-1/2 flex gap-4 sm:gap-8 z-10 opacity-70">
                            {opponents.map(([uid, p]) => (
                                <div key={uid} className="flex flex-col items-center">
                                    <div className={`w-8 h-8 sm:w-10 sm:h-10 rounded-full flex items-center justify-center bg-slate-800 transition-all ${tableState.currentTurn===uid?'ring-2 ring-emerald-500 scale-110 opacity-100':'ring-1 ring-slate-600'}`}>
                                        <i className="fa-solid fa-user text-slate-400 text-sm"></i>
                                    </div>
                                    <span className="text-[10px] font-medium text-slate-300 mt-1">{p.username}</span>
                                    <span className="text-[9px] text-slate-500">{p.cards?.length||0} אבנים</span>
                                </div>
                            ))}
                        </div>
                        
                        {/* Sit Down Overlay */}
                        {!isSeated && tableState.phase === 'waiting' && (
                            <div className="absolute inset-0 z-20 flex items-center justify-center">
                                <button onClick={handleSit} className="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-3 rounded-xl font-bold shadow-xl transition-transform hover:scale-105">
                                    התיישב בשולחן ({Object.keys(tableState.players||{}).length}/{tableState.maxPlayers})
                                </button>
                            </div>
                        )}

                        {/* Victory Modal */}
                        {showVictory && (
                             <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm px-4 animate-fade-in">
                                 <div className="bg-slate-900 border border-emerald-500/50 p-6 rounded-2xl shadow-2xl text-center w-full max-w-sm">
                                     <i className="fa-solid fa-award text-4xl text-amber-400 mb-3 drop-shadow-md"></i>
                                     <h2 className="text-xl font-bold text-white mb-4">{tableState.players[tableState.winner]?.username} ניצח!</h2>
                                     <div className="bg-slate-950 rounded-xl p-4 text-right mb-4">
                                         <p className="text-slate-300 text-sm mb-1 flex justify-between"><span>רווח נקי:</span> <span className="font-bold text-emerald-400"><Coin amount={tableState.lastResults?.winnerProfit}/></span></p>
                                         <p className="text-slate-500 text-xs flex justify-between"><span>עמלה (6%):</span> <span><Coin amount={tableState.lastResults?.rake}/></span></p>
                                     </div>
                                 </div>
                             </div>
                        )}
                        
                        {/* The Board Groups */}
                        {isPlaying && (
                            <div className="mt-16 flex flex-wrap gap-4 items-start p-2 pb-24 overflow-y-auto h-full scrollbar-hide">
                                {board.map((group, gIdx) => (
                                    <div key={gIdx} onPointerEnter={(e) => { e.stopPropagation(); setHoverTarget(`board-group-${gIdx}`); }} className={`flex bg-slate-900/30 p-1.5 rounded-lg border transition-colors ${hoverTarget === `board-group-${gIdx}` ? 'border-emerald-500/50 bg-emerald-500/10' : !validateGroup(group) ? 'board-invalid-group' : 'border-slate-800'}`}>
                                        {group.map((t, tIdx) => (
                                            <div key={t.id} 
                                                 onPointerEnter={(e)=>{e.stopPropagation(); setHoverTarget(`board-tile-${gIdx}-${tIdx}`);}}
                                                 onPointerDown={(e) => startDrag(e, t, 'board', gIdx, tIdx)} 
                                                 className={`rummy-tile w-9 h-12 sm:w-11 sm:h-16 flex items-center justify-center text-xl sm:text-2xl mx-[1px] ${dragData?.tile?.id === t.id ? 'opacity-30' : ''}`} 
                                                 style={{ color: t.color }}>{t.val}</div>
                                        ))}
                                    </div>
                                ))}
                                {board.length === 0 && <div className="w-full text-center mt-20 text-slate-700 text-lg font-medium pointer-events-none">הלוח ריק. ממתינים למהלך ראשון.</div>}
                            </div>
                        )}
                    </div>

                    {/* Action Bar & Rack */}
                    <div className="relative z-10 shrink-0" onPointerEnter={() => setHoverTarget('rack')}>
                        
                        {/* Controls (Top of rack) */}
                        {isSeated && isPlaying && (
                            <div className="absolute left-2 right-2 top-[-45px] flex justify-between items-end z-30 pointer-events-none">
                                <div className="flex gap-2 pointer-events-auto">
                                    {isMyTurn && <button onClick={handleEndTurn} disabled={!isBoardValid} className={`px-4 py-2.5 rounded-lg font-bold shadow-md text-white text-sm transition-colors ${!isBoardValid ? 'bg-slate-700 opacity-50' : 'bg-emerald-600 hover:bg-emerald-500'}`}>סיום תור</button>}
                                    {isMyTurn && <button onClick={handleDraw} className="bg-slate-800 text-slate-200 border border-slate-700 px-4 py-2.5 rounded-lg text-sm font-medium shadow-md hover:bg-slate-700 transition-colors">קופה</button>}
                                    {isMyTurn && <button onClick={()=>{setBoard(startTurnBoard); setRack(startTurnRack);}} className="bg-rose-900/80 text-rose-300 px-3 py-2.5 rounded-lg text-sm font-medium shadow-md border border-rose-800/50 hover:bg-rose-800 transition-colors" title="בטל מהלכים"><i className="fa-solid fa-undo"></i></button>}
                                </div>
                                
                                <div className="flex gap-2 pointer-events-auto items-center">
                                   {isMyTurn && (
                                       <div className="bg-slate-900 rounded-full w-10 h-10 flex items-center justify-center border border-emerald-500/50 relative shadow-lg">
                                           <svg className="absolute inset-0 w-full h-full timer-ring"><circle cx="50%" cy="50%" r="45%" fill="none" stroke="#1e293b" strokeWidth="3"></circle><circle cx="50%" cy="50%" r="45%" fill="none" stroke="#10b981" strokeWidth="3" strokeDasharray="100" strokeDashoffset={100 - (100 * (timeLeft/60))} className="timer-ring-circle"></circle></svg>
                                           <span className="font-bold text-white text-xs z-10">{timeLeft}</span>
                                       </div>
                                   )}
                                   <div className="flex gap-1 bg-slate-900/80 p-1 rounded-lg border border-slate-800 shadow-md">
                                       <button onClick={()=>setRack([...rack].sort((a,b)=>(a.val==='☻'?1:(b.val==='☻'?-1:a.val-b.val))))} className="bg-slate-800 text-slate-400 w-8 h-8 rounded font-medium text-[10px] hover:text-white transition-colors">1-9</button>
                                       <button onClick={()=>setRack([...rack].sort((a,b)=>(a.color>b.color?1:(a.color<b.color?-1:a.val-b.val))))} className="bg-slate-800 text-slate-400 w-8 h-8 rounded font-medium text-[10px] hover:text-white transition-colors flex"><span className="text-blue-500">■</span><span className="text-red-500">■</span></button>
                                   </div>
                                </div>
                            </div>
                        )}

                        {/* Wait overlay */}
                        {!isMyTurn && isPlaying && isSeated && <div className="absolute inset-0 bg-slate-950/40 z-20 flex items-center justify-center backdrop-blur-[1px]"><span className="text-white/80 font-medium text-sm">המתן לתורך...</span></div>}

                        {/* Physical Rack */}
                        <div className="bg-slate-950 px-2 sm:px-4 pt-8 pb-4">
                            <div className="flex flex-wrap justify-center items-end gap-0.5 min-h-[90px] px-2 py-4 w-full max-w-4xl mx-auto rummy-rack-wood">
                                {rack.map((tile, index) => (
                                    <div key={tile.id} onPointerDown={(e) => startDrag(e, tile, 'rack', null, index)} className={`rummy-tile w-10 h-14 sm:w-14 sm:h-20 flex items-center justify-center text-2xl sm:text-3xl mx-[1px] z-10 cursor-grab active:cursor-grabbing ${dragData?.tile?.id === tile.id ? 'opacity-20' : ''}`} style={{ color: tile.color }}>{tile.val}</div>
                                ))}
                            </div>
                        </div>
                    </div>
                    
                    {/* Drag Ghost */}
                    {dragData && dragData.type === 'single' && (
                        <div className="fixed pointer-events-none z-[9999] rummy-tile w-12 h-16 sm:w-16 sm:h-24 flex items-center justify-center text-3xl font-bold scale-110 shadow-[0_20px_40px_rgba(0,0,0,0.6)]" style={{ left: dragPos.x, top: dragPos.y, transform: 'translate(-50%, -50%) rotate(3deg)', color: dragData.tile.color }}>{dragData.tile.val}</div>
                    )}
                    {dragData && dragData.type === 'group' && (
                        <div className="fixed pointer-events-none z-[9999] flex bg-slate-900/60 p-1.5 rounded-xl border border-emerald-500/50 shadow-2xl scale-110 backdrop-blur-sm" style={{ left: dragPos.x, top: dragPos.y, transform: 'translate(-50%, -50%)' }}>
                            {dragData.tiles.map(t => (<div key={t.id} className="rummy-tile w-9 h-12 flex items-center justify-center text-xl mx-[1px]" style={{ color: t.color }}>{t.val}</div>))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
