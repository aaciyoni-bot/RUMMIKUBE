<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rummikube.com - Elite Club</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 950: '#020617', 900: '#0f172a', 800: '#1e293b', 700: '#334155' },
                        gold: { 400: '#facc15', 500: '#eab308' },
                        rummikub: '#10b981'
                    },
                    fontFamily: { 
                        sans: ['Heebo', 'sans-serif'], 
                        rubik: ['Rubik', 'sans-serif'] 
                    }
                }
            }
        }
    </script>

    <style>
        body, html {
            background-color: #020617; 
            color: #f8fafc; margin: 0; padding: 0;
            height: 100dvh; /* Mobile viewport fix - CRITICAL for mobile */
            width: 100vw; overflow: hidden; overscroll-behavior: none;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        
        .glass-panel { 
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6); 
        }

        .scrollable-content { overflow-y: auto; -webkit-overflow-scrolling: touch; height: 100%; padding-bottom: 150px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        .animate-pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes flashRed { 0%, 100% { border-color: rgba(239, 68, 68, 0.3); box-shadow: none; } 50% { border-color: rgba(239, 68, 68, 0.8); box-shadow: 0 0 15px rgba(239,68,68,0.5); } }
        .board-invalid-group { animation: flashRed 1.5s infinite; border: 2px solid #ef4444 !important; background: rgba(239, 68, 68, 0.05); }
        
        .rummy-tile {
            background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
            box-shadow: 2px 4px 8px rgba(0,0,0,0.4), inset -1px -2px 3px rgba(0,0,0,0.1), inset 1px 1px 2px rgba(255,255,255,1);
            border-bottom: 5px solid #cbd5e1; border-right: 1px solid #e2e8f0; border-radius: 8px; 
            font-family: 'Rubik', sans-serif; font-weight: 900;
            transition: transform 0.1s ease, box-shadow 0.1s ease; user-select: none;
            text-shadow: 0 1px 1px rgba(0,0,0,0.15);
            touch-action: none; 
        }
        .rummy-tile:active, .rummy-tile.dragging {
            box-shadow: 0 20px 30px rgba(0,0,0,0.6); transform: scale(1.1) translateY(-8px); z-index: 999;
        }

        .card-back { background-image: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(0,0,0,0.1) 3px, rgba(0,0,0,0.1) 6px); }
        
        /* Opponent Wooden Rack Back */
        .opponent-rack-back {
            background: linear-gradient(to top, #4a2e15 0%, #8b5a2b 100%);
            border-top: 3px solid #d4a373; border-radius: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.7);
            width: 140px; height: 35px;
            transform: perspective(300px) rotateX(25deg);
            display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 2px; gap: 1px;
            position: relative;
        }
        .opponent-tile-peek {
            width: 6px; height: 18px; background: #e2e8f0; border-radius: 2px 2px 0 0;
            border: 1px solid #cbd5e1; border-bottom: none; box-shadow: inset -1px 0 2px rgba(0,0,0,0.2);
        }

        .timer-ring { transform: rotate(-90deg); transition: stroke-dashoffset 1s linear; }
        
        @keyframes wave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .loading-dot { display: inline-block; animation: wave 1.2s infinite ease-in-out; }
        .loading-dot:nth-child(1) { animation-delay: 0s; }
        .loading-dot:nth-child(2) { animation-delay: 0.15s; }
        .loading-dot:nth-child(3) { animation-delay: 0.3s; }

        /* The Custom Grid for the Player Rack */
        .rack-grid {
            display: grid;
            grid-template-columns: repeat(14, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 4px;
            width: 100%; max-width: 900px;
            padding: 8px;
            background: linear-gradient(to bottom, #d4a373 0%, #bc8a5f 40%, #8b5a2b 100%);
            border-bottom: 14px solid #4a2e15; border-top: 1px solid #e6ccb2;
            border-left: 3px solid #704728; border-right: 3px solid #704728;
            border-radius: 12px 12px 6px 6px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .rack-slot {
            aspect-ratio: 9/13; /* roughly rummikub tile proportions */
            background-color: rgba(0,0,0,0.15);
            border-radius: 6px;
            border: 1px dashed rgba(255,255,255,0.1);
            position: relative;
        }
        .rack-slot.hover-target { background-color: rgba(16, 185, 129, 0.4); border-color: rgba(16, 185, 129, 0.8); }

    </style>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, onSnapshot, query, where, updateDoc, addDoc, deleteDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBldyf-FW8DI2DX90tM9XIDCEij5riiYOk",
            authDomain: "rummikube-5c138.firebaseapp.com",
            projectId: "rummikube-5c138"
        };
        const app = initializeApp(firebaseConfig);
        window.fb = { auth: getAuth(app), db: getFirestore(app), googleProvider: new GoogleAuthProvider(), signInWithPopup, onAuthStateChanged, signOut, collection, doc, setDoc, getDoc, getDocs, onSnapshot, query, where, updateDoc, addDoc, deleteDoc, runTransaction };
        
        window.dispatchEvent(new Event('firebase-ready'));
    </script>
</head>
<body class="bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 to-slate-950 h-full w-full">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const ROLES = { SUPER_ADMIN: 'super_admin', CLUB_OWNER: 'club_owner', MANAGER: 'manager', AGENT: 'agent', PLAYER: 'player' };

        const formatMoney = (amount) => {
            if (amount === undefined || amount === null) return '0.00';
            const num = Number(amount);
            if (isNaN(num)) return String(amount);
            if (num === 0) return '0.00';
            return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        };

        const Coin = ({ amount, className="", size="md" }) => (
            <span className={`inline-flex items-center gap-1 font-bold ${className}`}>
                <i className={`fa-solid fa-coins text-gold-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.5)] ${size==='lg'?'text-xl':''}`}></i>
                {formatMoney(amount)}
            </span>
        );

        function App() {
            const [fbReady, setFbReady] = useState(false);
            const [dbUser, setDbUser] = useState(null);
            const [currentView, setCurrentView] = useState('auth'); 
            const [tablesDB, setTablesDB] = useState([]);
            const [activeTable, setActiveTable] = useState(null);
            const [toasts, setToasts] = useState([]);
            
            const viewRef = useRef(currentView);
            useEffect(() => { viewRef.current = currentView; }, [currentView]);

            const showToast = (msg, type = 'info') => {
                const id = Date.now(); 
                setToasts(prev => [...prev, { id, msg, type }]);
                setTimeout(() => { setToasts(prev => prev.filter(t => t.id !== id)); }, 4000);
            };

            const changeView = (view, tableObj = null) => {
                setCurrentView(view);
                setActiveTable(tableObj);
                if (view !== 'auth' && view !== 'pending') {
                    window.history.pushState({ view, tableId: tableObj?.docId }, "", `?v=${view}`);
                }
            };

            useEffect(() => {
                const handlePopState = (event) => {
                    if (event.state && event.state.view) {
                        setCurrentView(event.state.view);
                        if (event.state.view !== 'table') setActiveTable(null);
                    } else if (dbUser && dbUser.status === 'approved') {
                        setCurrentView('lobby');
                    }
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, [dbUser]);

            useEffect(() => {
                if (window.fb) setFbReady(true);
                else window.addEventListener('firebase-ready', () => setFbReady(true));
            }, []);

            useEffect(() => {
                if (!fbReady) return;
                const unsub = window.fb.onAuthStateChanged(window.fb.auth, async (user) => {
                    if (user) await fetchOrInitUser(user); 
                    else { setDbUser(null); setCurrentView('auth'); }
                });
                return () => unsub();
            }, [fbReady]);

            const fetchOrInitUser = async (user) => {
                const ref = window.fb.doc(window.fb.db, "users", user.uid);
                const snap = await window.fb.getDoc(ref);
                if (snap.exists()) {
                    setDbUser({ uid: user.uid, ...snap.data() });
                } else {
                    const q = await window.fb.getDocs(window.fb.collection(window.fb.db, "users"));
                    const role = q.empty ? ROLES.SUPER_ADMIN : ROLES.PLAYER;
                    const newUser = { 
                        username: user.displayName || 'Player', 
                        email: user.email || '', 
                        role, 
                        status: q.empty ? 'approved' : 'pending', 
                        balance: q.empty ? 10000000 : 0,
                        clubProfits: 0, 
                        stats: { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 }
                    };
                    await window.fb.setDoc(ref, newUser); 
                    setDbUser({ uid: user.uid, ...newUser });
                }
            };

            useEffect(() => {
                if (!fbReady || !dbUser) return;
                const unsubT = window.fb.onSnapshot(window.fb.collection(window.fb.db, "tables"), (s) => {
                    setTablesDB(s.docs.map(d => ({ docId: d.id, ...d.data() })));
                });
                
                const unsubU = window.fb.onSnapshot(window.fb.doc(window.fb.db, "users", dbUser.uid), (d) => {
                    if(d.exists()) {
                        const data = d.data(); 
                        setDbUser({ uid: d.id, ...data });
                        if(data.status === 'pending') changeView('pending');
                        else if (viewRef.current === 'auth' || viewRef.current === 'pending') {
                            changeView('lobby');
                        }
                    }
                });
                return () => { unsubT(); unsubU(); };
            }, [fbReady, dbUser?.uid]);

            if (!fbReady) return <div className="h-full w-full flex items-center justify-center text-emerald-500"><i className="fa-solid fa-circle-notch fa-spin text-4xl"></i></div>;

            return (
                <div className="h-full w-full flex flex-col relative overflow-hidden">
                    
                    {dbUser && dbUser.status === 'approved' && currentView !== 'table' && (
                        <nav className="bg-slate-900/90 backdrop-blur-md px-4 py-3 z-40 shrink-0 border-b border-slate-800 shadow-xl flex justify-between items-center">
                            <div className="flex items-center gap-2 sm:gap-4">
                                <button onClick={() => window.fb.signOut(window.fb.auth)} className="w-10 h-10 rounded-xl bg-slate-800 text-slate-400 border border-slate-700 hover:text-white hover:bg-rose-600 transition-colors flex items-center justify-center">
                                    <i className="fa-solid fa-sign-out-alt"></i>
                                </button>
                                
                                {[ROLES.SUPER_ADMIN, ROLES.CLUB_OWNER, ROLES.MANAGER, ROLES.AGENT].includes(dbUser.role) && (
                                    <button onClick={() => changeView(currentView === 'backoffice' ? 'lobby' : 'backoffice')} className={`w-10 h-10 rounded-xl border flex items-center justify-center transition-colors ${currentView === 'backoffice' ? 'bg-blue-600 text-white border-blue-500 shadow-[0_0_10px_rgba(37,99,235,0.5)]' : 'bg-slate-800 text-blue-400 border-slate-700 hover:text-white'}`} title="ניהול מועדון">
                                        <i className="fa-solid fa-chart-line"></i>
                                    </button>
                                )}

                                <button onClick={() => changeView(currentView === 'profile' ? 'lobby' : 'profile')} className={`w-10 h-10 rounded-xl border flex items-center justify-center transition-colors ${currentView === 'profile' ? 'bg-emerald-600 text-white border-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]' : 'bg-slate-800 text-emerald-400 border-slate-700 hover:text-white'}`} title="אזור אישי">
                                    <i className="fa-solid fa-user"></i>
                                </button>

                                <div className="flex flex-col items-end mr-1 hidden sm:flex">
                                    <span className="text-sm font-bold text-white flex items-center gap-1">
                                        {dbUser.username}
                                        {dbUser.role === ROLES.SUPER_ADMIN && <i className="fa-solid fa-crown text-amber-400 text-[10px]"></i>}
                                    </span>
                                    <Coin amount={dbUser.balance} className="text-sm" />
                                </div>
                            </div>

                            <div className="flex flex-col items-end cursor-pointer" onClick={() => changeView('lobby')}>
                                <h1 className="text-xl sm:text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-300">RUMMIKUBE</h1>
                                <p className="text-[10px] text-slate-400 font-bold tracking-[0.2em] uppercase leading-none mt-[-2px]">Elite Club</p>
                            </div>
                        </nav>
                    )}

                    <main className="flex-1 overflow-hidden relative z-0">
                        {currentView === 'auth' && <AuthView />}
                        {currentView === 'pending' && <PendingView />}
                        {currentView === 'lobby' && <LobbyView user={dbUser} tables={tablesDB} onJoin={(t) => changeView('table', t)} showToast={showToast} />}
                        {currentView === 'profile' && <ProfileView user={dbUser} />}
                        {currentView === 'backoffice' && <BackofficeView user={dbUser} showToast={showToast} />}
                        {currentView === 'table' && <RummyTable tableDocId={activeTable?.docId} user={dbUser} onLeave={() => changeView('lobby')} showToast={showToast} />}
                    </main>
                    
                    <div className="fixed bottom-8 left-1/2 transform -translate-x-1/2 z-[99999] flex flex-col gap-2 pointer-events-none w-[90%] max-w-sm">
                        {toasts.map(t => (
                            <div key={t.id} className={`animate-fade-in px-6 py-3 rounded-2xl shadow-2xl font-bold text-sm text-center border backdrop-blur-md ${t.type === 'error' ? 'bg-rose-900/95 border-rose-500 text-white' : 'bg-slate-800/95 border-emerald-500/50 text-emerald-400'}`}>
                                {t.msg}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function AuthView() {
            return (
                <div className="h-full w-full flex flex-col items-center justify-center p-4">
                    <div className="glass-panel p-10 sm:p-14 rounded-3xl text-center relative z-10 w-full max-w-md animate-fade-in">
                        <h2 className="text-4xl font-black text-white mb-2 tracking-widest drop-shadow-lg">Rummikube</h2>
                        <p className="text-emerald-400 mb-10 font-bold tracking-[0.3em] uppercase text-xs">Elite Private Club</p>
                        <button onClick={()=>window.fb.signInWithPopup(window.fb.auth, window.fb.googleProvider)} className="w-full bg-white hover:bg-slate-100 transition-transform transform hover:scale-105 text-slate-900 font-black py-4 px-6 rounded-xl shadow-xl flex items-center justify-center gap-3">
                            <i className="fa-brands fa-google text-blue-500 text-xl"></i> התחברות לחברים
                        </button>
                    </div>
                </div>
            );
        }

        function PendingView() {
            return <div className="h-full w-full text-slate-300 flex justify-center items-center font-bold text-xl flex-col gap-4">
                <i className="fa-solid fa-clock-rotate-left text-4xl text-amber-500 animate-spin"></i>
                ממתין לאישור מנהל המועדון...
            </div>;
        }

        function ProfileView({ user }) {
            const stats = user.stats || { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 };
            const winRate = stats.gamesPlayed > 0 ? Math.round((stats.gamesWon / stats.gamesPlayed) * 100) : 0;

            return (
                <div className="scrollable-content p-4 sm:p-8">
                    <div className="max-w-4xl mx-auto glass-panel p-6 rounded-3xl animate-fade-in">
                        <div className="text-center mb-8">
                            <div className="w-24 h-24 bg-slate-800 rounded-full mx-auto border-4 border-emerald-500 flex items-center justify-center shadow-[0_0_20px_rgba(16,185,129,0.4)] mb-4">
                                <i className="fa-solid fa-user text-4xl text-slate-400"></i>
                            </div>
                            <h2 className="text-3xl font-black text-white">{user.username}</h2>
                            <p className="text-slate-400 font-bold uppercase tracking-widest text-sm mt-1">{user.role}</p>
                        </div>

                        <div className={`grid grid-cols-2 ${[ROLES.SUPER_ADMIN, ROLES.CLUB_OWNER].includes(user.role) ? 'sm:grid-cols-5' : 'sm:grid-cols-4'} gap-4 mb-6`}>
                            <div className="bg-slate-900/80 p-4 rounded-2xl border border-slate-700 text-center">
                                <p className="text-slate-400 text-xs font-bold mb-1">יתרה נוכחית</p>
                                <Coin amount={user.balance} className="text-xl text-emerald-400" />
                            </div>
                            <div className="bg-slate-900/80 p-4 rounded-2xl border border-slate-700 text-center">
                                <p className="text-slate-400 text-xs font-bold mb-1">משחקים ששוחקו</p>
                                <p className="text-xl font-black text-white">{stats.gamesPlayed}</p>
                            </div>
                            <div className="bg-slate-900/80 p-4 rounded-2xl border border-slate-700 text-center">
                                <p className="text-slate-400 text-xs font-bold mb-1">אחוז ניצחונות</p>
                                <p className="text-xl font-black text-blue-400">{winRate}%</p>
                            </div>
                            <div className="bg-slate-900/80 p-4 rounded-2xl border border-slate-700 text-center">
                                <p className="text-slate-400 text-xs font-bold mb-1">רווח/הפסד כולל</p>
                                <p className={`text-xl font-black ${stats.totalProfit >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                    {stats.totalProfit > 0 ? '+' : ''}{formatMoney(stats.totalProfit)}
                                </p>
                            </div>
                            
                            {[ROLES.SUPER_ADMIN, ROLES.CLUB_OWNER].includes(user.role) && (
                                <div className="bg-slate-900/80 p-4 rounded-2xl border border-amber-500/50 text-center shadow-[0_0_15px_rgba(245,158,11,0.2)]">
                                    <p className="text-amber-400 text-xs font-bold mb-1">רווחי מועדון (Rake)</p>
                                    <Coin amount={user.clubProfits || 0} className="text-xl text-amber-500" />
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function LobbyView({ user, tables, onJoin, showToast }) {
            const [showCreate, setShowCreate] = useState(false);
            const [newTableOptions, setNewTableOptions] = useState({ maxPlayers: 4, stakes: 0.10 });
            
            const handleCreate = async () => {
                const calculatedBuyIn = newTableOptions.stakes * 100; 
                await window.fb.addDoc(window.fb.collection(window.fb.db, "tables"), { 
                    type: 'rummikub', maxPlayers: newTableOptions.maxPlayers, 
                    minBuyIn: calculatedBuyIn, stakes: newTableOptions.stakes, 
                    players: {}, board: [], deck: [], phase: 'waiting', createdAt: Date.now()
                });
                setShowCreate(false); showToast("שולחן נפתח בהצלחה!", "success");
            };

            const handleDelete = async (e, t) => {
                e.stopPropagation(); 
                const playersCount = Object.keys(t.players || {}).length;
                if (playersCount > 0 || t.phase === 'playing') {
                    if (!window.confirm(`⚠️ חכה רגע!\nיש כרגע ${playersCount} שחקנים שיושבים בשולחן הזה (או שהמשחק באוויר).\nאם תמחק את השולחן, הכסף שלהם עלול לא לחזור לארנק!\nהאם אתה בטוח שברצונך למחוק?`)) return;
                } else {
                    if (!window.confirm("למחוק שולחן זה?")) return;
                }
                await window.fb.deleteDoc(window.fb.doc(window.fb.db, "tables", t.docId));
                showToast("שולחן נמחק בהצלחה");
            };

            return (
                <div className="scrollable-content p-4 sm:p-6">
                    <div className="max-w-6xl mx-auto animate-fade-in">
                        <div className="flex justify-between items-center mb-8">
                            <h2 className="text-2xl sm:text-3xl font-black text-white flex items-center gap-3">
                                <span className="w-4 h-4 rounded-full bg-emerald-500 shadow-[0_0_15px_#10b981] animate-pulse"></span>
                                שולחנות קאש
                            </h2>
                            {[ROLES.SUPER_ADMIN, ROLES.CLUB_OWNER, ROLES.MANAGER].includes(user.role) && (
                                <button onClick={()=>setShowCreate(!showCreate)} className="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg transition-transform hover:scale-105 flex items-center text-sm">
                                    <i className="fa-solid fa-plus ml-2"></i> שולחן חדש
                                </button>
                            )}
                        </div>
                        
                        {showCreate && (
                            <div className="glass-panel p-6 rounded-2xl mb-8 animate-pop-in border border-emerald-500/30">
                                <h3 className="text-lg font-bold text-white mb-4">הגדרות שולחן חדש</h3>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                                    <div>
                                        <label className="text-slate-400 text-sm font-bold mb-1 block">שחקנים מקסימום</label>

        function RummyTable({ tableDocId, user, onLeave, showToast }) {
            const [tableState, setTableState] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isGodMode, setIsGodMode] = useState(false); 
            
            const [rack, setRack] = useState(Array(28).fill(null)); 
            const [board, setBoard] = useState([]);
            const [startTurnBoard, setStartTurnBoard] = useState([]);
            const [startTurnRack, setStartTurnRack] = useState([]);
            
            const [dragData, setDragData] = useState(null); 
            const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
            const [hoverTarget, setHoverTarget] = useState(null); 
            const [timeLeft, setTimeLeft] = useState(60);
            const [showVictory, setShowVictory] = useState(false);
            const longPressTimer = useRef(null);
            const synthRef = useRef(null);

            useEffect(() => {
                if(!tableDocId) return;
                const unsub = window.fb.onSnapshot(window.fb.doc(window.fb.db, "tables", tableDocId), doc => { 
                    if(doc.exists()) {
                        setTableState({id: doc.id, ...doc.data()});
                        setLoading(false);
                    } else { 
                        showToast("השולחן נסגר", "error"); 
                        onLeave(); 
                    }
                });
                return () => unsub();
            }, [tableDocId]);

            useEffect(() => {
                if(!tableState) return;
                if (!dragData) {
                    setBoard(tableState.board || []);
                    const dbCards = tableState.players?.[user.uid]?.cards || [];
                    const fullRack = [...dbCards];
                    while(fullRack.length < 28) fullRack.push(null);
                    setRack(fullRack);
                    
                    if (tableState.currentTurn === user.uid && tableState.board) {
                        if (startTurnBoard.length === 0 && startTurnRack.length === 0) {
                             setStartTurnBoard(tableState.board || []);
                             setStartTurnRack(fullRack);
                        }
                    } else if (tableState.currentTurn !== user.uid) {
                        setStartTurnBoard([]); setStartTurnRack([]); 
                    }
                }
                setShowVictory(tableState.phase === 'showdown');
            }, [tableState, dragData, user.uid]);

            useEffect(() => {
                let interval;
                if (tableState?.phase === 'playing' && tableState?.turnStartedAt) {
                    interval = setInterval(() => {
                        const elapsed = Math.floor((Date.now() - tableState.turnStartedAt) / 1000);
                        const remaining = Math.max(0, 60 - elapsed);
                        setTimeLeft(remaining);
                        
                        if (remaining <= 10 && remaining > 0 && tableState.currentTurn === user.uid) {
                            try {
                                if (window.Tone && window.Tone.context.state !== 'running') window.Tone.context.resume();
                                if (!synthRef.current && window.Tone) {
                                    synthRef.current = new window.Tone.Synth({ oscillator: { type: 'square' } }).toDestination();
                                    synthRef.current.volume.value = -10;
                                }
                                synthRef.current?.triggerAttackRelease("E6", "0.05");
                            } catch(e) {}
                        }
                        if (remaining === 0 && tableState.currentTurn === user.uid) {
                            clearInterval(interval);
                            handleTimeoutPenalty();
                        }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [tableState?.phase, tableState?.turnStartedAt, tableState?.currentTurn, user.uid]);

            const validateGroup = (group) => {
                if (!group || group.length < 3) return false;
                const jCount = group.filter(t => t.val === '☻').length;
                const regulars = group.filter(t => t.val !== '☻');
                if(regulars.length === 0) return true;
                const isSet = regulars.every(t => t.val === regulars[0].val) && new Set(regulars.map(t => t.color)).size === regulars.length;
                if (isSet && group.length <= 4) return true;
                const isRunColor = regulars.every(t => t.color === regulars[0].color);
                if (isRunColor) {
                    const sorted = [...regulars].sort((a,b) => a.val - b.val);
                    let neededJokers = 0;
                    for(let i=0; i<sorted.length-1; i++) {
                        if (sorted[i].val === sorted[i+1].val) return false; 
                        neededJokers += (sorted[i+1].val - sorted[i].val - 1); 
                    }
                    if (neededJokers <= jCount && group.length <= 13) return true;
                }
                return false;
            };

            const isBoardValid = useMemo(() => { 
                if (board.length === 0) return true; 
                return board.every(g => validateGroup(g)); 
            }, [board]);

            useEffect(() => {
                const handlePointerMove = (e) => { 
                    if (dragData) { 
                        setDragPos({ x: e.clientX, y: e.clientY }); 
                        if(longPressTimer.current) clearTimeout(longPressTimer.current); 
                        const elem = document.elementFromPoint(e.clientX, e.clientY);
                        if (elem) {
                            const dropZone = elem.closest('[data-drop]');
                            if (dropZone) setHoverTarget(dropZone.getAttribute('data-drop'));
                            else setHoverTarget(null);
                        }
                    } 
                };
                
                const handlePointerUp = async (e) => {
                    if (longPressTimer.current) clearTimeout(longPressTimer.current);
                    if (!dragData) return;
                    
                    const ghost = document.getElementById('drag-ghost');
                    const ghostGroup = document.getElementById('drag-ghost-group');
                    if (ghost) ghost.style.visibility = 'hidden';
                    if (ghostGroup) ghostGroup.style.visibility = 'hidden';
                    
                    const elemUnder = document.elementFromPoint(e.clientX, e.clientY);
                    const dropZone = elemUnder ? elemUnder.closest('[data-drop]') : null;
                    let actualTarget = dropZone ? dropZone.getAttribute('data-drop') : null;

                    // FALLBACK BOUNDING BOX: Magnetic Drop to Board
                    const boardArea = document.getElementById('felt-board');
                    if (boardArea && actualTarget !== 'rack' && !actualTarget?.startsWith('rack-slot-')) {
                        const rect = boardArea.getBoundingClientRect();
                        if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                            if (!actualTarget) actualTarget = 'board-new';
                        }
                    }

                    if (ghost) ghost.style.visibility = 'visible';
                    if (ghostGroup) ghostGroup.style.visibility = 'visible';
                    
                    const isMyTurn = tableState?.currentTurn === user.uid;

                    // Block drops on the board if it's not the user's turn
                    if (!isMyTurn && (actualTarget === 'board-new' || actualTarget?.startsWith('board-group-'))) {
                        showToast("המתן לתורך כדי לשחק באבני השולחן", "error");
                        actualTarget = null; // Triggers cancellation
                    }
                    
                    let newRack = [...rack]; 
                    let newBoard = board.map(g => [...g]);
                    
                    if (dragData.type === 'single') {
                        if (dragData.source === 'rack') newRack[dragData.tileIndex] = null;
                        else if (dragData.source === 'board') {
                            const grp = newBoard[dragData.groupIndex];
                            const tIdx = dragData.tileIndex;
                            if (tIdx > 0 && tIdx < grp.length - 1 && grp.length >= 4) {
                                const left = grp.slice(0, tIdx); const right = grp.slice(tIdx + 1);
                                newBoard.splice(dragData.groupIndex, 1, left, right);
                            } else {
                                grp.splice(tIdx, 1);
                                if (grp.length === 0) newBoard.splice(dragData.groupIndex, 1);
                            }
                        }

                        if (actualTarget && actualTarget.startsWith('board-group-')) {
                            const targetIdx = parseInt(actualTarget.split('-')[2]);
                            const actualIdx = (dragData.source === 'board' && dragData.groupIndex < targetIdx && newBoard.length < board.length) ? targetIdx - 1 : targetIdx;
                            if (newBoard[actualIdx]) newBoard[actualIdx].push(dragData.tile); else newBoard.push([dragData.tile]);
                        } 
                        else if (actualTarget === 'board-new') newBoard.push([dragData.tile]);
                        else if (actualTarget && actualTarget.startsWith('rack-slot-')) {
                            let slotIdx = parseInt(actualTarget.split('-')[2]);
                            if (newRack[slotIdx] !== null && dragData.source === 'rack') {
                                newRack[dragData.tileIndex] = newRack[slotIdx]; // Swap
                            } else if (newRack[slotIdx] !== null) {
                                const nextEmpty = newRack.findIndex(t=>t===null);
                                if(nextEmpty !== -1) slotIdx = nextEmpty;
                            }
                            newRack[slotIdx] = dragData.tile;
                        }
                        else if (dragData.source === 'rack') newRack[dragData.tileIndex] = dragData.tile;
                    } 
                    else if (dragData.type === 'group') {
                        const groupTiles = dragData.tiles;
                        if (dragData.source === 'board') newBoard.splice(dragData.groupIndex, 1);
                        
                        if (actualTarget && actualTarget.startsWith('board-group-')) {
                            const targetIdx = parseInt(actualTarget.split('-')[2]);
                            const actualIdx = (dragData.source === 'board' && dragData.groupIndex < targetIdx && newBoard.length < board.length) ? targetIdx - 1 : targetIdx;
                            if (newBoard[actualIdx]) newBoard[actualIdx].push(...groupTiles); else newBoard.push([...groupTiles]);
                        } else if (actualTarget === 'board-new') newBoard.push([...groupTiles]);
                        else if (dragData.source === 'board') newBoard.splice(dragData.groupIndex, 0, groupTiles); 
                    }
                    
                    setRack(newRack); 
                    setBoard(newBoard); 
                    setDragData(null); 
                    setHoverTarget(null);

                            await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), {

                            });
                        } catch(err) {}
                    }
                };
                
                if (dragData) {

                }

                    window.removeEventListener('pointermove', handlePointerMove); 
                    window.removeEventListener('pointerup', handlePointerUp); 
                };
            }, [dragData, hoverTarget, rack, board, tableState?.id, user.uid, tableState?.currentTurn]);

            const startDrag = (e, tile, source, groupIndex, tileIndex) => {

                setDragData({ type: 'single', tile, source, groupIndex, tileIndex }); 
                setDragPos({ x: e.clientX, y: e.clientY });
                
                if (source === 'board') {
                    longPressTimer.current = setTimeout(() => {
                        if (navigator.vibrate) navigator.vibrate(50);
                        setDragData({ type: 'group', tiles: board[groupIndex], source, groupIndex });
                    }, 400); 
                }
            };

            const handleSort777 = async () => {
                if (!tableState || !tableState.players[user.uid]) return;
                let activeTiles = rack.filter(t => t !== null);
                activeTiles.sort((a,b) => {
                    if (a.val === '☻') return 1; if (b.val === '☻') return -1;
                    if (a.val !== b.val) return a.val - b.val;
                    return a.color.localeCompare(b.color);
                });
                while(activeTiles.length < 28) activeTiles.push(null);
                setRack(activeTiles);
                if(startTurnRack.length > 0) setStartTurnRack([...activeTiles]);
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), {
                    [`players.${user.uid}.cards`]: activeTiles
                });
            };

            const handleSort789 = async () => {
                if (!tableState || !tableState.players[user.uid]) return;
                let activeTiles = rack.filter(t => t !== null);
                activeTiles.sort((a,b) => {
                    if (a.val === '☻') return 1; if (b.val === '☻') return -1;
                    if (a.color !== b.color) return a.color.localeCompare(b.color);
                    return a.val - b.val;
                });
                while(activeTiles.length < 28) activeTiles.push(null);
                setRack(activeTiles);
                if(startTurnRack.length > 0) setStartTurnRack([...activeTiles]);
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), {
                    [`players.${user.uid}.cards`]: activeTiles
                });

            const generateDeck = () => {
                const colors = ['#ef4444', '#3b82f6', '#f59e0b', '#0f172a'];
                let d = [];
                for (let set=0; set<2; set++) { for(let c=0; c<4; c++) { for(let v=1; v<=13; v++) d.push({id:`t_${set}_${c}_${v}`, val:v, color:colors[c]}); } }
                d.push({id:'j1', val:'☻', color:'#ef4444'}); d.push({id:'j2', val:'☻', color:'#0f172a'});
                return d.sort(()=>Math.random()-0.5);
            };

            const handleSit = async () => {
                const activeTablesSnap = await window.fb.getDocs(window.fb.collection(window.fb.db, "tables"));

                activeTablesSnap.forEach(doc => {
                    const tData = doc.data();

                });
                if (alreadySeated) return showToast("אתה כבר יושב בשולחן אחר. קום ממנו קודם.", "error");

                try { 
                    const buyInAmount = Number(tableState.minBuyIn);
                    await window.fb.runTransaction(window.fb.db, async (t) => {

                        const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const uSnap = await t.get(uRef);
                        if (uSnap.data().balance < buyInAmount) throw "אין לך מספיק יתרה לכניסה.";
                        t.update(uRef, { balance: uSnap.data().balance - buyInAmount });

                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { deck: newDeck, board: startTurnBoard, [`players.${user.uid}.cards`]: newRack, currentTurn: nextTurn, turnStartedAt: Date.now() });
            };

            const handleDraw = async () => {

            };
            
            const handleEndTurn = async () => {
                if (tableState.currentTurn !== user.uid || !isBoardValid) return;
                
                const isFirstDrop = !tableState.players[user.uid].hasDropped;
                const activeRackCount = rack.filter(t=>t!==null).length;

                if (isFirstDrop) {
                    const currentRackIds = rack.filter(t=>t!==null).map(t=>t.id);
                    const droppedTiles = startTurnRack.filter(t => t!==null && !currentRackIds.includes(t.id));
                    if (droppedTiles.length > 0) {
                        const sum = droppedTiles.reduce((s, t) => s + (t.val === '☻' ? 30 : t.val), 0);
                        if (sum < 30) return showToast(`יש צורך ב-30 נקודות לפחות להורדה ראשונה.`, "error");
                    } else return showToast("לא ירדת, חובה למשוך קופה.", "error");

                         let dw = (pData.cards||[]).filter(t=>t!==null).reduce((s, t) => s + (t.val === '☻' ? 30 : t.val), 0);
                         let penalty = Math.min(dw * stakesNum, pData.stack); 
                         updates[`players.${uid}.stack`] = pData.stack - penalty;
                         totalPot += penalty;
                         updates[`stats.${uid}`] = { incrementGames: 1, profit: -penalty };

                        const uSnap = await t.get(uRef);

                        const uData = uSnap.data();

                        delete newP[user.uid];

                            )}

                        >

                                        );
                                    }

                                    const tileCount = pData[1].cards ? pData[1].cards.filter(c => c !== null).length : 0;

                                    return (
                                        <div key={i} className={`flex flex-col items-center transition-all relative ${isTurn ? 'scale-110' : ''}`}>
                                            <div className={`w-10 h-10 sm:w-12 sm:h-12 rounded-full border-2 mb-1 flex items-center justify-center relative shadow-lg ${isMe ? 'bg-emerald-900 border-emerald-400 shadow-[0_0_15px_#10b981]' : isTurn ? 'bg-slate-800 border-emerald-500 ring-2 ring-emerald-500 ring-offset-2 ring-offset-slate-950' : 'bg-slate-800 border-slate-500'}`}>
                                                <i className={`fa-solid fa-user text-sm sm:text-lg ${isTurn ? 'text-white' : 'text-slate-300'}`}></i>
                                                {isMe && <div className="absolute -bottom-2 bg-emerald-500 text-slate-950 text-[9px] font-black px-2 py-0.5 rounded-full shadow-md">אתה</div>}
                                            </div>
                                            <span className={`text-[10px] sm:text-xs font-bold ${isMe ? 'text-emerald-400' : 'text-slate-300'} mt-1`}>
                                                {pData[1].username}
                                            </span>
                                            
                                            {tableState.phase === 'playing' && !isMe && (
                                                <div className="relative mt-2 flex justify-center">
                                                    <div className="opponent-rack-back">
                                                        {[...Array(Math.min(tileCount, 14))].map((_, idx) => (
                                                            <div key={idx} className="opponent-tile-peek"></div>
                                                        ))}
                                                    </div>
                                                    <div className="absolute -bottom-3 text-[10px] font-bold text-slate-400 bg-slate-950/80 px-2 rounded-full border border-slate-800">{tileCount} אבנים</div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>

                            {/* GOD MODE PANEL - Floating above everything */}
                            {isGodMode && tableState.phase === 'playing' && (
                                <div className="fixed inset-0 pointer-events-none z-[9999] flex flex-wrap justify-center items-start pt-32 gap-4 px-4">
                                    {Object.entries(tableState.players || {}).filter(([uid]) => uid !== user.uid).map(([uid, pData]) => (
                                        <div key={uid} className="flex flex-col items-center bg-purple-950/95 p-3 rounded-xl border-2 border-purple-400 shadow-[0_0_50px_purple] max-w-[300px]">
                                            <div className="text-center text-[10px] text-purple-200 font-black mb-2 uppercase tracking-widest border-b border-purple-500/50 pb-1 w-full"><i className="fa-solid fa-eye mr-1"></i> God Mode: {pData.username}</div>
                                            <div className="flex flex-wrap justify-center gap-[3px]">
                                                {pData.cards?.filter(c=>c!==null).map((c, idx) => (
                                                    <div key={idx} className="w-6 h-8 bg-white rounded flex flex-col items-center justify-center text-[14px] font-bold shadow-md" style={{ color: c.color }}>
                                                        <span>{c.val}</span>
                                                    </div>
                                                ))}
                                                {(!pData.cards || pData.cards.filter(c=>c!==null).length === 0) && <span className="text-xs text-purple-400 py-1 font-bold">אין אבנים על הלוח</span>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                            
                            {!isSeated && tableState.phase === 'waiting' && (
                                <div className="absolute inset-0 z-20 flex items-center justify-center">
                                    <button onClick={handleSit} className="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-3 rounded-xl font-bold shadow-xl transition-transform hover:scale-105">
                                        התיישב בשולחן ({Object.keys(tableState.players||{}).length}/{tableState.maxPlayers})
                                    </button>
                                </div>
                            )}

                            {showVictory && (
                                 <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm px-4 animate-fade-in">
                                     <div className="bg-slate-900 border border-emerald-500/50 p-6 rounded-2xl shadow-2xl text-center w-full max-w-sm">
                                         <i className="fa-solid fa-award text-4xl text-amber-400 mb-3 drop-shadow-md"></i>
                                         <h2 className="text-xl font-bold text-white mb-4">{tableState.players[tableState.winner]?.username} ניצח!</h2>
                                         <div className="bg-slate-950 rounded-xl p-4 text-right mb-4">
                                             <p className="text-slate-300 text-sm mb-1 flex justify-between"><span>רווח נקי:</span> <span className="font-bold text-emerald-400"><Coin amount={tableState.lastResults?.winnerProfit}/></span></p>
                                             <p className="text-slate-500 text-xs flex justify-between"><span>עמלת מועדון:</span> <span><Coin amount={tableState.lastResults?.rake}/></span></p>
                                         </div>
                                     </div>
                                 </div>
                            )}
                            
                            {isPlaying && (
                                <div className="mt-32 w-full flex flex-wrap gap-4 items-start p-2 pb-32 overflow-y-auto h-full scrollbar-hide">
                                    {board.map((group, gIdx) => (
                                        <div key={gIdx} data-drop={`board-group-${gIdx}`} className={`flex bg-slate-900/30 p-1.5 rounded-lg border transition-colors ${hoverTarget === `board-group-${gIdx}` ? 'border-emerald-500/50 bg-emerald-500/10 scale-105' : !validateGroup(group) ? 'board-invalid-group' : 'border-slate-800'}`}>
                                            {group.map((t, tIdx) => (
                                                <div key={t.id} 
                                                     onPointerDown={(e) => startDrag(e, t, 'board', gIdx, tIdx)} 
                                                     className={`rummy-tile w-9 h-12 sm:w-11 sm:h-16 flex items-center justify-center text-xl sm:text-2xl mx-[1px] ${dragData?.type === 'group' && dragData.groupIndex === gIdx ? 'opacity-30' : dragData?.tile?.id === t.id ? 'opacity-30' : ''}`} 
                                                     style={{ color: t.color }}>{t.val}</div>
                                            ))}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="relative z-10 shrink-0 bg-slate-950 pt-2 pb-4">
                        {isSeated && isPlaying && (
                            <div className="flex justify-between items-center px-4 pb-3">
                                <div className="flex gap-2">
                                   <button onClick={handleSort777} className="bg-slate-800 text-slate-300 px-3 py-2 rounded-lg font-bold text-xs hover:text-white hover:bg-slate-700 transition-all border border-slate-700 shadow-sm">סדר 777 🔢</button>
                                   <button onClick={handleSort789} className="bg-slate-800 text-slate-300 px-3 py-2 rounded-lg font-bold text-xs hover:text-white hover:bg-slate-700 transition-all border border-slate-700 shadow-sm"><span className="text-blue-500">■</span><span className="text-red-500">■</span> סדר 789</button>
                                </div>
                                <div className="flex gap-2 items-center">
                                    {isMyTurn && <button onClick={()=>{setBoard(startTurnBoard); setRack(startTurnRack);}} className="bg-rose-900/80 text-rose-300 px-4 py-2 rounded-lg text-sm font-bold shadow-md border border-rose-800/50 hover:bg-rose-800 transition-colors" title="בטל מהלכים"><i className="fa-solid fa-undo"></i></button>}
                                    {isMyTurn && <button onClick={handleDraw} className="bg-slate-800 text-slate-200 border border-slate-700 px-5 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-slate-700 transition-colors">קופה</button>}
                                    {isMyTurn && <button onClick={handleEndTurn} disabled={!isBoardValid} className={`px-6 py-2 rounded-lg font-black shadow-lg text-white text-sm transition-colors ${!isBoardValid ? 'bg-slate-700 opacity-50' : 'bg-emerald-600 hover:bg-emerald-500'}`}>סיום תור</button>}
                                </div>
                            </div>
                        )}

                        <div className="px-2 sm:px-4">
                            <div className="rack-grid">
                                {rack.map((tile, index) => (
                                    <div key={index} data-drop={`rack-slot-${index}`} className={`rack-slot flex items-center justify-center ${hoverTarget === `rack-slot-${index}` ? 'hover-target' : ''}`}>
                                        {tile && (
                                            <div onPointerDown={(e) => startDrag(e, tile, 'rack', null, index)} className={`rummy-tile w-[90%] h-[90%] flex items-center justify-center text-xl sm:text-3xl z-10 cursor-grab active:cursor-grabbing ${dragData?.tile?.id === tile.id ? 'opacity-20' : ''}`} style={{ color: tile.color }}>
                                                {tile.val}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    
                    {/* The Ghost Elements with strict pointer-events-none */}
                    {dragData && dragData.type === 'single' && (
                        <div id="drag-ghost" className="fixed z-[9999] rummy-tile w-12 h-16 sm:w-16 sm:h-24 flex items-center justify-center text-3xl font-bold scale-110 shadow-[0_20px_40px_rgba(0,0,0,0.6)]" style={{ left: dragPos.x, top: dragPos.y, transform: 'translate(-50%, -50%) rotate(3deg)', color: dragData.tile.color, pointerEvents: 'none' }}>{dragData.tile.val}</div>
                    )}
                    {dragData && dragData.type === 'group' && (
                        <div id="drag-ghost-group" className="fixed z-[9999] flex bg-slate-900/60 p-1.5 rounded-xl border border-emerald-500/50 shadow-2xl scale-110 backdrop-blur-sm" style={{ left: dragPos.x, top: dragPos.y, transform: 'translate(-50%, -50%)', pointerEvents: 'none' }}>
                            {dragData.tiles.map(t => (<div key={t.id} className="rummy-tile w-9 h-12 flex items-center justify-center text-xl mx-[1px]" style={{ color: t.color }}>{t.val}</div>))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
