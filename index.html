<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 950: '#020617', 900: '#0f172a', 800: '#1e293b', 700: '#334155' },

    <style>
        body, html {
            background-color: #020617;
            color: #f8fafc; margin: 0; padding: 0;
            height: 100dvh; width: 100vw;
            overflow: hidden; overscroll-behavior: none; touch-action: none;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        .scrollable-content { overflow-y: auto; -webkit-overflow-scrolling: touch; height: 100%; padding-bottom: 150px; pointer-events: auto; touch-action: auto; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        @keyframes flashRed { 0%, 100% { border-color: rgba(239, 68, 68, 0.3); box-shadow: none; } 50% { border-color: rgba(239, 68, 68, 0.8); box-shadow: 0 0 15px rgba(239,68,68,0.5); } }
        .board-invalid-group { animation: flashRed 1.5s infinite; border: 2px solid #ef4444 !important; background: rgba(239, 68, 68, 0.12); }

        @keyframes trophyPop { 0% { transform: scale(0) rotate(-20deg); } 70% { transform: scale(1.2) rotate(5deg); } 100% { transform: scale(1) rotate(0); } }
        .trophy-pop { animation: trophyPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        /* ===== שולחן הלבד (Felt) ===== */
        #felt-board {
            touch-action: pan-x pan-y;
            background:
                radial-gradient(ellipse at center, rgba(16,185,129,0.10), transparent 70%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 2px, transparent 2px, transparent 6px),
                linear-gradient(160deg, #06402f 0%, #052e22 55%, #04241b 100%);
        }

        /* ===== אבן משחק ===== */
        .rummy-tile {
            background: linear-gradient(135deg, #fffef8 0%, #f0ede2 100%);
            box-shadow: 2px 4px 8px rgba(0,0,0,0.45), inset -1px -2px 3px rgba(0,0,0,0.1), inset 1px 1px 2px rgba(255,255,255,1);
            border-bottom: 5px solid #cfc9b8; border-right: 1px solid #e6e2d5; border-radius: 8px;
            font-family: 'Rubik', sans-serif; font-weight: 900;
            transition: transform 0.1s ease, box-shadow 0.1s ease; user-select: none;
            text-shadow: 0 1px 1px rgba(0,0,0,0.15);
            touch-action: none;
        }
        .rummy-tile:active, .rummy-tile.dragging {
            box-shadow: 0 20px 30px rgba(0,0,0,0.6); transform: scale(1.1) translateY(-8px); z-index: 999;
        }

        /* ===== אבנים על הלוח - קנה מידה דינמי ===== */
        .board-tile {
            width: calc(2.25rem * var(--board-scale, 1)); height: calc(3.5rem * var(--board-scale, 1));
            font-size: calc(1.25rem * var(--board-scale, 1)); margin: 0 calc(2px * var(--board-scale, 1));
        }
        @media (min-width: 640px) {
            .board-tile {
                width: calc(2.75rem * var(--board-scale, 1)); height: calc(4rem * var(--board-scale, 1));
                font-size: calc(1.75rem * var(--board-scale, 1));
            }
        }

        .board-group {
            padding: calc(0.6rem * var(--board-scale, 1));
            border-radius: calc(0.75rem * var(--board-scale, 1));
            transition: background-color 0.2s, border-color 0.2s;
        }

        /* ===== המגש (Rack) - התיקון הקריטי: הרשת לא הייתה מוגדרת ===== */
        .rack-grid {
            display: grid;
            grid-template-columns: repeat(14, minmax(0, 1fr));
            grid-template-rows: repeat(2, minmax(0, 1fr));
            gap: 3px;
            direction: ltr;
        }
        .rack-slot { min-height: 52px; position: relative; }
        @media (min-width: 640px) { .rack-slot { min-height: 64px; } }

        .action-btn {
            background: linear-gradient(to bottom, #1e293b, #0f172a); border: 2px solid #334155;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.1); transition: all 0.1s ease;
        }
        .action-btn:active { transform: translateY(2px); box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
    </style>

</head>
<body class="bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 to-slate-950 h-full w-full">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        /* ============================================================
           הגדרות קלאב - כאן משנים דברים בקלות
           ============================================================ */
        const ROLES = { SUPER_ADMIN: 'super_admin', CLUB_OWNER: 'club_owner', MANAGER: 'manager', AGENT: 'agent', PLAYER: 'player' };

        // GOD MODE - רק שני המיילים האלה. שים לב: תיקנתי gmail.con -> gmail.com
        const GOD_EMAILS = ['aaci.yoni@gmail.com', 'info.bagso@gmail.com'];
        const SUPER_ADMIN_EMAIL = 'aaci.yoni@gmail.com';

        const RAKE_PCT = 0.05;        // 5% רייק לקלאב מכל סיבוב
        const TURN_SECONDS = 60;      // זמן לתור
        const FIRST_MELD_MIN = 30;    // מינימום נקודות להורדה ראשונה

        const BOT_NAMES = ['Alex_Pro', 'TileMaster99', 'RummyKing', 'Sara_Play', 'PokerFace_Dan', 'Lucky_Jim', 'AceOfSpades', 'JokerQueen', 'Max_Bet', 'Fast_Hand', 'RummyShark', 'TileNinja', 'Brainiac', 'Lucky777', 'FastRunner'];

        const isGodUser = (u) => u && GOD_EMAILS.includes((u.email || '').toLowerCase().trim());

        const formatMoney = (amount) => {
            if (amount === undefined || amount === null) return '0.00';
            const num = Number(amount); return isNaN(num) ? String(amount) : num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        };

        /* ============================================================
           לוגיקת משחק - חוקי רמיקוב
           ============================================================ */
        const generateDeck = () => {
            const colors = ['#dc2626', '#2563eb', '#d97706', '#0f172a'];
            let d = [];
            for (let set=0; set<2; set++) { for(let c=0; c<4; c++) { for(let v=1; v<=13; v++) d.push({id:`t_${set}_${c}_${v}_${Math.random().toString(36).slice(2,8)}`, val:v, color:colors[c]}); } }
            d.push({id:`j1_${Math.random().toString(36).slice(2,8)}`, val:'☻', color:'#dc2626'});
            d.push({id:`j2_${Math.random().toString(36).slice(2,8)}`, val:'☻', color:'#0f172a'});
            return d.sort(()=>Math.random()-0.5);
        };

        // בדיקת חוקיות קבוצה: סדרה (Run) או סט (Set)
        const validateGroup = (group) => {
            if (!group || group.length < 3) return false;
            const jokersCount = group.filter(t => t.val === '☻').length;
            const regulars = group.filter(t => t.val !== '☻');
            if (regulars.length === 0) return group.length >= 3;
            if (group.length > 13) return false;

            const isSet = () => {
                if (group.length > 4) return false;
                if (!regulars.every(t => t.val === regulars[0].val)) return false;
                return new Set(regulars.map(t => t.color)).size === regulars.length;
            };
            const isRun = () => {
                if (!regulars.every(t => t.color === regulars[0].color)) return false;
                if (new Set(regulars.map(t => Number(t.val))).size !== regulars.length) return false;
                const sorted = [...regulars].sort((a,b) => Number(a.val) - Number(b.val));
                let gaps = 0;
                for(let i=0; i<sorted.length-1; i++) gaps += (Number(sorted[i+1].val) - Number(sorted[i].val) - 1);
                if (gaps > jokersCount) return false;
                // הג'וקרים הנותרים חייבים להאריך את הסדרה בלי לחרוג מ-1 עד 13
                const extra = jokersCount - gaps;
                const lo = Number(sorted[0].val), hi = Number(sorted[sorted.length-1].val);
                return (13 - hi) + (lo - 1) >= extra;
            };
            return isSet() || isRun();
        };

        // חישוב נקודות קבוצה חוקית - ג'וקר שווה את ערך האבן שהוא מחליף (חוק רשמי)
        const groupPoints = (tiles) => {
            const jokers = tiles.filter(t => t.val === '☻').length;
            const regulars = tiles.filter(t => t.val !== '☻');
            if (regulars.length === 0) return 30 * jokers;

            const isSet = tiles.length <= 4 && regulars.every(t => t.val === regulars[0].val) && new Set(regulars.map(t=>t.color)).size === regulars.length;
            if (isSet) return Number(regulars[0].val) * tiles.length;

            // Run: ג'וקרים ממלאים חורים ואז מאריכים למעלה (עד 13) ואז למטה
            const sorted = [...regulars].sort((a,b) => Number(a.val) - Number(b.val));
            let sum = sorted.reduce((s,t) => s + Number(t.val), 0);
            let j = jokers;
            for (let i=0; i<sorted.length-1 && j>0; i++) {
                const gap = Number(sorted[i+1].val) - Number(sorted[i].val) - 1;
                for (let g=1; g<=gap && j>0; g++) { sum += Number(sorted[i].val) + g; j--; }
            }
            let hi = Number(sorted[sorted.length-1].val), lo = Number(sorted[0].val);
            while (j>0 && hi<13) { hi++; sum += hi; j--; }
            while (j>0 && lo>1) { lo--; sum += lo; j--; }
            return sum;
        };

        // קנס אבנים שנשארו ביד בסוף משחק - ג'וקר = 30
        const rackPenalty = (cards) => (cards || []).filter(c => c).reduce((s,c) => s + (c.val === '☻' ? 30 : Number(c.val)), 0);

        // חלוקת קלפים והתחלת סיבוב - פונקציה אחת לכל המקומות (מתקן תנאי מרוץ)
        const buildDeal = (players) => {
            const d = generateDeck();
            const uids = Object.keys(players).sort();
            const np = {};
            uids.forEach(uid => {
                const hand = d.splice(0, 14);
                while (hand.length < 28) hand.push(null);
                np[uid] = { ...players[uid], cards: hand, hasDropped: false };
            });
            return { players: np, deck: d, board: [], phase: 'playing', currentTurn: uids[0], turnStartedAt: Date.now(), results: null };
        };

        const Coin = ({ amount, className="" }) => (
            <span className={`inline-flex items-center gap-1 font-bold ${className}`}>
                <i className="fa-solid fa-coins text-gold-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.5)]"></i>
                {formatMoney(amount)}
            </span>
        );

        /* ============================================================
           אפליקציה ראשית
           ============================================================ */
        function App() {
            const [fbReady, setFbReady] = useState(false);
            const [dbUser, setDbUser] = useState(null);
            const [currentView, setCurrentView] = useState('auth');
            const [tablesDB, setTablesDB] = useState([]);
            const [activeTable, setActiveTable] = useState(null);
            const [toasts, setToasts] = useState([]);

            const viewRef = useRef(currentView);
            useEffect(() => { viewRef.current = currentView; }, [currentView]);

            const showToast = useCallback((msg, type = 'info') => {
                const id = Date.now() + Math.random();
                setToasts(prev => [...prev, { id, msg, type }]);
                setTimeout(() => { setToasts(prev => prev.filter(t => t.id !== id)); }, 4000);
            }, []);

            const changeView = useCallback((view, tableObj = null) => {
                setCurrentView(view); setActiveTable(tableObj);
                if (view !== 'auth' && view !== 'pending') { window.history.pushState({ view, tableId: tableObj?.docId }, "", `?v=${view}`); }
            }, []);

            useEffect(() => {
                const handlePopState = (event) => {
                    if (event.state && event.state.view) {
                        setCurrentView(event.state.view); if (event.state.view !== 'table') setActiveTable(null);
                    } else if (dbUser && dbUser.status === 'approved') { setCurrentView('lobby'); }
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, [dbUser]);

            useEffect(() => {
                if (window.fb) setFbReady(true);
                else window.addEventListener('firebase-ready', () => setFbReady(true));
            }, []);

            useEffect(() => {
                if (!fbReady) return;
                const unsub = window.fb.onAuthStateChanged(window.fb.auth, async (user) => {
                    if (user) await fetchOrInitUser(user);
                    else { setDbUser(null); setCurrentView('auth'); }
                });
                return () => unsub();
            }, [fbReady]);

            const fetchOrInitUser = async (user) => {
                const ref = window.fb.doc(window.fb.db, "users", user.uid);
                const snap = await window.fb.getDoc(ref);
                if (snap.exists()) { setDbUser({ uid: user.uid, ...snap.data() }); }
                else {
                    const email = (user.email || '').toLowerCase();
                    const isSuper = email === SUPER_ADMIN_EMAIL;
                    const isGod = GOD_EMAILS.includes(email);
                    const newUser = {
                        username: user.displayName || 'Player', email: email,
                        role: isSuper ? ROLES.SUPER_ADMIN : ROLES.PLAYER,
                        status: (isSuper || isGod) ? 'approved' : 'pending',
                        balance: isSuper ? 10000000 : 0, isBot: false,
                        stats: { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 }
                    };
                    await window.fb.setDoc(ref, newUser); setDbUser({ uid: user.uid, ...newUser });
                }
            };

            useEffect(() => {
                if (!fbReady || !dbUser?.uid) return;
                const unsubT = window.fb.onSnapshot(window.fb.collection(window.fb.db, "tables"), (s) => {
                    setTablesDB(s.docs.map(d => ({ docId: d.id, ...d.data() })));
                });
                const unsubU = window.fb.onSnapshot(window.fb.doc(window.fb.db, "users", dbUser.uid), (d) => {
                    if(d.exists()) {
                        const data = d.data(); setDbUser({ uid: d.id, ...data });
                        if(data.status === 'pending') changeView('pending');
                        else if (viewRef.current === 'auth' || viewRef.current === 'pending') { changeView('lobby'); }
                    }
                });
                return () => { unsubT(); unsubU(); };
            }, [fbReady, dbUser?.uid, changeView]);

            if (!fbReady) return <div className="h-full w-full flex items-center justify-center text-emerald-500"><i className="fa-solid fa-circle-notch fa-spin text-4xl"></i></div>;

            return (
                <div className="h-full w-full flex flex-col relative overflow-hidden">
                    {dbUser && dbUser.status === 'approved' && currentView !== 'table' && (
                        <nav className="bg-slate-900/90 backdrop-blur-md px-4 py-3 z-40 shrink-0 border-b border-slate-800 shadow-xl flex justify-between items-center">
                            <div className="flex items-center gap-2 sm:gap-4">
                                <button onClick={() => window.fb.signOut(window.fb.auth)} className="w-10 h-10 rounded-xl bg-slate-800 text-slate-400 hover:text-white hover:bg-rose-600 flex items-center justify-center"><i className="fa-solid fa-sign-out-alt"></i></button>
                                {([ROLES.SUPER_ADMIN, ROLES.CLUB_OWNER, ROLES.MANAGER, ROLES.AGENT].includes(dbUser.role) || isGodUser(dbUser)) && (
                                    <button onClick={() => changeView(currentView === 'backoffice' ? 'lobby' : 'backoffice')} className={`w-10 h-10 rounded-xl flex items-center justify-center ${currentView === 'backoffice' ? 'bg-blue-600 text-white' : 'bg-slate-800 text-blue-400'}`}><i className="fa-solid fa-chart-line"></i></button>
                                )}
                                <div className="flex-col items-end mr-1 hidden sm:flex">
                                    <span className="text-sm font-bold text-white">{dbUser.username}</span>
                                    <Coin amount={dbUser.balance} className="text-sm" />
                                </div>
                            </div>
                            <div className="flex flex-col items-end cursor-pointer" onClick={() => changeView('lobby')}>
                                <h1 className="text-xl font-black text-emerald-400">RUMMIKUBE</h1>
                                <span className="sm:hidden"><Coin amount={dbUser.balance} className="text-xs" /></span>
                            </div>
                        </nav>
                    )}

                    <main className="flex-1 overflow-hidden relative z-0">
                        {currentView === 'auth' && <AuthView />}
                        {currentView === 'pending' && <PendingView />}
                        {currentView === 'lobby' && <LobbyView user={dbUser} tables={tablesDB} onJoin={(t) => changeView('table', t)} showToast={showToast} />}
                        {currentView === 'backoffice' && <BackofficeView user={dbUser} showToast={showToast} />}
                        {currentView === 'table' && <RummyTable tableDocId={activeTable?.docId} user={dbUser} onLeave={() => changeView('lobby')} showToast={showToast} />}
                    </main>

                    <div className="fixed bottom-8 left-1/2 transform -translate-x-1/2 z-[99999] flex flex-col gap-2 pointer-events-none w-[90%] max-w-sm">
                        {toasts.map(t => (
                            <div key={t.id} className={`animate-fade-in px-6 py-3 rounded-2xl font-bold text-sm text-center border backdrop-blur-md ${t.type === 'error' ? 'bg-rose-900 border-rose-500 text-white' : 'bg-slate-800 border-emerald-500 text-emerald-400'}`}>{t.msg}</div>
                        ))}
                    </div>
                </div>
            );
        }

        function AuthView() {
            return (
                <div className="h-full w-full flex flex-col items-center justify-center p-4">
                    <div className="glass-panel p-10 rounded-3xl text-center">
                        <h2 className="text-4xl font-black text-white mb-2">Rummikube</h2>
                        <p className="text-slate-400 text-sm">Elite Club</p>
                        <button onClick={()=>window.fb.signInWithPopup(window.fb.auth, window.fb.googleProvider)} className="w-full bg-white text-slate-900 font-black py-4 px-6 rounded-xl shadow-xl flex items-center justify-center gap-3 mt-8">
                            <i className="fa-brands fa-google text-blue-500"></i> התחברות
                        </button>
                    </div>
                </div>
            );
        }

        function PendingView() {
            return (
                <div className="h-full w-full text-slate-300 flex justify-center items-center font-bold text-xl flex-col gap-4 p-6 text-center">
                    <i className="fa-solid fa-clock-rotate-left text-4xl text-amber-500 animate-spin"></i>
                    ממתין לאישור מנהל...
                    <button onClick={()=>window.fb.signOut(window.fb.auth)} className="text-sm text-slate-500 underline">התנתק</button>
                </div>
            );
        }

        /* ============================================================
           לובי
           ============================================================ */
        function LobbyView({ user, tables, onJoin, showToast }) {
            const [showCreate, setShowCreate] = useState(false);
            const [newTableOptions, setNewTableOptions] = useState({ maxPlayers: 4, stakes: 0.10 });

            const handleCreate = async () => {
                const calculatedBuyIn = Math.round(newTableOptions.stakes * 100 * 100) / 100;
                await window.fb.addDoc(window.fb.collection(window.fb.db, "tables"), {
                    type: 'rummikub', maxPlayers: newTableOptions.maxPlayers,
                    minBuyIn: calculatedBuyIn, stakes: newTableOptions.stakes,
                    players: {}, board: [], deck: [], phase: 'waiting', results: null, createdAt: Date.now()
                });
                setShowCreate(false); showToast("שולחן נפתח בהצלחה!", "success");
            };

            // מחיקת שולחן - עכשיו מחזירה את הצ'יפים של כל היושבים לארנק
            const handleDelete = async (e, t) => {
                e.stopPropagation();
                if (!window.confirm("למחוק שולחן זה? הצ'יפים של השחקנים היושבים יוחזרו לארנק שלהם.")) return;
                try {
                    await window.fb.runTransaction(window.fb.db, async (tr) => {
                        const tblRef = window.fb.doc(window.fb.db, "tables", t.docId);
                        const snap = await tr.get(tblRef);
                        if (!snap.exists()) return;
                        const players = snap.data().players || {};
                        const refunds = [];
                        for (const uid of Object.keys(players)) {
                            const uSnap = await tr.get(window.fb.doc(window.fb.db, "users", uid));
                            if (uSnap.exists()) refunds.push([uSnap.ref, (uSnap.data().balance || 0) + (players[uid].stack || 0)]);
                        }
                        refunds.forEach(([ref, bal]) => tr.update(ref, { balance: bal }));
                        tr.delete(tblRef);
                    });

                                            <button onClick={()=>rejectUser(u)} className="bg-slate-800 hover:bg-rose-900 text-slate-300 px-4 py-2 rounded-lg font-bold text-sm border border-slate-700"><i className="fa-solid fa-xmark"></i></button>

                        {/* בוטים */}

        /* ============================================================
           שולחן רמיקוב
           ============================================================ */
        function RummyTable({ tableDocId, user, onLeave, showToast }) {
            const [tableState, setTableState] = useState(null);
            const [loading, setLoading] = useState(true);
            const [godOpen, setGodOpen] = useState(false);

            const [rack, setRack] = useState(Array(28).fill(null));
            const [board, setBoard] = useState([]);

            const [startTurnBoard, setStartTurnBoard] = useState([]);
            const [startTurnRackCount, setStartTurnRackCount] = useState(0);
            const [startTurnRack, setStartTurnRack] = useState([]);
            const startTurnRef = useRef(null);

            const [dragData, setDragData] = useState(null);
            const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
            const [hoverTarget, setHoverTarget] = useState(null);

            const [timeLeft, setTimeLeft] = useState(TURN_SECONDS);
            const [showError, setShowError] = useState("");

            const longPressTimer = useRef(null);
            const dragDataRef = useRef(null);
            const endingRef = useRef(false);

            const isGod = isGodUser(user);
            const me = tableState?.players?.[user.uid];
            const hasDropped = !!me?.hasDropped;

            const flashError = (msg) => { setShowError(msg); setTimeout(()=>setShowError(""), 4000); };

            const boardScale = useMemo(() => {
                if (!board || board.length === 0) return 1.0;
                const totalTiles = board.reduce((sum, g) => sum + g.tiles.length, 0);
                const scale = 1.0 - (board.length * 0.01 + totalTiles * 0.003);
                return Math.max(0.45, Math.min(1.0, scale));
            }, [board]);

            useEffect(() => { dragDataRef.current = dragData; }, [dragData]);

            useEffect(() => {
                if(!tableDocId) return;
                const unsub = window.fb.onSnapshot(window.fb.doc(window.fb.db, "tables", tableDocId), doc => {
                    if(doc.exists()) { setTableState({id: doc.id, ...doc.data()}); setLoading(false); }
                    else { showToast("השולחן נסגר", "error"); onLeave(); }
                });
                return () => unsub();
            }, [tableDocId, onLeave, showToast]);

            /* ---------- בוטים (רצים רק בדפדפן של הסופר-אדמין) ---------- */
            useEffect(() => {
                if (!tableState || user.role !== ROLES.SUPER_ADMIN) return;

                if (tableState.phase === 'waiting') {
                    const joinInterval = setInterval(async () => {
                        try {
                            const tblRef = window.fb.doc(window.fb.db, "tables", tableDocId);
                            const tblSnap = await window.fb.getDoc(tblRef);
                            if (!tblSnap.exists()) return;
                            const t = tblSnap.data();
                            const playersCount = Object.keys(t.players || {}).length;
                            if (!t.players[user.uid]) return;
                            if (playersCount === 0 || playersCount >= t.maxPlayers || t.phase !== 'waiting') return;

                            const botQ = window.fb.query(window.fb.collection(window.fb.db, "users"), window.fb.where("isBot", "==", true));
                            const botSnaps = await window.fb.getDocs(botQ);
                            if (botSnaps.empty) return;
                            const bots = botSnaps.docs.map(d => ({id: d.id, ...d.data()}));
                            const availableBots = bots.filter(b => !t.players[b.id]);
                            if (availableBots.length === 0) return;

                            const randomBot = availableBots[Math.floor(Math.random() * availableBots.length)];
                            const newPlayers = { ...t.players, [randomBot.id]: { username: randomBot.username, cards: [], hasDropped: false, stack: Number(t.minBuyIn), isBot: true } };
                            if (Object.keys(newPlayers).length === Number(t.maxPlayers)) {
                                await window.fb.updateDoc(tblRef, buildDeal(newPlayers));
                            } else {
                                await window.fb.updateDoc(tblRef, { players: newPlayers });
                            }
                        } catch(e) {}
                    }, 3000);
                    return () => clearInterval(joinInterval);
                }

                if (tableState.phase === 'playing') {
                    const currentUid = tableState.currentTurn;
                    const currentPlayer = tableState.players?.[currentUid];
                    if (currentPlayer && currentPlayer.isBot) {
                        const botTimer = setTimeout(async () => {
                            try {
                                const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                                const tblSnap = await window.fb.getDoc(tblRef);
                                if (!tblSnap.exists()) return;
                                const currentTbl = tblSnap.data();
                                if (currentTbl.currentTurn !== currentUid || currentTbl.phase !== 'playing') return;

                                const newDeck = [...(currentTbl.deck || [])];
                                const tile = newDeck.length > 0 ? newDeck.pop() : null;
                                const newRack = [...(currentTbl.players[currentUid].cards || [])];
                                if(tile) {
                                    const emptyIdx = newRack.findIndex(t=>t===null);
                                    if(emptyIdx !== -1) newRack[emptyIdx] = tile; else newRack.push(tile);
                                }
                                const uids = Object.keys(currentTbl.players).sort();
                                const nextTurn = uids[(uids.indexOf(currentUid) + 1) % uids.length];
                                await window.fb.updateDoc(tblRef, { deck: newDeck, [`players.${currentUid}.cards`]: newRack, currentTurn: nextTurn, turnStartedAt: Date.now() });
                            } catch(e) {}
                        }, 4000);
                        return () => clearTimeout(botTimer);
                    }
                }
            }, [tableState?.phase, tableState?.currentTurn, user.role, user.uid, tableDocId]);

            /* ---------- טיימר תור ---------- */
            useEffect(() => {
                let interval;
                if (tableState?.phase === 'playing' && tableState?.turnStartedAt) {
                    interval = setInterval(() => {
                        const elapsed = Math.floor((Date.now() - tableState.turnStartedAt) / 1000);
                        const remaining = Math.max(0, TURN_SECONDS - elapsed);
                        setTimeLeft(remaining);
                        if (remaining === 0 && tableState.currentTurn === user.uid) { clearInterval(interval); handleDraw(true); }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [tableState?.phase, tableState?.turnStartedAt, tableState?.currentTurn, user.uid]);

            /* ---------- סנכרון מצב מקומי מול DB ---------- */
            useEffect(() => {
                if(!tableState) return;
                if (!dragDataRef.current) {
                    const rawBoard = tableState.board || [];
                    setBoard(rawBoard);
                    const dbCards = tableState.players?.[user.uid]?.cards || [];
                    const fullRack = [...dbCards]; while(fullRack.length < 28) fullRack.push(null);
                    setRack(fullRack);

                    if (tableState.currentTurn === user.uid && startTurnRef.current !== tableState.turnStartedAt) {
                         setStartTurnBoard(JSON.parse(JSON.stringify(rawBoard)));
                         setStartTurnRackCount(dbCards.filter(t=>t!==null).length);
                         setStartTurnRack(JSON.parse(JSON.stringify(fullRack)));
                         startTurnRef.current = tableState.turnStartedAt;
                         setShowError("");
                    }
                }
            }, [tableState, user.uid]);

            const isBoardValid = useMemo(() => {
                if (board.length === 0) return true;
                return board.every(g => validateGroup(g.tiles));
            }, [board]);

            /* ---------- גרירה ---------- */
            useEffect(() => {
                const handlePointerMove = (e) => {
                    if (dragDataRef.current) {
                        setDragPos({ x: e.clientX, y: e.clientY });
                        if (longPressTimer.current) {
                            const dist = Math.hypot(e.clientX - dragDataRef.current.startX, e.clientY - dragDataRef.current.startY);
                            if (dist > 15) { clearTimeout(longPressTimer.current); longPressTimer.current = null; }
                        }
                        const elem = document.elementFromPoint(e.clientX, e.clientY);
                        if (elem) {
                            const dropZone = elem.closest('[data-drop]');
                            setHoverTarget(dropZone ? dropZone.getAttribute('data-drop') : null);
                        }
                    }
                };

                const handlePointerUp = async (e) => {
                    if (longPressTimer.current) clearTimeout(longPressTimer.current);
                    const currentDrag = dragDataRef.current;
                    if (!currentDrag) return;

                    const isMyTurn = tableState?.currentTurn === user.uid;
                    let actualTarget = hoverTarget;

                    let dropX = 50, dropY = 50;
                    const boardArea = document.getElementById('felt-board');
                    if (boardArea && actualTarget !== 'rack' && !actualTarget?.startsWith('rack-slot-')) {
                        const rect = boardArea.getBoundingClientRect();
                        if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                            dropX = Math.max(4, Math.min(96, ((e.clientX - rect.left) / rect.width) * 100));
                            dropY = Math.max(6, Math.min(94, ((e.clientY - rect.top) / rect.height) * 100));
                            if (!actualTarget || (!actualTarget.startsWith('board-group-'))) actualTarget = 'board-new';
                        }
                    }

                    const droppingToBoard = actualTarget === 'board-new' || actualTarget?.startsWith('board-group-');

                    // חסימה: לא בתורך אסור לשחק על הלוח
                    if (!isMyTurn && (droppingToBoard || currentDrag.source === 'board')) {
                        flashError("המתן לתורך כדי לשחק בלוח המרכזי"); actualTarget = null;
                    }

                    // חוק הורדה ראשונה: אסור לצרף אבנים לקבוצות קיימות לפני שירדת עם 30
                    if (isMyTurn && !hasDropped && actualTarget?.startsWith('board-group-')) {
                        const targetId = actualTarget.replace('board-group-', '');
                        const existedAtStart = startTurnBoard.some(g => g.id === targetId);
                        if (existedAtStart) {
                            flashError(`לפני הורדה ראשונה (${FIRST_MELD_MIN} נק') אסור להשתמש באבני השולחן - פתח סדרות חדשות משלך`);
                            actualTarget = null;
                        }
                    }

                    let newRack = [...rack]; let newBoard = board.map(g => ({...g, tiles: [...g.tiles]})); let tilesToAdd = [];

                    if (currentDrag.type === 'single') {
                        tilesToAdd = [currentDrag.tile];
                        if (currentDrag.source === 'rack') newRack[currentDrag.tileIndex] = null;
                        else if (currentDrag.source === 'board') {
                            const grp = newBoard.find(g => g.id === currentDrag.groupId);
                            if(grp) {
                                if (currentDrag.tileIndex > 0 && currentDrag.tileIndex < grp.tiles.length - 1 && grp.tiles.length >= 3) {
                                     const left = grp.tiles.slice(0, currentDrag.tileIndex); const right = grp.tiles.slice(currentDrag.tileIndex + 1);
                                     grp.tiles = left; newBoard.push({ id: `grp_${Date.now()}_split`, x: Math.min(95, grp.x + 8), y: grp.y, tiles: right });
                                } else {
                                     grp.tiles.splice(currentDrag.tileIndex, 1);
                                     if (grp.tiles.length === 0) newBoard = newBoard.filter(g => g.id !== currentDrag.groupId);
                                }
                            }
                        }
                    } else {
                        tilesToAdd = currentDrag.tiles;
                        if (currentDrag.source === 'board') newBoard = newBoard.filter(g => g.id !== currentDrag.groupId);
                        else if (currentDrag.source === 'rack') {
                            for (let i = currentDrag.startIndex; i < currentDrag.startIndex + currentDrag.tiles.length; i++) newRack[i] = null;
                        }
                    }

                    // *** התיקון הקריטי: זיהוי קבוצת יעד לפי ID אמיתי (בעבר הושוו אינדקסים מול ID ושום דבר לא התחבר) ***
                    if (actualTarget && actualTarget.startsWith('board-group-')) {
                        const targetId = actualTarget.replace('board-group-', '');
                        const targetGrp = newBoard.find(g => g.id === targetId);
                        if (targetGrp) targetGrp.tiles.push(...tilesToAdd);
                        else newBoard.push({ id: `grp_${Date.now()}`, x: dropX, y: dropY, tiles: tilesToAdd });
                    }
                    else if (actualTarget === 'board-new') newBoard.push({ id: `grp_${Date.now()}`, x: dropX, y: dropY, tiles: tilesToAdd });
                    else if (actualTarget && actualTarget.startsWith('rack-slot-')) {
                        let slotIdx = parseInt(actualTarget.split('-')[2]);
                        if (currentDrag.type === 'single') {
                             if (newRack[slotIdx] !== null && currentDrag.source === 'rack') newRack[currentDrag.tileIndex] = newRack[slotIdx];
                             else if (newRack[slotIdx] !== null) slotIdx = newRack.findIndex(t=>t===null);
                             if(slotIdx !== -1) newRack[slotIdx] = tilesToAdd[0];
                        } else {
                             tilesToAdd.forEach(t => { const emptyIdx = newRack.findIndex(r=>r===null); if(emptyIdx !== -1) newRack[emptyIdx] = t; });
                        }
                    } else {
                        // ביטול - חזרה למקור
                        if (currentDrag.source === 'rack') {
                            if(currentDrag.type === 'single') { const eIdx = newRack.findIndex(t=>t===null); newRack[eIdx !== -1 ? eIdx : 0] = tilesToAdd[0]; }
                            else tilesToAdd.forEach(t => { const emptyIdx = newRack.findIndex(r=>r===null); if(emptyIdx !== -1) newRack[emptyIdx] = t; });
                        } else newBoard.push({ id: currentDrag.groupId, x: currentDrag.startX_pct || 50, y: currentDrag.startY_pct || 50, tiles: tilesToAdd });
                    }

                    setRack(newRack); setBoard(newBoard); setDragData(null); setHoverTarget(null);

                    if (tableState?.id && isMyTurn) {
                        try { await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { board: newBoard, [`players.${user.uid}.cards`]: newRack }); } catch(err) {}
                    }
                };

                if (dragData) { window.addEventListener('pointermove', handlePointerMove, { passive: false }); window.addEventListener('pointerup', handlePointerUp); }
                return () => { window.removeEventListener('pointermove', handlePointerMove); window.removeEventListener('pointerup', handlePointerUp); };
            }, [dragData, hoverTarget, rack, board, tableState?.id, user.uid, tableState?.currentTurn, hasDropped, startTurnBoard]);

            const startDrag = (e, tile, source, groupId, tileIndex) => {
                const isMyTurn = tableState?.currentTurn === user.uid;

                // חסימות לפני תחילת גרירה מהלוח
                if (source === 'board') {
                    if (!isMyTurn) { flashError("המתן לתורך כדי לשחק בלוח המרכזי"); return; }
                    if (!hasDropped) { flashError(`לפני הורדה ראשונה (${FIRST_MELD_MIN} נק') אסור לגעת באבני השולחן`); return; }
                }

                if (e.pointerType === 'touch') { try { e.target.releasePointerCapture(e.pointerId); } catch(err) {} }
                let pctX = 50, pctY = 50;
                const boardArea = document.getElementById('felt-board');
                if (boardArea) {
                    const rect = boardArea.getBoundingClientRect();
                    pctX = Math.max(4, Math.min(96, ((e.clientX - rect.left) / rect.width) * 100));
                    pctY = Math.max(6, Math.min(94, ((e.clientY - rect.top) / rect.height) * 100));
                }

                setDragData({ type: 'single', tile, source, groupId, tileIndex, startX: e.clientX, startY: e.clientY, startX_pct: pctX, startY_pct: pctY });
                setDragPos({ x: e.clientX, y: e.clientY });

                longPressTimer.current = setTimeout(() => {
                    if (navigator.vibrate) navigator.vibrate(50);
                    if (source === 'board') {
                        const grp = board.find(g => g.id === groupId);
                        if(grp) setDragData({ type: 'group', tiles: grp.tiles, source, groupId, startX: e.clientX, startY: e.clientY, startX_pct: grp.x, startY_pct: grp.y });
                    } else if (source === 'rack') {
                        let left = tileIndex; while (left > 0 && rack[left - 1] !== null) left--;
                        let right = tileIndex; while (right < 27 && rack[right + 1] !== null) right++;
                        const groupTiles = rack.slice(left, right + 1);
                        if (groupTiles.length > 1) setDragData({ type: 'group_from_rack', tiles: groupTiles, source: 'rack', startIndex: left, startX: e.clientX, startY: e.clientY });
                    }
                }, 400);
            };

            /* ---------- כפתורי מיון ---------- */
            const syncRack = (newRack) => {
                setRack(newRack);
                try { window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { [`players.${user.uid}.cards`]: newRack }); } catch(e){}
            };

            const handleSort777 = () => {
                let a = rack.filter(t => t !== null).sort((x,y) => {
                    if (x.val === '☻') return 1; if (y.val === '☻') return -1;
                    if (x.val !== y.val) return Number(x.val) - Number(y.val);
                    return x.color.localeCompare(y.color);
                });
                while(a.length < 28) a.push(null);
                syncRack(a);
            };

            const handleSort789 = () => {
                let a = rack.filter(t => t !== null).sort((x,y) => {
                    if (x.val === '☻') return 1; if (y.val === '☻') return -1;
                    if (x.color !== y.color) return x.color.localeCompare(y.color);
                    return Number(x.val) - Number(y.val);
                });
                while(a.length < 28) a.push(null);
                syncRack(a);
            };

            /* ---------- סידור אוטומטי של השולחן ---------- */
            const handleArrangeBoard = async () => {
                if (board.length === 0) return;
                const sorted = [...board].map(g => ({...g}));
                let x = 6, y = 12;
                const tileUnit = 3.0 * boardScale; // רוחב משוער של אבן ב-%
                sorted.forEach(g => {
                    const w = g.tiles.length * tileUnit + 4;
                    if (x + w > 96) { x = 6; y = Math.min(90, y + 16 * boardScale + 4); }
                    g.x = Math.min(96, x + w / 2); g.y = y;
                    x += w + 3;
                });
                setBoard(sorted);
                if (tableState?.currentTurn === user.uid) {
                    try { await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { board: sorted }); } catch(e){}
                }
            };

            const handleUndo = async () => {
                if (tableState?.currentTurn !== user.uid) return;
                setBoard(startTurnBoard); setRack(startTurnRack);
                try { await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { board: startTurnBoard, [`players.${user.uid}.cards`]: startTurnRack }); } catch(e){}
            };

            /* ---------- התיישבות בשולחן (טרנזקציה מלאה כולל חלוקה - מתקן תנאי מרוץ) ---------- */
            const handleSit = async () => {
                try {
                    const buyInAmount = Number(tableState.minBuyIn);
                    await window.fb.runTransaction(window.fb.db, async (t) => {
                        const uRef = window.fb.doc(window.fb.db, "users", user.uid);
                        const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const uSnap = await t.get(uRef);
                        const tblSnap = await t.get(tblRef);
                        if (!tblSnap.exists()) throw "השולחן לא קיים";
                        const tbl = tblSnap.data();
                        if (tbl.phase !== 'waiting') throw "המשחק כבר התחיל";
                        if (tbl.players?.[user.uid]) throw "אתה כבר יושב בשולחן";
                        if (Object.keys(tbl.players || {}).length >= Number(tbl.maxPlayers)) throw "השולחן מלא";
                        if ((uSnap.data().balance || 0) < buyInAmount) throw "אין לך מספיק יתרה בארנק לכניסה";

                        t.update(uRef, { balance: uSnap.data().balance - buyInAmount });
                        const players = { ...tbl.players, [user.uid]: { username: uSnap.data().username, cards: [], hasDropped: false, stack: buyInAmount, isBot: false } };

                        if (Object.keys(players).length === Number(tbl.maxPlayers)) {
                            t.update(tblRef, buildDeal(players)); // חלוקה בתוך הטרנזקציה - אין מרוץ
                        } else {
                            t.update(tblRef, { players });
                        }
                    });
                } catch(e) { showToast(typeof e === 'string' ? e : "שגיאה בכניסה", "error"); }
            };

            /* ---------- משיכת אבן (מסיימת תור, מאפסת את הלוח למצב תחילת התור) ---------- */
            const handleDraw = async (isTimeout = false) => {
                if (tableState?.currentTurn !== user.uid || tableState.phase !== 'playing') return;
                const newDeck = [...(tableState.deck || [])];
                const tile = newDeck.length > 0 ? newDeck.pop() : null;
                // חוזרים למצב תחילת התור: מה שהוזז על הלוח מבוטל, האבנים חוזרות ליד
                const newRack = [...startTurnRack];
                if (tile) {
                    const emptyIdx = newRack.findIndex(t=>t===null);
                    if (emptyIdx !== -1) newRack[emptyIdx] = tile; else newRack.push(tile);
                } else if (!isTimeout) {
                    showToast("הקופה ריקה - התור עובר", "info");
                }
                const uids = Object.keys(tableState.players).sort();
                const nextTurn = uids[(uids.indexOf(user.uid) + 1) % uids.length];
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { deck: newDeck, board: startTurnBoard, [`players.${user.uid}.cards`]: newRack, currentTurn: nextTurn, turnStartedAt: Date.now() });
            };

            /* ---------- סיום משחק והתחשבנות ---------- */
            const endGame = async (finalBoard, finalRack) => {
                if (endingRef.current) return;
                endingRef.current = true;
                try {
                    let resultsOut = null;
                    await window.fb.runTransaction(window.fb.db, async (t) => {
                        const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const clubRef = window.fb.doc(window.fb.db, "club", "stats");
                        const tblSnap = await t.get(tblRef);
                        const clubSnap = await t.get(clubRef);
                        if (!tblSnap.exists()) throw "table gone";
                        const tbl = tblSnap.data();
                        if (tbl.phase !== 'playing') throw "already ended";

                        const players = JSON.parse(JSON.stringify(tbl.players));
                        players[user.uid].cards = finalRack;
                        let pot = 0; const details = {};

                        Object.entries(players).forEach(([uid, p]) => {
                            if (uid === user.uid) return;
                            const penalty = rackPenalty(p.cards);
                            const pay = Math.min(Math.round(penalty * Number(tbl.stakes) * 100) / 100, p.stack || 0);
                            players[uid].stack = Math.round(((p.stack || 0) - pay) * 100) / 100;
                            pot += pay;
                            details[uid] = { username: p.username, penalty, pay };
                        });

                        pot = Math.round(pot * 100) / 100;
                        const rake = Math.round(pot * RAKE_PCT * 100) / 100;
                        const winAmount = Math.round((pot - rake) * 100) / 100;
                        players[user.uid].stack = Math.round(((players[user.uid].stack || 0) + winAmount) * 100) / 100;

                        resultsOut = { winner: user.uid, winnerName: players[user.uid].username, pot, rake, winAmount, details, endedAt: Date.now() };
                        t.update(tblRef, { players, board: finalBoard, phase: 'finished', results: resultsOut, currentTurn: null });
                        t.set(clubRef, { profits: Math.round((((clubSnap.exists() ? clubSnap.data().profits : 0) || 0) + rake) * 100) / 100 }, { merge: true });
                    });

                    // עדכון סטטיסטיקות (מחוץ לטרנזקציה)
                    if (resultsOut) {
                        const allUids = [user.uid, ...Object.keys(resultsOut.details)];
                        for (const uid of allUids) {
                            try {
                                const uRef = window.fb.doc(window.fb.db, "users", uid);
                                const uSnap = await window.fb.getDoc(uRef);
                                if (!uSnap.exists()) continue;
                                const st = uSnap.data().stats || { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 };
                                const delta = uid === user.uid ? resultsOut.winAmount : -(resultsOut.details[uid]?.pay || 0);
                                await window.fb.updateDoc(uRef, { stats: {
                                    gamesPlayed: (st.gamesPlayed || 0) + 1,
                                    gamesWon: (st.gamesWon || 0) + (uid === user.uid ? 1 : 0),
                                    totalProfit: Math.round(((st.totalProfit || 0) + delta) * 100) / 100
                                }});
                            } catch(e) {}
                        }
                    }
                } catch(e) {
                } finally { endingRef.current = false; }
            };

            /* ---------- סיום תור ---------- */
            const handleEndTurn = async () => {
                if (tableState.currentTurn !== user.uid) return;

                if (!isBoardValid) { flashError("הלוח לא תקין! ודא שכל הסדרות חוקיות (מסומנות באדום)."); return; }

                const activeRackCount = rack.filter(t=>t!==null).length;
                if (activeRackCount >= startTurnRackCount) { flashError("לא הורדת אף אבן! אם אין לך מה לשחק - משוך אבן מהקופה."); return; }

                if (!hasDropped) {
                    // הורדה ראשונה: רק קבוצות חדשות, סכומן חייב להיות 30+, והקבוצות הישנות ללא שינוי
                    const startIds = new Set(startTurnBoard.map(g => g.id));
                    const untouched = startTurnBoard.every(sg => {
                        const cur = board.find(g => g.id === sg.id);
                        if (!cur || cur.tiles.length !== sg.tiles.length) return false;
                        const ids = new Set(cur.tiles.map(t => t.id));
                        return sg.tiles.every(t => ids.has(t.id));
                    });
                    if (!untouched) { flashError(`לפני הורדה ראשונה אסור לשנות את אבני השולחן. לחץ "בטל" ופתח סדרות חדשות משלך.`); return; }

                    const newGroups = board.filter(g => !startIds.has(g.id));
                    const dropValue = newGroups.reduce((s, g) => s + groupPoints(g.tiles), 0);
                    if (dropValue < FIRST_MELD_MIN) { flashError(`הורדה ראשונה דורשת ${FIRST_MELD_MIN} נקודות לפחות (הורדת ${dropValue}).`); return; }
                }

                // ניצחון!
                if (activeRackCount === 0) { await endGame(board, rack); return; }

                const uids = Object.keys(tableState.players).sort();
                const nextTurn = uids[(uids.indexOf(user.uid) + 1) % uids.length];
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { board: board, [`players.${user.uid}.cards`]: rack, [`players.${user.uid}.hasDropped`]: true, currentTurn: nextTurn, turnStartedAt: Date.now() });
            };

            /* ---------- סיבוב חדש אחרי סיום ---------- */
            const handleNewRound = async () => {
                try {
                    await window.fb.runTransaction(window.fb.db, async (t) => {
                        const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const snap = await t.get(tblRef);
                        if (!snap.exists()) return;
                        const tbl = snap.data();
                        if (tbl.phase !== 'finished') return;
                        if (Object.keys(tbl.players || {}).length < 2) throw "אין מספיק שחקנים לסיבוב חדש";
                        t.update(tblRef, buildDeal(tbl.players));
                    });
                } catch(e) { showToast(typeof e === 'string' ? e : "שגיאה בפתיחת סיבוב", "error"); }
            };

            /* ---------- עזיבת שולחן (החזר צ'יפים לארנק) ---------- */
            const handleLeaveTable = async () => {
                const seated = !!tableState?.players?.[user.uid];
                if (!seated) { onLeave(); return; }
                if (tableState.phase === 'playing' && !window.confirm("המשחק פעיל. לעזוב בכל זאת? הצ'יפים יוחזרו לארנק והסיבוב יבוטל אם לא יישארו מספיק שחקנים.")) return;
                try {
                    await window.fb.runTransaction(window.fb.db, async (t) => {
                        const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const uRef = window.fb.doc(window.fb.db, "users", user.uid);
                        const tblSnap = await t.get(tblRef);
                        const uSnap = await t.get(uRef);
                        if (!tblSnap.exists()) return;
                        const tbl = tblSnap.data();
                        const myStack = tbl.players?.[user.uid]?.stack || 0;
                        const players = { ...tbl.players }; delete players[user.uid];

                        if (uSnap.exists()) t.update(uRef, { balance: Math.round(((uSnap.data().balance || 0) + myStack) * 100) / 100 });

                        const remaining = Object.keys(players);
                        const updates = { players };
                        if (tbl.phase === 'playing') {
                            if (remaining.length < 2) {
                                // אין מספיק שחקנים - איפוס הסיבוב
                                updates.phase = 'waiting'; updates.board = []; updates.deck = []; updates.currentTurn = null; updates.results = null;
                                remaining.forEach(uid => { players[uid] = { ...players[uid], cards: [], hasDropped: false }; });
                            } else if (tbl.currentTurn === user.uid) {
                                const uids = Object.keys(tbl.players).sort();
                                let idx = uids.indexOf(user.uid);
                                let next = uids[(idx + 1) % uids.length];
                                while (!players[next]) next = uids[(uids.indexOf(next) + 1) % uids.length];
                                updates.currentTurn = next; updates.turnStartedAt = Date.now();
                            }
                        }
                        t.update(tblRef, updates);
                    });
                } catch(e) {}
                onLeave();
            };

            if (loading) return <div className="h-full flex items-center justify-center"><i className="fa-solid fa-spinner fa-spin text-3xl"></i></div>;

            const isSeated = !!me;
            const isPlaying = tableState.phase === 'playing';
            const isFinished = tableState.phase === 'finished';
            const isMyTurn = tableState.currentTurn === user.uid;
            const myTileCount = rack.filter(t=>t!==null).length;
            const results = tableState.results;

            return (
                <div className="h-full w-full flex bg-slate-950 font-sans overflow-hidden select-none" dir="rtl">

                    {/* ===== חדר המתנה ===== */}
                    {tableState.phase === 'waiting' && (
                        <div className="absolute inset-0 z-50 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-emerald-500 p-8 rounded-3xl text-center max-w-lg w-full shadow-[0_0_50px_rgba(16,185,129,0.2)]">
                                <h2 className="text-3xl font-black text-white mb-2">ממתין לשחקנים...</h2>
                                <p className="text-slate-400 text-sm mb-6" dir="ltr">{formatMoney(tableState.stakes)} ₪ / נק' · כניסה {formatMoney(tableState.minBuyIn)}</p>
                                <div className="flex justify-center gap-6 mb-8 flex-wrap">
                                    {[...Array(Number(tableState.maxPlayers) || 4)].map((_, i) => {
                                        const p = Object.values(tableState.players || {})[i];
                                        return p ? (
                                            <div key={i} className="flex flex-col items-center">
                                                <div className="w-16 h-16 rounded-full bg-slate-800 border-2 border-emerald-500 flex items-center justify-center mb-2 shadow-[0_0_15px_#10b981]"><span className="text-lg font-black text-emerald-400">{(p.username||'?').substring(0,2).toUpperCase()}</span></div>
                                                <span className="text-white font-bold text-sm">{p.username}</span>
                                            </div>
                                        ) : (
                                            <div key={i} className="flex flex-col items-center">
                                                <div className="w-16 h-16 rounded-full bg-slate-800/30 border-2 border-slate-600 border-dashed flex items-center justify-center mb-2"><i className="fa-solid fa-spinner fa-spin text-2xl text-slate-500"></i></div>
                                                <span className="text-slate-500 font-bold text-sm">ממתין...</span>
                                            </div>
                                        );
                                    })}
                                </div>
                                {!isSeated && <button onClick={handleSit} className="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-3 rounded-xl font-black w-full text-lg shadow-lg">התיישב בשולחן ({formatMoney(tableState.minBuyIn)})</button>}
                                <button onClick={handleLeaveTable} className="mt-4 text-slate-400 hover:text-white underline text-sm font-bold">חזרה ללובי</button>
                            </div>
                        </div>
                    )}

                    {/* ===== מסך סיום והתחשבנות ===== */}
                    {isFinished && results && (
                        <div className="absolute inset-0 z-50 bg-slate-950/95 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-gold-500/50 p-8 rounded-3xl text-center max-w-md w-full shadow-[0_0_60px_rgba(250,204,21,0.15)]">
                                <div className="trophy-pop inline-block"><i className="fa-solid fa-trophy text-6xl text-gold-400 drop-shadow-[0_0_20px_rgba(250,204,21,0.6)]"></i></div>
                                <h2 className="text-3xl font-black text-white mt-4">{results.winnerName} ניצח!</h2>
                                <div className="text-emerald-400 font-black text-2xl mt-2"><Coin amount={results.winAmount} /></div>

                                <div className="mt-6 bg-slate-950/60 rounded-2xl border border-slate-800 divide-y divide-slate-800 text-sm">
                                    {Object.entries(results.details || {}).map(([uid, d]) => (
                                        <div key={uid} className="flex justify-between items-center px-4 py-3">
                                            <span className="font-bold text-slate-300">{d.username}</span>
                                            <span className="text-rose-400 font-bold">{d.penalty} נק' · -{formatMoney(d.pay)}</span>
                                        </div>
                                    ))}
                                    <div className="flex justify-between items-center px-4 py-3 text-xs text-slate-500">
                                        <span>רייק קלאב ({RAKE_PCT*100}%)</span><span>{formatMoney(results.rake)}</span>
                                    </div>
                                </div>

                                <div className="flex gap-3 mt-6">
                                    {isSeated && <button onClick={handleNewRound} className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-xl font-black">סיבוב חדש</button>}
                                    <button onClick={handleLeaveTable} className="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl font-black border border-slate-700">חזרה ללובי</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== יריבים (צד ימין ב-RTL) ===== */}
                    <div className="w-24 sm:w-32 bg-slate-900 border-l border-slate-800 flex flex-col items-center py-4 gap-4 z-20 shrink-0 overflow-y-auto">
                        <button onClick={handleLeaveTable} className="px-3 py-1 bg-slate-800 rounded-lg text-slate-400 font-bold border border-slate-700 text-xs hover:bg-rose-900 hover:text-white transition-colors">יציאה</button>

                        {(isPlaying || isFinished) && Object.entries(tableState.players || {}).filter(([uid]) => uid !== user.uid).map(([uid, pData]) => {
                            const tileCount = pData.cards ? pData.cards.filter(c => c !== null).length : 0;
                            const isTurn = tableState.currentTurn === uid;
                            return (
                                <div key={uid} className={`flex flex-col items-center transition-all p-2 rounded-xl shrink-0 w-full ${isTurn ? 'bg-slate-800 border border-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.2)]' : 'opacity-70'}`}>
                                    <div className={`w-12 h-12 rounded-full border-2 mb-1 flex items-center justify-center bg-slate-800 ${isTurn ? 'border-emerald-400 text-emerald-400' : 'border-slate-600 text-slate-400'}`}>
                                        <span className="text-sm font-black">{(pData.username||'?').substring(0,2).toUpperCase()}</span>
                                    </div>
                                    <span className="text-xs font-bold text-white mb-1 truncate w-full text-center">{pData.username}</span>
                                    <span className="text-[10px] bg-slate-950 border border-slate-700 px-2 py-0.5 rounded-full text-amber-400 font-bold whitespace-nowrap mb-1">📦 {tileCount}</span>
                                    <span className="text-[10px] text-gold-400 font-bold" dir="ltr">{formatMoney(pData.stack)}</span>
                                </div>
                            );
                        })}
                    </div>

                    {/* ===== מרכז: לוח + מגש ===== */}
                    <div className="flex-1 flex flex-col relative h-full min-w-0" style={{ '--board-scale': boardScale }}>

                        {showError && <div className="absolute bottom-[220px] sm:bottom-[250px] left-1/2 transform -translate-x-1/2 z-[100] bg-rose-700 text-white px-6 py-3 rounded-2xl font-black shadow-[0_10px_30px_rgba(225,29,72,0.6)] border-2 border-rose-400 animate-fade-in text-center max-w-[90%] text-sm">{showError}</div>}

                        {/* פס מידע עליון */}
                        {(isPlaying || isFinished) && (
                             <div className="absolute top-3 left-1/2 transform -translate-x-1/2 flex items-center gap-2 pointer-events-none z-10">
                                 <span className="text-[11px] bg-slate-900/80 border border-slate-700 px-3 py-1 rounded-full text-slate-300 font-bold backdrop-blur">קופה: {(tableState.deck||[]).length} אבנים</span>
                                 <span className="text-[11px] bg-slate-900/80 border border-slate-700 px-3 py-1 rounded-full text-slate-300 font-bold backdrop-blur" dir="ltr">{formatMoney(tableState.stakes)} ₪/נק'</span>
                                 {isSeated && !hasDropped && isPlaying && <span className="text-[11px] bg-amber-900/70 border border-amber-600 px-3 py-1 rounded-full text-amber-300 font-bold backdrop-blur">טרם ירדת ({FIRST_MELD_MIN}+ נק')</span>}
                             </div>
                        )}

                        {/* לוח חופשי */}
                        <div id="felt-board" data-drop="board-new" className="flex-1 relative m-2 md:m-4 rounded-3xl border-2 border-emerald-900/60 overflow-auto shadow-[inset_0_0_80px_rgba(0,0,0,0.7)]">
                            <div className="min-w-full min-h-full relative">
                                {board.map((groupObj) => (
                                    <div key={groupObj.id} data-drop={`board-group-${groupObj.id}`}
                                         className={`absolute flex board-group hover:bg-emerald-500/10 ${hoverTarget === `board-group-${groupObj.id}` ? 'border-2 border-emerald-400 rounded-xl bg-emerald-500/15' : !validateGroup(groupObj.tiles) ? 'board-invalid-group rounded-xl' : 'border-2 border-transparent'}`}
                                         style={{ left: `${groupObj.x}%`, top: `${groupObj.y}%`, transform: 'translate(-50%, -50%)', direction: 'ltr' }}>
                                        {groupObj.tiles.map((t, tIdx) => (
                                            <div key={t.id} onPointerDown={(e) => startDrag(e, t, 'board', groupObj.id, tIdx)} className={`rummy-tile board-tile flex items-center justify-center cursor-grab active:cursor-grabbing ${dragData?.type === 'group' && dragData.groupId === groupObj.id ? 'opacity-30' : dragData?.tile?.id === t.id ? 'opacity-30' : ''}`} style={{ color: t.color }}>{t.val}</div>
                                        ))}
                                    </div>
                                ))}
                                {board.length === 0 && isPlaying && (
                                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                        <span className="text-emerald-800/70 font-black text-lg">גרור אבנים לכאן כדי לפתוח סדרות</span>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* המגש שלי */}
                        {isSeated && isPlaying && (
                            <div className="h-44 sm:h-52 shrink-0 bg-gradient-to-t from-slate-950 to-slate-900 border-t-8 border-slate-700 mx-2 md:mx-4 rounded-t-3xl shadow-[0_-15px_40px_rgba(0,0,0,0.6)] flex flex-col justify-end pb-3 px-2 relative z-30">
                                <div className="flex items-center justify-between px-2 pb-1">
                                    <span className="text-[11px] font-bold text-slate-400">{user.username} · 📦 {myTileCount} אבנים</span>
                                    <span className="text-[11px] font-bold text-gold-400" dir="ltr">Stack: {formatMoney(me?.stack)}</span>
                                </div>
                                <div className="rack-grid w-full flex-1 max-h-[150px]">
                                    {rack.map((tile, index) => {
                                        const isDragGrp = dragData?.type === 'group_from_rack' && index >= dragData.startIndex && index < dragData.startIndex + dragData.tiles.length;
                                        return (
                                            <div key={index} data-drop={`rack-slot-${index}`} className={`rack-slot flex items-center justify-center border border-slate-800/50 rounded bg-slate-950/30 ${hoverTarget === `rack-slot-${index}` ? 'bg-emerald-900/30 border-emerald-500/50 shadow-inner' : ''}`}>
                                                {tile && (
                                                    <div onPointerDown={(e) => startDrag(e, tile, 'rack', null, index)} className={`rummy-tile w-[92%] h-[95%] flex items-center justify-center text-lg sm:text-2xl z-10 cursor-grab active:cursor-grabbing ${dragData?.tile?.id === tile.id ? 'opacity-20' : isDragGrp ? 'opacity-20' : 'hover:-translate-y-1'}`} style={{ color: tile.color }}>{tile.val}</div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* ===== פעולות וטיימר ===== */}
                    <div className="w-24 sm:w-32 bg-slate-900 border-r border-slate-800 flex flex-col items-center p-3 gap-3 z-20 shrink-0">
                        {isPlaying && (
                            <div className={`flex flex-col items-center p-2 rounded-xl border-2 w-full bg-slate-950 shadow-lg ${isMyTurn ? 'border-emerald-500 shadow-[0_0_20px_rgba(16,185,129,0.3)]' : 'border-slate-800'}`}>
                                <span className={`text-[10px] font-bold mb-1 ${isMyTurn ? 'text-emerald-400 animate-pulse' : 'text-slate-500'}`}>{isMyTurn ? 'התור שלך!' : 'תור יריב'}</span>
                                <span className={`text-2xl sm:text-3xl font-black font-mono ${isMyTurn ? (timeLeft <= 10 ? 'text-rose-500 animate-pulse' : 'text-white') : 'text-slate-500'}`}>{timeLeft.toString().padStart(2, '0')}</span>
                            </div>
                        )}

                        {/* GOD MODE - רק לשני המיילים המורשים */}
                        {isGod && (isPlaying || isFinished) && (
                            <button onClick={()=>setGodOpen(!godOpen)} className={`w-full py-2 rounded-lg font-black text-[10px] border-2 transition-all ${godOpen ? 'bg-purple-700 border-purple-400 text-white shadow-[0_0_15px_rgba(168,85,247,0.5)]' : 'bg-slate-950 border-purple-800 text-purple-400'}`}>
                                <i className="fa-solid fa-eye ml-1"></i> GOD
                            </button>
                        )}

                        {isSeated && isPlaying && (
                            <div className="flex-1 flex flex-col w-full gap-2 overflow-y-auto">
                                <button onClick={handleSort789} className="w-full py-3 rounded-lg action-btn text-slate-300 font-bold text-[10px] sm:text-xs"><span className="text-blue-400">789</span> סדרות</button>
                                <button onClick={handleSort777} className="w-full py-3 rounded-lg action-btn text-slate-300 font-bold text-[10px] sm:text-xs"><span className="text-rose-400">777</span> שלישיות</button>
                                <button onClick={handleArrangeBoard} className="w-full py-3 rounded-lg action-btn text-slate-300 font-bold text-[10px] sm:text-xs"><i className="fa-solid fa-table-cells ml-1"></i> סדר שולחן</button>
                                {isMyTurn && <button onClick={handleUndo} className="w-full py-3 rounded-lg action-btn text-slate-300 font-bold text-[10px] sm:text-xs hover:bg-slate-700 transition-colors"><i className="fa-solid fa-undo"></i> בטל</button>}

                                <div className="w-full h-px bg-slate-800 my-1"></div>

                                <div className="mt-auto flex flex-col gap-2">
                                    {isMyTurn && <button onClick={()=>handleDraw(false)} title="משוך אבן וסיים תור" className="w-full py-4 rounded-xl bg-amber-600 hover:bg-amber-500 text-white font-black text-lg shadow-[0_0_15px_rgba(245,158,11,0.4)] border-2 border-amber-400 transition-all active:scale-95"><i className="fa-solid fa-hand-holding"></i></button>}
                                    {isMyTurn && <button onClick={handleEndTurn} title="סיים תור" className="w-full py-4 rounded-xl bg-emerald-600 hover:bg-emerald-500 text-white font-black text-2xl shadow-[0_0_15px_rgba(16,185,129,0.4)] border-2 border-emerald-400 transition-all active:scale-95"><i className="fa-solid fa-check"></i></button>}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* ===== פאנל GOD MODE ===== */}
                    {isGod && godOpen && (isPlaying || isFinished) && (
                        <div className="absolute bottom-4 right-28 sm:right-36 z-[200] bg-slate-950/95 border-2 border-purple-600 rounded-2xl p-4 shadow-[0_0_40px_rgba(168,85,247,0.3)] max-w-[70vw] max-h-[60vh] overflow-y-auto backdrop-blur">
                            <div className="flex items-center justify-between mb-3">
                                <span className="font-black text-purple-400 text-sm"><i className="fa-solid fa-eye ml-1"></i> GOD MODE</span>
                                <button onClick={()=>setGodOpen(false)} className="text-slate-500 hover:text-white"><i className="fa-solid fa-xmark"></i></button>
                            </div>
                            <div className="text-[10px] text-slate-500 mb-2">קופה: {(tableState.deck||[]).length} אבנים</div>
                            {Object.entries(tableState.players || {}).filter(([uid]) => uid !== user.uid).map(([uid, p]) => (
                                <div key={uid} className="mb-3">
                                    <div className="text-xs font-bold text-white mb-1">{p.username} <span className="text-slate-500">({(p.cards||[]).filter(c=>c).length})</span></div>
                                    <div className="flex flex-wrap gap-1" dir="ltr">
                                        {(p.cards||[]).filter(c=>c).map(t => (
                                            <div key={t.id} className="rummy-tile w-6 h-9 flex items-center justify-center text-xs" style={{ color: t.color }}>{t.val}</div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* ===== רוחות רפאים לגרירה ===== */}
                    {dragData?.type === 'single' && <div id="drag-ghost" className="fixed z-[9999] rummy-tile w-12 h-16 sm:w-16 sm:h-24 flex items-center justify-center text-4xl sm:text-5xl font-bold shadow-2xl" style={{ left: dragPos.x, top: dragPos.y, transform: 'translate(-50%, -50%) scale(1.1) rotate(5deg)', color: dragData.tile.color, pointerEvents: 'none' }}>{dragData.tile.val}</div>}
                    {(dragData?.type === 'group' || dragData?.type === 'group_from_rack') && <div id="drag-ghost-group" className="fixed z-[9999] flex bg-black/40 p-2 rounded-xl shadow-2xl" style={{ left: dragPos.x, top: dragPos.y, transform: 'translate(-50%, -50%) scale(1.1) rotate(5deg)', pointerEvents: 'none' }} dir="ltr">{dragData.tiles.map(t => (<div key={t.id} className="rummy-tile w-10 h-14 sm:w-12 sm:h-16 flex items-center justify-center text-2xl sm:text-3xl mx-0.5" style={{ color: t.color }}>{t.val}</div>))}</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
