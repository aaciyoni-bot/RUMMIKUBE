<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rummikube - VIP Club</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <!-- פוליפיל למסכי מגע (מאפשר Drag & Drop בטלפונים וטאבלטים) -->
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.1.4/DragDropTouch.min.js"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { margin: 0; padding: 0; overflow: hidden; background-color: #020617; }
        .tile-grab:active { cursor: grabbing !important; }
        
        /* אפקט הילה למי שהתור שלו */
        .turn-glow { box-shadow: 0 0 20px rgba(234, 179, 8, 0.6); border-color: #eab308 !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- חיבור ל-Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSyDOWDeF5YKZ-LH8c9lM-eb6gFjFDXfIZQs",
            authDomain: "rummikube-b2188.firebaseapp.com",
            databaseURL: "https://rummikube-b2188-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "rummikube-b2188",
            storageBucket: "rummikube-b2188.firebasestorage.app",
            messagingSenderId: "825997058278",
            appId: "1:825997058278:web:6a544f6d3fd6b1f80f1b27"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- אייקונים ---
        const IconWrapper = ({ children, size = 24, className = '', fill = 'none' }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Shield = (props) => <IconWrapper {...props}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></IconWrapper>;
        const Play = (props) => <IconWrapper {...props}><polygon points="6 3 20 12 6 21 6 3"/></IconWrapper>;
        const ChevronRight = (props) => <IconWrapper {...props}><polyline points="9 18 15 12 9 6"/></IconWrapper>;
        const Menu = (props) => <IconWrapper {...props}><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></IconWrapper>;
        const Layers = (props) => <IconWrapper {...props}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></IconWrapper>;
        const UserIcon = (props) => <IconWrapper {...props}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconWrapper>;

        // --- מנוע חפיסת אבנים ---
        const generateDeck = () => {
            const colors = ['text-red-600', 'text-blue-700', 'text-slate-900', 'text-amber-500'];
            let deck = [];
            let idCounter = 1;
            for (let i = 0; i < 2; i++) {
                colors.forEach(color => {
                    for (let num = 1; num <= 13; num++) { deck.push({ id: `t${idCounter++}`, num, color, isJoker: false }); }
                });
            }
            deck.push({ id: `t${idCounter++}`, num: '☻', color: 'text-red-600', isJoker: true });
            deck.push({ id: `t${idCounter++}`, num: '☻', color: 'text-slate-900', isJoker: true });
            
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            return deck;
        };

        const MOCK_TABLES = [{ id: 'table_1', name: 'שולחן 1 - מתחילים', stakes: '1', maxPlayers: 4 }];

        function App() {
          // --- זיהוי משתמש (שמירה ב-Local Storage) ---
          const [myId] = useState(() => localStorage.getItem('rk_uid') || Math.random().toString(36).substr(2, 9));
          const [myName, setMyName] = useState(() => localStorage.getItem('rk_name') || '');
          
          useEffect(() => {
              localStorage.setItem('rk_uid', myId);
              localStorage.setItem('rk_name', myName);
          }, [myId, myName]);

          // --- ניהול מצב ---
          const [currentView, setCurrentView] = useState('login'); 
          const [activeTable, setActiveTable] = useState(null);

          // State מסונכרן ענן
          const [boardGroups, setBoardGroups] = useState([]);
          const [bankTiles, setBankTiles] = useState([]);
          const [players, setPlayers] = useState({});
          const [turn, setTurn] = useState(null);
          const [rackTiles, setRackTiles] = useState([]); // המעמד הפרטי מגובה בענן

          // סנכרון זמן אמת מול Firebase לשולחן הפעיל
          useEffect(() => {
            if (!activeTable) return;
            const tableRefStr = `tables/${activeTable.id}`;
            
            const boardRef = db.ref(`${tableRefStr}/board`);
            const bankRef = db.ref(`${tableRefStr}/bank`);
            const playersRef = db.ref(`${tableRefStr}/players`);
            const turnRef = db.ref(`${tableRefStr}/turn`);
            const myRackRef = db.ref(`${tableRefStr}/racks/${myId}`);
            
            boardRef.on('value', snap => setBoardGroups(snap.val() || []));
            bankRef.on('value', snap => setBankTiles(snap.val() || []));
            playersRef.on('value', snap => setPlayers(snap.val() || {}));
            turnRef.on('value', snap => setTurn(snap.val()));
            myRackRef.on('value', snap => setRackTiles(snap.val() || []));

            return () => {
                boardRef.off(); bankRef.off(); playersRef.off(); turnRef.off(); myRackRef.off();
            };
          }, [activeTable, myId]);

          // --- פעולות כניסה ויציאה ---
          const handleLogin = () => setCurrentView('dashboard');
          
          const handleJoinTable = (table) => {
              if(!myName.trim()) { alert("אנא הזן את שמך כדי להצטרף לשולחן."); return; }
              // רושמים את השחקן ב-Firebase
              db.ref(`tables/${table.id}/players/${myId}`).set({ name: myName });
              setActiveTable(table); 
              setCurrentView('table'); 
          };
          
          const backToClub = () => { 
              // אפשר להשאיר את השחקן רשום בשולחן או למחוק אותו
              // db.ref(`tables/${activeTable.id}/players/${myId}`).remove(); 
              setActiveTable(null); 
              setCurrentView('dashboard'); 
          };

          // --- ניהול תורות ---
          const endTurn = () => {
              if (turn !== myId) return;
              const playerIds = Object.keys(players);
              if (playerIds.length === 0) return;
              
              const currentIndex = playerIds.indexOf(myId);
              const nextIndex = (currentIndex + 1) % playerIds.length;
              db.ref(`tables/${activeTable.id}/turn`).set(playerIds[nextIndex]);
          };

          const isMyTurn = turn === myId;

          // --- פעולות מנהל משחק: חלוקה ---
          const startNewGame = () => {
              const playerIds = Object.keys(players);
              if (playerIds.length < 1) {
                  alert("אין מספיק שחקנים בשולחן");
                  return;
              }

              let newDeck = generateDeck();
              const initialRacks = {};
              
              // מחלקים 14 אבנים לכל שחקן שיושב בשולחן
              playerIds.forEach(pid => {
                  initialRacks[pid] = newDeck.splice(0, 14);
              });
              
              const tableRefStr = `tables/${activeTable.id}`;
              db.ref(`${tableRefStr}/board`).set([]);
              db.ref(`${tableRefStr}/bank`).set(newDeck);
              db.ref(`${tableRefStr}/racks`).set(initialRacks);
              db.ref(`${tableRefStr}/turn`).set(playerIds[0]); // השחקן הראשון מתחיל
              
              alert(`המשחק התחיל! 14 אבנים חולקו לכל אחד מ-${playerIds.length} השחקנים.`);
          };

          // --- פעולת קופה ---
          const drawTileFromBank = () => {
              if (!isMyTurn) { alert("חכה בסבלנות, עדיין לא תורך!"); return; }
              if (bankTiles.length === 0) { alert("הקופה ריקה!"); return; }
              
              const drawnTile = bankTiles[0];
              const remainingBank = bankTiles.slice(1);
              
              const tableRefStr = `tables/${activeTable.id}`;
              db.ref(`${tableRefStr}/bank`).set(remainingBank);
              db.ref(`${tableRefStr}/racks/${myId}`).set([...rackTiles, drawnTile]);
              
              // העברת תור אוטומטית אחרי לקיחה מהקופה
              endTurn();
          };

          // --- מנגנון גרירה בענן ---
          const handleDragStart = (e, source, tile, groupIndex = null) => {
            if (!isMyTurn && source === 'rack') {
                alert("לא תורך! אי אפשר לשחק עכשיו.");
                e.preventDefault();
                return;
            }
            e.dataTransfer.setData('application/json', JSON.stringify({ source, tile, groupIndex }));
            e.dataTransfer.effectAllowed = 'move';
          };
          
          const handleDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };

          const handleDropOnBoard = (e) => {
            e.preventDefault(); e.stopPropagation();
            if (!isMyTurn) return; // הגנה שרק בעל התור ישנה את הלוח

            const dataString = e.dataTransfer.getData('application/json');
            if (!dataString) return;
            const data = JSON.parse(dataString);
            const tableRefStr = `tables/${activeTable.id}`;
            let newGroups = [...boardGroups];
            
            if (data.source === 'rack') {
              const newRack = rackTiles.filter(t => t.id !== data.tile.id);
              db.ref(`${tableRefStr}/racks/${myId}`).set(newRack);
              newGroups.push([data.tile]);
            } else if (data.source === 'board') {
              newGroups[data.groupIndex] = newGroups[data.groupIndex].filter(t => t.id !== data.tile.id);
              newGroups.push([data.tile]);
              newGroups = newGroups.filter(g => g && g.length > 0);
            }
            db.ref(`${tableRefStr}/board`).set(newGroups);
          };

          const handleDropOnGroup = (e, targetGroupIndex) => {
            e.preventDefault(); e.stopPropagation();
            if (!isMyTurn) return;

            const dataString = e.dataTransfer.getData('application/json');
            if (!dataString) return;
            const data = JSON.parse(dataString);
            const tableRefStr = `tables/${activeTable.id}`;
            let newGroups = [...boardGroups];

            if (data.source === 'rack') {
              const newRack = rackTiles.filter(t => t.id !== data.tile.id);
              db.ref(`${tableRefStr}/racks/${myId}`).set(newRack);
              newGroups[targetGroupIndex] = [...(newGroups[targetGroupIndex] || []), data.tile];
            } else if (data.source === 'board') {
              if (data.groupIndex === targetGroupIndex) return;
              newGroups[data.groupIndex] = newGroups[data.groupIndex].filter(t => t.id !== data.tile.id);
              newGroups[targetGroupIndex] = [...(newGroups[targetGroupIndex] || []), data.tile];
              newGroups = newGroups.filter(g => g && g.length > 0);
            }
            db.ref(`${tableRefStr}/board`).set(newGroups);
          };

          const handleDropOnRack = (e) => {
            e.preventDefault();
            const dataString = e.dataTransfer.getData('application/json');
            if (!dataString) return;
            const data = JSON.parse(dataString);
            const tableRefStr = `tables/${activeTable.id}`;
            
            // מותר להחזיר רק מהלוח (אם התחרטנו) - בגרסה סופית צריך להגביל חזרה של אבנים ישנות
            if (data.source === 'board' && isMyTurn) {
              let newGroups = [...boardGroups];
              newGroups[data.groupIndex] = newGroups[data.groupIndex].filter(t => t.id !== data.tile.id);
              newGroups = newGroups.filter(g => g && g.length > 0);
              db.ref(`${tableRefStr}/board`).set(newGroups);
              db.ref(`${tableRefStr}/racks/${myId}`).set([...rackTiles, data.tile]);
            }
          };

          // --- רכיבי תצוגה ---
          const LoginScreen = () => (
            <div className="flex flex-col items-center justify-center min-h-screen p-6 relative overflow-hidden">
              <div className="absolute top-[-10%] left-[-10%] w-64 h-64 bg-yellow-600/20 rounded-full blur-[100px]" />
              <div className="w-24 h-24 bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-2xl flex items-center justify-center mb-8 rotate-3">
                <Shield size={48} className="text-slate-950" />
              </div>
              <h1 className="text-4xl font-extrabold mb-2 tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 to-yellow-600">RUMMIKUBE</h1>
              <button onClick={handleLogin} className="w-full max-w-sm mt-12 bg-gradient-to-r from-yellow-500 to-yellow-600 text-slate-950 font-bold py-4 rounded-xl shadow-[0_4px_20px_rgba(234,179,8,0.3)] hover:scale-[1.02] transition-transform">התחברות מהירה</button>
            </div>
          );

          const DashboardScreen = () => (
            <div className="flex flex-col min-h-screen">
              <div className="p-6">
                 <h2 className="text-xl font-bold mb-4">ברוך הבא!</h2>
                 <div className="bg-slate-900 p-4 rounded-xl border border-slate-800 mb-8">
                     <label className="block text-sm text-slate-400 mb-2">איך יקראו לך בשולחן?</label>
                     <input 
                        type="text" 
                        value={myName} 
                        onChange={(e) => setMyName(e.target.value)}
                        placeholder="הכנס כינוי..."
                        className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white focus:border-yellow-500 focus:outline-none"
                     />
                 </div>

                <h2 className="text-lg font-bold text-slate-300 mb-4">שולחנות מועדון פתוחים</h2>
                {MOCK_TABLES.map(table => (
                  <div key={table.id} className="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-lg">
                    <div className="p-4 border-b border-slate-800/50 flex justify-between bg-black/20">
                      <h3 className="font-bold text-slate-200">{table.name}</h3>
                    </div>
                    <div className="p-4 flex justify-between items-center">
                      <button onClick={() => handleJoinTable(table)} className="w-full bg-yellow-500 text-slate-950 px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-yellow-400">
                         <Play size={16} fill="currentColor" /> כנס לשולחן והמתן לשחקנים
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );

          const GameTableScreen = () => {
            // חישוב שחקנים אחרים להצגה סביב השולחן
            const opponents = Object.entries(players).filter(([id, _]) => id !== myId);

            return (
                <div className="flex flex-col h-[100dvh] bg-[#080d14] text-white relative font-sans overflow-hidden">
                
                {/* הדר שולחן מרובה שחקנים */}
                <div className="absolute top-0 w-full z-30 p-4 bg-gradient-to-b from-black/90 to-transparent">
                    <div className="flex justify-between items-center">
                        <button onClick={backToClub} className="bg-black/50 p-2 rounded-full border border-white/10"><ChevronRight size={24} className="rotate-180" /></button>
                        <div className="flex flex-col items-center">
                            <div className="font-extrabold tracking-widest">{activeTable?.name}</div>
                            {/* מידע על התור */}
                            {turn && (
                                <div className={`text-xs font-bold px-3 py-1 rounded-full mt-2 ${isMyTurn ? 'bg-yellow-500 text-black shadow-[0_0_15px_rgba(234,179,8,0.5)]' : 'bg-slate-800 text-slate-300'}`}>
                                    {isMyTurn ? 'התור שלך!' : `תור: ${players[turn]?.name || 'ממתין...'}`}
                                </div>
                            )}
                        </div>
                        <button className="bg-black/50 p-2 rounded-full border border-white/10"><Menu size={24} /></button>
                    </div>
                    
                    {/* תצוגת יריבים */}
                    <div className="flex justify-center gap-4 mt-4">
                        {opponents.map(([id, player]) => (
                            <div key={id} className={`flex flex-col items-center bg-slate-900/80 px-4 py-2 rounded-xl border ${turn === id ? 'turn-glow' : 'border-slate-700'}`}>
                                <UserIcon size={20} className="text-slate-400 mb-1" />
                                <span className="text-xs font-bold">{player.name}</span>
                            </div>
                        ))}
                    </div>
                </div>

                {/* כפתור מנהל צף */}
                <div className="absolute left-4 top-32 z-50">
                    <button onClick={startNewGame} className="text-[10px] bg-red-900 text-white px-3 py-2 rounded-lg font-bold shadow-lg border border-red-500">
                        התחל משחק וחלוקה
                    </button>
                </div>

                {/* הלוח המרכזי */}
                <div className="flex-1 relative flex flex-col items-center justify-center pt-40 pb-44 px-4" onDragOver={handleDragOver} onDrop={handleDropOnBoard}>
                    <div className="absolute inset-2 md:inset-8 rounded-[80px] bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-[#0f6b40] via-[#084226] to-[#041a0f] border-[12px] border-[#1a100b] shadow-[inset_0_0_80px_rgba(0,0,0,1)] flex flex-col p-8 overflow-y-auto no-scrollbar ring-4 ring-[#3b2313]/40">
                    
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-10 pointer-events-none">
                        <span className="text-emerald-400 font-black text-4xl tracking-[0.3em] rotate-[-30deg] block">RUMMIKUBE</span>
                    </div>

                    <div className="relative w-full h-full flex flex-wrap content-start gap-4 md:gap-6 z-10 p-2">
                        {boardGroups.map((group, groupIdx) => (
                        <div key={`group-${groupIdx}`} className="flex gap-1 p-3 rounded-xl bg-black/20 border border-white/5 min-w-[70px] min-h-[90px] transition-all hover:bg-black/40" onDragOver={handleDragOver} onDrop={(e) => handleDropOnGroup(e, groupIdx)}>
                            {group.length === 0 && <span className="text-white/20 text-xs my-auto mx-2">גרור לכאן</span>}
                            {group.map(tile => (
                            <div key={`board-${tile.id}`} draggable onDragStart={(e) => handleDragStart(e, 'board', tile, groupIdx)} className="relative w-11 h-16 rounded-[8px] bg-gradient-to-b from-[#ffffff] to-[#e0e0e0] flex items-center justify-center shadow-[1px_3px_8px_rgba(0,0,0,0.6),inset_0_2px_4px_rgba(255,255,255,1)] border border-gray-300 cursor-grab active:cursor-grabbing transform hover:-translate-y-1 transition-transform touch-none">
                                <span className={`text-2xl font-black ${tile.color}`} style={{ textShadow: '1px 1px 0px rgba(255,255,255,0.8), -1px -1px 0px rgba(0,0,0,0.2)' }}>{tile.num}</span>
                            </div>
                            ))}
                        </div>
                        ))}
                    </div>
                    </div>
                </div>

                {/* אזור המעמד של השחקן (Rack) */}
                <div className={`absolute bottom-0 w-full h-44 bg-gradient-to-t from-black to-transparent z-40 flex flex-col justify-end pb-2 transition-opacity ${!isMyTurn && turn !== null ? 'opacity-70' : 'opacity-100'}`}>
                    <div className="flex justify-between items-center mb-4 px-6 z-50">
                    <button onClick={drawTileFromBank} disabled={!isMyTurn} className={`px-6 py-2.5 rounded-xl font-bold shadow-lg border transition-transform flex items-center gap-2 ${isMyTurn ? 'bg-gradient-to-b from-emerald-500 to-emerald-700 text-white border-emerald-800 active:scale-95' : 'bg-slate-800 text-slate-500 border-slate-700 cursor-not-allowed'}`}>
                        <Layers size={18} /> קופה ({bankTiles.length})
                    </button>
                    <button onClick={endTurn} disabled={!isMyTurn} className={`px-6 py-2.5 rounded-xl font-extrabold shadow-lg border transition-transform ${isMyTurn ? 'bg-gradient-to-b from-yellow-400 to-yellow-600 text-slate-950 border-yellow-700 active:scale-95' : 'bg-slate-800 text-slate-500 border-slate-700 cursor-not-allowed'}`}>
                        סיום תור
                    </button>
                    </div>

                    <div className="relative flex justify-center items-end px-2" onDragOver={handleDragOver} onDrop={handleDropOnRack}>
                    <div className="absolute bottom-0 w-[98%] h-12 bg-gradient-to-b from-[#5c3a21] to-[#1f1006] rounded-t-xl border-t border-[#8c5a35]/40" />
                    
                    <div className="flex gap-1.5 z-10 px-4 overflow-x-auto pb-4 pt-4 no-scrollbar items-end min-h-[5rem] w-full justify-center">
                        {rackTiles.map((tile, idx) => (
                        <div key={`rack-${tile.id}`} draggable onDragStart={(e) => handleDragStart(e, 'rack', tile)} className="relative w-[3rem] h-[4.5rem] md:w-14 md:h-20 rounded-[10px] bg-gradient-to-b from-white to-[#e3e3e3] flex flex-col items-center justify-center shadow-[2px_6px_12px_rgba(0,0,0,0.6),inset_0_2px_4px_rgba(255,255,255,1)] border border-gray-300 cursor-grab active:cursor-grabbing transform hover:-translate-y-4 hover:scale-110 transition-all duration-200 touch-none" style={{ zIndex: rackTiles.length - idx }}>
                            <span className={`text-3xl font-black ${tile.color} tracking-tighter`} style={{ textShadow: '1px 1px 0px rgba(255,255,255,0.9), -1px -1px 0px rgba(0,0,0,0.25)' }}>{tile.num}</span>
                        </div>
                        ))}
                    </div>
                    </div>
                </div>
                </div>
            );
          };

          return (
            <div className="max-w-md mx-auto h-[100dvh] w-full shadow-2xl overflow-hidden bg-slate-950 font-sans selection:bg-yellow-500/30 text-white">
              {currentView === 'login' && <LoginScreen />}
              {currentView === 'dashboard' && <DashboardScreen />}
              {currentView === 'table' && <GameTableScreen />}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
