<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rummikube.com - Elite Club</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 950: '#020617', 900: '#0f172a', 800: '#1e293b', 700: '#334155' },
                        gold: { 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706' },
                        texas: '#ef4444', omaha4: '#8b5cf6', omaha5: '#ec4899', omaha6: '#f97316', pineapple: '#facc15', rummikub: '#10b981', gin: '#3b82f6'
                    },
                    fontFamily: { sans: ['Heebo', 'sans-serif'], rubik: ['Rubik', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #020617; 
            color: #e2e8f0;
            overflow: hidden; 
            touch-action: none; 
            user-select: none; 
            -webkit-user-select: none;
            font-family: 'Heebo', sans-serif;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .glass-panel { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8); 
        }
        .chip-text { 
            color: #fbbf24; 
            text-shadow: 0 2px 5px rgba(0,0,0,0.8), 0 0 15px rgba(251, 191, 36, 0.4); 
            font-family: 'Rubik', sans-serif; 
            font-weight: 900; 
        }
        
        @keyframes slideInUp { from { transform: translate(-50%, 100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        .toast-animate { animation: slideInUp 0.3s ease-out forwards; }
        
        @keyframes flashRed { 0%, 100% { border-color: rgba(255,0,0,0.2); } 50% { border-color: rgba(255,0,0,0.8); box-shadow: 0 0 20px rgba(255,0,0,0.5); } }
        .board-invalid-group { animation: flashRed 1s infinite; border: 2px solid red !important; }
        
        .rummy-tile {
            background: linear-gradient(135deg, #ffffff 0%, #f4f1e1 100%);
            box-shadow: 2px 6px 12px rgba(0,0,0,0.6), 
                        inset -1px -3px 4px rgba(0,0,0,0.15), 
                        inset 1px 2px 3px rgba(255,255,255,1);
            border-bottom: 7px solid #d1ccb8; 
            border-right: 2px solid #e2ddd0; 
            border-left: 1px solid #ffffff;
            border-radius: 8px; 
            font-family: 'Rubik', sans-serif; 
            text-shadow: 0 1px 1px rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .rummy-tile:active, .rummy-tile.dragging {
            box-shadow: 0 30px 40px rgba(0,0,0,0.8);
            transform: scale(1.1) translateY(-10px);
            z-index: 999;
        }
        
        .rummy-rack-wood {
            background: linear-gradient(to bottom, #e3b782 0%, #c49258 40%, #8b5a33 100%);
            border-bottom: 12px solid #5c3a21; 
            border-left: 4px solid #704728; 
            border-right: 4px solid #704728;
            box-shadow: inset 0 -10px 30px rgba(60,30,10,0.6), 
                        0 20px 50px rgba(0,0,0,0.9);
            border-top-left-radius: 20px; 
            border-top-right-radius: 20px;
            position: relative;
        }
        .rummy-rack-wood::before {
            content: ''; 
            position: absolute; 
            inset: 0; 
            border-top-left-radius: 20px; 
            border-top-right-radius: 20px;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 15px, rgba(0,0,0,0.08) 15px, rgba(0,0,0,0.08) 30px);
            pointer-events: none;
        }

        .poker-table-ellipse {
            background: radial-gradient(ellipse at center, #0f5132 0%, #064e3b 100%);
            border: 15px solid #1f2937;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 0 30px rgba(16, 185, 129, 0.3);
            border-radius: 200px;
        }

        .timer-ring { transform: rotate(-90deg); transition: stroke-dashoffset 1s linear; }
        .bg-dots { background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px); background-size: 20px 20px; }
        
        @keyframes popInModal { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .victory-modal { animation: popInModal 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, onSnapshot, query, where, updateDoc, addDoc, deleteDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBldyf-FW8DI2DX90tM9XIDCEij5riiYOk",
            authDomain: "rummikube-5c138.firebaseapp.com",
            projectId: "rummikube-5c138"
        };
        const app = initializeApp(firebaseConfig);
        window.fb = { auth: getAuth(app), db: getFirestore(app), googleProvider: new GoogleAuthProvider(), signInWithPopup, onAuthStateChanged, signOut, collection, doc, setDoc, getDoc, getDocs, onSnapshot, query, where, updateDoc, addDoc, deleteDoc, runTransaction };
        
        window.dispatchEvent(new Event('firebase-ready'));
    </script>
</head>
<body class="bg-dots">
    <div id="root" class="h-full w-full flex flex-col overflow-hidden"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const ROLES = { SUPER_ADMIN: 'super_admin', CLUB_OWNER: 'club_owner', MANAGER: 'manager', AGENT: 'agent', PLAYER: 'player' };

        const MAIN_CATEGORIES = [
            { id: 'poker', name: 'פוקר', icon: 'fa-diamond', color: 'text-rose-400' },
            { id: 'rummy', name: 'רמי', icon: 'fa-layer-group', color: 'text-emerald-400' }
        ];

        const GAME_TYPES = [
            { id: 'texas', category: 'poker', name: 'טקסס הולדם', hex: '#ef4444', maxPlayersLimit: 9 },
            { id: 'omaha4', category: 'poker', name: 'אומהה 4', hex: '#8b5cf6', maxPlayersLimit: 9 },
            { id: 'omaha5', category: 'poker', name: 'אומהה 5', hex: '#ec4899', maxPlayersLimit: 7 }, 
            { id: 'omaha6', category: 'poker', name: 'אומהה 6', hex: '#f97316', maxPlayersLimit: 6 },
            { id: 'pineapple', category: 'poker', name: 'Crazy Pineapple', hex: '#facc15', maxPlayersLimit: 8 },
            { id: 'rummikub', category: 'rummy', name: 'רמיקוב אבנים', hex: '#10b981', maxPlayersLimit: 4 },
            { id: 'gin', category: 'rummy', name: 'ג\'ין רמי', hex: '#3b82f6', maxPlayersLimit: 2 }
        ];

        const formatMoney = (amount) => {
            if (!amount && amount !== 0) return '🪙 0';
            if (amount >= 1000000) return (amount / 1000000).toFixed(1) + 'M';
            if (amount >= 1000) return (amount / 1000).toFixed(1) + 'K';
            return amount.toLocaleString();
        };

        function App() {
            const [fbReady, setFbReady] = useState(false);
            const [authUser, setAuthUser] = useState(null);
            const [dbUser, setDbUser] = useState(null);
            const [currentView, setCurrentView] = useState('auth'); 
            const [tablesDB, setTablesDB] = useState([]);
            const [activeTable, setActiveTable] = useState(null);
            const [activeSession, setActiveSession] = useState(null); 
            const [toasts, setToasts] = useState([]);
            
            const showToast = (msg, type = 'info') => {
                const id = Date.now(); 
                setToasts(prev => [...prev, { id, msg, type }]);
                setTimeout(() => { setToasts(prev => prev.filter(t => t.id !== id)); }, 4000);
            };

            useEffect(() => {
                if (window.fb) setFbReady(true);
                else window.addEventListener('firebase-ready', () => setFbReady(true));
            }, []);

            useEffect(() => {
                if (!fbReady) return;
                const unsub = window.fb.onAuthStateChanged(window.fb.auth, async (user) => {
                    if (user) { 
                        setAuthUser(user); 
                        await fetchOrInitUser(user); 
                    } else { 
                        setAuthUser(null); setDbUser(null); setCurrentView('auth'); 
                    }
                });
                return () => unsub();
            }, [fbReady]);

            const fetchOrInitUser = async (user) => {
                const ref = window.fb.doc(window.fb.db, "users", user.uid);
                const snap = await window.fb.getDoc(ref);
                if (snap.exists()) {
                    let data = snap.data(); let updates = {};
                    if (data.role === ROLES.SUPER_ADMIN && data.balance < 1000000) { updates.balance = 10000000; data.balance = 10000000; }
                    if (Object.keys(updates).length > 0) await window.fb.updateDoc(ref, updates);
                    setDbUser({ uid: user.uid, ...data });
                } else {
                    const q = await window.fb.getDocs(window.fb.collection(window.fb.db, "users"));
                    const role = q.empty ? ROLES.SUPER_ADMIN : ROLES.PLAYER;
                    const newUser = { username: user.displayName || 'Player', role, status: q.empty ? 'approved' : 'pending', balance: q.empty ? 10000000 : 0, avatarId: 'av1' };
                    await window.fb.setDoc(ref, newUser); setDbUser({ uid: user.uid, ...newUser });
                }
            };

            useEffect(() => {
                if (!fbReady || !dbUser) return;
                const unsubT = window.fb.onSnapshot(window.fb.collection(window.fb.db, "tables"), (s) => {
                    const tables = s.docs.map(d => ({ docId: d.id, ...d.data() }));
                    setTablesDB(tables);
                    const myTable = tables.find(t => t.players && t.players[dbUser.uid] !== undefined);
                    setActiveSession(myTable);
                });
                const unsubU = window.fb.onSnapshot(window.fb.doc(window.fb.db, "users", dbUser.uid), (d) => {
                    if(d.exists()) {
                        const data = d.data(); setDbUser({ uid: d.id, ...data });
                        if(data.status === 'pending') setCurrentView('pending');
                        else if(['auth','pending'].includes(currentView)) setCurrentView('lobby');
                    }
                });
                return () => { unsubT(); unsubU(); };
            }, [fbReady, dbUser?.uid]);

            if (!fbReady) return <div className="h-screen w-screen flex items-center justify-center bg-slate-950 text-emerald-400"><i className="fa-solid fa-spinner fa-spin text-4xl"></i></div>;

            return (
                <div className="h-full flex flex-col relative bg-slate-950 overflow-hidden">
                    {dbUser && dbUser.status === 'approved' && currentView !== 'table' && (
                        <nav className="bg-slate-950 p-3 sm:p-4 z-40 shrink-0 border-b border-slate-800 shadow-2xl relative">
                            <div className="max-w-7xl mx-auto flex justify-between items-center relative z-10 gap-2">
                                <div className="flex items-center gap-2">
                                    <button onClick={() => window.fb.signOut(window.fb.auth)} className="w-10 h-10 rounded-xl bg-slate-900 text-rose-500 border border-slate-800 flex items-center justify-center hover:bg-slate-800 transition"><i className="fa-solid fa-arrow-right-from-bracket"></i></button>
                                    
                                    {[ROLES.SUPER_ADMIN, ROLES.CLUB_OWNER, ROLES.MANAGER].includes(dbUser.role) && (
                                        <button 
                                            onClick={() => setCurrentView(currentView === 'backoffice' ? 'lobby' : 'backoffice')} 
                                            className={`w-10 h-10 rounded-xl border flex items-center justify-center transition ${currentView === 'backoffice' ? 'bg-blue-600 text-white border-blue-500' : 'bg-slate-900 text-blue-400 border-slate-800 hover:bg-slate-800'}`}
                                            title="ניהול מועדון"
                                        >
                                            <i className="fa-solid fa-chart-line"></i>
                                        </button>
                                    )}

                                    <div className="flex flex-col items-end px-2">
                                        <span className="text-sm font-bold text-white">
                                            {dbUser.username} 
                                            {dbUser.role === ROLES.SUPER_ADMIN && <i className="fa-solid fa-bolt text-purple-400 text-[10px] mr-1" title="Super Admin"></i>}
                                        </span>
                                        <span className="chip-text text-sm"><i className="fa-solid fa-coins text-gold-500 text-[10px] mr-1"></i>{formatMoney(dbUser.balance)}</span>
                                    </div>
                                </div>
                                <div className="flex flex-col items-end cursor-pointer" onClick={() => setCurrentView('lobby')}>
                                    <h1 className="text-xl sm:text-2xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-white">RUMMIKUBE</h1>
                                    <p className="text-[10px] text-blue-400 font-bold tracking-[0.3em] uppercase mt-[-2px]">Elite Club</p>
                                </div>
                            </div>
                        </nav>
                    )}
                    
                    {currentView === 'lobby' && activeSession && (
                        <div onClick={() => { setActiveTable(activeSession); setCurrentView('table'); }} className="bg-emerald-600 cursor-pointer hover:bg-emerald-500 text-white p-3 flex justify-center items-center gap-2 font-bold z-50 shrink-0 shadow-lg animate-pulse border-b-4 border-emerald-800 text-sm sm:text-base">
                            <i className="fa-solid fa-play"></i> יש לך משחק פעיל! לחץ כאן לחזור לשולחן
                        </div>
                    )}

                    <main className="flex-1 min-h-0 relative flex flex-col z-0">
                        {currentView === 'auth' && <AuthView />}
                        {currentView === 'pending' && <PendingView />}
                        {currentView === 'lobby' && <LobbyView user={dbUser} tables={tablesDB} onJoin={(t) => {setActiveTable(t); setCurrentView('table');}} showToast={showToast} />}
                        {currentView === 'backoffice' && <BackofficeView user={dbUser} showToast={showToast} />}
                        {currentView === 'table' && <TableDirector tableDocId={activeTable?.docId} user={dbUser} onLeave={() => {setActiveTable(null); setCurrentView('lobby');}} showToast={showToast} />}
                    </main>
                    
                    <div className="fixed bottom-10 left-1/2 transform -translate-x-1/2 z-[999999] flex flex-col items-center gap-2 pointer-events-none">
                        {toasts.map(t => (<div key={t.id} className={`toast-animate px-6 py-3 rounded-2xl shadow-2xl font-bold whitespace-nowrap border ${t.type === 'error' ? 'bg-rose-900 border-rose-500 text-white' : 'bg-slate-800 border-slate-600 text-white'}`}>{t.msg}</div>))}
                    </div>
                </div>
            );
        }

        function AuthView() {
            return (
                <div className="flex-1 flex flex-col items-center justify-center p-4 bg-slate-950 relative overflow-hidden">
                    <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-blue-900/20 via-slate-950 to-slate-950"></div>
                    <div className="glass-panel p-10 sm:p-14 rounded-[2rem] text-center shadow-2xl border-t border-white/10 relative z-10 w-full max-w-md">
                        <div className="w-20 h-20 mx-auto bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-blue-500/50">
                            <span className="text-4xl font-black text-white font-rubik">R</span>
                        </div>
                        <h2 className="text-3xl sm:text-4xl font-black text-white mb-2 tracking-widest drop-shadow-lg uppercase">Rummikube</h2>
                        <p className="text-blue-400 mb-10 font-bold tracking-[0.3em] uppercase text-xs">Elite Private Club</p>
                        <button onClick={()=>window.fb.signInWithPopup(window.fb.auth, window.fb.googleProvider)} className="w-full bg-white hover:bg-gray-100 transition-all transform hover:scale-105 text-slate-900 font-black py-4 px-8 rounded-xl shadow-xl flex items-center justify-center gap-3">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" className="w-6 h-6" />
                            התחברות מהירה
                        </button>
                    </div>
                </div>
            );
        }

        function PendingView() {
            return <div className="flex-1 text-white flex justify-center items-center font-bold text-xl flex-col gap-4">
                <i className="fa-solid fa-clock-rotate-left text-4xl text-amber-500 animate-spin"></i>
                ממתין לאישור מנהל המועדון...
            </div>;
        }

        function LobbyView({ user, tables, onJoin, showToast }) {
            const [activeCat, setActiveCat] = useState('rummy');
            const [activeType, setActiveType] = useState('rummikub');
            const [showCreate, setShowCreate] = useState(false);
            const [newTableOptions, setNewTableOptions] = useState({ maxPlayers: 4, isDealerChoice: false, buyIn: 1000 });
            
            const subTypes = GAME_TYPES.filter(g => g.category === activeCat);
            const filteredTables = tables.filter(t => t.type === activeType);
            const typeInfo = GAME_TYPES.find(g => g.id === activeType);
            
            useEffect(() => { 
                if(!subTypes.find(s=>s.id===activeType)) setActiveType(subTypes[0].id); 
                if(typeInfo) setNewTableOptions(prev => ({ ...prev, maxPlayers: typeInfo.maxPlayersLimit }));
            }, [activeCat, activeType]);
            
            const handleCreate = async () => {
                await window.fb.addDoc(window.fb.collection(window.fb.db, "tables"), { 
                    type: activeType, 
                    maxPlayers: newTableOptions.maxPlayers, 
                    isDealerChoice: newTableOptions.isDealerChoice,
                    minBuyIn: newTableOptions.buyIn, 
                    stakes: newTableOptions.buyIn / 100, 
                    players: {}, 
                    board: [], deck: [], phase: 'waiting', createdAt: Date.now()
                });
                setShowCreate(false); showToast("שולחן נפתח בהצלחה!", "success");
            };

            const handleDelete = async (e, id) => {
                e.stopPropagation(); 
                if (window.confirm("בטוח שברצונך למחוק שולחן זה לצמיתות?")) {
                    await window.fb.deleteDoc(window.fb.doc(window.fb.db, "tables", id));
                    showToast("השולחן נמחק", "info");
                }
            };

            return (
                <div className="flex-1 flex flex-col overflow-y-auto bg-slate-950 pb-10">
                    <div className="bg-slate-900 flex p-2 gap-2 justify-center border-b border-slate-800 shadow-md">
                        {MAIN_CATEGORIES.map(c => <button key={c.id} onClick={()=>setActiveCat(c.id)} className={`px-6 py-3 rounded-lg font-bold transition-all ${activeCat===c.id?'bg-slate-800 text-white border-b-4 border-blue-500':'text-slate-500 hover:text-white'}`}>{c.name}</button>)}
                    </div>
                    <div className="bg-slate-900/50 flex p-3 gap-3 justify-center overflow-x-auto scrollbar-hide">
                        {subTypes.map(t => <button key={t.id} onClick={()=>setActiveType(t.id)} className={`px-5 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all ${activeType===t.id?'bg-slate-800 text-white shadow-lg':'text-slate-500'}`} style={activeType===t.id?{color:t.hex, boxShadow:`0 0 10px ${t.hex}40`}:{}}>{t.name}</button>)}
                    </div>
                    
                    <div className="p-4 max-w-6xl mx-auto w-full">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-xl font-bold text-white flex items-center gap-2">
                                <span className="w-3 h-3 rounded-full animate-pulse" style={{backgroundColor: typeInfo.hex}}></span>
                                שולחנות - {typeInfo.name}
                            </h2>
                            {user.role !== ROLES.PLAYER && (
                                <button onClick={()=>setShowCreate(!showCreate)} className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg shadow-lg font-bold transition-all flex items-center">
                                    <i className="fa-solid fa-plus ml-2"></i> פתיחת שולחן
                                </button>
                            )}
                        </div>
                        
                        {showCreate && (
                            <div className="glass-panel p-6 rounded-2xl mb-6 text-right relative overflow-hidden border border-blue-500/30 animate-[slideInUp_0.2s_ease-out]">
                                <div className="absolute top-0 right-0 w-full h-1 bg-blue-500"></div>
                                <h3 className="text-lg font-bold text-white mb-4">הגדרות שולחן חדש</h3>
                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
                                    <div>
                                        <label className="text-slate-400 text-sm">מקסימום שחקנים</label>
                                        <select value={newTableOptions.maxPlayers} onChange={(e)=>setNewTableOptions({...newTableOptions, maxPlayers: parseInt(e.target.value)})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-lg p-3 mt-1 outline-none focus:border-blue-500">
                                            {[...Array(typeInfo.maxPlayersLimit-1)].map((_,i) => <option key={i+2} value={i+2}>{i+2} שחקנים</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-slate-400 text-sm">דמי כניסה (Buy-In)</label>
                                        <select value={newTableOptions.buyIn} onChange={(e)=>setNewTableOptions({...newTableOptions, buyIn: parseInt(e.target.value)})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-lg p-3 mt-1 outline-none focus:border-blue-500">
                                            <option value={1000}>1,000 צ'יפים</option>
                                            <option value={5000}>5,000 צ'יפים</option>
                                            <option value={10000}>10,000 צ'יפים</option>
                                        </select>
                                    </div>
                                    {/* Dealer's Choice only for Poker */}
                                    {typeInfo.category === 'poker' && (
                                        <div className="flex items-end">
                                            <label className="flex items-center gap-2 text-white cursor-pointer bg-slate-900 p-3 border border-slate-700 rounded-lg w-full hover:bg-slate-800 transition-colors">
                                                <input type="checkbox" checked={newTableOptions.isDealerChoice} onChange={(e)=>setNewTableOptions({...newTableOptions, isDealerChoice: e.target.checked})} className="w-5 h-5 accent-blue-500" />
                                                Dealer's Choice
                                            </label>
                                        </div>
                                    )}
                                </div>
                                <div className="flex justify-end gap-2 mt-4 pt-4 border-t border-slate-800">
                                    <button onClick={()=>setShowCreate(false)} className="px-4 py-2 text-slate-400 hover:text-white transition-colors">ביטול</button>
                                    <button onClick={handleCreate} className="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-2 rounded-lg font-bold shadow-lg transition-transform hover:scale-105">אשר ופתח</button>
                                </div>
                            </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                            {filteredTables.map(t => (

                    const users = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setUsersList(users);

                return () => unsub();

            const handleApprove = async (uid) => {
                try {
                    await window.fb.updateDoc(window.fb.doc(window.fb.db, "users", uid), { status: 'approved' });
                    showToast("שחקן אושר בהצלחה", "success");

            };

            const handleTransfer = async (isDeposit) => {
                if (!selectedUser) return showToast("בחר שחקן להעברה", "error");
                const amount = parseInt(transferAmount);
                if (!amount || amount <= 0) return showToast("הזן סכום חוקי", "error");

                try {
                    await window.fb.runTransaction(window.fb.db, async (transaction) => {
                        const ownerRef = window.fb.doc(window.fb.db, "users", user.uid);
                        const targetRef = window.fb.doc(window.fb.db, "users", selectedUser);
                        
                        const ownerSnap = await transaction.get(ownerRef);
                        const targetSnap = await transaction.get(targetRef);

                        let ownerBal = ownerSnap.data().balance;
                        let targetBal = targetSnap.data().balance;

                        if (isDeposit) {
                            if (ownerBal < amount) throw "אין לך מספיק יתרה במועדון כדי לבצע הפקדה זו.";
                            ownerBal -= amount;
                            targetBal += amount;
                        } else {
                            if (targetBal < amount) throw "לשחקן אין מספיק יתרה כדי לבצע משיכה זו.";
                            ownerBal += amount;
                            targetBal -= amount;
                        }

                        transaction.update(ownerRef, { balance: ownerBal });
                        transaction.update(targetRef, { balance: targetBal });
                    });
                    
                    showToast(`פעולת ה${isDeposit?'הפקדה':'משיכה'} בוצעה בהצלחה!`, "success");

            return (

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div className="bg-slate-900 rounded-2xl p-6 border border-slate-800 shadow-xl">
                                <h3 className="text-slate-400 text-sm font-semibold mb-2">היתרה האישית שלך (Owner)</h3>
                                <p className="text-3xl font-black text-white">{formatMoney(user.balance)}</p>
                            </div>
                            <div className="bg-slate-900 rounded-2xl p-6 border border-slate-800 shadow-xl relative overflow-hidden">
                                <div className="absolute -left-4 -top-4 w-24 h-24 bg-blue-500/10 rounded-full blur-2xl"></div>
                                <h3 className="text-slate-400 text-sm font-semibold mb-2">סך צ'יפים אצל שחקנים</h3>
                                <p className="text-3xl font-black text-blue-400">
                                    {formatMoney(approvedPlayers.reduce((sum, p) => sum + (p.balance || 0), 0))}

                            </div>
                            <div className="bg-slate-900 rounded-2xl p-6 border border-slate-800 shadow-xl relative overflow-hidden">
                                <div className="absolute -left-4 -top-4 w-24 h-24 bg-amber-500/10 rounded-full blur-2xl"></div>
                                <h3 className="text-slate-400 text-sm font-semibold mb-2">ממתינים לאישור</h3>
                                <p className="text-3xl font-black text-amber-400">{pendingUsers.length}</p>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div className="bg-slate-900 rounded-2xl border border-slate-800 p-6 shadow-xl">
                                <h3 className="font-bold text-lg text-white mb-6 flex items-center gap-2">
                                    <i className="fa-solid fa-money-bill-transfer text-emerald-400"></i> העברת צ'יפים
                                </h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-slate-400 text-sm font-bold mb-1 block">בחר שחקן:</label>
                                        <select value={selectedUser} onChange={(e)=>setSelectedUser(e.target.value)} className="w-full bg-slate-950 text-white border border-slate-700 rounded-lg p-3 outline-none focus:border-blue-500">
                                            <option value="">-- בחר מהרשימה --</option>
                                            {approvedPlayers.map(p => (
                                                <option key={p.id} value={p.id}>{p.username} (יתרה: {formatMoney(p.balance)})</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-slate-400 text-sm font-bold mb-1 block">סכום צ'יפים:</label>
                                        <input type="number" value={transferAmount} onChange={(e)=>setTransferAmount(e.target.value)} placeholder="0" className="w-full bg-slate-950 text-white border border-slate-700 rounded-lg p-3 outline-none focus:border-blue-500 font-bold text-xl" />
                                    </div>
                                    <div className="flex gap-3 pt-2">
                                        <button onClick={()=>handleTransfer(true)} className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-lg font-bold shadow-lg transition-transform hover:scale-[1.02]">
                                            הפקד לשחקן <i className="fa-solid fa-arrow-down ml-1"></i>
                                        </button>
                                        <button onClick={()=>handleTransfer(false)} className="flex-1 bg-rose-600 hover:bg-rose-500 text-white py-3 rounded-lg font-bold shadow-lg transition-transform hover:scale-[1.02]">
                                            משוך משחקן <i className="fa-solid fa-arrow-up ml-1"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-slate-900 rounded-2xl border border-slate-800 p-6 shadow-xl flex flex-col min-h-[300px]">
                                <h3 className="font-bold text-lg text-white mb-6 flex items-center gap-2">
                                    <i className="fa-solid fa-user-clock text-amber-400"></i> ממתינים לאישור כניסה
                                </h3>
                                <div className="flex-1 overflow-y-auto pr-2 space-y-3">
                                    {pendingUsers.length === 0 && (
                                        <div className="text-center text-slate-500 py-10 font-bold">אין שחקנים בהמתנה כרגע.</div>
                                    )}
                                    {pendingUsers.map(u => (
                                        <div key={u.id} className="bg-slate-950 p-4 rounded-xl border border-slate-800 flex justify-between items-center">
                                            <div className="flex items-center gap-3">
                                                <div className="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center text-slate-400"><i className="fa-solid fa-user"></i></div>
                                                <span className="font-bold text-white">{u.username}</span>
                                            </div>
                                            <button onClick={()=>handleApprove(u.id)} className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-bold shadow-lg transition-colors text-sm">
                                                אשר כניסה
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function TableDirector({ tableDocId, user, onLeave, showToast }) {
            const [tableState, setTableState] = useState(null);
            useEffect(() => {
                if(!tableDocId) return;
                const unsub = window.fb.onSnapshot(window.fb.doc(window.fb.db, "tables", tableDocId), doc => { 
                    if(doc.exists()) setTableState({id: doc.id, ...doc.data()}); 
                    else { showToast("השולחן נסגר.", "error"); onLeave(); }
                });
                return () => unsub();
            }, [tableDocId]);
            if(!tableState) return <div className="flex-1 flex justify-center items-center text-emerald-400"><i className="fa-solid fa-spinner fa-spin text-4xl"></i></div>;
            
            const category = GAME_TYPES.find(g => g.id === tableState.type)?.category;
            if(category === 'poker') return <PokerTable tableState={tableState} user={user} onLeave={onLeave} showToast={showToast} />;
            if(category === 'rummy') return <RummyTable tableState={tableState} user={user} onLeave={onLeave} showToast={showToast} />;
            return null;
        }

        function PokerTable({ tableState, user, onLeave, showToast }) {
            return (
                <div className="flex-1 flex flex-col bg-slate-950 relative">
                    <div className="p-3 bg-slate-900 border-b border-white/10 shrink-0 flex justify-between">
                        <button onClick={onLeave} className="text-white bg-slate-800 px-4 py-2 rounded-lg font-bold"><i className="fa-solid fa-arrow-right ml-2"></i> יציאה</button>
                        <h2 className="text-xl font-black text-white">פוקר בפיתוח</h2>
                    </div>
                    <div className="flex-1 flex items-center justify-center p-4">
                        <div className="w-full max-w-4xl h-[400px] poker-table-ellipse flex items-center justify-center">
                            <span className="text-emerald-400/50 text-2xl font-black">הלוגיקה תוכנס בקרוב...</span>
                        </div>
                    </div>
                </div>
            );
        }

        function RummyTable({ tableState, user, onLeave, showToast }) {
            const typeInfo = GAME_TYPES.find(g => g.id === tableState.type) || GAME_TYPES[0];
            const isSeated = tableState?.players?.[user.uid] !== undefined;
            const isPlaying = tableState.phase === 'playing';
            const isMyTurn = tableState.currentTurn === user.uid;
            
            const [rack, setRack] = useState([]);
            const [board, setBoard] = useState([]);
            const [startTurnBoard, setStartTurnBoard] = useState([]);
            const [startTurnRack, setStartTurnRack] = useState([]);
            
            const [dragData, setDragData] = useState(null); 
            const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
            const [hoverTarget, setHoverTarget] = useState(null);
            const [timeLeft, setTimeLeft] = useState(60);
            const [showVictory, setShowVictory] = useState(false);
            
            const longPressTimer = useRef(null);

            useEffect(() => {
                if (!dragData) {
                    setBoard(tableState.board || []);
                    setRack(tableState.players?.[user.uid]?.cards || []);
                    if (tableState.currentTurn === user.uid && tableState.board) {
                        if (startTurnBoard.length === 0 && startTurnRack.length === 0) {
                             setStartTurnBoard(tableState.board || []);
                             setStartTurnRack(tableState.players?.[user.uid]?.cards || []);
                        }
                    } else if (tableState.currentTurn !== user.uid) {
                        setStartTurnBoard([]); setStartTurnRack([]); 
                    }
                }
                if (tableState.phase === 'showdown') setShowVictory(true);
                else setShowVictory(false);
            }, [tableState.board, tableState.players?.[user.uid]?.cards, tableState.currentTurn, dragData, tableState.phase]);

            useEffect(() => {
                if (tableState.phase === 'waiting' && isSeated) {
                    const pCount = Object.keys(tableState.players || {}).length;
                    if (pCount === (tableState.maxPlayers || 4)) {
                        const firstPlayerUid = Object.keys(tableState.players)[0];
                        if (user.uid === firstPlayerUid) startGame();
                    }
                }
            }, [tableState.phase, tableState.players]);

            useEffect(() => {
                let interval;
                if (isPlaying && tableState.turnStartedAt) {
                    interval = setInterval(() => {
                        const elapsed = Math.floor((Date.now() - tableState.turnStartedAt) / 1000);
                        const remaining = Math.max(0, 60 - elapsed);
                        setTimeLeft(remaining);
                        if (remaining === 0 && isMyTurn) {
                            clearInterval(interval);
                            handleTimeoutPenalty();
                        }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [isPlaying, tableState.turnStartedAt, isMyTurn]);

            const generateRummyDeck = () => {
                const colors = ['text-orange-500', 'text-blue-600', 'text-red-600', 'text-slate-900'];
                const hexes = ['#f97316', '#2563eb', '#dc2626', '#0f172a'];
                let d = [];
                for (let set = 0; set < 2; set++) { 
                    for (let c = 0; c < 4; c++) { 
                        for (let v = 1; v <= 13; v++) { d.push({ id: `t_${set}_${c}_${v}`, val: v, color: colors[c], hex: hexes[c] }); } 
                    } 
                }
                d.push({ id: 'j1', val: '☻', color: 'text-red-600', hex: '#dc2626' });
                d.push({ id: 'j2', val: '☻', color: 'text-slate-900', hex: '#0f172a' });
                return d.sort(() => Math.random() - 0.5); 
            };

            const validateGroup = (group) => {
                if (!group || group.length < 3) return false;
                const jCount = group.filter(t => t.val === '☻').length;
                const regulars = group.filter(t => t.val !== '☻');
                if(regulars.length === 0) return true;
                const isSet = regulars.every(t => t.val === regulars[0].val) && new Set(regulars.map(t => t.hex)).size === regulars.length;
                if (isSet && group.length <= 4) return true;
                const isRunColor = regulars.every(t => t.hex === regulars[0].hex);
                if (isRunColor) {
                    const sorted = [...regulars].sort((a,b) => a.val - b.val);
                    let neededJokers = 0;
                    for(let i=0; i<sorted.length-1; i++) {
                        if (sorted[i].val === sorted[i+1].val) return false; 
                        neededJokers += (sorted[i+1].val - sorted[i].val - 1); 
                    }
                    if (neededJokers <= jCount && group.length <= 13) return true;
                }
                return false;
            };

            const isBoardValid = useMemo(() => { 
                if (board.length === 0) return true; 
                return board.every(g => validateGroup(g)); 
            }, [board]);
            
            const deadwoodScore = rack.reduce((s, t) => s + (t.val === '☻' ? 30 : t.val), 0);

            useEffect(() => {
                const handlePointerMove = (e) => { 
                    if (dragData) { 
                        setDragPos({ x: e.clientX, y: e.clientY }); 
                        if(longPressTimer.current) clearTimeout(longPressTimer.current); 
                    } 
                };
                
                const handlePointerUp = (e) => {
                    if (longPressTimer.current) clearTimeout(longPressTimer.current);
                    if (!dragData) return;
                    
                    let newRack = [...rack]; 
                    let newBoard = board.map(g => [...g]);
                    
                    if (dragData.type === 'single') {
                        if (dragData.source === 'rack') {
                            newRack.splice(dragData.tileIndex, 1);
                        } else if (dragData.source === 'board') {
                            const grp = newBoard[dragData.groupIndex];
                            const tIdx = dragData.tileIndex;
                            if (tIdx > 0 && tIdx < grp.length - 1 && grp.length >= 4) {
                                const left = grp.slice(0, tIdx);
                                const right = grp.slice(tIdx + 1);
                                newBoard.splice(dragData.groupIndex, 1, left, right);
                            } else {
                                grp.splice(tIdx, 1);
                                if (grp.length === 0) newBoard.splice(dragData.groupIndex, 1);
                            }
                        }

                        if (hoverTarget && hoverTarget.startsWith('board-tile-')) {
                            const [,,targetGroupIdx, targetTileIdx] = hoverTarget.split('-');
                            const actualGIdx = (dragData.source === 'board' && dragData.groupIndex < targetGroupIdx && newBoard.length < board.length) ? targetGroupIdx - 1 : targetGroupIdx;
                            
                            if (newBoard[actualGIdx] && newBoard[actualGIdx][targetTileIdx]?.val === '☻') {
                                let tempGroup = [...newBoard[actualGIdx]];
                                tempGroup[targetTileIdx] = dragData.tile;
                                if (validateGroup(tempGroup)) {
                                    const retrievedJoker = newBoard[actualGIdx][targetTileIdx];
                                    newBoard[actualGIdx][targetTileIdx] = dragData.tile; 
                                    newRack.push(retrievedJoker); 
                                    showToast("שחררת ג'וקר חוקי!", "success");
                                } else {
                                    newBoard[actualGIdx].push(dragData.tile); 
                                }
                            } else {
                                // EXACT INSERTION LOGIC
                                if (newBoard[actualGIdx]) {
                                    newBoard[actualGIdx].splice(targetTileIdx, 0, dragData.tile);
                                }
                            }
                        } 
                        else if (hoverTarget && hoverTarget.startsWith('board-group-')) {
                            const targetIdx = parseInt(hoverTarget.split('-')[2]);
                            const actualIdx = (dragData.source === 'board' && dragData.groupIndex < targetIdx && newBoard.length < board.length) ? targetIdx - 1 : targetIdx;
                            if (newBoard[actualIdx]) newBoard[actualIdx].push(dragData.tile); else newBoard.push([dragData.tile]);
                        } 
                        else if (hoverTarget === 'board-new') {
                            newBoard.push([dragData.tile]);
                        } 
                        else if (hoverTarget === 'rack') {
                            newRack.push(dragData.tile);
                        } 
                        else if (dragData.source === 'rack') {
                            newRack.splice(dragData.tileIndex, 0, dragData.tile); 
                        } 
                    } 
                    else if (dragData.type === 'group') {
                        const groupTiles = dragData.tiles;
                        if (dragData.source === 'board') newBoard.splice(dragData.groupIndex, 1);
                        
                        if (hoverTarget && hoverTarget.startsWith('board-group-')) {
                            const targetIdx = parseInt(hoverTarget.split('-')[2]);
                            const actualIdx = (dragData.source === 'board' && dragData.groupIndex < targetIdx && newBoard.length < board.length) ? targetIdx - 1 : targetIdx;
                            if (newBoard[actualIdx]) newBoard[actualIdx].push(...groupTiles); else newBoard.push([...groupTiles]);
                        } else if (hoverTarget === 'board-new') {
                            newBoard.push([...groupTiles]);
                        } else if (hoverTarget === 'rack') {
                            newRack.push(...groupTiles);
                        } else if (dragData.source === 'board') {
                            newBoard.splice(dragData.groupIndex, 0, groupTiles); 
                        } 
                    }
                    
                    setRack(newRack); setBoard(newBoard); setDragData(null); setHoverTarget(null);
                };
                
                if (dragData) { 
                    window.addEventListener('pointermove', handlePointerMove, { passive: false }); 
                    window.addEventListener('pointerup', handlePointerUp); 
                }
                return () => { 
                    window.removeEventListener('pointermove', handlePointerMove); 
                    window.removeEventListener('pointerup', handlePointerUp); 
                };
            }, [dragData, hoverTarget, rack, board]);

            const startDrag = (e, tile, source, groupIndex, tileIndex) => {
                if (!isMyTurn) return showToast("זה לא התור שלך! המתן.", "error");
                if (e.pointerType === 'touch') e.target.releasePointerCapture(e.pointerId);
                
                setDragData({ type: 'single', tile, source, groupIndex, tileIndex }); 
                setDragPos({ x: e.clientX, y: e.clientY });
                
                if (source === 'board') {
                    longPressTimer.current = setTimeout(() => {
                        if (navigator.vibrate) navigator.vibrate(50);
                        setDragData({ type: 'group', tiles: board[groupIndex], source, groupIndex });
                    }, 500); 
                }
            };

            const handleSit = async () => {
                try { 
                    await window.fb.runTransaction(window.fb.db, async (transaction) => {
                        const userRef = window.fb.doc(window.fb.db, "users", user.uid);
                        const tableRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const userSnap = await transaction.get(userRef);
                        const uData = userSnap.data();
                        
                        if (uData.balance < tableState.minBuyIn) throw "אין לך מספיק צ'יפים להיכנס.";
                        
                        transaction.update(userRef, { balance: uData.balance - tableState.minBuyIn });
                        transaction.update(tableRef, { 
                            [`players.${user.uid}`]: { username: uData.username, cards: [], hasDropped: false, stack: tableState.minBuyIn } 
                        });
                    });
                    showToast("התיישבת בהצלחה והכנסת צ'יפים לשולחן!", "success"); 
                } catch(e) { showToast(typeof e === 'string' ? e : "שגיאה בישיבה בשולחן", "error"); }
            };

            const handleLeaveSafely = async () => {
                if (!isSeated) { onLeave(); return; }
                if (isPlaying) { showToast("אי אפשר לקום באמצע יד חיה!", "error"); return; }
                
                try {
                    await window.fb.runTransaction(window.fb.db, async (transaction) => {
                        const userRef = window.fb.doc(window.fb.db, "users", user.uid);
                        const tableRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const userSnap = await transaction.get(userRef);
                        const tableSnap = await transaction.get(tableRef);
                        
                        const uData = userSnap.data();
                        const tData = tableSnap.data();
                        const myStack = tData.players[user.uid]?.stack || 0;
                        
                        let newPlayers = { ...tData.players };
                        delete newPlayers[user.uid];
                        
                        transaction.update(userRef, { balance: uData.balance + myStack });
                        transaction.update(tableRef, { players: newPlayers });
                    });
                    showToast("הצ'יפים חזרו לחשבון. יצאת מהשולחן.", "success");
                    onLeave();
                } catch(e) { showToast("שגיאה ביציאה", "error"); }
            };

            const startGame = async () => {
                const d = generateRummyDeck(); 
                const newPlayers = { ...tableState.players }; 
                const uids = Object.keys(newPlayers);
                uids.forEach(uid => { newPlayers[uid].cards = d.splice(0, 14); newPlayers[uid].hasDropped = false; });
                
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { 
                    phase: 'playing', deck: d, board: [], players: newPlayers, 
                    currentTurn: uids[0], turnStartedAt: Date.now() 
                });
                showToast("המשחק מתחיל!", "success");
            };

            const handleTimeoutPenalty = async () => {
                showToast("נגמר הזמן! הלוח אופס ומשכת עונשין מהקופה.", "error");
                const newDeck = [...(tableState.deck || [])];
                const tile = newDeck.length > 0 ? newDeck.pop() : null;
                const newRack = tile ? [...startTurnRack, tile] : [...startTurnRack];
                const uids = Object.keys(tableState.players); 
                const nextTurn = uids[(uids.indexOf(user.uid) + 1) % uids.length];
                
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { 
                    deck: newDeck, board: startTurnBoard, [`players.${user.uid}.cards`]: newRack, 
                    currentTurn: nextTurn, turnStartedAt: Date.now() 
                });
            };

            const handleDraw = async () => {
                if (!isMyTurn) return;
                const newDeck = [...(tableState.deck || [])];
                const tile = newDeck.length > 0 ? newDeck.pop() : null;
                const newRack = tile ? [...startTurnRack, tile] : [...startTurnRack];
                const uids = Object.keys(tableState.players); 
                const nextTurn = uids[(uids.indexOf(user.uid) + 1) % uids.length];
                
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { 
                    deck: newDeck, board: startTurnBoard, [`players.${user.uid}.cards`]: newRack, 
                    currentTurn: nextTurn, turnStartedAt: Date.now() 
                });
            };
            
            const handleEndTurn = async () => {
                if (!isMyTurn || !isBoardValid) return;
                
                const isFirstDrop = !tableState.players[user.uid].hasDropped;
                if (isFirstDrop) {
                    const currentRackIds = rack.map(t=>t.id);
                    const droppedTiles = startTurnRack.filter(t => !currentRackIds.includes(t.id));
                    if (droppedTiles.length > 0) {
                        const sum = droppedTiles.reduce((s, t) => s + (t.val === '☻' ? 30 : t.val), 0);
                        if (sum < 30) return showToast(`הורדה ראשונה חייבת להיות 30 נקודות. הורדת רק ${sum}.`, "error");
                    } else {
                        return showToast("לא ביצעת שום מהלך! עליך למשוך מהקופה.", "error");
                    }
                }

                if (rack.length === 0) {
                    // WIN CONDITION AND ECONOMY CALCULATION
                    showToast("ניצחון! 🏆 מחשב צ'יפים...", "success");
                    
                    const losers = Object.entries(tableState.players).filter(([uid]) => uid !== user.uid);
                    let totalPot = 0;
                    const updates = {};
                    
                    losers.forEach(([uid, pData]) => {
                         let dw = pData.cards.reduce((s, t) => s + (t.val === '☻' ? 30 : t.val), 0);
                         let penalty = dw * tableState.stakes;
                         penalty = Math.min(penalty, pData.stack); // Cannot lose more than stack
                         updates[`players.${uid}.stack`] = pData.stack - penalty;
                         totalPot += penalty;
                    });
                    
                    const rake = Math.floor(totalPot * 0.06);
                    const winnerProfit = totalPot - rake;
                    
                    updates[`players.${user.uid}.stack`] = tableState.players[user.uid].stack + winnerProfit;
                    updates[`players.${user.uid}.cards`] = [];
                    updates.phase = 'showdown';
                    updates.board = board;
                    updates.winner = user.uid;
                    updates.lastResults = { winnerProfit, rake, totalPot };
                    
                    await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), updates);
                    setTimeout(() => startGame(), 8000); 
                    return;
                }

                const uids = Object.keys(tableState.players); 
                const nextTurn = uids[(uids.indexOf(user.uid) + 1) % uids.length];
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { 
                    board: board, [`players.${user.uid}.cards`]: rack, [`players.${user.uid}.hasDropped`]: true, 
                    currentTurn: nextTurn, turnStartedAt: Date.now() 
                });
            };

            const sortRackNumbers = () => setRack([...rack].sort((a,b) => (a.val==='☻'?1:(b.val==='☻'?-1:a.val-b.val))));
            const sortRackColors = () => setRack([...rack].sort((a,b) => (a.hex>b.hex?1:(a.hex<b.hex?-1:a.val-b.val))));

            const opponents = Object.entries(tableState.players || {}).filter(([uid]) => uid !== user.uid);

            return (
                <div className="flex-1 flex flex-col relative select-none h-full overflow-hidden" style={{ backgroundColor: '#0f386d', backgroundImage: 'radial-gradient(circle at 50% 0%, #174b8e 0%, #0a2142 100%)', touchAction: 'none' }}>
                    
                    <div className="relative z-10 flex justify-between items-center p-3 bg-slate-900/50 border-b border-white/10 shrink-0 shadow-lg">
                        <button onClick={handleLeaveSafely} className="text-slate-300 bg-slate-800/80 px-4 py-2 rounded-lg font-bold hover:bg-slate-700 transition border border-slate-700"><i className="fa-solid fa-arrow-right ml-2"></i> {isSeated ? 'קום מהשולחן' : 'חזור ללובי'}</button>
                        <h2 className="text-xl sm:text-2xl font-black text-white/90 tracking-wider font-rubik drop-shadow-md">Rummikub Elite</h2>
                        <div className="flex gap-2">
                            {isSeated && <div className="text-emerald-400 font-bold bg-emerald-900/50 border border-emerald-500/50 px-3 py-1.5 rounded-lg shadow-[0_0_10px_rgba(16,185,129,0.2)]">קופה שלי: 🪙{formatMoney(tableState.players[user.uid]?.stack)}</div>}
                            <div className="text-amber-400 font-bold bg-amber-900/50 border border-amber-500/50 px-3 py-1.5 rounded-lg shadow-[0_0_10px_rgba(245,158,11,0.2)] flex items-center gap-2">
                                <i className="fa-solid fa-coins"></i> {tableState.stakes}
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 min-h-0 relative mx-2 sm:mx-4 mt-4 mb-2 flex flex-col" onPointerEnter={() => setHoverTarget('board-new')}>
                        
                        {/* Opponents */}
                        <div className="absolute top-0 left-1/2 transform -translate-x-1/2 flex gap-8 z-10">
                            {opponents.map(([uid, p]) => (
                                <div key={uid} className="flex flex-col items-center">
                                    <div className={`w-12 h-12 sm:w-14 sm:h-14 rounded-full border-4 flex items-center justify-center bg-slate-800 transition-all ${tableState.currentTurn===uid?'border-emerald-400 shadow-[0_0_20px_#10b981] scale-110':'border-slate-600 opacity-70'}`}>
                                        <i className="fa-solid fa-user text-slate-300"></i>
                                    </div>
                                    <span className="text-xs font-bold text-white mt-1 bg-black/50 px-3 py-0.5 rounded-full">{p.username}</span>
                                    <span className="text-[10px] text-emerald-400 font-black bg-slate-900 px-2 rounded-full mt-1 border border-emerald-900">{p.cards?.length||0} אבנים</span>
                                    <span className="text-xs text-gold-400 font-bold mt-1">🪙{formatMoney(p.stack)}</span>
                                </div>
                            ))}
                        </div>
                        
                        {!isSeated && (
                            <div className="absolute inset-0 z-20 flex items-center justify-center bg-black/30 backdrop-blur-sm">
                                <button onClick={handleSit} className="bg-gradient-to-b from-blue-500 to-blue-700 text-white px-8 py-4 rounded-full font-black text-2xl shadow-[0_0_30px_rgba(59,130,246,0.6)] border-2 border-blue-400 hover:scale-105 transition-transform">
                                    התיישב בשולחן ({Object.keys(tableState.players||{}).length}/{tableState.maxPlayers})
                                </button>
                            </div>
                        )}

                        {/* Victory Modal Summary */}
                        {showVictory && (
                             <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-md">
                                 <div className="victory-modal bg-slate-900 border-4 border-emerald-500 p-8 rounded-3xl shadow-[0_0_50px_rgba(16,185,129,0.5)] text-center max-w-md">
                                     <i className="fa-solid fa-trophy text-6xl text-gold-400 mb-4 drop-shadow-[0_0_15px_rgba(251,191,36,0.8)]"></i>
                                     <h2 className="text-3xl font-black text-white mb-2">{tableState.players[tableState.winner]?.username} ניצח!</h2>
                                     <div className="bg-slate-800 rounded-xl p-4 my-6 text-right">
                                         <p className="text-emerald-400 font-bold text-lg mb-1">סה"כ קופה: 🪙{formatMoney(tableState.lastResults?.totalPot)}</p>
                                         <p className="text-slate-400 text-sm">רווח נקי למנצח: 🪙{formatMoney(tableState.lastResults?.winnerProfit)}</p>
                                         <p className="text-slate-400 text-sm">עמלת מועדון (Rake): 🪙{formatMoney(tableState.lastResults?.rake)}</p>
                                     </div>
                                     <p className="text-amber-500 font-bold animate-pulse">המשחק הבא מתחיל בעוד כמה שניות...</p>
                                 </div>
                             </div>
                        )}
                        
                        {isPlaying && (
                            <div className="mt-24 flex flex-wrap gap-5 items-start pb-24 overflow-y-auto w-full h-full p-2 scrollbar-hide">
                                {board.map((group, gIdx) => (
                                    <div key={gIdx} onPointerEnter={(e) => { e.stopPropagation(); setHoverTarget(`board-group-${gIdx}`); }} className={`flex bg-black/20 p-2 rounded-xl border-2 transition-all duration-200 ${hoverTarget === `board-group-${gIdx}` ? 'border-amber-400 shadow-[0_0_20px_#f59e0b] scale-105' : !validateGroup(group) ? 'board-invalid-group' : 'border-white/5 shadow-md'}`}>
                                        {group.map((t, tIdx) => (
                                            <div key={t.id} 
                                                 onPointerEnter={(e)=>{e.stopPropagation(); setHoverTarget(`board-tile-${gIdx}-${tIdx}`);}}
                                                 onPointerDown={(e) => startDrag(e, t, 'board', gIdx, tIdx)} 
                                                 className={`rummy-tile w-10 h-14 sm:w-12 sm:h-16 flex items-center justify-center text-2xl font-black mx-0.5 cursor-grab active:cursor-grabbing ${dragData?.tile?.id === t.id ? 'opacity-30' : ''} ${hoverTarget===`board-tile-${gIdx}-${tIdx}` && dragData && t.val==='☻' ? 'ring-4 ring-emerald-500 scale-110 z-10 shadow-[0_0_20px_#10b981]' : ''}`} 
                                                 style={{ color: t.hex }}>
                                                {t.val}
                                            </div>
                                        ))}
                                    </div>
                                ))}
                                {board.length === 0 && <div className="w-full text-center mt-10 text-white/20 font-black text-2xl sm:text-3xl pointer-events-none drop-shadow-md">גרור אבנים לכאן כדי ליצור סדרות</div>}
                            </div>
                        )}
                    </div>

                    <div className="relative z-10 p-2 sm:p-4 flex flex-col items-center justify-end pb-4 shrink-0" onPointerEnter={() => setHoverTarget('rack')}>
                        
                        {isSeated && isPlaying && (
                            <div className="absolute left-4 top-[-40px] flex gap-2 z-30">
                                {isMyTurn && <button onClick={handleEndTurn} disabled={!isBoardValid} className={`px-5 py-2.5 rounded-xl font-black shadow-lg text-white transition-all ${!isBoardValid ? 'bg-slate-600 opacity-50 cursor-not-allowed' : 'bg-emerald-600 hover:bg-emerald-500 hover:-translate-y-1'}`}>סיום תור</button>}
                                {isMyTurn && <button onClick={handleDraw} className="bg-gradient-to-b from-blue-700 to-blue-900 text-white px-5 py-2.5 rounded-xl font-bold border border-blue-500 shadow-lg hover:-translate-y-1 transition-transform">קופה <span className="text-xs text-amber-400">({tableState.deck?.length})</span></button>}
                                {isMyTurn && <button onClick={()=>{setBoard(startTurnBoard); setRack(startTurnRack);}} className="bg-rose-900 text-rose-200 px-4 py-2.5 rounded-xl font-bold shadow-lg border border-rose-700 hover:-translate-y-1 transition-transform" title="איפוס לוח"><i className="fa-solid fa-rotate-left"></i></button>}
                            </div>
                        )}

                        <div className="absolute right-4 top-[-40px] flex gap-2 z-30">
                           {isMyTurn && (
                               <div className="bg-slate-900 rounded-full w-12 h-12 flex items-center justify-center border-2 border-emerald-400 shadow-[0_0_15px_#10b981] relative">
                                   <svg className="absolute inset-0 w-full h-full timer-ring"><circle cx="24" cy="24" r="22" fill="none" stroke="#334155" strokeWidth="4"></circle><circle cx="24" cy="24" r="22" fill="none" stroke="#10b981" strokeWidth="4" strokeDasharray="138" strokeDashoffset={138 - (138 * (timeLeft/60))} className="timer-ring-circle"></circle></svg>
                                   <span className="font-black text-white text-sm z-10">{timeLeft}</span>
                               </div>
                           )}
                           {isSeated && (
                               <div className="flex gap-1">
                                   <button onClick={sortRackNumbers} className="bg-slate-800 hover:bg-slate-700 text-slate-300 w-10 h-10 rounded-xl font-bold shadow-lg border border-slate-600 text-xs flex flex-col items-center justify-center transition-colors"><span>1-9</span></button>
                                   <button onClick={sortRackColors} className="bg-slate-800 hover:bg-slate-700 text-slate-300 w-10 h-10 rounded-xl font-bold shadow-lg border border-slate-600 text-xs flex flex-col items-center justify-center transition-colors"><div className="flex"><span className="text-blue-500">■</span><span className="text-red-500">■</span></div></button>
                               </div>
                           )}
                           <div className="bg-slate-900/90 px-3 py-1 rounded-xl flex flex-col items-center border border-slate-700 shadow-lg backdrop-blur-md">
                               <span className="text-[9px] text-slate-400 uppercase font-bold tracking-widest">עונשין</span>
                               <span className={`text-sm font-black ${deadwoodScore===0?'text-emerald-400':'text-rose-400'}`}>{deadwoodScore}</span>
                           </div>
                        </div>

                        {!isMyTurn && isPlaying && isSeated && <div className="absolute inset-0 bg-black/50 z-20 flex items-center justify-center backdrop-blur-[2px] rounded-t-[20px]"><span className="text-white font-black text-xl shadow-black drop-shadow-2xl animate-pulse tracking-widest uppercase">המתן לתורך...</span></div>}

                        <div className="flex flex-wrap justify-center items-end gap-1 h-auto min-h-[130px] px-4 py-6 w-[98%] max-w-5xl relative z-10 rummy-rack-wood">
                            {rack.map((tile, index) => (
                                <div key={tile.id} onPointerDown={(e) => startDrag(e, tile, 'rack', null, index)} className={`rummy-tile w-12 h-16 sm:w-16 sm:h-24 flex items-center justify-center text-3xl sm:text-4xl font-black cursor-grab active:cursor-grabbing transition-transform z-10 ${dragData?.tile?.id === tile.id ? 'opacity-20 scale-95' : 'hover:-translate-y-4 hover:shadow-[0_20px_25px_rgba(0,0,0,0.8)]'}`} style={{ color: tile.hex }}>{tile.val}</div>
                            ))}
                            {rack.length === 0 && isPlaying && <div className="text-amber-700 font-bold text-xl opacity-50 select-none">התושבת ריקה</div>}
                        </div>
                    </div>
                    
                    {dragData && dragData.type === 'single' && (
                        <div className="fixed pointer-events-none z-[9999] rummy-tile w-14 h-20 sm:w-16 sm:h-24 flex items-center justify-center text-4xl font-black scale-110 shadow-[0_30px_50px_rgba(0,0,0,0.9)]" style={{ left: dragPos.x, top: dragPos.y, transform: 'translate(-50%, -50%) rotate(5deg)', color: dragData.tile.hex }}>
                            {dragData.tile.val}
                        </div>
                    )}
                    {dragData && dragData.type === 'group' && (
                        <div className="fixed pointer-events-none z-[9999] flex bg-black/30 p-2 rounded-2xl border-2 border-emerald-400 shadow-[0_30px_60px_rgba(0,0,0,0.9)] scale-110 backdrop-blur-md" style={{ left: dragPos.x, top: dragPos.y, transform: 'translate(-50%, -50%)' }}>
                            {dragData.tiles.map(t => (
                                <div key={t.id} className="rummy-tile w-10 h-14 flex items-center justify-center text-2xl font-black mx-0.5" style={{ color: t.hex }}>{t.val}</div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
