<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rummikube.com - Elite Club</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 950: '#020617', 900: '#0f172a', 800: '#1e293b', 700: '#334155' },
                        gold: { 400: '#facc15', 500: '#eab308' },
                        rummikub: '#10b981'
                    },
                    fontFamily: { 
                        sans: ['Heebo', 'sans-serif'], 
                        rubik: ['Rubik', 'sans-serif'] 
                    }
                }
            }
        }
    </script>

    <style>
        body, html {
            background-color: #020617; 
            color: #f8fafc; margin: 0; padding: 0;
            height: 100dvh; /* גובה דינמי מדויק למובייל למניעת הסתרת התושבת */
            width: 100vw; overflow: hidden; overscroll-behavior: none;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        
        .glass-panel { 
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6); 
        }

        .scrollable-content { overflow-y: auto; -webkit-overflow-scrolling: touch; height: 100%; padding-bottom: 150px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        .animate-pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes flashRed { 0%, 100% { border-color: rgba(239, 68, 68, 0.3); box-shadow: none; } 50% { border-color: rgba(239, 68, 68, 0.8); box-shadow: 0 0 15px rgba(239,68,68,0.5); } }
        .board-invalid-group { animation: flashRed 1.5s infinite; border: 2px solid #ef4444 !important; background: rgba(239, 68, 68, 0.05); }
        
        /* Premium Rummy Tiles */
        .rummy-tile {
            background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
            box-shadow: 2px 4px 8px rgba(0,0,0,0.4), inset -1px -2px 3px rgba(0,0,0,0.1), inset 1px 1px 2px rgba(255,255,255,1);
            border-bottom: 5px solid #cbd5e1; border-right: 1px solid #e2e8f0; border-radius: 8px; 
            font-family: 'Rubik', sans-serif; font-weight: 900;
            transition: transform 0.1s ease, box-shadow 0.1s ease; user-select: none;
            text-shadow: 0 1px 1px rgba(0,0,0,0.15);
        }
        .rummy-tile:active, .rummy-tile.dragging {
            box-shadow: 0 20px 30px rgba(0,0,0,0.6); transform: scale(1.1) translateY(-8px); z-index: 999;
        }
        
        /* Realistic Wood Rack */
        .rummy-rack-wood {
            background: linear-gradient(to bottom, #d4a373 0%, #bc8a5f 40%, #8b5a2b 100%);
            border-bottom: 14px solid #4a2e15; border-top: 1px solid #e6ccb2;
            border-left: 3px solid #704728; border-right: 3px solid #704728;
            border-radius: 12px 12px 6px 6px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 5px 15px rgba(0,0,0,0.3); position: relative;
        }
        .rummy-rack-wood::after {
            content: ''; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 15px, rgba(0,0,0,0.04) 15px, rgba(0,0,0,0.04) 30px);
        }

        .timer-ring { transform: rotate(-90deg); transition: stroke-dashoffset 1s linear; }
        
        /* Animated dots for waiting screen */
        .animated-dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
        @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } 100% { content: ''; } }
    </style>

    <!-- React, Babel, and Tone.js for Sound -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <!-- Firebase Init -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, onSnapshot, query, where, updateDoc, addDoc, deleteDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBldyf-FW8DI2DX90tM9XIDCEij5riiYOk",
            authDomain: "rummikube-5c138.firebaseapp.com",
            projectId: "rummikube-5c138"
        };
        const app = initializeApp(firebaseConfig);
        window.fb = { auth: getAuth(app), db: getFirestore(app), googleProvider: new GoogleAuthProvider(), signInWithPopup, onAuthStateChanged, signOut, collection, doc, setDoc, getDoc, getDocs, onSnapshot, query, where, updateDoc, addDoc, deleteDoc, runTransaction };
        
        window.dispatchEvent(new Event('firebase-ready'));
    </script>
</head>
<body class="bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 to-slate-950 h-full w-full">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const ROLES = { SUPER_ADMIN: 'super_admin', CLUB_OWNER: 'club_owner', MANAGER: 'manager', AGENT: 'agent', PLAYER: 'player' };

        const formatMoney = (amount) => {
            if (amount === undefined || amount === null) return '0';
            const num = Number(amount);
            if (isNaN(num)) return String(amount); // Protects against legacy text data
            if (num === 0) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            if (num % 1 !== 0) return num.toFixed(2); // Show pennies/cents
            return num.toLocaleString();
        };

        const Coin = ({ amount, className="" }) => (
            <span className={`inline-flex items-center gap-1 font-bold ${className}`}>
                <i className="fa-solid fa-coins text-gold-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.5)]"></i>
                {formatMoney(amount)}
            </span>
        );

        function App() {
            const [fbReady, setFbReady] = useState(false);
            const [dbUser, setDbUser] = useState(null);
            const [currentView, setCurrentView] = useState('auth'); 
            const [tablesDB, setTablesDB] = useState([]);
            const [activeTable, setActiveTable] = useState(null);
            const [toasts, setToasts] = useState([]);
            
            const viewRef = useRef(currentView);
            useEffect(() => { viewRef.current = currentView; }, [currentView]);

            const showToast = (msg, type = 'info') => {
                const id = Date.now(); 
                setToasts(prev => [...prev, { id, msg, type }]);
                setTimeout(() => { setToasts(prev => prev.filter(t => t.id !== id)); }, 4000);
            };

            const changeView = (view, tableObj = null) => {
                setCurrentView(view);
                setActiveTable(tableObj);
                if (view !== 'auth' && view !== 'pending') {
                    window.history.pushState({ view, tableId: tableObj?.docId }, "", `?v=${view}`);
                }
            };

            useEffect(() => {
                const handlePopState = (event) => {
                    if (event.state && event.state.view) {
                        setCurrentView(event.state.view);
                        if (event.state.view !== 'table') setActiveTable(null);
                    } else if (dbUser && dbUser.status === 'approved') {
                        setCurrentView('lobby');
                    }
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, [dbUser]);

            useEffect(() => {
                if (window.fb) setFbReady(true);
                else window.addEventListener('firebase-ready', () => setFbReady(true));
            }, []);

            useEffect(() => {
                if (!fbReady) return;
                const unsub = window.fb.onAuthStateChanged(window.fb.auth, async (user) => {
                    if (user) await fetchOrInitUser(user); 
                    else { setDbUser(null); setCurrentView('auth'); }
                });
                return () => unsub();
            }, [fbReady]);

            const fetchOrInitUser = async (user) => {
                const ref = window.fb.doc(window.fb.db, "users", user.uid);
                const snap = await window.fb.getDoc(ref);
                if (snap.exists()) {
                    setDbUser({ uid: user.uid, ...snap.data() });
                } else {
                    const q = await window.fb.getDocs(window.fb.collection(window.fb.db, "users"));
                    const role = q.empty ? ROLES.SUPER_ADMIN : ROLES.PLAYER;
                    const newUser = { 
                        username: user.displayName || 'Player', 
                        email: user.email || '', // Saved for Agent/Manager identification
                        role, 
                        status: q.empty ? 'approved' : 'pending', 
                        balance: q.empty ? 10000000 : 0,
                        stats: { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 }
                    };
                    await window.fb.setDoc(ref, newUser); 
                    setDbUser({ uid: user.uid, ...newUser });
                }
            };

            useEffect(() => {
                if (!fbReady || !dbUser) return;
                const unsubT = window.fb.onSnapshot(window.fb.collection(window.fb.db, "tables"), (s) => {
                    setTablesDB(s.docs.map(d => ({ docId: d.id, ...d.data() })));
                });
                
                const unsubU = window.fb.onSnapshot(window.fb.doc(window.fb.db, "users", dbUser.uid), (d) => {
                    if(d.exists()) {
                        const data = d.data(); 
                        setDbUser({ uid: d.id, ...data });
                        if(data.status === 'pending') changeView('pending');
                        else if (viewRef.current === 'auth' || viewRef.current === 'pending') {
                            changeView('lobby');
                        }
                    }
                });
                return () => { unsubT(); unsubU(); };
            }, [fbReady, dbUser?.uid]);

            if (!fbReady) return <div className="h-full w-full flex items-center justify-center text-emerald-500"><i className="fa-solid fa-circle-notch fa-spin text-4xl"></i></div>;

            return (
                <div className="h-full w-full flex flex-col relative overflow-hidden">
                    
                    {/* Header */}
                    {dbUser && dbUser.status === 'approved' && currentView !== 'table' && (
                        <nav className="bg-slate-900/90 backdrop-blur-md px-4 py-3 z-40 shrink-0 border-b border-slate-800 shadow-xl flex justify-between items-center">
                            <div className="flex items-center gap-2 sm:gap-4">
                                <button onClick={() => window.fb.signOut(window.fb.auth)} className="w-10 h-10 rounded-xl bg-slate-800 text-slate-400 border border-slate-700 hover:text-white hover:bg-rose-600 transition-colors flex items-center justify-center">
                                    <i className="fa-solid fa-sign-out-alt"></i>
                                </button>
                                
                                {[ROLES.SUPER_ADMIN, ROLES.CLUB_OWNER, ROLES.MANAGER, ROLES.AGENT].includes(dbUser.role) && (
                                    <button onClick={() => changeView(currentView === 'backoffice' ? 'lobby' : 'backoffice')} className={`w-10 h-10 rounded-xl border flex items-center justify-center transition-colors ${currentView === 'backoffice' ? 'bg-blue-600 text-white border-blue-500 shadow-[0_0_10px_rgba(37,99,235,0.5)]' : 'bg-slate-800 text-blue-400 border-slate-700 hover:text-white'}`} title="ניהול מועדון">
                                        <i className="fa-solid fa-chart-line"></i>
                                    </button>
                                )}

                                <button onClick={() => changeView(currentView === 'profile' ? 'lobby' : 'profile')} className={`w-10 h-10 rounded-xl border flex items-center justify-center transition-colors ${currentView === 'profile' ? 'bg-emerald-600 text-white border-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]' : 'bg-slate-800 text-emerald-400 border-slate-700 hover:text-white'}`} title="אזור אישי">
                                    <i className="fa-solid fa-user"></i>
                                </button>

                                <div className="flex flex-col items-end mr-1 hidden sm:flex">
                                    <span className="text-sm font-bold text-white flex items-center gap-1">
                                        {dbUser.username}
                                        {dbUser.role === ROLES.SUPER_ADMIN && <i className="fa-solid fa-crown text-amber-400 text-[10px]"></i>}
                                    </span>
                                    <Coin amount={dbUser.balance} className="text-sm" />
                                </div>
                            </div>

                            <div className="flex flex-col items-end cursor-pointer" onClick={() => changeView('lobby')}>
                                <h1 className="text-xl sm:text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-300">RUMMIKUBE</h1>
                                <p className="text-[10px] text-slate-400 font-bold tracking-[0.2em] uppercase leading-none mt-[-2px]">Elite Club</p>
                            </div>
                        </nav>
                    )}

                    <main className="flex-1 overflow-hidden relative z-0">
                        {currentView === 'auth' && <AuthView />}
                        {currentView === 'pending' && <PendingView />}
                        {currentView === 'lobby' && <LobbyView user={dbUser} tables={tablesDB} onJoin={(t) => changeView('table', t)} showToast={showToast} />}
                        {currentView === 'profile' && <ProfileView user={dbUser} />}
                        {currentView === 'backoffice' && <BackofficeView user={dbUser} showToast={showToast} />}
                        {currentView === 'table' && <RummyTable tableDocId={activeTable?.docId} user={dbUser} onLeave={() => changeView('lobby')} showToast={showToast} />}
                    </main>
                    
                    <div className="fixed bottom-8 left-1/2 transform -translate-x-1/2 z-[9999] flex flex-col gap-2 pointer-events-none w-[90%] max-w-sm">
                        {toasts.map(t => (
                            <div key={t.id} className={`animate-fade-in px-6 py-3 rounded-2xl shadow-2xl font-bold text-sm text-center border backdrop-blur-md ${t.type === 'error' ? 'bg-rose-900/95 border-rose-500 text-white' : 'bg-slate-800/95 border-emerald-500/50 text-emerald-400'}`}>
                                {t.msg}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function AuthView() {
            return (
                <div className="h-full w-full flex flex-col items-center justify-center p-4">
                    <div className="glass-panel p-10 sm:p-14 rounded-3xl text-center relative z-10 w-full max-w-md animate-fade-in">
                        <h2 className="text-4xl font-black text-white mb-2 tracking-widest drop-shadow-lg">Rummikube</h2>
                        <p className="text-emerald-400 mb-10 font-bold tracking-[0.3em] uppercase text-xs">Elite Private Club</p>
                        <button onClick={()=>window.fb.signInWithPopup(window.fb.auth, window.fb.googleProvider)} className="w-full bg-white hover:bg-slate-100 transition-transform transform hover:scale-105 text-slate-900 font-black py-4 px-6 rounded-xl shadow-xl flex items-center justify-center gap-3">
                            <i className="fa-brands fa-google text-blue-500 text-xl"></i> התחברות לחברים
                        </button>
                    </div>
                </div>
            );
        }

        function PendingView() {
            return <div className="h-full w-full text-slate-300 flex justify-center items-center font-bold text-xl flex-col gap-4">
                <i className="fa-solid fa-clock-rotate-left text-4xl text-amber-500 animate-spin"></i>
                ממתין לאישור מנהל המועדון...
            </div>;
        }

        function ProfileView({ user }) {
            const stats = user.stats || { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 };
            const winRate = stats.gamesPlayed > 0 ? Math.round((stats.gamesWon / stats.gamesPlayed) * 100) : 0;

            return (
                <div className="scrollable-content p-4 sm:p-8">
                    <div className="max-w-3xl mx-auto glass-panel p-6 rounded-3xl animate-fade-in">
                        <div className="text-center mb-8">
                            <div className="w-24 h-24 bg-slate-800 rounded-full mx-auto border-4 border-emerald-500 flex items-center justify-center shadow-[0_0_20px_rgba(16,185,129,0.4)] mb-4">
                                <i className="fa-solid fa-user text-4xl text-slate-400"></i>
                            </div>
                            <h2 className="text-3xl font-black text-white">{user.username}</h2>
                            <p className="text-slate-400 font-bold uppercase tracking-widest text-sm mt-1">{user.role}</p>
                        </div>

                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
                            <div className="bg-slate-900/80 p-4 rounded-2xl border border-slate-700 text-center">
                                <p className="text-slate-400 text-xs font-bold mb-1">יתרה נוכחית</p>
                                <Coin amount={user.balance} className="text-xl text-emerald-400" />
                            </div>
                            <div className="bg-slate-900/80 p-4 rounded-2xl border border-slate-700 text-center">
                                <p className="text-slate-400 text-xs font-bold mb-1">משחקים ששוחקו</p>
                                <p className="text-xl font-black text-white">{stats.gamesPlayed}</p>
                            </div>
                            <div className="bg-slate-900/80 p-4 rounded-2xl border border-slate-700 text-center">
                                <p className="text-slate-400 text-xs font-bold mb-1">אחוז ניצחונות</p>
                                <p className="text-xl font-black text-blue-400">{winRate}%</p>
                            </div>
                            <div className="bg-slate-900/80 p-4 rounded-2xl border border-slate-700 text-center">
                                <p className="text-slate-400 text-xs font-bold mb-1">רווח/הפסד כולל</p>
                                <p className={`text-xl font-black ${stats.totalProfit >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                    {stats.totalProfit > 0 ? '+' : ''}{formatMoney(stats.totalProfit)}
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function LobbyView({ user, tables, onJoin, showToast }) {
            const [showCreate, setShowCreate] = useState(false);
            const [newTableOptions, setNewTableOptions] = useState({ maxPlayers: 4, stakes: 0.10 });
            
            const handleCreate = async () => {
                const calculatedBuyIn = newTableOptions.stakes * 100; // Buy-in is 100x stakes
                await window.fb.addDoc(window.fb.collection(window.fb.db, "tables"), { 
                    type: 'rummikub', maxPlayers: newTableOptions.maxPlayers, 
                    minBuyIn: calculatedBuyIn, stakes: newTableOptions.stakes, 
                    players: {}, board: [], deck: [], phase: 'waiting', createdAt: Date.now()
                });
                setShowCreate(false); showToast("שולחן נפתח בהצלחה!", "success");
            };

            const handleDelete = async (e, t) => {
                e.stopPropagation(); 
                const playersCount = Object.keys(t.players || {}).length;
                if (playersCount > 0 || t.phase === 'playing') {
                    if (!window.confirm(`⚠️ אזהרה: יש שחקנים בשולחן או שהמשחק פעיל!\nהאם אתה בטוח שאתה רוצה למחוק ולזרוק אותם?`)) return;
                } else {
                    if (!window.confirm("למחוק שולחן זה?")) return;
                }
                await window.fb.deleteDoc(window.fb.doc(window.fb.db, "tables", t.docId));
            };

            return (
                <div className="scrollable-content p-4 sm:p-6">
                    <div className="max-w-6xl mx-auto animate-fade-in">
                        <div className="flex justify-between items-center mb-8">
                            <h2 className="text-2xl sm:text-3xl font-black text-white flex items-center gap-3">
                                <span className="w-4 h-4 rounded-full bg-emerald-500 shadow-[0_0_15px_#10b981] animate-pulse"></span>
                                שולחנות קאש
                            </h2>
                            {[ROLES.SUPER_ADMIN, ROLES.CLUB_OWNER, ROLES.MANAGER].includes(user.role) && (
                                <button onClick={()=>setShowCreate(!showCreate)} className="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg transition-transform hover:scale-105 flex items-center text-sm">
                                    <i className="fa-solid fa-plus ml-2"></i> שולחן חדש
                                </button>
                            )}
                        </div>
                        
                        {showCreate && (
                            <div className="glass-panel p-6 rounded-2xl mb-8 animate-pop-in border border-emerald-500/30">
                                <h3 className="text-lg font-bold text-white mb-4">הגדרות שולחן חדש</h3>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                                    <div>
                                        <label className="text-slate-400 text-sm font-bold mb-1 block">שחקנים מקסימום</label>
                                        <select value={newTableOptions.maxPlayers} onChange={(e)=>setNewTableOptions({...newTableOptions, maxPlayers: parseInt(e.target.value)})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-emerald-500 font-bold">
                                            <option value={2}>2 שחקנים</option>
                                            <option value={3}>3 שחקנים</option>
                                            <option value={4}>4 שחקנים</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-slate-400 text-sm font-bold mb-1 block">ערך נקודה ב-₪</label>
                                        <select value={newTableOptions.stakes} onChange={(e)=>setNewTableOptions({...newTableOptions, stakes: parseFloat(e.target.value)})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-emerald-500 font-bold">
                                            <option value={0.10}>0.10 ₪ (10 אגורות)</option>
                                            <option value={0.50}>0.50 ₪ (50 אגורות)</option>
                                            <option value={1}>1.00 ₪</option>
                                            <option value={2}>2.00 ₪</option>
                                            <option value={5}>5.00 ₪</option>
                                            <option value={10}>10.00 ₪</option>
                                        </select>
                                        <p className="text-emerald-400 text-xs mt-2 font-bold">
                                            * דמי כניסה מחושבים אוטומטית (X100): {formatMoney(newTableOptions.stakes * 100)} ₪
                                        </p>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 pt-4 border-t border-slate-700">
                                    <button onClick={()=>setShowCreate(false)} className="px-6 py-2 text-slate-400 hover:text-white font-bold transition-colors">ביטול</button>
                                    <button onClick={handleCreate} className="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-2 rounded-xl font-bold shadow-lg">אשר ופתח</button>
                                </div>
                            </div>
                        )}

        function RummyTable({ tableDocId, user, onLeave, showToast }) {
            const [tableState, setTableState] = useState(null);
            const [loading, setLoading] = useState(true);
            
            const [rack, setRack] = useState([]);
            const [board, setBoard] = useState([]);
            const [startTurnBoard, setStartTurnBoard] = useState([]);
            const [startTurnRack, setStartTurnRack] = useState([]);
            
            const [dragData, setDragData] = useState(null); 
            const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
            const [hoverTarget, setHoverTarget] = useState(null);
            const [timeLeft, setTimeLeft] = useState(60);
            const [showVictory, setShowVictory] = useState(false);
            const longPressTimer = useRef(null);
            const synthRef = useRef(null);

            // Fetch table from Firebase
            useEffect(() => {
                if(!tableDocId) return;
                const unsub = window.fb.onSnapshot(window.fb.doc(window.fb.db, "tables", tableDocId), doc => { 
                    if(doc.exists()) {
                        setTableState({id: doc.id, ...doc.data()});
                        setLoading(false);
                    } else { 
                        showToast("השולחן נסגר", "error"); 
                        onLeave(); 
                    }
                });
                return () => unsub();
            }, [tableDocId]);

            // Sync Local state with Firebase state
            useEffect(() => {
                if(!tableState) return;
                if (!dragData) {
                    setBoard(tableState.board || []);
                    setRack(tableState.players?.[user.uid]?.cards || []);
                    if (tableState.currentTurn === user.uid && tableState.board) {
                        if (startTurnBoard.length === 0 && startTurnRack.length === 0) {
                             setStartTurnBoard(tableState.board || []);
                             setStartTurnRack(tableState.players?.[user.uid]?.cards || []);
                        }
                    } else if (tableState.currentTurn !== user.uid) {
                        setStartTurnBoard([]); setStartTurnRack([]); 
                    }
                }
                setShowVictory(tableState.phase === 'showdown');
            }, [tableState, dragData, user.uid]);

            // Timer & Sound Loop
            useEffect(() => {
                let interval;
                if (tableState?.phase === 'playing' && tableState?.turnStartedAt) {
                    interval = setInterval(() => {
                        const elapsed = Math.floor((Date.now() - tableState.turnStartedAt) / 1000);
                        const remaining = Math.max(0, 60 - elapsed);
                        setTimeLeft(remaining);
                        
                        // Play ticking sound in the last 5 seconds if it's my turn
                        if (remaining <= 5 && remaining > 0 && tableState.currentTurn === user.uid) {
                            try {
                                if (window.Tone && window.Tone.context.state !== 'running') window.Tone.context.resume();
                                if (!synthRef.current && window.Tone) {
                                    synthRef.current = new window.Tone.Synth({ oscillator: { type: 'square' } }).toDestination();
                                    synthRef.current.volume.value = -10;
                                }
                                synthRef.current?.triggerAttackRelease("E6", "0.05");
                            } catch(e) {}
                        }

                        if (remaining === 0 && tableState.currentTurn === user.uid) {
                            clearInterval(interval);
                            handleTimeoutPenalty();
                        }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [tableState?.phase, tableState?.turnStartedAt, tableState?.currentTurn, user.uid]);

            const validateGroup = (group) => {
                if (!group || group.length < 3) return false;
                const jCount = group.filter(t => t.val === '☻').length;
                const regulars = group.filter(t => t.val !== '☻');
                if(regulars.length === 0) return true;
                const isSet = regulars.every(t => t.val === regulars[0].val) && new Set(regulars.map(t => t.color)).size === regulars.length;
                if (isSet && group.length <= 4) return true;
                const isRunColor = regulars.every(t => t.color === regulars[0].color);
                if (isRunColor) {
                    const sorted = [...regulars].sort((a,b) => a.val - b.val);
                    let neededJokers = 0;
                    for(let i=0; i<sorted.length-1; i++) {
                        if (sorted[i].val === sorted[i+1].val) return false; 
                        neededJokers += (sorted[i+1].val - sorted[i].val - 1); 
                    }
                    if (neededJokers <= jCount && group.length <= 13) return true;
                }
                return false;
            };

            const isBoardValid = useMemo(() => { 
                if (board.length === 0) return true; 
                return board.every(g => validateGroup(g)); 
            }, [board]);

            // Drag and Drop implementation
            useEffect(() => {
                const handlePointerMove = (e) => { 
                    if (dragData) { setDragPos({ x: e.clientX, y: e.clientY }); if(longPressTimer.current) clearTimeout(longPressTimer.current); } 
                };
                const handlePointerUp = (e) => {
                    if (longPressTimer.current) clearTimeout(longPressTimer.current);
                    if (!dragData) return;
                    let newRack = [...rack]; let newBoard = board.map(g => [...g]);
                    
                    if (dragData.type === 'single') {
                        if (dragData.source === 'rack') newRack.splice(dragData.tileIndex, 1);
                        else if (dragData.source === 'board') {
                            const grp = newBoard[dragData.groupIndex];
                            const tIdx = dragData.tileIndex;
                            if (tIdx > 0 && tIdx < grp.length - 1 && grp.length >= 4) {
                                const left = grp.slice(0, tIdx); const right = grp.slice(tIdx + 1);
                                newBoard.splice(dragData.groupIndex, 1, left, right);
                            } else {
                                grp.splice(tIdx, 1);
                                if (grp.length === 0) newBoard.splice(dragData.groupIndex, 1);
                            }
                        }

                        if (hoverTarget && hoverTarget.startsWith('board-tile-')) {
                            const [,,targetGroupIdx, targetTileIdx] = hoverTarget.split('-');
                            const actualGIdx = (dragData.source === 'board' && dragData.groupIndex < targetGroupIdx && newBoard.length < board.length) ? targetGroupIdx - 1 : targetGroupIdx;
                            if (newBoard[actualGIdx] && newBoard[actualGIdx][targetTileIdx]?.val === '☻') {
                                let tempGroup = [...newBoard[actualGIdx]]; tempGroup[targetTileIdx] = dragData.tile;
                                if (validateGroup(tempGroup)) {
                                    const retrievedJoker = newBoard[actualGIdx][targetTileIdx];
                                    newBoard[actualGIdx][targetTileIdx] = dragData.tile; newRack.push(retrievedJoker); 
                                } else newBoard[actualGIdx].splice(targetTileIdx, 0, dragData.tile);
                            } else if (newBoard[actualGIdx]) newBoard[actualGIdx].splice(targetTileIdx, 0, dragData.tile);
                        } 
                        else if (hoverTarget && hoverTarget.startsWith('board-group-')) {
                            const targetIdx = parseInt(hoverTarget.split('-')[2]);
                            const actualIdx = (dragData.source === 'board' && dragData.groupIndex < targetIdx && newBoard.length < board.length) ? targetIdx - 1 : targetIdx;
                            if (newBoard[actualIdx]) newBoard[actualIdx].push(dragData.tile); else newBoard.push([dragData.tile]);
                        } 
                        else if (hoverTarget === 'board-new') newBoard.push([dragData.tile]);
                        else if (hoverTarget === 'rack') newRack.push(dragData.tile);
                        else if (dragData.source === 'rack') newRack.splice(dragData.tileIndex, 0, dragData.tile); 
                    } 
                    else if (dragData.type === 'group') {
                        const groupTiles = dragData.tiles;
                        if (dragData.source === 'board') newBoard.splice(dragData.groupIndex, 1);
                        if (hoverTarget && hoverTarget.startsWith('board-group-')) {
                            const targetIdx = parseInt(hoverTarget.split('-')[2]);
                            const actualIdx = (dragData.source === 'board' && dragData.groupIndex < targetIdx && newBoard.length < board.length) ? targetIdx - 1 : targetIdx;
                            if (newBoard[actualIdx]) newBoard[actualIdx].push(...groupTiles); else newBoard.push([...groupTiles]);
                        } else if (hoverTarget === 'board-new') newBoard.push([...groupTiles]);
                        else if (hoverTarget === 'rack') newRack.push(...groupTiles);
                        else if (dragData.source === 'board') newBoard.splice(dragData.groupIndex, 0, groupTiles); 
                    }
                    
                    setRack(newRack); setBoard(newBoard); setDragData(null); setHoverTarget(null);
                };
                
                if (dragData) { window.addEventListener('pointermove', handlePointerMove, { passive: false }); window.addEventListener('pointerup', handlePointerUp); }
                return () => { window.removeEventListener('pointermove', handlePointerMove); window.removeEventListener('pointerup', handlePointerUp); };
            }, [dragData, hoverTarget, rack, board]);

            const startDrag = (e, tile, source, groupIndex, tileIndex) => {
                if (tableState.currentTurn !== user.uid) return showToast("המתן לתורך", "error");
                if (e.pointerType === 'touch') e.target.releasePointerCapture(e.pointerId);
                
                try { if (window.Tone && window.Tone.context.state !== 'running') window.Tone.context.resume(); } catch(err){}

                setDragData({ type: 'single', tile, source, groupIndex, tileIndex }); setDragPos({ x: e.clientX, y: e.clientY });
                if (source === 'board') {
                    longPressTimer.current = setTimeout(() => {
                        if (navigator.vibrate) navigator.vibrate(20);
                        setDragData({ type: 'group', tiles: board[groupIndex], source, groupIndex });
                    }, 400); 
                }
            };

            const generateDeck = () => {
                const colors = ['#ef4444', '#3b82f6', '#f59e0b', '#0f172a'];
                let d = [];
                for (let set=0; set<2; set++) { for(let c=0; c<4; c++) { for(let v=1; v<=13; v++) d.push({id:`t_${set}_${c}_${v}`, val:v, color:colors[c]}); } }
                d.push({id:'j1', val:'☻', color:'#ef4444'}); d.push({id:'j2', val:'☻', color:'#0f172a'});
                return d.sort(()=>Math.random()-0.5);
            };

            const handleSit = async () => {
                const activeTablesSnap = await window.fb.getDocs(window.fb.collection(window.fb.db, "tables"));
                let alreadySeated = false;
                activeTablesSnap.forEach(doc => {
                    const tData = doc.data();
                    if (tData.players && tData.players[user.uid]) alreadySeated = true;
                });
                if (alreadySeated) return showToast("אתה כבר יושב בשולחן אחר. קום ממנו קודם.", "error");

                try { 
                    const buyInAmount = Number(tableState.minBuyIn);
                    await window.fb.runTransaction(window.fb.db, async (t) => {
                        const uRef = window.fb.doc(window.fb.db, "users", user.uid);
                        const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const uSnap = await t.get(uRef);
                        if (uSnap.data().balance < buyInAmount) throw "אין לך מספיק יתרה לכניסה.";
                        t.update(uRef, { balance: uSnap.data().balance - buyInAmount });
                        t.update(tblRef, { [`players.${user.uid}`]: { username: uSnap.data().username, cards: [], hasDropped: false, stack: buyInAmount } });
                    });
                    
                    const currentPlayersCount = Object.keys(tableState.players || {}).length + 1; 
                    if (currentPlayersCount === Number(tableState.maxPlayers)) {
                        setTimeout(() => {
                            const d = generateDeck(); const np = { ...tableState.players, [user.uid]: {username: user.username, cards: [], hasDropped: false, stack: buyInAmount} }; 
                            const uids = Object.keys(np);
                            uids.forEach(uid => { np[uid].cards = d.splice(0, 14); });
                            window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { phase: 'playing', deck: d, board: [], players: np, currentTurn: uids[0], turnStartedAt: Date.now() });
                        }, 1500); 
                    }
                } catch(e) { showToast(typeof e === 'string' ? e : "שגיאה", "error"); }
            };

            const handleTimeoutPenalty = async () => {
                const newDeck = [...(tableState.deck || [])];
                const tile = newDeck.length > 0 ? newDeck.pop() : null;
                const newRack = tile ? [...startTurnRack, tile] : [...startTurnRack];
                const uids = Object.keys(tableState.players); 
                const nextTurn = uids[(uids.indexOf(user.uid) + 1) % uids.length];
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { deck: newDeck, board: startTurnBoard, [`players.${user.uid}.cards`]: newRack, currentTurn: nextTurn, turnStartedAt: Date.now() });
            };

            const handleDraw = async () => {
                if (tableState.currentTurn !== user.uid) return;
                const newDeck = [...(tableState.deck || [])];
                const tile = newDeck.length > 0 ? newDeck.pop() : null;
                const newRack = tile ? [...startTurnRack, tile] : [...startTurnRack];
                const uids = Object.keys(tableState.players); 
                const nextTurn = uids[(uids.indexOf(user.uid) + 1) % uids.length];
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { deck: newDeck, board: startTurnBoard, [`players.${user.uid}.cards`]: newRack, currentTurn: nextTurn, turnStartedAt: Date.now() });
            };
            
            const handleEndTurn = async () => {
                if (tableState.currentTurn !== user.uid || !isBoardValid) return;
                
                const isFirstDrop = !tableState.players[user.uid].hasDropped;
                if (isFirstDrop) {
                    const currentRackIds = rack.map(t=>t.id);
                    const droppedTiles = startTurnRack.filter(t => !currentRackIds.includes(t.id));
                    if (droppedTiles.length > 0) {
                        const sum = droppedTiles.reduce((s, t) => s + (t.val === '☻' ? 30 : t.val), 0);
                        if (sum < 30) return showToast(`יש צורך ב-30 נקודות לפחות להורדה ראשונה.`, "error");
                    } else return showToast("לא ירדת, חובה למשוך קופה.", "error");
                }

                if (rack.length === 0) { // WIN
                    const losers = Object.entries(tableState.players).filter(([uid]) => uid !== user.uid);
                    let totalPot = 0; const updates = {};
                    const stakesNum = Number(tableState.stakes) || 0.1;
                    
                    losers.forEach(([uid, pData]) => {
                         let dw = pData.cards.reduce((s, t) => s + (t.val === '☻' ? 30 : t.val), 0);
                         let penalty = Math.min(dw * stakesNum, pData.stack); 
                         updates[`players.${uid}.stack`] = pData.stack - penalty;
                         totalPot += penalty;
                         updates[`stats.${uid}`] = { incrementGames: 1, profit: -penalty };
                    });
                    
                    const rake = totalPot * 0.06;
                    const winnerProfit = totalPot - rake;
                    
                    updates[`players.${user.uid}.stack`] = tableState.players[user.uid].stack + winnerProfit;
                    updates[`players.${user.uid}.cards`] = []; 
                    updates.phase = 'showdown'; 
                    updates.board = board; 
                    updates.winner = user.uid; 
                    updates.lastResults = { winnerProfit, rake, totalPot };
                    updates[`stats.${user.uid}`] = { incrementGames: 1, incrementWins: 1, profit: winnerProfit };

                    await window.fb.runTransaction(window.fb.db, async (t) => {
                        const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        t.update(tblRef, updates);
                        for (const [uid, pData] of Object.entries(tableState.players)) {
                            const uRef = window.fb.doc(window.fb.db, "users", uid);
                            const uSnap = await t.get(uRef);
                            if (uSnap.exists()) {
                                const currentStats = uSnap.data().stats || { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 };
                                const statUpdates = updates[`stats.${uid}`] || { incrementGames: 1, profit: 0 };
                                t.update(uRef, {
                                    'stats.gamesPlayed': currentStats.gamesPlayed + (statUpdates.incrementGames || 0),
                                    'stats.gamesWon': currentStats.gamesWon + (statUpdates.incrementWins || 0),
                                    'stats.totalProfit': currentStats.totalProfit + statUpdates.profit
                                });
                            }
                        }
                    });

                    setTimeout(() => { showToast("המשחק יתחיל מחדש בעתיד"); }, 5000); 
                    return;
                }

                const uids = Object.keys(tableState.players); 
                const nextTurn = uids[(uids.indexOf(user.uid) + 1) % uids.length];
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { board: board, [`players.${user.uid}.cards`]: rack, [`players.${user.uid}.hasDropped`]: true, currentTurn: nextTurn, turnStartedAt: Date.now() });
            };

            const handleLeave = async () => {
                if (!tableState?.players?.[user.uid]) { onLeave(); return; }
                if (tableState.phase === 'playing') { showToast("אי אפשר לקום באמצע יד חיה", "error"); return; }
                try {
                    await window.fb.runTransaction(window.fb.db, async (t) => {
                        const uRef = window.fb.doc(window.fb.db, "users", user.uid);
                        const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const myStack = (await t.get(tblRef)).data().players[user.uid]?.stack || 0;
                        let newP = { ...(await t.get(tblRef)).data().players }; delete newP[user.uid];
                        t.update(uRef, { balance: (await t.get(uRef)).data().balance + myStack });
                        t.update(tblRef, { players: newP });
                    });
                    onLeave();
                } catch(e) {}
            };

            if (loading) return <div className="h-full flex items-center justify-center text-emerald-500"><i className="fa-solid fa-spinner fa-spin text-3xl"></i></div>;

            const isSeated = tableState?.players?.[user.uid] !== undefined;
            const isPlaying = tableState.phase === 'playing';
            const isMyTurn = tableState.currentTurn === user.uid;

            return (
                <div className="h-full w-full flex flex-col relative select-none" style={{ backgroundColor: '#0a101d', touchAction: 'none' }}>
                    
                    {/* Minimalist Header */}
                    <div className="flex justify-between items-center p-3 sm:p-4 bg-slate-900/40 border-b border-white/5 shrink-0 z-20">
                        <button onClick={handleLeave} className="text-slate-300 hover:text-white px-3 py-1.5 rounded bg-slate-800/50 border border-slate-700/50 transition-colors text-sm font-medium"><i className="fa-solid fa-angle-right ml-1.5 text-xs"></i> {isSeated ? 'קום מהשולחן' : 'חזור ללובי'}</button>
                        <div className="flex flex-col items-center">
                            <span className="text-sm font-bold text-slate-200 opacity-80 tracking-widest uppercase">רמיקוב</span>
                            <span className="text-[10px] text-emerald-400 font-semibold">ערך נקודה: {formatMoney(tableState.stakes)}</span>
                        </div>
                        <div className="w-[80px] text-left">
                            {isSeated && <div className="text-emerald-400 text-xs font-bold bg-slate-950/50 px-2 py-1 rounded inline-block border border-slate-800"><Coin amount={tableState.players[user.uid]?.stack}/></div>}
                        </div>
                    </div>

                    {/* Felt Area (Board & Empty States) */}
                    <div className="flex-1 relative flex flex-col" onPointerEnter={() => setHoverTarget('board-new')}>
                        
                        {/* Minimalist Center Anchor */}
                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center pointer-events-none z-0">
                            
                            <div className="flex flex-col items-center justify-center mb-8 opacity-30">
                                <div className="flex -space-x-3 mb-2">
                                    <div className="w-8 h-12 rounded border-2 border-white/20 bg-white/5 transform -rotate-12"></div>
                                    <div className="w-8 h-12 rounded border-2 border-white/30 bg-white/10 shadow-lg z-10"></div>
                                    <div className="w-8 h-12 rounded border-2 border-white/20 bg-white/5 transform rotate-12"></div>
                                </div>
                                <span className="text-white font-bold text-[10px] tracking-[0.3em] uppercase">קופה</span>
                            </div>
                            
                            {tableState.phase === 'waiting' && (
                                <div className="bg-slate-900/80 backdrop-blur border border-emerald-500/30 px-6 py-4 rounded-2xl shadow-[0_0_30px_rgba(16,185,129,0.1)] text-center animate-fade-in">
                                    <h2 className="text-lg sm:text-xl font-bold text-emerald-400 flex items-center justify-center">
                                        ממתינים לשחקנים<span className="animated-dots w-4 sm:w-6 text-left"></span>
                                    </h2>
                                    <p className="text-slate-400 text-xs sm:text-sm mt-2 font-medium">
                                        {Object.keys(tableState.players||{}).length} מתוך {tableState.maxPlayers} התיישבו
                                    </p>
                                </div>
                            )}
                        </div>

                        {/* Opponents & Seats Avatars */}
                        <div className="absolute top-4 left-1/2 transform -translate-x-1/2 flex items-start gap-4 sm:gap-12 z-10">
                            {[...Array(Number(tableState.maxPlayers) || 4)].map((_, i) => {
                                const seatedPlayers = Object.entries(tableState.players || {});
                                const pData = seatedPlayers[i]; 
                                const isMe = pData && pData[0] === user.uid;
                                const isTurn = pData && tableState.currentTurn === pData[0];
                                
                                if (!pData) {
                                    return (
                                        <div key={i} className="flex flex-col items-center opacity-40">
                                            <div className="w-10 h-10 sm:w-12 sm:h-12 bg-black/30 rounded-full border-2 border-slate-700/50 border-dashed flex items-center justify-center mb-1">
                                                <i className="fa-solid fa-chair text-slate-600 text-sm"></i>
                                            </div>
                                            <span className="text-[9px] sm:text-[10px] font-bold text-slate-500">כיסא פנוי</span>
                                        </div>
                                    );
                                }

                                return (
                                    <div key={i} className={`flex flex-col items-center transition-all ${isTurn ? 'scale-110' : ''}`}>
                                        <div className={`w-10 h-10 sm:w-12 sm:h-12 rounded-full border-2 mb-1 flex items-center justify-center relative shadow-lg ${isMe ? 'bg-emerald-900 border-emerald-400 shadow-[0_0_15px_#10b981]' : isTurn ? 'bg-slate-800 border-emerald-500 ring-2 ring-emerald-500 ring-offset-2 ring-offset-slate-950' : 'bg-slate-800 border-slate-500'}`}>
                                            <i className={`fa-solid fa-user text-sm sm:text-lg ${isTurn ? 'text-white' : 'text-slate-300'}`}></i>
                                            {isMe && <div className="absolute -bottom-2 bg-emerald-500 text-slate-950 text-[9px] font-black px-1.5 rounded-sm shadow-md">אתה</div>}
                                        </div>
                                        <span className={`text-[10px] sm:text-xs font-bold ${isMe ? 'text-emerald-400' : 'text-slate-300'} mt-1`}>
                                            {pData[1].username}
                                        </span>
                                        {tableState.phase === 'playing' && (
                                            <span className="text-[9px] sm:text-[10px] text-emerald-400 font-bold bg-slate-900 px-2 rounded-full mt-0.5 border border-slate-700">
                                                {pData[1].cards?.length || 0} אבנים
                                            </span>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                        
                        {/* Sit Down Overlay */}
                        {!isSeated && tableState.phase === 'waiting' && (
                            <div className="absolute inset-0 z-20 flex items-center justify-center">
                                <button onClick={handleSit} className="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-3 rounded-xl font-bold shadow-xl transition-transform hover:scale-105">
                                    התיישב בשולחן ({Object.keys(tableState.players||{}).length}/{tableState.maxPlayers})
                                </button>
                            </div>
                        )}

                        {/* Victory Modal */}
                        {showVictory && (
                             <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm px-4 animate-fade-in">
                                 <div className="bg-slate-900 border border-emerald-500/50 p-6 rounded-2xl shadow-2xl text-center w-full max-w-sm">
                                     <i className="fa-solid fa-award text-4xl text-amber-400 mb-3 drop-shadow-md"></i>
                                     <h2 className="text-xl font-bold text-white mb-4">{tableState.players[tableState.winner]?.username} ניצח!</h2>
                                     <div className="bg-slate-950 rounded-xl p-4 text-right mb-4">
                                         <p className="text-slate-300 text-sm mb-1 flex justify-between"><span>רווח נקי:</span> <span className="font-bold text-emerald-400"><Coin amount={tableState.lastResults?.winnerProfit}/></span></p>
                                         <p className="text-slate-500 text-xs flex justify-between"><span>עמלת מועדון:</span> <span><Coin amount={tableState.lastResults?.rake}/></span></p>
                                     </div>
                                 </div>
                             </div>
                        )}
                        
                        {/* The Board Groups */}
                        {isPlaying && (
                            <div className="mt-20 flex flex-wrap gap-4 items-start p-2 pb-24 overflow-y-auto h-full scrollbar-hide">
                                {board.map((group, gIdx) => (
                                    <div key={gIdx} onPointerEnter={(e) => { e.stopPropagation(); setHoverTarget(`board-group-${gIdx}`); }} className={`flex bg-slate-900/30 p-1.5 rounded-lg border transition-colors ${hoverTarget === `board-group-${gIdx}` ? 'border-emerald-500/50 bg-emerald-500/10' : !validateGroup(group) ? 'board-invalid-group' : 'border-slate-800'}`}>
                                        {group.map((t, tIdx) => (
                                            <div key={t.id} 
                                                 onPointerEnter={(e)=>{e.stopPropagation(); setHoverTarget(`board-tile-${gIdx}-${tIdx}`);}}
                                                 onPointerDown={(e) => startDrag(e, t, 'board', gIdx, tIdx)} 
                                                 className={`rummy-tile w-9 h-12 sm:w-11 sm:h-16 flex items-center justify-center text-xl sm:text-2xl mx-[1px] ${dragData?.tile?.id === t.id ? 'opacity-30' : ''}`} 
                                                 style={{ color: t.color }}>{t.val}</div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Action Bar & Rack */}
                    <div className="relative z-10 shrink-0" onPointerEnter={() => setHoverTarget('rack')}>
                        
                        {/* Controls (Top of rack) */}
                        {isSeated && isPlaying && (
                            <div className="absolute left-2 right-2 top-[-45px] flex justify-between items-end z-30 pointer-events-none">
                                <div className="flex gap-2 pointer-events-auto">
                                    {isMyTurn && <button onClick={handleEndTurn} disabled={!isBoardValid} className={`px-4 py-2.5 rounded-lg font-bold shadow-md text-white text-sm transition-colors ${!isBoardValid ? 'bg-slate-700 opacity-50' : 'bg-emerald-600 hover:bg-emerald-500'}`}>סיום תור</button>}
                                    {isMyTurn && <button onClick={handleDraw} className="bg-slate-800 text-slate-200 border border-slate-700 px-4 py-2.5 rounded-lg text-sm font-medium shadow-md hover:bg-slate-700 transition-colors">קופה</button>}
                                    {isMyTurn && <button onClick={()=>{setBoard(startTurnBoard); setRack(startTurnRack);}} className="bg-rose-900/80 text-rose-300 px-3 py-2.5 rounded-lg text-sm font-medium shadow-md border border-rose-800/50 hover:bg-rose-800 transition-colors" title="בטל מהלכים"><i className="fa-solid fa-undo"></i></button>}
                                </div>
                                
                                <div className="flex gap-2 pointer-events-auto items-center">
                                   {isMyTurn && (
                                       <div className={`bg-slate-900 rounded-full w-10 h-10 flex items-center justify-center border relative shadow-lg ${timeLeft <= 5 ? 'border-rose-500 shadow-[0_0_15px_#f43f5e] animate-pulse' : 'border-emerald-500/50'}`}>
                                           <svg className="absolute inset-0 w-full h-full timer-ring"><circle cx="50%" cy="50%" r="45%" fill="none" stroke="#1e293b" strokeWidth="3"></circle><circle cx="50%" cy="50%" r="45%" fill="none" stroke={timeLeft <= 5 ? '#f43f5e' : '#10b981'} strokeWidth="3" strokeDasharray="100" strokeDashoffset={100 - (100 * (timeLeft/60))} className="timer-ring-circle"></circle></svg>
                                           <span className={`font-bold text-xs z-10 ${timeLeft <= 5 ? 'text-rose-400' : 'text-white'}`}>{timeLeft}</span>
                                       </div>
                                   )}
                                   <div className="flex gap-1 bg-slate-900/80 p-1 rounded-lg border border-slate-800 shadow-md">
                                       <button onClick={()=>setRack([...rack].sort((a,b)=>(a.val==='☻'?1:(b.val==='☻'?-1:a.val-b.val))))} className="bg-slate-800 text-slate-400 w-8 h-8 rounded font-medium text-[10px] hover:text-white transition-colors">1-9</button>
                                       <button onClick={()=>setRack([...rack].sort((a,b)=>(a.color>b.color?1:(a.color<b.color?-1:a.val-b.val))))} className="bg-slate-800 text-slate-400 w-8 h-8 rounded font-medium text-[10px] hover:text-white transition-colors flex"><span className="text-blue-500">■</span><span className="text-red-500">■</span></button>
                                   </div>
                                </div>
                            </div>
                        )}

                        {/* Wait overlay */}
                        {!isMyTurn && isPlaying && isSeated && <div className="absolute inset-0 bg-slate-950/40 z-20 flex items-center justify-center backdrop-blur-[1px]"><span className="text-white/80 font-medium text-sm">המתן לתורך...</span></div>}

                        {/* Physical Rack */}
                        <div className="bg-slate-950 px-2 sm:px-4 pt-8 pb-4">
                            <div className="flex flex-wrap justify-center items-end gap-0.5 min-h-[90px] px-2 py-4 w-full max-w-4xl mx-auto rummy-rack-wood">
                                {rack.map((tile, index) => (
                                    <div key={tile.id} onPointerDown={(e) => startDrag(e, tile, 'rack', null, index)} className={`rummy-tile w-10 h-14 sm:w-14 sm:h-20 flex items-center justify-center text-2xl sm:text-3xl mx-[1px] z-10 cursor-grab active:cursor-grabbing ${dragData?.tile?.id === tile.id ? 'opacity-20' : ''}`} style={{ color: tile.color }}>{tile.val}</div>
                                ))}
                            </div>
                        </div>
                    </div>
                    
                    {/* Drag Ghost */}
                    {dragData && dragData.type === 'single' && (
                        <div className="fixed pointer-events-none z-[9999] rummy-tile w-12 h-16 sm:w-16 sm:h-24 flex items-center justify-center text-3xl font-bold scale-110 shadow-[0_20px_40px_rgba(0,0,0,0.6)]" style={{ left: dragPos.x, top: dragPos.y, transform: 'translate(-50%, -50%) rotate(3deg)', color: dragData.tile.color }}>{dragData.tile.val}</div>
                    )}
                    {dragData && dragData.type === 'group' && (
                        <div className="fixed pointer-events-none z-[9999] flex bg-slate-900/60 p-1.5 rounded-xl border border-emerald-500/50 shadow-2xl scale-110 backdrop-blur-sm" style={{ left: dragPos.x, top: dragPos.y, transform: 'translate(-50%, -50%)' }}>
                            {dragData.tiles.map(t => (<div key={t.id} className="rummy-tile w-9 h-12 flex items-center justify-center text-xl mx-[1px]" style={{ color: t.color }}>{t.val}</div>))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
