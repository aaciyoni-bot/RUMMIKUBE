                                    <p className={`text-xl sm:text-2xl font-black ${t.color}`} dir="ltr">{t.value}</p>
                                </div>
                            ))}
                        </div>

                        {/* הגדרות מועדון - רייק גלובלי (Owner בלבד) */}
                        {isOwner && (
                            <div className="glass-panel p-6 rounded-3xl mb-6 border border-amber-500/20">
                                <h3 className="text-lg font-black text-white mb-4 flex items-center gap-2">
                                    <span className="w-8 h-8 rounded-lg bg-amber-500/15 border border-amber-500/30 flex items-center justify-center"><i className="fa-solid fa-sliders text-amber-400 text-sm"></i></span>
                                    הגדרות מועדון
                                </h3>
                                <div className="flex items-end gap-4 flex-wrap">
                                    <div>
                                        <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">רייק גלובלי (%) - לכל המשחקים</label>
                                        <input type="number" min="0" max="20" step="0.5" value={rakeDraft} onChange={e=>setRakeDraft(e.target.value)} className="bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-white font-black w-32 outline-none focus:border-amber-500/60" dir="ltr" />
                                    </div>
                                    <button onClick={saveClubSettings} className="bg-gradient-to-b from-amber-500 to-amber-700 hover:from-amber-400 text-white px-6 py-3 rounded-xl font-bold shadow-lg">שמור</button>
                                    <p className="text-xs text-slate-500 font-bold basis-full">הרייק חל על רמיקוב, פוקר וכל המשחקים העתידיים. שולחנות פוקר קיימים שומרים על הרייק שנקבע בפתיחתם.</p>
                                </div>
                            </div>
                        )}

                        {/* בקשות הצטרפות */}
                        <div className="glass-panel p-6 rounded-3xl mb-6">
                            <h3 className="text-lg font-black text-white mb-4 flex items-center gap-2">
                                <span className="w-8 h-8 rounded-lg bg-amber-500/15 border border-amber-500/30 flex items-center justify-center"><i className="fa-solid fa-user-check text-amber-400 text-sm"></i></span>
                                בקשות הצטרפות <span className="text-amber-400">({pendingUsers.length})</span>
                            </h3>
                            {pendingUsers.length === 0 && <p className="text-slate-500 text-sm font-bold">אין בקשות בהמתנה.</p>}
                            <div className="flex flex-col gap-2">
                                {pendingUsers.map(u => (
                                    <div key={u.id} className="flex items-center justify-between bg-slate-900/70 rounded-2xl p-3 border border-white/5">
                                        <div className="flex items-center gap-3 min-w-0">
                                            <img src={avatarUrl(u.id)} className="w-10 h-10 rounded-xl bg-slate-800 shrink-0" />
                                            <div className="min-w-0">
                                                <div className="font-bold text-white truncate">{u.username}</div>
                                                <div className="text-xs text-slate-400 truncate" dir="ltr">{u.email}</div>
                                            </div>
                                        </div>
                                        <div className="flex gap-2 shrink-0">
                                            <button onClick={()=>handleApprove(u.id)} className="bg-gradient-to-b from-emerald-500 to-emerald-700 hover:from-emerald-400 text-white px-4 py-2 rounded-xl font-bold text-sm shadow-lg"><i className="fa-solid fa-check ml-1"></i>אשר</button>
                                            <button onClick={()=>handleReject(u)} className="bg-slate-800 hover:bg-rose-900 text-slate-300 w-10 rounded-xl font-bold text-sm border border-white/10"><i className="fa-solid fa-xmark"></i></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* שחקנים: העברות צ'יפים + תפקידים */}
                        <div className="glass-panel p-6 rounded-3xl mb-6">
                            <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
                                <h3 className="text-lg font-black text-white flex items-center gap-2">
                                    <span className="w-8 h-8 rounded-lg bg-emerald-500/15 border border-emerald-500/30 flex items-center justify-center"><i className="fa-solid fa-money-bill-transfer text-emerald-400 text-sm"></i></span>
                                    שחקנים · צ'יפים · תפקידים
                                </h3>
                                <div className="relative">
                                    <i className="fa-solid fa-magnifying-glass absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                                    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="חיפוש שחקן..." className="bg-slate-900/80 border border-white/10 rounded-full pr-9 pl-4 py-2 text-sm text-white w-52 outline-none focus:border-emerald-500/50" />
                                </div>
                            </div>
                            <div className="flex flex-col gap-2 max-h-96 overflow-y-auto pl-1">
                                {players.map(u => (
                                    <div key={u.id} className="flex items-center justify-between bg-slate-900/70 rounded-2xl p-3 border border-white/5 hover:border-emerald-500/30 transition-colors">
                                        <div className="flex items-center gap-3 min-w-0">
                                            <img src={avatarUrl(u.id)} className={`w-10 h-10 rounded-xl bg-slate-800 shrink-0 ${u.isBot ? 'ring-1 ring-purple-500' : ''}`} />
                                            <div className="min-w-0">
                                                <div className="font-bold text-white truncate text-sm flex items-center gap-1.5">
                                                    {u.username}
                                                    {u.isBot && <span className="text-purple-400 text-[10px]">(Bot)</span>}
                                                    {isGodUser(u) && <i className="fa-solid fa-eye text-purple-400 text-[10px]" title="GOD MODE"></i>}
                                                    {u.role && u.role !== ROLES.PLAYER && <span className="text-[9px] bg-blue-500/15 border border-blue-500/40 text-blue-300 px-2 py-0.5 rounded-full font-bold">{ROLE_LABELS[u.role]}</span>}
                                                </div>
                                                <div className="text-[11px] text-slate-400 truncate" dir="ltr">{u.email}</div>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-2 sm:gap-3 shrink-0">
                                            <Coin amount={u.balance} className="text-sm hidden sm:inline-flex" />
                                            <button onClick={()=>adjustBalance(u, true)} className="w-9 h-9 rounded-xl bg-gradient-to-b from-emerald-500 to-emerald-800 hover:from-emerald-400 text-white font-black shadow-md" title="הפקד צ'יפים">+</button>
                                            <button onClick={()=>adjustBalance(u, false)} className="w-9 h-9 rounded-xl bg-slate-800 hover:bg-rose-900 text-white font-black border border-white/10" title="משוך צ'יפים">−</button>
                                            {isOwner && !u.isBot && (
                                                <button onClick={()=>openRoleEditor(u)} className="w-9 h-9 rounded-xl bg-slate-800 hover:bg-blue-900 text-slate-300 hover:text-white border border-white/10" title="הגדר תפקיד"><i className="fa-solid fa-user-gear text-xs"></i></button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* מודל עריכת תפקיד + בחירת משחקים לניהול */}
                    {roleEditUser && (
                        <div className="fixed inset-0 z-[500] bg-black/70 backdrop-blur-sm flex items-center justify-center p-4" onClick={()=>setRoleEditUser(null)}>
                            <div className="glass-panel rounded-3xl p-6 w-full max-w-sm animate-pop-in" onClick={e=>e.stopPropagation()}>
                                <div className="flex items-center gap-3 mb-5">
                                    <img src={avatarUrl(roleEditUser.id)} className="w-12 h-12 rounded-xl bg-slate-800" />
                                    <div>
                                        <div className="font-black text-white">{roleEditUser.username}</div>
                                        <div className="text-xs text-slate-400" dir="ltr">{roleEditUser.email}</div>
                                    </div>
                                </div>

                                <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">תפקיד</label>
                                <select value={roleDraft.role} onChange={e=>setRoleDraft({...roleDraft, role: e.target.value})} className="w-full bg-slate-900 text-white border border-white/10 rounded-xl p-3 outline-none focus:border-blue-500/60 font-bold mb-4">
                                    <option value={ROLES.PLAYER}>שחקן</option>
                                    <option value={ROLES.AGENT}>סוכן</option>
                                    <option value={ROLES.MANAGER}>מנהל</option>
                                    {user.role === ROLES.SUPER_ADMIN && <option value={ROLES.CLUB_OWNER}>בעל מועדון</option>}
                                </select>

                                {[ROLES.MANAGER, ROLES.AGENT].includes(roleDraft.role) && (
                                    <div className="mb-4">
                                        <label className="text-slate-400 text-xs font-bold mb-2 block uppercase tracking-widest">אילו משחקים {roleDraft.role === ROLES.MANAGER ? 'ינהל' : 'ישרת'}?</label>
                                        <div className="flex flex-col gap-2">
                                            {GAMES.map(g => (
                                                <label key={g.id} className={`flex items-center justify-between bg-slate-900/70 rounded-xl px-4 py-3 border cursor-pointer transition-colors ${roleDraft.managedGames.includes(g.id) ? 'border-emerald-500/60' : 'border-white/5'} ${!g.live ? 'opacity-60' : ''}`}>
                                                    <span className="font-bold text-sm text-white">{g.label}</span>
                                                    <input type="checkbox" checked={roleDraft.managedGames.includes(g.id)} onChange={()=>toggleGame(g.id)} className="w-5 h-5 accent-emerald-500 cursor-pointer" />
                                                </label>
                                            ))}
                                        </div>
                                        <button onClick={()=>setRoleDraft({...roleDraft, managedGames: GAMES.map(g=>g.id)})} className="text-xs text-emerald-400 font-bold mt-2 underline">סמן הכל</button>
                                    </div>
                                )}

                                <div className="flex gap-3">
                                    <button onClick={saveRole} className="flex-1 bg-gradient-to-b from-blue-500 to-blue-700 hover:from-blue-400 text-white py-3 rounded-xl font-black">שמור</button>
                                    <button onClick={()=>setRoleEditUser(null)} className="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl font-black border border-white/10">ביטול</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        /* ================================================================
           שולחן רמיקוב
           ================================================================ */
        function RummyTable({ tableDocId, user, clubSettings, onLeave, showToast }) {
            const [tableState, setTableState] = useState(null);
            const [loading, setLoading] = useState(true);
            const [godOpen, setGodOpen] = useState(false);

            const [rack, setRack] = useState(Array(28).fill(null));
            const [board, setBoard] = useState([]);

            const [startTurnBoard, setStartTurnBoard] = useState([]);
            const [startTurnRackCount, setStartTurnRackCount] = useState(0);
            const [startTurnRack, setStartTurnRack] = useState([]);
            const startTurnRef = useRef(null);

            const [dragData, setDragData] = useState(null);
            const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
            const [hoverTarget, setHoverTarget] = useState(null);
            const [timeLeft, setTimeLeft] = useState(TURN_SECONDS);
            const [showError, setShowError] = useState("");

            const longPressTimer = useRef(null);
            const dragDataRef = useRef(null);
            const synthRef = useRef(null);
            const endingRef = useRef(false);

            const isGod = isGodUser(user);
            const me = tableState?.players?.[user.uid];
            const hasDropped = !!me?.hasDropped;
            const rakeFrac = ((clubSettings?.rakePct ?? DEFAULT_RAKE_PCT) / 100);

            const startIdsSet = useMemo(() => new Set(startTurnBoard.map(g => g.id)), [startTurnBoard]);

            const flashError = (msg) => { setShowError(msg); setTimeout(()=>setShowError(""), 4000); };

            const boardScale = useMemo(() => {
                if (!board || board.length === 0) return 1.0;
                const totalTiles = board.reduce((sum, g) => sum + g.tiles.length, 0);
                const scale = 1.0 - (board.length * 0.01 + totalTiles * 0.003);
                return Math.max(0.45, Math.min(1.0, scale));
            }, [board]);

            useEffect(() => { dragDataRef.current = dragData; }, [dragData]);

            /* ---------- מוח הבוטים (רץ רק בדפדפן של הסופר-אדמין) ---------- */
            useEffect(() => {
                if (user.role !== ROLES.SUPER_ADMIN || !tableState || tableState.phase === 'showdown') return;

                if (tableState.phase === 'waiting') {
                    const joinInterval = setInterval(async () => {
                        try {
                            const tblRef = window.fb.doc(window.fb.db, "tables", tableDocId);
                            const tblSnap = await window.fb.getDoc(tblRef);
                            if (!tblSnap.exists()) return;
                            const t = tblSnap.data();
                            const playersCount = Object.keys(t.players || {}).length;
                            if (playersCount === 0 || playersCount >= t.maxPlayers || t.phase !== 'waiting') return;

                            const botQ = window.fb.query(window.fb.collection(window.fb.db, "users"), window.fb.where("isBot", "==", true));
                            const botSnaps = await window.fb.getDocs(botQ);
                            if (botSnaps.empty) return;
                            const bots = botSnaps.docs.map(d => ({id: d.id, ...d.data()}));
                            const availableBots = bots.filter(b => !t.players[b.id]);
                            if (availableBots.length === 0) return;

                            const randomBot = availableBots[Math.floor(Math.random() * availableBots.length)];
                            const newPlayers = { ...t.players, [randomBot.id]: { username: randomBot.username, cards: [], hasDropped: false, stack: Number(t.minBuyIn), isBot: true } };
                            if (Object.keys(newPlayers).length === Number(t.maxPlayers)) {
                                await window.fb.updateDoc(tblRef, buildDeal(newPlayers));
                            } else {
                                await window.fb.updateDoc(tblRef, { players: newPlayers });
                            }
                        } catch(e) {}
                    }, 3000);
                    return () => clearInterval(joinInterval);
                }

                if (tableState.phase === 'playing') {
                    const currentUid = tableState.currentTurn;
                    const currentPlayer = tableState.players?.[currentUid];
                    if (currentPlayer && currentPlayer.isBot) {
                        const botTimer = setTimeout(async () => {
                            try {
                                const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                                const tblSnap = await window.fb.getDoc(tblRef);
                                if (!tblSnap.exists()) return;
                                const currentTbl = tblSnap.data();
                                if (currentTbl.currentTurn !== currentUid || currentTbl.phase !== 'playing') return;

                                const newDeck = [...(currentTbl.deck || [])];
                                const tile = newDeck.length > 0 ? newDeck.pop() : null;
                                const newRack = [...(currentTbl.players[currentUid].cards || [])];
                                if(tile) {
                                    const emptyIdx = newRack.findIndex(t=>t===null);
                                    if(emptyIdx !== -1) newRack[emptyIdx] = tile; else newRack.push(tile);
                                }
                                const uids = Object.keys(currentTbl.players).sort();
                                const nextTurn = uids[(uids.indexOf(currentUid) + 1) % uids.length];
                                await window.fb.updateDoc(tblRef, { deck: newDeck, [`players.${currentUid}.cards`]: newRack, currentTurn: nextTurn, turnStartedAt: Date.now() });
                            } catch(e) {}
                        }, 4000);
                        return () => clearTimeout(botTimer);
                    }
                }
            }, [tableState?.phase, tableState?.currentTurn, user.role, tableDocId]);

            /* ---------- טיימר + צליל ---------- */
            useEffect(() => {
                let interval;
                if (tableState?.phase === 'playing' && tableState?.turnStartedAt) {
                    interval = setInterval(() => {
                        const elapsed = Math.floor((Date.now() - tableState.turnStartedAt) / 1000);
                        const remaining = Math.max(0, TURN_SECONDS - elapsed);
                        setTimeLeft(remaining);
                        if (remaining <= 10 && remaining > 0 && tableState.currentTurn === user.uid) {
                            try {
                                if (window.Tone && window.Tone.context.state !== 'running') window.Tone.context.resume();
                                if (!synthRef.current && window.Tone) {
                                    synthRef.current = new window.Tone.Synth({ oscillator: { type: 'square' } }).toDestination();
                                    synthRef.current.volume.value = -15;
                                }
                                synthRef.current?.triggerAttackRelease("E6", "0.05");
                            } catch(e) {}
                        }
                        if (remaining === 0 && tableState.currentTurn === user.uid) { clearInterval(interval); handleDraw(true); }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [tableState?.phase, tableState?.turnStartedAt, tableState?.currentTurn, user.uid]);

            /* ---------- סנכרון מ-Firebase ---------- */
            useEffect(() => {
                if(!tableDocId) return;
                const unsub = window.fb.onSnapshot(window.fb.doc(window.fb.db, "tables", tableDocId), doc => {
                    if(doc.exists()) { setTableState({id: doc.id, ...doc.data()}); setLoading(false); }
                    else { showToast("השולחן נסגר", "error"); onLeave(); }
                });
                return () => unsub();
            }, [tableDocId]);

            useEffect(() => {
                if(!tableState) return;
                if (!dragDataRef.current) {
                    const rawBoard = tableState.board || [];
                    setBoard(rawBoard);
                    const dbCards = tableState.players?.[user.uid]?.cards || [];
                    const fullRack = [...dbCards];
                    while(fullRack.length < 28) fullRack.push(null);
                    setRack(fullRack);

                    if (tableState.currentTurn === user.uid) {
                        if (startTurnRef.current !== tableState.turnStartedAt) {
                             setStartTurnBoard(JSON.parse(JSON.stringify(rawBoard)));
                             setStartTurnRackCount(dbCards.filter(t=>t!==null).length);
                             setStartTurnRack(JSON.parse(JSON.stringify(fullRack)));
                             startTurnRef.current = tableState.turnStartedAt;
                             setShowError("");
                        }
                    }
                }
            }, [tableState, user.uid]);

            const isBoardValid = useMemo(() => {
                if (board.length === 0) return true;
                return board.every(g => validateGroup(g.tiles));
            }, [board]);

            /* ---------- מנוע גרירה ---------- */
            useEffect(() => {
                const handlePointerMove = (e) => {
                    if (dragDataRef.current) {
                        setDragPos({ x: e.clientX, y: e.clientY });
                        if (longPressTimer.current) {
                            const dist = Math.hypot(e.clientX - dragDataRef.current.startX, e.clientY - dragDataRef.current.startY);
                            if (dist > 15) { clearTimeout(longPressTimer.current); longPressTimer.current = null; }
                        }
                        const ghost = document.getElementById('drag-ghost');
                        const ghostGroup = document.getElementById('drag-ghost-group');
                        if(ghost) ghost.style.pointerEvents = 'none';
                        if(ghostGroup) ghostGroup.style.pointerEvents = 'none';
                        const elem = document.elementFromPoint(e.clientX, e.clientY);
                        if (elem) {
                            const dropZone = elem.closest('[data-drop]');
                            setHoverTarget(dropZone ? dropZone.getAttribute('data-drop') : null);
                        }
                    }
                };

                const handlePointerUp = async (e) => {
                    if (longPressTimer.current) clearTimeout(longPressTimer.current);
                    const currentDrag = dragDataRef.current;
                    if (!currentDrag) return;

                    const isMyTurn = tableState?.currentTurn === user.uid;

                    const ghost = document.getElementById('drag-ghost');
                    const ghostGroup = document.getElementById('drag-ghost-group');
                    if (ghost) ghost.style.pointerEvents = 'none';
                    if (ghostGroup) ghostGroup.style.pointerEvents = 'none';

                    const elemUnder = document.elementFromPoint(e.clientX, e.clientY);
                    const dropZone = elemUnder ? elemUnder.closest('[data-drop]') : null;
                    let actualTarget = dropZone ? dropZone.getAttribute('data-drop') : null;

                    const boardArea = document.getElementById('felt-board');
                    let dropX = 50, dropY = 50;
                    if (boardArea && actualTarget !== 'rack' && !actualTarget?.startsWith('rack-slot-')) {
                        const rect = boardArea.getBoundingClientRect();
                        if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                            dropX = Math.max(4, Math.min(96, ((e.clientX - rect.left) / rect.width) * 100));
                            dropY = Math.max(6, Math.min(94, ((e.clientY - rect.top) / rect.height) * 100));
                            if (!actualTarget || (!actualTarget.startsWith('board-group-'))) actualTarget = 'board-new';
                        }
                    }

                    const droppingToBoard = actualTarget === 'board-new' || actualTarget?.startsWith('board-group-');

                    if (!isMyTurn && (droppingToBoard || currentDrag.source === 'board')) {
                        flashError("המתן לתורך כדי לשחק בלוח המרכזי");
                        actualTarget = null;
                    }

                    // לפני הורדה ראשונה: איסור צירוף רק לקבוצות הוותיקות. לקבוצות שפתחת בתור הזה - מותר!
                    if (isMyTurn && !hasDropped && actualTarget?.startsWith('board-group-')) {
                        const targetId = actualTarget.replace('board-group-', '');
                        if (startIdsSet.has(targetId)) {
                            flashError(`לפני הורדה ראשונה (${FIRST_MELD_MIN} נק') אסור להשתמש באבני השולחן הקיימות`);
                            actualTarget = null;
                        }
                    }

                    let newRack = [...rack];
                    let newBoard = board.map(g => ({...g, tiles: [...g.tiles]}));
                    let tilesToAdd = [];

                    if (currentDrag.type === 'single') {
                        tilesToAdd = [currentDrag.tile];
                        if (currentDrag.source === 'rack') newRack[currentDrag.tileIndex] = null;
                        else if (currentDrag.source === 'board') {
                            const grp = newBoard.find(g => g.id === currentDrag.groupId);
                            if(grp) {
                                if (currentDrag.tileIndex > 0 && currentDrag.tileIndex < grp.tiles.length - 1 && grp.tiles.length >= 3) {
                                     const left = grp.tiles.slice(0, currentDrag.tileIndex);
                                     const right = grp.tiles.slice(currentDrag.tileIndex + 1);
                                     grp.tiles = left;
                                     const splitId = `grp_${Date.now()}_split`;
                                     newBoard.push({ id: splitId, x: Math.min(95, grp.x + 8), y: grp.y, tiles: right });
                                     resolveOverlaps(newBoard, splitId, boardScale);
                                } else {
                                     grp.tiles.splice(currentDrag.tileIndex, 1);
                                     if (grp.tiles.length === 0) newBoard = newBoard.filter(g => g.id !== currentDrag.groupId);
                                }
                            }
                        }
                    } else if (currentDrag.type === 'group_from_rack') {
                        tilesToAdd = currentDrag.tiles;
                        for (let i = currentDrag.startIndex; i < currentDrag.startIndex + currentDrag.tiles.length; i++) newRack[i] = null;
                    } else {
                        tilesToAdd = currentDrag.tiles;
                        if (currentDrag.source === 'board') newBoard = newBoard.filter(g => g.id !== currentDrag.groupId);
                    }

                    if (actualTarget && actualTarget.startsWith('board-group-')) {
                        const targetId = actualTarget.replace('board-group-', '');
                        const targetGrp = newBoard.find(g => g.id === targetId);
                        if (targetGrp) {
                             targetGrp.tiles.push(...tilesToAdd);
                             targetGrp.tiles = autoSortRun(targetGrp.tiles);
                        } else {
                             const nid = `grp_${Date.now()}`;
                             newBoard.push({ id: nid, x: dropX, y: dropY, tiles: tilesToAdd });
                             resolveOverlaps(newBoard, nid, boardScale);
                        }
                    }
                    else if (actualTarget === 'board-new') {
                        // מגנט הצמדה מוגדל: שוחרר ליד קבוצה - מצטרף אליה וממוין אוטומטית
                        const near = newBoard.find(g => {
                            if (g.tiles.length === 0) return false;
                            const bx = groupBox(g, boardScale);
                            return Math.abs(dropX - g.x) < bx.w / 2 + 4 && Math.abs(dropY - g.y) < bx.h / 2 + 4;
                        });
                        const nearBlocked = near && isMyTurn && !hasDropped && startIdsSet.has(near.id);
                        if (near && !nearBlocked) {
                            near.tiles.push(...tilesToAdd);
                            near.tiles = autoSortRun(near.tiles);
                        } else {
                            const nid = `grp_${Date.now()}`;
                            newBoard.push({ id: nid, x: dropX, y: dropY, tiles: tilesToAdd });
                            resolveOverlaps(newBoard, nid, boardScale);
                        }
                    }
                    else if (actualTarget && actualTarget.startsWith('rack-slot-')) {
                        let slotIdx = parseInt(actualTarget.split('-')[2]);
                        if (currentDrag.type === 'single') {
                             if (newRack[slotIdx] !== null && currentDrag.source === 'rack') newRack[currentDrag.tileIndex] = newRack[slotIdx];
                             else if (newRack[slotIdx] !== null) slotIdx = newRack.findIndex(t=>t===null);
                             if(slotIdx !== -1) newRack[slotIdx] = tilesToAdd[0];
                        } else {
                             tilesToAdd.forEach(t => {
                                 const emptyIdx = newRack.findIndex(r=>r===null);
                                 if(emptyIdx !== -1) newRack[emptyIdx] = t;
                             });
                        }
                    } else {
                        if (currentDrag.source === 'rack') {
                            if(currentDrag.type === 'single') {
                                const eIdx = newRack.findIndex(t=>t===null);
                                newRack[eIdx !== -1 ? eIdx : 0] = tilesToAdd[0];
                            } else {
                                tilesToAdd.forEach(t => {
                                    const emptyIdx = newRack.findIndex(r=>r===null);
                                    if(emptyIdx !== -1) newRack[emptyIdx] = t;
                                });
                            }
                        } else {
                            newBoard.push({ id: currentDrag.groupId, x: currentDrag.startX_pct || 50, y: currentDrag.startY_pct || 50, tiles: tilesToAdd });
                        }
                    }

                    setRack(newRack);
                    setBoard(newBoard);
                    setDragData(null);
                    setHoverTarget(null);
                    if (isMyTurn && actualTarget && (actualTarget === 'board-new' || actualTarget.startsWith('board-group-'))) playSnd('tile');

                    if (tableState?.id && isMyTurn) {
                        try {
                            await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { board: newBoard, [`players.${user.uid}.cards`]: newRack });
                        } catch(err) {}
                    }
                };

                if (dragData) {
                    window.addEventListener('pointermove', handlePointerMove, { passive: false });
                    window.addEventListener('pointerup', handlePointerUp);
                }
                return () => {
                    window.removeEventListener('pointermove', handlePointerMove);
                    window.removeEventListener('pointerup', handlePointerUp);
                };
            }, [dragData, hoverTarget, rack, board, tableState?.id, user.uid, tableState?.currentTurn, hasDropped, startIdsSet, boardScale]);

            const startDrag = (e, tile, source, groupId, tileIndex) => {
                const isMyTurn = tableState?.currentTurn === user.uid;

                if (source === 'board') {
                    if (!isMyTurn) { flashError("המתן לתורך כדי לשחק בלוח המרכזי"); return; }
                    if (!hasDropped && startIdsSet.has(groupId)) {
                        flashError(`לפני הורדה ראשונה (${FIRST_MELD_MIN} נק') אסור לגעת באבני השולחן הקיימות - את שלך מותר לסדר`);
                        return;
                    }
                }

                if (e.pointerType === 'touch') { try { e.target.releasePointerCapture(e.pointerId); } catch(err) {} }
                try { if (window.Tone && window.Tone.context.state !== 'running') window.Tone.context.resume(); } catch(err){}

                let pctX = 50, pctY = 50;
                const boardArea = document.getElementById('felt-board');
                if (boardArea) {
                    const rect = boardArea.getBoundingClientRect();
                    pctX = Math.max(4, Math.min(96, ((e.clientX - rect.left) / rect.width) * 100));
                    pctY = Math.max(6, Math.min(94, ((e.clientY - rect.top) / rect.height) * 100));
                }

                setDragData({ type: 'single', tile, source, groupId, tileIndex, startX: e.clientX, startY: e.clientY, startX_pct: pctX, startY_pct: pctY });
                setDragPos({ x: e.clientX, y: e.clientY });

                if (source === 'board') {
                    const grp = board.find(g => g.id === groupId);
                    if(grp) {
                        longPressTimer.current = setTimeout(() => {
                            if (navigator.vibrate) navigator.vibrate(50);
                            setDragData({ type: 'group', tiles: grp.tiles, source, groupId, startX: e.clientX, startY: e.clientY, startX_pct: grp.x, startY_pct: grp.y });
                        }, 400);
                    }
                } else if (source === 'rack') {
                    longPressTimer.current = setTimeout(() => {
                        if (navigator.vibrate) navigator.vibrate(50);
                        // בחירה חכמה: מרימים יחד רק אבנים שכנות שקשורות משחקית (רצף/שלישייה),
                        // ובלי לחצות בין שתי שורות המגש. 7 ליד 10 = אבן אחת בלבד.
                        let left = tileIndex;
                        while (left > 0 && (left % 14 !== 0) && tilesChain(rack[left - 1], rack[left])) left--;
                        let right = tileIndex;
                        while (right < 27 && (right % 14 !== 13) && tilesChain(rack[right], rack[right + 1])) right++;
                        const groupTiles = rack.slice(left, right + 1);
                        if (groupTiles.length > 1) {
                            setDragData({ type: 'group_from_rack', tiles: groupTiles, source: 'rack', startIndex: left, startX: e.clientX, startY: e.clientY });
                        }
                    }, 400);
                }
            };

            /* ---------- מיון וסידור ---------- */
            const syncRack = (newRack) => {
                setRack(newRack);
                try { window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { [`players.${user.uid}.cards`]: newRack }); } catch(e){}
            };

            const handleSort777 = () => {
                let a = rack.filter(t => t !== null);
                a.sort((x,y) => {
                    if (x.val === '☻') return 1; if (y.val === '☻') return -1;
                    if (x.val !== y.val) return Number(x.val) - Number(y.val);
                    return x.color.localeCompare(y.color);
                });
                while(a.length < 28) a.push(null);
                syncRack(a);
            };

            const handleSort789 = () => {
                let a = rack.filter(t => t !== null);
                a.sort((x,y) => {
                    if (x.val === '☻') return 1; if (y.val === '☻') return -1;
                    if (x.color !== y.color) return x.color.localeCompare(y.color);
                    return Number(x.val) - Number(y.val);
                });
                while(a.length < 28) a.push(null);
                syncRack(a);
            };

            const handleArrangeBoard = async () => {
                if (board.length === 0) return;
                const arranged = board.map(g => ({...g}));
                let x = 6, y = 12;
                arranged.forEach(g => {
                    const bx = groupBox(g, boardScale);
                    if (x + bx.w > 96) { x = 6; y = Math.min(90, y + bx.h + 3); }
                    g.x = Math.min(96, x + bx.w / 2);
                    g.y = y;
                    x += bx.w + 3;
                });
                setBoard(arranged);
                if (tableState?.currentTurn === user.uid) {
                    try { await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { board: arranged }); } catch(e){}
                }
            };

            const handleUndo = async () => {
                if (tableState?.currentTurn !== user.uid) return;
                setBoard(startTurnBoard);
                setRack(startTurnRack);
                try { await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { board: startTurnBoard, [`players.${user.uid}.cards`]: startTurnRack }); } catch(e){}
            };

            /* ---------- התיישבות ---------- */
            const handleSit = async () => {
                try {
                    const buyInAmount = Number(tableState.minBuyIn);
                    await window.fb.runTransaction(window.fb.db, async (t) => {
                        const uRef = window.fb.doc(window.fb.db, "users", user.uid);
                        const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const uSnap = await t.get(uRef);
                        const tblSnap = await t.get(tblRef);
                        if (!tblSnap.exists()) throw "השולחן לא קיים";
                        const tbl = tblSnap.data();
                        if (tbl.phase !== 'waiting') throw "המשחק כבר התחיל";
                        if (tbl.players?.[user.uid]) throw "אתה כבר יושב בשולחן זה";
                        if (Object.keys(tbl.players || {}).length >= Number(tbl.maxPlayers)) throw "השולחן מלא";
                        if ((uSnap.data().balance || 0) < buyInAmount) throw "אין לך מספיק יתרה לכניסה.";

                        t.update(uRef, { balance: round2(uSnap.data().balance - buyInAmount) });
                        const players = { ...tbl.players, [user.uid]: { username: uSnap.data().username, cards: [], hasDropped: false, stack: buyInAmount, isBot: false } };
                        if (Object.keys(players).length === Number(tbl.maxPlayers)) {
                            t.update(tblRef, buildDeal(players));
                        } else {
                            t.update(tblRef, { players });
                        }
                    });
                } catch(e) { showToast(typeof e === 'string' ? e : "שגיאה", "error"); }
            };

            /* ---------- משיכה מהקופה ---------- */
            const handleDraw = async (isTimeout = false) => {
                if (tableState?.currentTurn !== user.uid || tableState.phase !== 'playing') return;
                const newDeck = [...(tableState.deck || [])];
                const tile = newDeck.length > 0 ? newDeck.pop() : null;
                const newRack = [...startTurnRack];
                if (tile) {
                    const emptyIdx = newRack.findIndex(t=>t===null);
                    if (emptyIdx !== -1) newRack[emptyIdx] = tile; else newRack.push(tile);
                } else if (!isTimeout) {
                    showToast("הקופה ריקה - התור עובר", "info");
                }
                const uids = Object.keys(tableState.players).sort();
                const nextTurn = uids[(uids.indexOf(user.uid) + 1) % uids.length];
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { deck: newDeck, board: startTurnBoard, [`players.${user.uid}.cards`]: newRack, currentTurn: nextTurn, turnStartedAt: Date.now() });
            };

            /* ---------- סיום משחק והתחשבנות ---------- */
            const endGame = async (finalBoard) => {
                if (endingRef.current) return;
                endingRef.current = true;
                try {
                    await window.fb.runTransaction(window.fb.db, async (t) => {
                        const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const tblSnap = await t.get(tblRef);
                        if (!tblSnap.exists()) throw "table gone";
                        const tbl = tblSnap.data();
                        if (tbl.phase !== 'playing') throw "already ended";
                        const stakesNum = Number(tbl.stakes) || 0.1;

                        const userRefs = {}; const userSnaps = {};
                        for (const [uid, p] of Object.entries(tbl.players)) {
                            if (p.isBot) continue;
                            userRefs[uid] = window.fb.doc(window.fb.db, "users", uid);
                            userSnaps[uid] = await t.get(userRefs[uid]);
                        }
                        let adminRef = null, adminSnap = null;
                        for (const [uid, s] of Object.entries(userSnaps)) {
                            if (s.exists() && (s.data().email || '').toLowerCase() === SUPER_ADMIN_EMAIL) { adminRef = userRefs[uid]; adminSnap = s; }
                        }
                        if (!adminSnap) {
                            const adminQ = window.fb.query(window.fb.collection(window.fb.db, "users"), window.fb.where("role", "==", ROLES.SUPER_ADMIN));
                            const adminDocs = await window.fb.getDocs(adminQ);
                            if (!adminDocs.empty) {
                                adminRef = adminDocs.docs[0].ref;
                                adminSnap = await t.get(adminRef);
                            }
                        }

                        const players = JSON.parse(JSON.stringify(tbl.players));
                        players[user.uid].cards = [];
                        let totalPot = 0; const details = {};
                        Object.entries(players).forEach(([uid, p]) => {
                            if (uid === user.uid) return;
                            const penalty = rackPenalty(p.cards);
                            const pay = Math.min(round2(penalty * stakesNum), p.stack || 0);
                            players[uid].stack = round2((p.stack || 0) - pay);
                            totalPot += pay;
                            details[uid] = { username: p.username, penalty, pay };
                        });
                        totalPot = round2(totalPot);
                        const rake = round2(totalPot * rakeFrac);
                        const winnerProfit = round2(totalPot - rake);
                        players[user.uid].stack = round2((players[user.uid].stack || 0) + winnerProfit);

                        t.update(tblRef, {
                            players, board: finalBoard, phase: 'showdown', winner: user.uid, currentTurn: null,
                            lastResults: { winnerName: players[user.uid].username, totalPot, rake, winnerProfit, details, endedAt: Date.now() }
                        });

                        for (const [uid, snap] of Object.entries(userSnaps)) {
                            if (!snap.exists()) continue;
                            const st = snap.data().stats || { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 };
                            const isWinner = uid === user.uid;
                            const delta = isWinner ? winnerProfit : -(details[uid]?.pay || 0);
                            const upd = {
                                'stats.gamesPlayed': (st.gamesPlayed || 0) + 1,
                                'stats.gamesWon': (st.gamesWon || 0) + (isWinner ? 1 : 0),
                                'stats.totalProfit': round2((st.totalProfit || 0) + delta)
                            };
                            if (adminRef && userRefs[uid].id === adminRef.id) {
                                upd.balance = round2((snap.data().balance || 0) + rake);
                                upd.clubProfits = round2((snap.data().clubProfits || 0) + rake);
                            }
                            t.update(userRefs[uid], upd);
                        }
                        if (adminRef && adminSnap && adminSnap.exists() && !userSnaps[adminRef.id]) {
                            t.update(adminRef, {
                                balance: round2((adminSnap.data().balance || 0) + rake),
                                clubProfits: round2((adminSnap.data().clubProfits || 0) + rake)
                            });
                        }
                    });
                } catch(e) {
                } finally { endingRef.current = false; }
            };

            /* ---------- סיום תור ---------- */
            const handleEndTurn = async () => {
                if (tableState.currentTurn !== user.uid) return;

                if (!isBoardValid) { flashError("הלוח לא תקין! ודא שכל הסדרות חוקיות (מינימום 3 אבנים)"); return; }

                const activeRackCount = rack.filter(t=>t!==null).length;
                if (activeRackCount >= startTurnRackCount) { flashError("לא הורדת אף אבן! אם אין לך מה לשחק, עליך למשוך אבן מהקופה."); return; }

                if (!hasDropped) {
                    const untouched = startTurnBoard.every(sg => {
                        const cur = board.find(g => g.id === sg.id);
                        if (!cur || cur.tiles.length !== sg.tiles.length) return false;
                        const ids = new Set(cur.tiles.map(t => t.id));
                        return sg.tiles.every(t => ids.has(t.id));
                    });
                    if (!untouched) { flashError('לפני הורדה ראשונה אסור לשנות את אבני השולחן הקיימות. לחץ "בטל" ופתח סדרות חדשות משלך.'); return; }
                    const newGroups = board.filter(g => !startIdsSet.has(g.id));
                    const dropValue = newGroups.reduce((s, g) => s + groupPoints(g.tiles), 0);
                    if (dropValue < FIRST_MELD_MIN) { flashError(`יש צורך ב-${FIRST_MELD_MIN} נקודות לפחות להורדה ראשונה (הורדת רק ${dropValue}).`); return; }
                }

                if (activeRackCount === 0) { await endGame(board); return; }

                const uids = Object.keys(tableState.players).sort();
                const nextTurn = uids[(uids.indexOf(user.uid) + 1) % uids.length];
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { board: board, [`players.${user.uid}.cards`]: rack, [`players.${user.uid}.hasDropped`]: true, currentTurn: nextTurn, turnStartedAt: Date.now() });
            };

            const handleNewRound = async () => {
                try {
                    await window.fb.runTransaction(window.fb.db, async (t) => {
                        const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const snap = await t.get(tblRef);
                        if (!snap.exists()) return;
                        const tbl = snap.data();
                        if (tbl.phase !== 'showdown') return;
                        if (Object.keys(tbl.players || {}).length < 2) throw "אין מספיק שחקנים לסיבוב חדש";
                        t.update(tblRef, buildDeal(tbl.players));
                    });
                } catch(e) { showToast(typeof e === 'string' ? e : "שגיאה בפתיחת סיבוב", "error"); }
            };

            /* ---------- עזיבת שולחן ---------- */
            const handleLeave = async () => {
                if (!tableState?.players?.[user.uid]) { onLeave(); return; }
                const isPlayingNow = tableState.phase === 'playing';
                if (isPlayingNow) {
                    if (!window.confirm("⚠️ פרישה באמצע משחק (כניעה) - הצ'יפים שלך בשולחן יחולקו בין השחקנים הנשארים.\nבטוח?")) return;
                }
                try {
                    await window.fb.runTransaction(window.fb.db, async (t) => {
                        const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const uRef = window.fb.doc(window.fb.db, "users", user.uid);
                        const tblSnap = await t.get(tblRef);
                        const uSnap = await t.get(uRef);
                        if (!tblSnap.exists()) return;
                        const tblData = tblSnap.data();
                        const stillPlaying = tblData.phase === 'playing';
                        const myStack = tblData.players?.[user.uid]?.stack || 0;

                        const newP = { ...tblData.players };
                        delete newP[user.uid];
                        const remainingUids = Object.keys(newP);

                        let winnerRef = null, winnerSnap = null, adminRef = null, adminSnap = null;
                        const lastManStanding = stillPlaying && remainingUids.length === 1;
                        if (lastManStanding) {
                            const winnerUid = remainingUids[0];
                            if (!newP[winnerUid].isBot) {
                                winnerRef = window.fb.doc(window.fb.db, "users", winnerUid);
                                winnerSnap = await t.get(winnerRef);
                            }
                            const adminQ = window.fb.query(window.fb.collection(window.fb.db, "users"), window.fb.where("role", "==", ROLES.SUPER_ADMIN));
                            const adminDocs = await window.fb.getDocs(adminQ);
                            if (!adminDocs.empty) { adminRef = adminDocs.docs[0].ref; adminSnap = await t.get(adminRef); }
                        }

                        const updates = { players: newP };
                        const uData = uSnap.exists() ? uSnap.data() : {};

                        if (!stillPlaying) {
                            t.update(uRef, { balance: round2((uData.balance || 0) + myStack) });
                        } else {
                            const currentStats = uData.stats || { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 };
                            t.update(uRef, {
                                'stats.gamesPlayed': (currentStats.gamesPlayed || 0) + 1,
                                'stats.totalProfit': round2((currentStats.totalProfit || 0) - myStack)
                            });

                            if (lastManStanding) {
                                const winnerUid = remainingUids[0];
                                const rake = round2(myStack * rakeFrac);
                                const winnerProfit = round2(myStack - rake);
                                newP[winnerUid].stack = round2((newP[winnerUid].stack || 0) + winnerProfit);
                                updates.phase = 'showdown';
                                updates.winner = winnerUid;
                                updates.currentTurn = null;
                                updates.lastResults = { winnerName: newP[winnerUid].username, totalPot: myStack, rake, winnerProfit, details: { [user.uid]: { username: uData.username || user.username, penalty: 0, pay: myStack } }, endedAt: Date.now() };

                                if (winnerRef && winnerSnap && winnerSnap.exists()) {
                                    const wStats = winnerSnap.data().stats || { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 };
                                    t.update(winnerRef, {
                                        'stats.gamesPlayed': (wStats.gamesPlayed || 0) + 1,
                                        'stats.gamesWon': (wStats.gamesWon || 0) + 1,
                                        'stats.totalProfit': round2((wStats.totalProfit || 0) + winnerProfit)
                                    });
                                }
                                if (adminRef && adminSnap && adminSnap.exists()) {
                                    t.update(adminRef, {
                                        balance: round2((adminSnap.data().balance || 0) + rake),
                                        clubProfits: round2((adminSnap.data().clubProfits || 0) + rake)
                                    });
                                }
                            } else if (remainingUids.length >= 2) {
                                const share = round2(myStack / remainingUids.length);
                                remainingUids.forEach(uid => { newP[uid].stack = round2((newP[uid].stack || 0) + share); });
                                if (tblData.currentTurn === user.uid) {
                                    const origUids = Object.keys(tblData.players).sort();
                                    let idx = origUids.indexOf(user.uid);
                                    let next = origUids[(idx + 1) % origUids.length];
                                    while (!newP[next]) { idx++; next = origUids[(idx + 1) % origUids.length]; }
                                    updates.currentTurn = next;
                                    updates.turnStartedAt = Date.now();
                                }
                            }
                        }
                        t.update(tblRef, updates);
                    });
                    showToast(isPlayingNow ? "נכנעת ויצאת מהמשחק." : "קמת מהשולחן והצ'יפים חזרו לארנק.", "info");
                    onLeave();
                } catch(e) { showToast("שגיאה ביציאה מהשולחן", "error"); }
            };

            /* ---------- צ'אט, ריאקציות וצלילים ---------- */
            const chatArr = tableState?.chat || [];
            const [chatOpen, setChatOpen] = useState(false);
            const [emoTick, setEmoTick] = useState(0);
            const reactions = useMemo(() => {
                const now = Date.now(); const r = {};
                chatArr.forEach(m => { if (m.emoji && now - m.at < 6000) r[m.uid] = m.emoji; });
                return r;
            }, [chatArr.length, emoTick]);
            const reactCount = Object.keys(reactions).length;
            useEffect(() => {
                if (!reactCount) return;
                const iv = setInterval(() => setEmoTick(x => x + 1), 1500);
                return () => clearInterval(iv);
            }, [reactCount]);
            const sendChat = async (text, emoji) => {
                if (!tableState) return;
                const msg = { uid: user.uid, name: user.username, text: text || '', emoji: emoji || '', at: Date.now() };
                try { await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { chat: [ ...(tableState.chat || []), msg ].slice(-30) }); } catch(e) {}
            };
            const prevRSnd = useRef({ phase: '', chatLen: 0 });
            useEffect(() => {
                if (!tableState) return;
                if (tableState.phase === 'showdown' && prevRSnd.current.phase !== 'showdown') playSnd('win');
                const cl = (tableState.chat || []).length;
                if (prevRSnd.current.chatLen && cl > prevRSnd.current.chatLen) playSnd('msg');
                prevRSnd.current = { phase: tableState.phase, chatLen: cl };
            }, [tableState]);

            if (loading) return <div className="h-full flex items-center justify-center text-emerald-500"><i className="fa-solid fa-spinner fa-spin text-3xl"></i></div>;

            const isSeated = tableState?.players?.[user.uid] !== undefined;
            const isPlaying = tableState.phase === 'playing';
            const isShowdown = tableState.phase === 'showdown';
            const isMyTurn = tableState.currentTurn === user.uid;
            const myTileCount = rack.filter(t=>t!==null).length;
            const results = tableState.lastResults;

            return (
                <div className="h-full w-full flex bg-slate-950 font-sans overflow-hidden select-none" dir="rtl">

                    {tableState.phase === 'waiting' && (
                        <div className="absolute inset-0 z-50 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-emerald-500 p-8 rounded-3xl text-center max-w-lg w-full shadow-[0_0_50px_rgba(16,185,129,0.2)]">
                                <h2 className="text-3xl font-black text-white mb-2">ממתין לשחקנים...</h2>
                                <p className="text-slate-400 text-sm mb-6" dir="ltr">{formatMoney(tableState.stakes)} ₪ / נק' · כניסה {formatMoney(tableState.minBuyIn)}</p>
                                <div className="flex justify-center gap-6 mb-8 flex-wrap">
                                    {[...Array(Number(tableState.maxPlayers) || 4)].map((_, i) => {
                                        const entries = Object.entries(tableState.players || {});
                                        const entry = entries[i];
                                        return entry ? (
                                            <div key={i} className="flex flex-col items-center">
                                                <img src={avatarUrl(entry[0])} className="w-16 h-16 rounded-2xl bg-slate-800 border-2 border-emerald-500 mb-2 shadow-[0_0_15px_#10b981]" />
                                                <span className="text-white font-bold text-sm">{entry[1].username}</span>
                                            </div>
                                        ) : (
                                            <div key={i} className="flex flex-col items-center">
                                                <div className="w-16 h-16 rounded-2xl bg-slate-800/30 border-2 border-slate-600 border-dashed flex items-center justify-center mb-2"><i className="fa-solid fa-spinner fa-spin text-2xl text-slate-500"></i></div>
                                                <span className="text-slate-500 font-bold text-sm">ממתין...</span>
                                            </div>
                                        );
                                    })}
                                </div>
                                {!isSeated && <button onClick={handleSit} className="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-3 rounded-xl font-black w-full text-lg shadow-lg">התיישב בשולחן ({formatMoney(tableState.minBuyIn)})</button>}
                                <button onClick={handleLeave} className="mt-4 text-slate-400 hover:text-white underline text-sm font-bold">חזרה ללובי</button>
                            </div>
                        </div>
                    )}

                    {isShowdown && results && (
                        <div className="absolute inset-0 z-50 bg-slate-950/95 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-gold-500/50 p-8 rounded-3xl text-center max-w-md w-full shadow-[0_0_60px_rgba(250,204,21,0.15)]">
                                <div className="trophy-pop inline-block"><i className="fa-solid fa-trophy text-6xl text-gold-400 drop-shadow-[0_0_20px_rgba(250,204,21,0.6)]"></i></div>
                                <h2 className="text-3xl font-black text-white mt-4">{results.winnerName} ניצח!</h2>
                                <div className="text-emerald-400 font-black text-2xl mt-2"><Coin amount={results.winnerProfit} /></div>
                                <div className="mt-6 bg-slate-950/60 rounded-2xl border border-slate-800 divide-y divide-slate-800 text-sm">
                                    {Object.entries(results.details || {}).map(([uid, d]) => (
                                        <div key={uid} className="flex justify-between items-center px-4 py-3">
                                            <span className="font-bold text-slate-300">{d.username}</span>
                                            <span className="text-rose-400 font-bold" dir="ltr">{d.penalty > 0 ? `${d.penalty} pts · ` : ''}-{formatMoney(d.pay)}</span>
                                        </div>
                                    ))}
                                    <div className="flex justify-between items-center px-4 py-3 text-xs text-slate-500">
                                        <span>רייק מועדון ({clubSettings?.rakePct ?? DEFAULT_RAKE_PCT}%)</span><span dir="ltr">{formatMoney(results.rake)}</span>
                                    </div>
                                </div>
                                <div className="flex gap-3 mt-6">
                                    {isSeated && <button onClick={handleNewRound} className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-xl font-black">סיבוב חדש</button>}
                                    <button onClick={handleLeave} className="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl font-black border border-slate-700">קום מהשולחן</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* יריבים */}
                    <div className="w-24 sm:w-32 bg-slate-900 border-l border-slate-800 flex flex-col items-center py-4 gap-4 z-20 shrink-0 overflow-y-auto">
                        <button onClick={handleLeave} className="px-3 py-1 bg-slate-800 rounded-lg text-slate-400 font-bold border border-slate-700 text-xs hover:bg-rose-900 hover:text-white transition-colors">יציאה</button>
                        {(isPlaying || isShowdown) && Object.entries(tableState.players || {}).filter(([uid]) => uid !== user.uid).map(([uid, pData]) => {
                            const tileCount = pData.cards ? pData.cards.filter(c => c !== null).length : 0;
                            const isTurn = tableState.currentTurn === uid;
                            return (
                                <div key={uid} className={`flex flex-col items-center transition-all p-2 rounded-xl shrink-0 w-full relative ${isTurn ? 'bg-slate-800 border border-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.2)]' : 'opacity-70'}`}>
                                    {reactions[uid] && <div className="absolute -top-2 left-1 text-xl animate-pop-in z-50 drop-shadow-lg">{reactions[uid]}</div>}
                                    <img src={avatarUrl(uid)} className={`w-12 h-12 rounded-xl bg-slate-800 border-2 mb-1 ${isTurn ? 'border-emerald-400' : 'border-slate-600'}`} />
                                    <span className="text-xs font-bold text-white mb-1 truncate w-full text-center">{pData.username}</span>
                                    <span className="text-[10px] bg-slate-950 border border-slate-700 px-2 py-0.5 rounded-full text-amber-400 font-bold whitespace-nowrap mb-1">📦 {tileCount}</span>
                                    <span className="text-[10px] text-gold-400 font-bold" dir="ltr">{formatMoney(pData.stack)}</span>
                                </div>
                            );
                        })}
                    </div>

                    {/* מרכז */}
                    <div className="flex-1 flex flex-col relative h-full min-w-0" style={{ '--board-scale': boardScale }}>

                        {showError && <div className="absolute bottom-[220px] sm:bottom-[250px] left-1/2 transform -translate-x-1/2 z-[100] bg-rose-700 text-white px-6 py-3 rounded-2xl font-black shadow-[0_10px_30px_rgba(225,29,72,0.6)] border-2 border-rose-400 animate-fade-in text-center max-w-[90%] text-sm">{showError}</div>}

                        {(isPlaying || isShowdown) && (
                             <div className="absolute top-3 left-1/2 transform -translate-x-1/2 flex items-center gap-2 pointer-events-none z-10 flex-wrap justify-center">
                                 <span className="text-[11px] bg-slate-900/80 border border-slate-700 px-3 py-1 rounded-full text-slate-300 font-bold backdrop-blur">קופה: {(tableState.deck||[]).length} אבנים</span>
                                 <span className="text-[11px] bg-slate-900/80 border border-slate-700 px-3 py-1 rounded-full text-slate-300 font-bold backdrop-blur" dir="ltr">{formatMoney(tableState.stakes)} ₪/נק'</span>
                                 {isSeated && !hasDropped && isPlaying && <span className="text-[11px] bg-amber-900/70 border border-amber-600 px-3 py-1 rounded-full text-amber-300 font-bold backdrop-blur">טרם ירדת ({FIRST_MELD_MIN}+ נק')</span>}
                             </div>
                        )}

                        <div id="felt-board" data-drop="board-new" className="flex-1 relative m-2 md:m-4 rounded-3xl border-2 border-emerald-900/60 overflow-auto shadow-[inset_0_0_80px_rgba(0,0,0,0.7)]">
                            <div className="min-w-full min-h-full relative">
                                {board.map((groupObj) => {
                                    const isMyNewGroup = isMyTurn && !hasDropped && !startIdsSet.has(groupObj.id);
                                    return (
                                    <div key={groupObj.id} data-drop={`board-group-${groupObj.id}`}
                                         className={`absolute flex board-group hover:bg-emerald-500/10 ${hoverTarget === `board-group-${groupObj.id}` ? 'border-2 border-emerald-400 rounded-xl bg-emerald-500/15' : !validateGroup(groupObj.tiles) ? 'board-invalid-group rounded-xl' : isMyNewGroup ? 'border-2 border-dashed border-emerald-500/50 rounded-xl' : 'border-2 border-transparent rounded-xl'}`}
                                         style={{ left: `${groupObj.x}%`, top: `${groupObj.y}%`, transform: 'translate(-50%, -50%)', direction: 'ltr' }}>
                                        {groupObj.tiles.map((t, tIdx) => (
