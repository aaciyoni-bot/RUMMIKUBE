    <style>
        body {
            background-color: #050505;

            overflow: hidden;
            touch-action: none;

            -webkit-user-select: none;
            font-family: 'Heebo', sans-serif;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }
        
        .chip-text {
            color: #fbbf24;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8), 0 0 15px rgba(251, 191, 36, 0.4);
            font-family: 'Rubik', sans-serif;
            font-weight: 900;
        }

        .game-felt {
            background: radial-gradient(circle at center, #0a1120 0%, #03050a 100%);
            box-shadow: inset 0 0 150px rgba(0,0,0,1);
        }
        
        /* Poker Specific Styles */
        .poker-table-oval {
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 20px 50px rgba(0,0,0,0.9);
            border-radius: 9999px;
        }
        
        /* Rummy Specific Styles */
        .rummi-tile {
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            border-bottom: 6px solid #64748b;
            border-right: 2px solid #64748b;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-radius: 8px;
            box-shadow: 2px 6px 12px rgba(0,0,0,0.9);
            font-family: 'Rubik', sans-serif;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: transform 0.1s ease-out, box-shadow 0.1s ease-out;
            cursor: grab;
            text-shadow: 0px 1px 1px rgba(0,0,0,0.2);
        }
        .rummi-tile:active { cursor: grabbing; }

        .playing-card {
            background: #ffffff;
            border-radius: 6px;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.8);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4px;
            font-family: 'Rubik', sans-serif;
            font-weight: 900;
            user-select: none;
            cursor: grab;
            position: relative;
        }
        .playing-card:active { cursor: grabbing; }
        .card-corner { font-size: 14px; line-height: 1; text-align: left; }
        .card-center { font-size: 28px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .card-back {
            background: repeating-linear-gradient(45deg, #1e293b, #1e293b 5px, #0f172a 5px, #0f172a 10px);
            border: 2px solid #ffffff;
        }
        
        .dragging-ghost {
            opacity: 0.95;
            transform: scale(1.15) rotate(5deg);
            box-shadow: 15px 25px 40px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 99999;
        }

        .bg-dots {
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Animations */
        @keyframes slideInUp {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        .toast-animate {
            animation: slideInUp 0.3s ease-out forwards;
        }
        
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
            80% { opacity: 1; transform: translateY(-60px) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(0.8); }
        }
        .emoji-float {
            animation: floatUp 2.5s ease-out forwards;
            pointer-events: none;
            z-index: 99999;
        }
        
        .z-overlay-menus { z-index: 9999 !important; }
    </style>

<body class="bg-dots">
    <div id="root" class="h-screen w-screen flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const AudioManager = {
            ready: false,
            init: async () => {
                if(AudioManager.ready) return;
                await Tone.start();
                AudioManager.ready = true;
            },
            playClack: () => {
                if(!AudioManager.ready) return;
                const synth = new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 4, oscillator: { type: "square" }, envelope: { attack: 0.001, decay: 0.1, sustain: 0, release: 0.1 } }).toDestination();
                synth.triggerAttackRelease("C3", "32n");
                synth.volume.value = -10;
            },
            playTurnStart: () => {
                if(!AudioManager.ready) return;
                const synth = new Tone.Synth({ oscillator: { type: "sine" }, envelope: { attack: 0.01, decay: 0.5, sustain: 0, release: 0.1 } }).toDestination();
                synth.triggerAttackRelease("E5", "8n");
                synth.volume.value = -15;
            },
            playTick: () => {
                if(!AudioManager.ready) return;
                const synth = new Tone.MetalSynth({ frequency: 200, envelope: { attack: 0.001, decay: 0.05, release: 0.01 }, harmonicity: 5.1, modulationIndex: 32, resonance: 4000, octaves: 1.5 }).toDestination();
                synth.triggerAttackRelease("32n");
                synth.volume.value = -25;
            },
            playError: () => {
                if(!AudioManager.ready) return;
                const synth = new Tone.Synth({ oscillator: { type: "sawtooth" } }).toDestination();
                synth.triggerAttackRelease("C3", "8n");
                setTimeout(() => synth.triggerAttackRelease("G2", "4n"), 150);
                synth.volume.value = -15;
            },
            playWin: () => {
                if(!AudioManager.ready) return;
                const synth = new Tone.PolySynth(Tone.Synth).toDestination();
                const now = Tone.now();
                synth.triggerAttackRelease(["C4", "E4", "G4"], "8n", now);
                synth.triggerAttackRelease(["C4", "F4", "A4"], "8n", now + 0.2);
                synth.triggerAttackRelease(["D4", "G4", "B4"], "8n", now + 0.4);
                synth.triggerAttackRelease(["C4", "E4", "G4", "C5"], "2n", now + 0.6);
                synth.volume.value = -10;
            },
            playPop: () => {
                if(!AudioManager.ready) return;
                const synth = new Tone.MembraneSynth({ pitchDecay: 0.2, octaves: 1.2, oscillator: { type: "sine" } }).toDestination();
                synth.triggerAttackRelease("G4", "32n");
                synth.volume.value = -10;
            }
        };

        const MAIN_CATEGORIES = [
            { id: 'rummy', name: 'משחקי רמי', icon: 'fa-layer-group', color: 'text-emerald-400' },
            { id: 'poker', name: 'פוקר הולדם', icon: 'fa-diamond', color: 'text-rose-400' },
            { id: 'backgammon', name: 'שש-בש (בקרוב)', icon: 'fa-chess-board', color: 'text-amber-400', disabled: true },
            { id: 'durak', name: 'דורקה (בקרוב)', icon: 'fa-crown', color: 'text-blue-400', disabled: true }
        ];

        const GAME_TYPES = [
            // Rummy Category
            { id: 'rummikub', category: 'rummy', name: 'רמיקוב אבנים', hex: '#10b981', maxPlayersLimit: 4 },
            { id: 'gin', category: 'rummy', name: 'ג\'ין רמי', hex: '#3b82f6', maxPlayersLimit: 2 },
            // Poker Category
            { id: 'texas', category: 'poker', name: 'טקסס הולדם', hex: '#ef4444', maxPlayersLimit: 9 },
            { id: 'omaha4', category: 'poker', name: 'אומהה 4', hex: '#8b5cf6', maxPlayersLimit: 9 },
            { id: 'omaha5', category: 'poker', name: 'אומהה 5', hex: '#ec4899', maxPlayersLimit: 7 }, // 5 cards * 7 players = 35 + 5 board = 40. Limit 7.
            { id: 'omaha6', category: 'poker', name: 'אומהה 6', hex: '#f97316', maxPlayersLimit: 6 }  // 6 cards * 6 players = 36 + 5 board = 41. Limit 6.
        ];

        const ROLES = { 
            SUPER_ADMIN: 'super_admin', // You. God Mode. No rake.
            CLUB_OWNER: 'club_owner',   // Multi-tenant club owner.
            MANAGER: 'manager', 
            AGENT: 'agent', 
            PLAYER: 'player' 
        };

        const AVATARS = [
            { id: 'av1', icon: 'fa-user-ninja', color: 'text-emerald-400', bg: 'bg-emerald-900/50' },
            { id: 'av2', icon: 'fa-user-astronaut', color: 'text-blue-400', bg: 'bg-blue-900/50' },
            { id: 'av3', icon: 'fa-cat', color: 'text-amber-400', bg: 'bg-amber-900/50' },
            { id: 'av4', icon: 'fa-dog', color: 'text-rose-400', bg: 'bg-rose-900/50' },
            { id: 'av5', icon: 'fa-dragon', color: 'text-purple-400', bg: 'bg-purple-900/50' },
            { id: 'av6', icon: 'fa-robot', color: 'text-cyan-400', bg: 'bg-cyan-900/50' }
        ];

        const formatMoney = (amount) => {
            if (amount === undefined || amount === null) return '🪙 0';
            return amount.toLocaleString();
        };

        const generateClubId = () => {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < 6; i++) { result += chars.charAt(Math.floor(Math.random() * chars.length)); }
            return result;
        };

        function App() {
            const [fbReady, setFbReady] = useState(false);
            const [authUser, setAuthUser] = useState(null);
            const [dbUser, setDbUser] = useState(null);
            const [currentView, setCurrentView] = useState('auth'); 
            const [tablesDB, setTablesDB] = useState([]);
            const [usersDB, setUsersDB] = useState([]);
            const [activeTable, setActiveTable] = useState(null);
            
            const [toasts, setToasts] = useState([]);
            const showToast = (msg, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, msg, type }]);
                setTimeout(() => { setToasts(prev => prev.filter(t => t.id !== id)); }, 4000);
            };

            useEffect(() => {
                const initAudio = () => { AudioManager.init(); window.removeEventListener('pointerdown', initAudio); };
                window.addEventListener('pointerdown', initAudio);
                
                if (window.fb) setFbReady(true);
                else {
                    const handleReady = () => setFbReady(true);
                    window.addEventListener('firebase-ready', handleReady);
                    return () => window.removeEventListener('firebase-ready', handleReady);
                }
            }, []);

            useEffect(() => {
                if (!fbReady) return;
                const unsubscribe = window.fb.onAuthStateChanged(window.fb.auth, async (user) => {
                    if (user) {
                        setAuthUser(user);
                        await fetchOrInitializeUser(user);
                    } else {
                        setAuthUser(null); setDbUser(null); setCurrentView('auth');
                    }
                });
                return () => unsubscribe();
            }, [fbReady]);

            const fetchOrInitializeUser = async (user) => {
                const userRef = window.fb.doc(window.fb.db, "users", user.uid);
                const userSnap = await window.fb.getDoc(userRef);
                
                if (userSnap.exists()) {
                    let data = userSnap.data();
                    let updates = {};
                    
                    // Super Admin Infinite Money Glitch (For Testing/Management)
                    if (data.role === ROLES.SUPER_ADMIN && (!data.balance || data.balance < 1000000)) {
                         updates.balance = 10000000;
                         data.balance = 10000000;
                    }
                    if (!data.clubId) {
                        const newClubId = generateClubId();
                        updates.clubId = newClubId;
                        data.clubId = newClubId;
                    }

                    if (Object.keys(updates).length > 0) await window.fb.updateDoc(userRef, updates);
                    setDbUser({ uid: user.uid, ...data });
                } else {
                    const usersQuery = await window.fb.getDocs(window.fb.collection(window.fb.db, "users"));
                    const isFirstUser = usersQuery.empty;
                    
                    let role = ROLES.PLAYER;
                    let status = 'pending';
                    let balance = 0;

                    if (isFirstUser) { role = ROLES.SUPER_ADMIN; status = 'approved'; balance = 10000000; } 

                    const newClubId = generateClubId();
                    const newUser = {
                        username: user.displayName || 'שחקן_' + newClubId,
                        clubId: newClubId,
                        email: user.email, role: role, status: status, balance: balance,
                        avatarId: 'av' + (Math.floor(Math.random()*6)+1),
                        agentId: null, agentRakeShare: 0,
                        createdAt: new Date().toISOString()
                    };
                    
                    await window.fb.setDoc(userRef, newUser);
                    setDbUser({ uid: user.uid, ...newUser });
                }
            };

            useEffect(() => {
                if (!fbReady || !dbUser) return;
                
                const unsubTables = window.fb.onSnapshot(window.fb.collection(window.fb.db, "tables"), (snapshot) => {
                    setTablesDB(snapshot.docs.map(doc => ({ docId: doc.id, ...doc.data() })));
                });

                const unsubMe = window.fb.onSnapshot(window.fb.doc(window.fb.db, "users", dbUser.uid), (doc) => {
                    if (doc.exists()) {
                        const data = doc.data();
                        setDbUser({ uid: doc.id, ...data });
                        
                        if (data.status === 'pending') setCurrentView('pending');
                        else if (currentView === 'auth' || currentView === 'pending') setCurrentView('lobby');
                    }
                });

                let unsubUsers = () => {};
                // Only load all users if they are an admin or agent
                if (dbUser.role !== ROLES.PLAYER) {
                    unsubUsers = window.fb.onSnapshot(window.fb.collection(window.fb.db, "users"), (snapshot) => {
                        setUsersDB(snapshot.docs.map(doc => ({ uid: doc.id, ...doc.data() })));
                    });
                }

                return () => { unsubTables(); unsubMe(); unsubUsers(); };
            }, [fbReady, dbUser?.uid, dbUser?.role, currentView]);

            if (!fbReady) return <div className="h-screen w-screen flex items-center justify-center text-emerald-400 font-bold"><i className="fa-solid fa-spinner fa-spin text-4xl"></i></div>;

            const userAvatar = AVATARS.find(a => a.id === dbUser?.avatarId) || AVATARS[0];

            return (
                <div className="h-full flex flex-col relative bg-slate-950">
                    {/* Header NavBar */}
                    {dbUser && dbUser.status === 'approved' && currentView !== 'table' && (
                        <nav className="bg-slate-950 p-3 sm:p-4 z-40 shrink-0 border-b border-slate-800 shadow-2xl relative">
                            <div className="absolute inset-0 bg-gradient-to-r from-blue-900/10 to-purple-900/10 pointer-events-none"></div>
                            <div className="max-w-7xl mx-auto flex justify-between items-center relative z-10">
                                
                                <div className="flex items-center gap-3">
                                    <button onClick={() => window.fb.signOut(window.fb.auth)} className="w-10 h-10 rounded-xl bg-slate-900 border border-slate-800 text-rose-500 hover:bg-rose-500/20 transition-all flex items-center justify-center" title="התנתק">
                                        <i className="fa-solid fa-arrow-right-from-bracket"></i>
                                    </button>
                                    
                                    {(dbUser.role !== ROLES.PLAYER) && (
                                        <button 
                                            onClick={() => setCurrentView(currentView === 'backoffice' ? 'lobby' : 'backoffice')}
                                            className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${currentView === 'backoffice' ? 'bg-slate-200 text-slate-900 shadow-[0_0_15px_rgba(255,255,255,0.5)]' : 'bg-slate-800 text-slate-400 hover:text-white border border-slate-700'}`}
                                            title="ניהול מועדון/סוכנות"
                                        >
                                            <i className="fa-solid fa-users-gear"></i>
                                        </button>
                                    )}

                                    <div 
                                        className="flex items-center gap-3 cursor-pointer bg-slate-900 hover:bg-slate-800 py-1.5 px-3 rounded-2xl border border-slate-700 transition-all shadow-lg group"
                                        onClick={() => setCurrentView('profile')}
                                    >
                                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center border border-slate-600 transition-transform group-hover:scale-110 ${userAvatar.bg}`}>
                                            <i className={`fa-solid ${userAvatar.icon} ${userAvatar.color} text-lg`}></i>
                                        </div>
                                        <div className="flex flex-col items-end pr-1">
                                            <span className="text-sm font-bold text-white flex items-center gap-2">
                                                {dbUser.username}
                                                {dbUser.role === ROLES.SUPER_ADMIN && <i className="fa-solid fa-bolt text-purple-400 text-[10px]" title="Super Admin"></i>}
                                                {dbUser.role === ROLES.CLUB_OWNER && <i className="fa-solid fa-crown text-gold-400 text-[10px]" title="Club Owner"></i>}
                                                {dbUser.role === ROLES.MANAGER && <i className="fa-solid fa-shield text-blue-400 text-[10px]" title="Manager"></i>}
                                                {dbUser.role === ROLES.AGENT && <i className="fa-solid fa-handshake text-emerald-400 text-[10px]" title="Agent"></i>}
                                            </span>
                                            <span className="chip-text text-md leading-none tracking-wide"><i className="fa-solid fa-coins text-gold-500 mr-1 text-xs"></i>{formatMoney(dbUser.balance)}</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex flex-col items-end cursor-pointer" onClick={() => setCurrentView('lobby')}>
                                    <h1 className="text-2xl sm:text-3xl font-black tracking-widest uppercase bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-white drop-shadow-[0_0_10px_rgba(59,130,246,0.5)]">
                                        RUMMIKUBE<span className="text-blue-500">.COM</span>
                                    </h1>
                                    <p className="text-[10px] text-slate-400 font-bold tracking-[0.4em] uppercase">Elite Private Club</p>
                                </div>
                            </div>
                        </nav>
                    )}

                    <main className="flex-1 relative overflow-hidden flex flex-col z-0">
                        {currentView === 'auth' && <AuthView />}
                        {currentView === 'pending' && <PendingView />}
                        {currentView === 'lobby' && <LobbyView user={dbUser} tables={tablesDB} onJoin={(t) => {setActiveTable(t); setCurrentView('table');}} showToast={showToast} />}
                        {currentView === 'backoffice' && <BackofficeView user={dbUser} usersDB={usersDB} showToast={showToast} />}
                        {currentView === 'profile' && <ProfileView user={dbUser} onSave={() => setCurrentView('lobby')} showToast={showToast} />}
                        {currentView === 'table' && <TableDirector tableDocId={activeTable?.docId} user={dbUser} onLeave={() => {setActiveTable(null); setCurrentView('lobby');}} showToast={showToast} />}
                    </main>

                    {/* Global Toasts */}
                    <div className="fixed bottom-10 left-1/2 transform -translate-x-1/2 z-[999999] flex flex-col items-center gap-2 pointer-events-none">
                        {toasts.map(t => (
                            <div key={t.id} className={`toast-animate px-6 py-3 rounded-2xl shadow-2xl font-bold whitespace-nowrap border ${t.type === 'error' ? 'bg-rose-900 border-rose-500 text-white' : t.type === 'success' ? 'bg-emerald-900 border-emerald-500 text-white' : 'bg-slate-800 border-slate-600 text-white'}`}>
                                {t.msg}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function AuthView() {
            const [error, setError] = useState('');
            const handleLogin = async () => {
                try { await window.fb.signInWithPopup(window.fb.auth, window.fb.googleProvider); } 
                catch (e) { setError(`שגיאה בהתחברות: (${e.code})`); }
            };
            return (
                <div className="flex-1 flex items-center justify-center p-4">
                    <div className="glass-panel p-10 rounded-3xl w-full max-w-md text-center border-t-4 border-blue-500 relative overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.8)]">
                        <div className="absolute top-0 left-0 w-full h-32 bg-blue-500/10 blur-3xl"></div>
                        <div className="w-20 h-20 mx-auto bg-slate-900 rounded-2xl flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(59,130,246,0.3)] border border-slate-800 relative z-10">
                             <i className="fa-solid fa-gem text-5xl text-blue-500"></i>

                if (!selectedUser || !amount || isNaN(amount) || amount <= 0) return showToast("הזן סכום תקין", "error");
                const amt = parseInt(amount);
                const isDeposit = type === 'deposit';
                
                // Only enforce balance check if not SUPER_ADMIN
                if (user.role !== ROLES.SUPER_ADMIN) {
                    if (isDeposit && user.balance < amt) return showToast("אין לך מספיק צ'יפים להפקדה לשחקן!", "error");

                        const senderRef = window.fb.doc(window.fb.db, "users", user.uid);
                        const receiverRef = window.fb.doc(window.fb.db, "users", selectedUser.uid);
                        const senderDoc = await transaction.get(senderRef);
                        const receiverDoc = await transaction.get(receiverRef);

                        const newReceiverBalance = isDeposit ? receiverDoc.data().balance + amt : receiverDoc.data().balance - amt;
                        
                        transaction.update(senderRef, { balance: newSenderBalance });
                        transaction.update(receiverRef, { balance: newReceiverBalance });

        function LobbyView({ user, tables, onJoin, showToast }) {
            const [activeCategory, setActiveCategory] = useState('rummy');
            const [activeGameType, setActiveGameType] = useState('rummikub');
            
            const isAdmin = user.role !== ROLES.PLAYER;
            
            // Sub-types based on category
            const subTypes = GAME_TYPES.filter(g => g.category === activeCategory);
            const filteredTables = tables.filter(t => t.type === activeGameType);
            const typeInfo = GAME_TYPES.find(g => g.id === activeGameType) || GAME_TYPES[0];

            const [showCreate, setShowCreate] = useState(false);
            
            // Advanced Table Creation Settings
            const [isTournament, setIsTournament] = useState(false);
            const [createSettings, setCreateSettings] = useState({
                maxPlayers: typeInfo.maxPlayersLimit,
                minToStart: 2,
                turnTime: 30,
                sb: 10,
                bb: 20,
                minBuyIn: 1000,
                maxBuyIn: 5000,
                penaltyLimit: 500, // For Rummy tournaments
                ratholeTimer: 30, // Minutes (0 = disabled)
                rakePercent: 6,
                rakeCap: 100
            });

            // Update default max players when game type changes
            useEffect(() => {
                if (subTypes.length > 0 && !subTypes.find(s => s.id === activeGameType)) {
                    setActiveGameType(subTypes[0].id);
                }
            }, [activeCategory]);
            
            useEffect(() => {
                const newTypeInfo = GAME_TYPES.find(g => g.id === activeGameType);
                if (newTypeInfo) {
                    setCreateSettings(prev => ({
                        ...prev,
                        maxPlayers: newTypeInfo.maxPlayersLimit,
                        minToStart: Math.min(prev.minToStart, newTypeInfo.maxPlayersLimit)
                    }));
                }
            }, [activeGameType]);

            const handleSettingChange = (field, value) => {
                setCreateSettings(prev => ({ ...prev, [field]: Number(value) }));
            };

            const handleCreateTable = async () => {
                try {
                    let stakesString = activeCategory === 'poker' ? `${createSettings.sb}/${createSettings.bb}` : `${createSettings.sb}`;
                    
                    await window.fb.addDoc(window.fb.collection(window.fb.db, "tables"), {
                        type: activeGameType, 
                        isTournament: isTournament,
                        stakes: isTournament ? 0 : stakesString, 
                        
                        // Advanced settings
                        maxPlayers: createSettings.maxPlayers,
                        minToStart: createSettings.minToStart,
                        turnTime: createSettings.turnTime,
                        buyIn: createSettings.minBuyIn, // Base buy-in or tournament fee
                        minBuyIn: createSettings.minBuyIn,
                        maxBuyIn: createSettings.maxBuyIn,
                        penaltyLimit: isTournament ? createSettings.penaltyLimit : 0, 
                        prizePool: 0, 
                        ratholeTimerMin: createSettings.ratholeTimer,
                        rakePercent: createSettings.rakePercent,
                        rakeCap: createSettings.rakeCap,
                        
                        // State tracking
                        status: 'waiting', 
                        players: {}, 
                        board: [], deck: [], discardPile: [], currentTurn: null, 
                        chatEnabled: true, mutedPlayers: [], chat: [], 
                        waitingList: [],
                        ratholeHistory: {}, // { uid: { stack: 5000, ts: timestamp } }
                        
                        createdAt: new Date().toISOString(), 
                        createdBy: user.uid
                    });
                    setShowCreate(false); showToast("שולחן נפתח בהצלחה!", "success");
                } catch(e) { showToast("שגיאה בפתיחת שולחן", "error"); console.error(e); }
            };

            const joinWaitingList = async (table) => {
                const isAlreadyWaiting = (table.waitingList || []).find(w => w.uid === user.uid);
                if (isAlreadyWaiting) return showToast("אתה כבר ברשימת ההמתנה לשולחן זה", "info");
                try {
                    const newList = [...(table.waitingList || []), { uid: user.uid, username: user.username, joinedAt: Date.now() }];
                    await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", table.docId), { waitingList: newList });

                    <div className="bg-slate-900/50 border-b border-slate-800 overflow-x-auto hide-scrollbar shrink-0 relative z-10">

                    <div className="p-4 max-w-6xl mx-auto w-full mt-4">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-xl sm:text-2xl font-black text-white flex items-center gap-3">

                        </div>

                        {/* ADVANCED TABLE CREATION PANEL */}
                        {showCreate && isAdmin && (
                            <div className="glass-panel p-6 rounded-2xl mb-8 flex flex-col gap-6 border-blue-500/50 shadow-[0_0_30px_rgba(59,130,246,0.2)]">
                                
                                <div className="flex items-center justify-between border-b border-slate-700 pb-4">

                                    <div>

                                        <select value={createSettings.ratholeTimer} onChange={e=>handleSettingChange('ratholeTimer', e.target.value)} className="w-full bg-slate-950 text-white px-3 py-2 rounded-lg border border-rose-900 outline-none focus:border-rose-500">

                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                                    {!isTournament ? (

                                            {activeCategory === 'poker' ? (
                                                <>
                                                    <div><label className="block text-xs font-bold text-slate-400 mb-1">Small Blind</label><input type="number" value={createSettings.sb} onChange={e=>handleSettingChange('sb', e.target.value)} className="w-full bg-slate-950 text-white px-3 py-2 rounded-lg border border-slate-700" /></div>
                                                    <div><label className="block text-xs font-bold text-slate-400 mb-1">Big Blind</label><input type="number" value={createSettings.bb} onChange={e=>handleSettingChange('bb', e.target.value)} className="w-full bg-slate-950 text-white px-3 py-2 rounded-lg border border-slate-700" /></div>

                                            )}
                                            <div><label className="block text-xs font-bold text-slate-400 mb-1">מינימום כניסה (Min)</label><input type="number" value={createSettings.minBuyIn} onChange={e=>handleSettingChange('minBuyIn', e.target.value)} className="w-full bg-slate-950 text-white px-3 py-2 rounded-lg border border-slate-700" /></div>
                                            <div><label className="block text-xs font-bold text-slate-400 mb-1">מקסימום כניסה (Max)</label><input type="number" value={createSettings.maxBuyIn} onChange={e=>handleSettingChange('maxBuyIn', e.target.value)} className="w-full bg-slate-950 text-white px-3 py-2 rounded-lg border border-slate-700" /></div>
                                        </>
                                    ) : (
                                        <>
                                            <div><label className="block text-xs font-bold text-gold-400 mb-1">דמי הרשמה (Buy-in)</label><input type="number" value={createSettings.minBuyIn} onChange={e=>handleSettingChange('minBuyIn', e.target.value)} className="w-full bg-slate-950 text-white px-3 py-2 rounded-lg border border-gold-500/50" /></div>
                                            {activeCategory === 'rummy' && (
                                                <div><label className="block text-xs font-bold text-rose-400 mb-1">רף פסילה (מינוס)</label><input type="number" value={createSettings.penaltyLimit} onChange={e=>handleSettingChange('penaltyLimit', e.target.value)} className="w-full bg-slate-950 text-white px-3 py-2 rounded-lg border border-rose-500/50" /></div>
                                            )}
                                        </>
                                    )}
                                </div>

                                <div className="flex justify-end gap-4 mt-2">
                                    <button onClick={handleCreateTable} className="bg-blue-600 hover:bg-blue-500 text-white px-10 py-3 rounded-xl font-black shadow-[0_0_15px_rgba(59,130,246,0.4)] transition-all text-lg">פתח שולחן</button>
                                </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                            {filteredTables.length === 0 && <div className="col-span-full text-center text-slate-500 p-10 font-bold">אין שולחנות פעילים בקטגוריה זו.</div>}
                            
                            {filteredTables.map(t => {
                                const isFull = Object.keys(t.players || {}).length >= (t.maxPlayers || typeInfo.maxPlayersLimit);
                                const isWaiting = (t.waitingList || []).some(w => w.uid === user.uid);
                                const waitingIndex = (t.waitingList || []).findIndex(w => w.uid === user.uid);
                                
                                return (
                                <div key={t.docId} className={`glass-panel rounded-2xl p-6 border ${t.isTournament ? 'border-gold-500/50 hover:border-gold-400 shadow-[0_0_20px_rgba(251,191,36,0.1)]' : 'border-slate-700 hover:border-slate-400'} transition-all hover:-translate-y-1 relative overflow-hidden group shadow-xl flex flex-col`}>
                                    <div className="absolute top-0 right-0 w-full h-1.5 transition-all" style={{ backgroundColor: t.isTournament ? '#fbbf24' : typeInfo.hex, boxShadow: `0 0 20px ${t.isTournament ? '#fbbf24' : typeInfo.hex}` }}></div>
                                    
                                    <div className="cursor-pointer flex-1" onClick={() => !isFull && onJoin(t)}>
                                        <div className="flex justify-between items-start mb-6">
                                            <div>
                                                {t.isTournament ? (
                                                    <><p className="text-gold-400 text-[10px] font-bold tracking-widest uppercase mb-1"><i className="fa-solid fa-trophy mr-1"></i> טורניר</p><h3 className="text-2xl font-black chip-text">Prize: {formatMoney(t.prizePool || 0)}</h3></>
                                                ) : (
                                                    <><p className="text-slate-400 text-[10px] font-bold tracking-widest uppercase mb-1">{activeCategory === 'poker' ? 'בליינדים' : 'ערך נקודה'}</p><h3 className="text-3xl font-black chip-text">{t.stakes} <i className="fa-solid fa-coins text-gold-500 text-lg"></i></h3></>
                                                )}
                                            </div>
                                            <div className="bg-slate-950 px-3 py-1.5 rounded-lg text-sm font-bold border border-slate-800 flex items-center gap-2">
                                                <span className={isFull ? 'text-rose-400' : 'text-emerald-400'}>{Object.keys(t.players || {}).length}/{t.maxPlayers || typeInfo.maxPlayersLimit}</span>
                                                <i className="fa-solid fa-users text-slate-500 text-xs"></i>
                                            </div>
                                        </div>
                                        <div className="flex justify-between items-center bg-slate-950/80 p-3 rounded-xl border border-slate-800 mb-4 shadow-inner">
                                            <span className="text-xs text-slate-400 font-bold">{t.isTournament ? 'דמי הרשמה:' : 'כניסה:'}</span>
                                            <span className="text-lg font-black text-white font-rubik">
                                                {t.isTournament ? formatMoney(t.buyIn) : `${formatMoney(t.minBuyIn)} - ${formatMoney(t.maxBuyIn)}`}
                                            </span>
                                        </div>
                                    </div>
                                    
                                    <div className="flex justify-between items-center mt-auto pt-2 border-t border-slate-800/50">
                                        <div className="flex flex-col gap-1">
                                            <span className="text-[10px] text-slate-400 font-bold bg-slate-900 px-2 py-1 rounded border border-slate-800"><i className="fa-regular fa-clock mr-1"></i>{t.turnTime} שניות</span>
                                            {(t.ratholeTimerMin > 0) && <span className="text-[9px] text-rose-400"><i className="fa-solid fa-shield-halved"></i> הגנת Rathole {t.ratholeTimerMin} דק'</span>}
                                        </div>
                                        
                                        {!isFull ? (
                                            <button onClick={() => onJoin(t)} className="px-6 py-2 rounded-xl font-black text-white shadow-lg transition-transform hover:scale-105" style={{ backgroundColor: t.isTournament ? '#d97706' : typeInfo.hex }}>הכנס לשולחן</button>
                                        ) : isWaiting ? (
                                            <div className="px-4 py-2 rounded-xl font-bold bg-orange-900/50 text-orange-400 border border-orange-500 text-sm flex items-center gap-2">
                                                <i className="fa-solid fa-hourglass-half fa-spin"></i> בתור ({waitingIndex + 1})
                                            </div>
                                        ) : (
                                            <button onClick={() => joinWaitingList(t)} className="px-4 py-2 rounded-xl font-bold bg-slate-800 text-slate-300 border border-slate-600 hover:bg-slate-700 hover:text-white transition-colors text-sm flex items-center gap-2">
                                                <i className="fa-solid fa-arrow-right-to-bracket"></i> הצטרף לתור
                                            </button>
                                        )}
                                    </div>
                                </div>
                            )})}
                        </div>
                    </div>
                </div>
            );
        }

        function TableDirector({ tableDocId, user, onLeave, showToast }) {
            const [tableState, setTableState] = useState(null);
            useEffect(() => {
                if (!tableDocId) return;
                const unsub = window.fb.onSnapshot(window.fb.doc(window.fb.db, "tables", tableDocId), (doc) => {
                    if (doc.exists()) setTableState({ id: doc.id, ...doc.data() });
                });
                return () => unsub();
            }, [tableDocId]);
            if (!tableState) return <div className="flex-1 bg-slate-950 flex items-center justify-center text-white text-xl">טוען שולחן...</div>;

            const category = GAME_TYPES.find(g => g.id === tableState.type)?.category;

            if (category === 'rummy') {
                if (tableState.type === 'rummikub') return <RummikubTable tableState={tableState} user={user} onLeave={onLeave} showToast={showToast} />;
                if (tableState.type === 'gin') return <GinRummyTable tableState={tableState} user={user} onLeave={onLeave} showToast={showToast} />;
            } else if (category === 'poker') {
                return <PokerTable tableState={tableState} user={user} onLeave={onLeave} showToast={showToast} />;
            }
            
            return <div className="flex-1 bg-slate-950 text-white p-10 text-center">משחק זה טרם נתמך במלואו.</div>;
        }

        function PokerTable({ tableState, user, onLeave, showToast }) {
            const typeInfo = GAME_TYPES.find(g => g.id === tableState.type) || GAME_TYPES[0];
            const hex = typeInfo.hex;
            
            const isSeated = tableState?.players?.[user.uid] !== undefined;
            const isPlaying = tableState?.status === 'playing';
            
            const maxSeats = tableState.maxPlayers || typeInfo.maxPlayersLimit;
            const seats = Array(maxSeats).fill(null);
            
            Object.entries(tableState.players || {}).forEach(([uid, pData]) => {
                if (pData.seat !== undefined && pData.seat < maxSeats) {
                    seats[pData.seat] = { uid, ...pData };
                }
            });

            // Advanced Seat positioning based on dynamic maxSeats
            const getSeatStyle = (index) => {
                const total = maxSeats;
                // Distribute seats around an ellipse
                const angle = (index / total) * Math.PI * 2 + (Math.PI / 2); // Start bottom center
                
                // Ellipse radii (percentages)
                const rx = 45; 
                const ry = 40; 
                
                const left = 50 + Math.cos(angle) * rx;
                const top = 50 + Math.sin(angle) * ry;

                return { top: `${top}%`, left: `${left}%`, transform: 'translate(-50%, -50%)' };
            };

            const handleSitDown = async (seatIndex) => {
                showToast("בודק מקום בשולחן הפוקר...", "info");
                const currentPlayers = tableState.players || {};
                
                if (Object.keys(currentPlayers).length >= maxSeats) return showToast("השולחן מלא.", "error");
                
                // Determine Required Buy-in (Ratholing Protection)
                let requiredBuyIn = Number(tableState.minBuyIn);
                
                if (tableState.ratholeHistory && tableState.ratholeHistory[user.uid]) {
                    const history = tableState.ratholeHistory[user.uid];
                    const timeSinceLeftMs = Date.now() - history.ts;
                    const ratholeTimerMs = (tableState.ratholeTimerMin || 0) * 60 * 1000;
                    
                    if (ratholeTimerMs > 0 && timeSinceLeftMs < ratholeTimerMs) {
                        requiredBuyIn = Math.max(requiredBuyIn, history.stack); // Must buy in for what they left with
                        if (requiredBuyIn > Number(tableState.maxBuyIn)) {
                            requiredBuyIn = Number(tableState.maxBuyIn); // Cap it at max buy in if they somehow left with more
                        }
                        showToast(`חזרת מוקדם (פגע וברח). עליך להיכנס עם לפחות ${formatMoney(requiredBuyIn)}`, "info");
                    }
                }
                
                if (Number(user.balance) < requiredBuyIn) {
                    return showToast(`אין לך מספיק צ'יפים. נדרשים לפחות ${formatMoney(requiredBuyIn)}.`, "error");
                }
                
                try {
                    const updatedPlayers = { ...currentPlayers };
                    updatedPlayers[user.uid] = { 
                        username: user.username, avatarId: user.avatarId, 
                        seat: seatIndex, stack: requiredBuyIn, cards: [], status: 'sitting'
                    };
                    
                    await window.fb.runTransaction(window.fb.db, async (transaction) => {
                        const userRef = window.fb.doc(window.fb.db, "users", user.uid);
                        const tableRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const userDoc = await transaction.get(userRef);
                        
                        const newBalance = Number(userDoc.data().balance) - requiredBuyIn;
                        transaction.update(userRef, { balance: newBalance });
                        transaction.update(tableRef, { players: updatedPlayers });
                    });

                    showToast("התיישבת בהצלחה!", "success");
                } catch(e) { showToast("שגיאה בהתיישבות", "error"); console.error(e); }
            };

            const handleLeave = async () => {
                if (!isSeated) return onLeave();

                try {
                    await window.fb.runTransaction(window.fb.db, async (transaction) => {
                        const userRef = window.fb.doc(window.fb.db, "users", user.uid);
                        const tableRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const userDoc = await transaction.get(userRef);
                        const tableDoc = await transaction.get(tableRef);
                        
                        const tData = tableDoc.data();
                        const myStack = tData.players[user.uid]?.stack || 0;
                        
                        // Ratholing logic update
                        const newRatholeHistory = { ...tData.ratholeHistory };
                        newRatholeHistory[user.uid] = { stack: myStack, ts: Date.now() };
                        
                        const newBalance = Number(userDoc.data().balance) + myStack;
                        
                        const updatedPlayers = { ...tData.players };
                        delete updatedPlayers[user.uid];
                        
                        transaction.update(userRef, { balance: newBalance });
                        transaction.update(tableRef, { players: updatedPlayers, ratholeHistory: newRatholeHistory });
                    });
                    onLeave();
                } catch(e) { showToast("שגיאה בעזיבת שולחן.", "error"); }
            };

            return (
                <div className="flex-1 flex flex-col relative game-felt select-none" style={{ touchAction: 'none' }}>
                    <div className="absolute inset-0 pointer-events-none opacity-20 mix-blend-screen" style={{ background: `radial-gradient(circle at 50% 50%, ${hex} 0%, transparent 70%)` }}></div>
                    
                    <div className="relative z-20 px-4 py-3 bg-slate-950/80 backdrop-blur-md flex justify-between items-center shadow-lg border-b border-slate-800">
                        <button onClick={handleLeave} className="text-slate-400 hover:text-white bg-slate-900 px-4 py-2 rounded-xl font-bold border border-slate-800 flex items-center gap-2">
                            <i className="fa-solid fa-arrow-right"></i> עזוב
                        </button>
                        <div className="text-center">
                            <h2 className="text-xl font-black text-white uppercase tracking-widest font-sans" style={{textShadow: `0 0 15px ${hex}`}}>
                                {typeInfo.name}
                            </h2>
                            <p className="text-[10px] text-slate-400 font-bold bg-slate-900 px-2 rounded-full border border-slate-800 mt-0.5 inline-block">
                                בליינדים: <span style={{color: hex}}>{tableState.stakes}</span>
                            </p>
                        </div>
                    </div>

                    <div className="flex-1 relative flex items-center justify-center p-4 py-10">
                        
                        <div className="relative w-full max-w-sm h-full max-h-[700px] border-[12px] poker-table-oval flex items-center justify-center flex-col z-0"
                             style={{ borderColor: `${hex}80`, backgroundColor: 'rgba(5, 10, 20, 0.9)' }}>
                             
                            <div className="absolute inset-4 rounded-[9999px] border-2 border-white/5 pointer-events-none"></div>

                            <div className="relative z-10 flex flex-col items-center">
                                <div className="mb-4 bg-black/60 px-4 py-1.5 rounded-full border border-white/10 flex items-center gap-2 shadow-inner">
                                    <i className="fa-solid fa-coins text-gold-500 text-sm"></i>
                                    <span className="text-white font-black font-rubik text-lg">Pot: {formatMoney(tableState.pot || 0)}</span>
                                </div>
                                
                                <div className="flex gap-1.5 sm:gap-2 justify-center">
                                    {[0,1,2,3,4].map(i => (
                                        <div key={i} className="w-10 h-14 sm:w-12 sm:h-16 border-2 border-dashed border-white/20 rounded bg-white/5 flex items-center justify-center">
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {seats.map((seat, index) => {
                            const style = getSeatStyle(index);
                            return (
                                <div key={index} className="absolute z-20" style={style}>
                                    {seat ? (
                                        <div className="flex flex-col items-center group relative">
                                            <div className={`w-14 h-14 rounded-full border-4 flex items-center justify-center shadow-2xl relative ${seat.uid === user.uid ? 'bg-slate-800 border-white ring-4 ring-blue-500' : 'bg-slate-900 border-slate-600'}`}>
                                                <i className={`fa-solid ${AVATARS.find(a=>a.id===seat.avatarId)?.icon || 'fa-user'} ${AVATARS.find(a=>a.id===seat.avatarId)?.color || 'text-slate-400'} text-xl`}></i>
                                            </div>
                                            <div className="mt-2 bg-slate-950/90 border border-slate-800 rounded-lg px-2 py-1 text-center min-w-[80px]">
                                                <div className="text-[10px] text-slate-300 font-bold truncate max-w-[70px]">{seat.username}</div>

        // For the sake of the complete file mandate and rendering stability, I am embedding the full Rummikub logic below.
        
        const generateRummikubDeck = () => {
            const colors = ['#f43f5e', '#3b82f6', '#fbbf24', '#0f172a']; 
            let deck = [];
            let idCounter = 1;
            for (let s = 0; s < 2; s++) { 
                colors.forEach(hex => { for (let i = 1; i <= 13; i++) { deck.push({ id: `t_${idCounter++}`, val: i, hex }); } });
            }
            deck.push({ id: `t_${idCounter++}`, val: '☻', hex: '#ffffff', isJoker: true });
            deck.push({ id: `t_${idCounter++}`, val: '☻', hex: '#ffffff', isJoker: true });
            return deck.sort(() => Math.random() - 0.5);
        };

        const isValidMeld = (meld) => {
            if (meld.length < 3 || meld.length > 13) return false;
            const jokers = meld.filter(t => t.val === '☻' || t.isJoker);
            const regulars = meld.filter(t => t.val !== '☻' && !t.isJoker);
            if (regulars.length === 0) return true; 
            const isSet = () => {
                if (meld.length > 4) return false;
                const val = regulars[0].val;
                const colors = new Set();
                for (let t of regulars) { if (t.val !== val || colors.has(t.hex)) return false; colors.add(t.hex); }
                return true;
            };
            const isRun = () => {
                const hex = regulars[0].hex;
                const values = [];
                for (let t of regulars) { if (t.hex !== hex) return false; values.push(parseInt(t.val)); }
                values.sort((a, b) => a - b);
                if (new Set(values).size !== values.length) return false;
                const span = values[values.length - 1] - values[0] + 1;
                const internalGaps = span - values.length;
                if (internalGaps > jokers.length) return false; 
                const remainingJokers = jokers.length - internalGaps;
                const leftSpace = values[0] - 1;
                const rightSpace = 13 - values[values.length - 1];
                if (remainingJokers > leftSpace + rightSpace) return false; 
                return true;
            };
            return isSet() || isRun();
        };

        const getGroupValue = (group) => {
            const regulars = group.filter(t => t.val !== '☻' && !t.isJoker);
            if (regulars.length === 0) return 0;
            const isSet = regulars.every(t => t.val === regulars[0].val);
            if (isSet) return parseInt(regulars[0].val) * group.length;
            const vals = regulars.map(t => parseInt(t.val)).sort((a,b)=>a-b);
            let sum = 0, jokersLeft = group.length - regulars.length;
            for (let i = 0; i < vals.length; i++) {
                if (i > 0) { const gap = vals[i] - vals[i-1] - 1; for (let j = 1; j <= gap; j++) { sum += (vals[i-1] + j); jokersLeft--; } }
                sum += vals[i];
            }
            let top = vals[vals.length - 1] + 1, bottom = vals[0] - 1;
            while (jokersLeft > 0) {
                if (top <= 13) { sum += top; top++; } else { sum += bottom; bottom--; }
                jokersLeft--;
            }
            return sum;
        };

        function RummikubTable({ tableState, user, onLeave, showToast }) {
            const [localRack, setLocalRack] = useState([]); 
            const [dragData, setDragData] = useState(null);
            const [dragPos, setDragPos] = useState({ x: 0, y: 0 });

            const [showEmojis, setShowEmojis] = useState(false);

            const isSeated = tableState?.players?.[user.uid] !== undefined;

            useEffect(() => {

            }, [isMyTurn, timeLeft]);

            useEffect(() => {
                if (tableState?.lastEvent?.type === 'emoji' && tableState.lastEvent.ts > Date.now() - 5000) {
                    const id = Math.random().toString(36);
                    setFloatingEmojis(prev => [...prev, { id, uid: tableState.lastEvent.uid, emoji: tableState.lastEvent.emoji }]);
                    AudioManager.playPop();
                    setTimeout(() => { setFloatingEmojis(prev => prev.filter(e => e.id !== id)); }, 2500);
                }
            }, [tableState?.lastEvent?.ts]);

            const handleSortRuns = () => { 
                let sorted = [...localRack].sort((a, b) => {
                    if(a.isJoker) return 1; if(b.isJoker) return -1;
                    if(a.hex !== b.hex) return a.hex.localeCompare(b.hex);
                    return parseInt(a.val) - parseInt(b.val);
                });
                setLocalRack(sorted); AudioManager.playClack();
            };

            const handleSortSets = () => { 
                let sorted = [...localRack].sort((a, b) => {
                    if(a.isJoker) return 1; if(b.isJoker) return -1;
                    if(parseInt(a.val) !== parseInt(b.val)) return parseInt(a.val) - parseInt(b.val);
                    return a.hex.localeCompare(b.hex);
                });
                setLocalRack(sorted); AudioManager.playClack();
            };

            const sendEmoji = async (emoji) => {
                setShowEmojis(false);
                try { await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { lastEvent: { type: 'emoji', uid: user.uid, emoji, ts: Date.now() } }); } 
                catch(e) { console.error(e); }
            };

            useEffect(() => {
                const handlePointerMove = (e) => {
                    if (!dragData || !isMyTurn) return;
                    e.preventDefault(); 
                    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                    setDragPos({ x: clientX, y: clientY });
                    if (!tableRef.current) return;
                    const elements = document.elementsFromPoint(clientX, clientY);
                    let foundZone = null;
                    for (let el of elements) {
                        const zone = el.getAttribute('data-zone');
                        if (zone) { if (zone.startsWith('joker-')) { foundZone = zone; break; } if (!foundZone) foundZone = zone; }
                    }
                    setHoverTarget(foundZone);
                };

                const handlePointerUp = async (e) => {
                    if (!dragData || !tableState || !isMyTurn) return;
                    let newRack = [...localRack];
                    let newBoard = (tableState.board || []).map(g => [...g]); 
                    let boardChanged = false;

                    if (hoverTarget && hoverTarget.startsWith('joker-')) {
                        const parts = hoverTarget.split('-');
                        const targetGIdx = parseInt(parts[1]), targetTIdx = parseInt(parts[2]);
                        const jokerTile = newBoard[targetGIdx][targetTIdx], draggedTile = dragData.tile;
                        
                        if (dragData.source === 'rack') {
                            newRack.splice(dragData.tileIndex, 1, jokerTile);
                            newBoard[targetGIdx].splice(targetTIdx, 1, draggedTile);
                            AudioManager.playPop();
                            showToast("ג'וקר שוחרר לתושבת! חובה להשתמש בו.", "success");
                        } else if (dragData.source === 'board') {
                            newBoard[dragData.groupIndex].splice(dragData.tileIndex, 1, jokerTile);
                            newBoard[targetGIdx].splice(targetTIdx, 1, draggedTile);
                            AudioManager.playPop();
                        }
                        boardChanged = true;
                    }
                    else {
                        if (dragData.source === 'rack') newRack.splice(dragData.tileIndex, 1);
                        else if (dragData.source === 'board') {
                            newBoard[dragData.groupIndex].splice(dragData.tileIndex, 1);
                            if (newBoard[dragData.groupIndex].length === 0) newBoard.splice(dragData.groupIndex, 1);
                            boardChanged = true;
                        }

                        if (hoverTarget && hoverTarget.startsWith('board-group-')) {
                            const targetIdx = parseInt(hoverTarget.replace('board-group-', ''));
                            const actualIdx = (dragData.source === 'board' && dragData.groupIndex < targetIdx && newBoard.length < (tableState.board||[]).length) ? targetIdx - 1 : targetIdx;
                            if(newBoard[actualIdx]) newBoard[actualIdx].push(dragData.tile);
                            else newBoard.push([dragData.tile]);
                            boardChanged = true; AudioManager.playClack();

                        else if (hoverTarget === 'board-main') {
                            newBoard.push([dragData.tile]); boardChanged = true; AudioManager.playClack();
                        } 
                        else if (hoverTarget === 'rack') {
                            newRack.push(dragData.tile); AudioManager.playClack();
                        } 
                        else {
                            if (dragData.source === 'rack') newRack.splice(dragData.tileIndex, 0, dragData.tile);
                            else { newBoard[dragData.groupIndex].splice(dragData.tileIndex, 0, dragData.tile); boardChanged = true; }

                    }

                    setLocalRack(newRack);
                    if (boardChanged) {
                        try { await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { board: newBoard }); } 
                        catch(err) { console.error(err); }

                    setDragData(null); setHoverTarget(null);

                if (dragData) {

                return () => {

            }, [dragData, hoverTarget, localRack, tableState, isMyTurn]);

            const startDrag = (e, tile, source, groupIndex, tileIndex) => {

                const clientX = e.clientX || (e.touches && e.touches[0].clientX);

            const handleSitDown = async () => {

                const currentPlayers = tableState.players || {};
                
                if (tableState.waitingList && tableState.waitingList.length > 0) {

                if (Object.keys(currentPlayers).length >= (tableState.maxPlayers || 4)) return showToast("השולחן מלא.", "error");
                
                if (tableState.isTournament) {
                    try {
                        await window.fb.runTransaction(window.fb.db, async (transaction) => {
                            const userRef = window.fb.doc(window.fb.db, "users", user.uid);
                            const tableRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                            const userDoc = await transaction.get(userRef);
                            const tableDoc = await transaction.get(tableRef);
                            if (Number(userDoc.data().balance) < Number(tableState.minBuyIn)) throw "אין לך מספיק צ'יפים להרשמה לטורניר. פנה לסוכן להפקדה.";
                            const tData = tableDoc.data();
                            const takenSeats = Object.values(tData.players || {}).map(p => p.seat);
                            let emptySeat = 0; while (takenSeats.includes(emptySeat)) emptySeat++;
                            
                            const updatedPlayers = { ...tData.players };
