                const origJokers = (originalRackRef.current || []).filter(t => t.val === '☻' || t.isJoker).length;
                const currentJokers = localRack.filter(t => t.val === '☻' || t.isJoker).length;
                if (currentJokers > origJokers) return applyPenalty("שחררת ג'וקר ולא השתמשת בו! חובה לשלבו על השולחן.");
                const origRack = originalRackRef.current || [];
                if (localRack.length === origRack.length) return handleDrawTile(); 

                let updates = {};
                if (!myPlayerData.hasOpened) {
                    const origBoardStr = JSON.stringify(originalBoardRef.current || []);
                    const currentBoardPrefix = JSON.stringify(currentBoard.slice(0, (originalBoardRef.current || []).length));
                    if (origBoardStr !== currentBoardPrefix) return applyPenalty("לפני ירידה ראשונה, אסור לשנות אבנים קיימות!");
                    const newGroups = currentBoard.slice((originalBoardRef.current || []).length);
                    let totalPoints = 0;
                    newGroups.forEach(g => totalPoints += getGroupValue(g));
                    if (totalPoints < 30) return applyPenalty(`ירידה ראשונה חייבת להיות 30 נקודות (הורדת ${totalPoints}).`);
                    updates[`players.${user.uid}.hasOpened`] = true;
                    showToast("כל הכבוד! פתחת את המשחק.", "success");
                }

                if (localRack.length === 0) return await handleWin();
                const uids = Object.keys(tableState.players);
                const nextTurnUid = uids[(uids.indexOf(user.uid) + 1) % uids.length];
                updates.currentTurn = nextTurnUid;
                updates[`players.${user.uid}.rack`] = localRack;
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), updates);
            };

            const handleDrawTile = async () => {
                if (!isMyTurn) return;
                const origRackStr = JSON.stringify(originalRackRef.current || []);
                if (origRackStr !== JSON.stringify(localRack)) {
                    AudioManager.playError();
                    return showToast("אי אפשר למשוך אחרי שביצעת שינויים. שחזר ידנית או סיים תור לקבלת קנס.", "error");
                }
                const currentDeck = [...(tableState.deck || [])];
                if (currentDeck.length === 0) return showToast("הקופה ריקה!", "error");
                const drawnTile = currentDeck.shift(); 
                const newRack = [...localRack, drawnTile];
                setLocalRack(newRack);
                
                const uids = Object.keys(tableState.players);
                const nextTurnUid = uids[(uids.indexOf(user.uid) + 1) % uids.length];
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { 
                    currentTurn: nextTurnUid, deck: currentDeck, [`players.${user.uid}.rack`]: newRack
                });
                AudioManager.playClack();
            };

            const typeInfo = GAME_TYPES.find(g => g.id === tableState.type) || GAME_TYPES[0];
            const hex = tableState.isTournament ? '#fbbf24' : typeInfo.hex;
            const sharedBoard = tableState.board || [];
            const playersList = Object.entries(tableState.players || {});

            return (
                <div className="flex-1 flex flex-col relative select-none game-felt overflow-hidden" ref={tableRef} style={{ touchAction: 'none' }}>
                    <div className="absolute inset-0 pointer-events-none opacity-20 mix-blend-screen" style={{ background: `radial-gradient(circle at 50% 30%, ${hex} 0%, transparent 60%)` }}></div>

                    <div className="relative z-10 px-4 py-3 bg-slate-950/80 backdrop-blur-md flex justify-between items-center shadow-[0_10px_30px_rgba(0,0,0,0.8)] border-b border-slate-800">
                        <div className="flex items-center gap-3">
                            <button onClick={onLeave} className="text-slate-400 bg-slate-900 px-4 py-2 rounded-xl border border-slate-800 font-bold hover:text-white transition-colors text-sm flex items-center gap-2">
                                <i className="fa-solid fa-arrow-right"></i> עזוב
                            </button>
                            {isSeated && (
                                <div className="bg-slate-900 border px-4 py-1.5 rounded-xl font-black chip-text shadow-inner hidden sm:block font-rubik" style={{ borderColor: `${hex}50` }}>
                                    {formatMoney(user.balance)}
                                </div>
                            )}
                        </div>
                        
                        <div className="text-center absolute left-1/2 transform -translate-x-1/2">
                            <h2 className="text-lg sm:text-2xl font-black text-white uppercase tracking-widest font-sans" style={{ textShadow: `0 0 20px ${hex}` }}>
                                {tableState.isTournament ? 'טורניר' : typeInfo.name}
                            </h2>
                            <div className="flex items-center justify-center gap-2 mt-0.5 font-sans">
                                {tableState.isTournament ? (
                                    <>
                                        <span className="text-[10px] font-bold bg-slate-900 px-2 rounded border border-slate-800 text-slate-300">קופה: <span style={{color: hex}} className="font-rubik">{formatMoney(tableState.prizePool)}</span></span>
                                        <span className="text-[10px] font-bold bg-slate-900 px-2 rounded border border-slate-800 text-slate-300">הדחה ב: <span className="font-rubik text-rose-400">{tableState.penaltyLimit}-</span></span>
                                    </>
                                ) : (
                                    <>
                                        <span className="text-[10px] font-bold bg-slate-900 px-2 rounded border border-slate-800 text-slate-300">נקודה: <span style={{color: hex}} className="font-rubik">{tableState.stakes}</span></span>
                                        <span className="text-[10px] font-bold bg-slate-900 px-2 rounded border border-slate-800 text-slate-300">כניסה: <span className="font-rubik">{formatMoney(tableState.buyIn)}</span></span>
                                    </>
                                )}
                            </div>
                        </div>

                        {(user.role === ROLES.OWNER || user.role === ROLES.MANAGER) && (
                            <button onClick={handleWin} className="text-slate-500 hover:text-white bg-slate-900 px-3 py-2 rounded-lg border border-slate-800 transition-colors text-xs font-bold flex items-center gap-2">
                                <i className="fa-solid fa-lock"></i> <span className="hidden sm:inline">הנהלה</span>
                            </button>
                        )}
                    </div>

                    <div 
                        data-zone="board-main" 
                        className={`flex-1 mx-2 sm:mx-6 mt-4 mb-2 rounded-[2rem] border-[4px] relative p-4 sm:p-6 overflow-y-auto transition-all z-0 ${hoverTarget === 'board-main' ? 'bg-white/5 scale-[1.01]' : ''}`} 
                        style={{ borderColor: `${hex}30`, backgroundColor: 'rgba(5, 8, 15, 0.7)', boxShadow: `inset 0 0 100px rgba(0,0,0,1)` }}
                    >
                        {!isSeated && (
                            <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm rounded-[1.8rem]">
                                <button onClick={handleSitDown} className="bg-blue-600 hover:bg-blue-500 text-white px-10 py-5 rounded-2xl font-black text-xl shadow-[0_0_30px_rgba(59,130,246,0.6)] flex items-center gap-3 transition-transform hover:scale-105">
                                    <i className="fa-solid fa-chair"></i> {tableState.isTournament ? `הרשם לטורניר (${formatMoney(tableState.buyIn)})` : `שב בשולחן (מינ' ${formatMoney(tableState.buyIn)})`}
                                </button>
                                <p className="mt-4 text-slate-300 font-bold">({playersList.length}/4 שחקנים יושבים)</p>
                            </div>
                        )}

                        {isSeated && !isPlaying && (
                            <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/40 backdrop-blur-sm rounded-[1.8rem]">
                                <h3 className="text-2xl text-white font-black mb-4">ממתין לתחילת משחק...</h3>
                                <p className="text-slate-300 mb-6 font-bold">{playersList.length} שחקנים מחוברים.</p>
                                {(user.role === ROLES.OWNER || user.role === ROLES.MANAGER) && (
                                    <button onClick={handleStartGame} className="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-4 rounded-xl font-black text-lg shadow-[0_0_30px_rgba(16,185,129,0.5)] transition-transform hover:scale-105">
                                        התחל משחק וחלוק 14 אבנים
                                    </button>
                                )}
                            </div>
                        )}

                        {isPlaying && (
                            <div className="absolute top-4 left-4 right-4 flex justify-center gap-8 pointer-events-none opacity-80 z-0">
                                {playersList.filter(([uid]) => uid !== user.uid).map(([uid, pData]) => {
                                    const av = AVATARS.find(a => a.id === pData.avatarId) || AVATARS[0];
                                    const isTheirTurn = tableState.currentTurn === uid;
                                    const userEmojis = floatingEmojis.filter(e => e.uid === uid);
                                    
                                    return (
                                        <div key={uid} className={`relative flex flex-col items-center transition-all ${isTheirTurn ? 'scale-110 drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]' : 'opacity-50'}`}>
                                            {userEmojis.map(e => (
                                                <div key={e.id} className="absolute emoji-float text-4xl" style={{top: -20}}>{e.emoji}</div>
                                            ))}
                                            <div className={`w-12 h-12 rounded-full flex items-center justify-center border-2 mb-1 ${isTheirTurn ? 'border-white bg-slate-800' : 'border-slate-600 bg-slate-900'}`}>
                                                <i className={`fa-solid ${av.icon} ${av.color}`}></i>
                                            </div>
                                            <span className={`text-[10px] font-bold ${isTheirTurn ? 'text-white' : 'text-slate-400'}`}>{pData.username}</span>
                                            <span className="text-[10px] text-emerald-400 font-rubik bg-slate-900 px-2 rounded-full mt-0.5">{pData.rack?.length || 0} אבנים</span>
                                            {tableState.isTournament && (
                                                <span className={`text-[11px] font-black mt-1 px-2 rounded ${pData.score < 0 ? 'bg-rose-900 text-rose-400' : 'bg-slate-800 text-slate-300'}`}>
                                                    {pData.score || 0} נק'
                                                </span>
                                            )}
                                        </div>
                                    )
                                })}
                            </div>
                        )}

                        <div className="flex flex-wrap gap-4 sm:gap-6 items-start pb-24 mt-20 relative z-10 pointer-events-auto">
                            {sharedBoard.map((group, gIdx) => (
                                <div 
                                    key={gIdx} data-zone={`board-group-${gIdx}`}
                                    className={`flex p-2 sm:p-3 rounded-2xl border-[3px] min-h-[85px] min-w-[70px] transition-all duration-200 pointer-events-auto ${hoverTarget === `board-group-${gIdx}` ? `bg-white/10 scale-110 shadow-[0_0_40px_${hex}80]` : 'bg-black/50 border-white/5'}`}
                                    style={hoverTarget === `board-group-${gIdx}` ? { borderColor: hex } : {}}
                                >
                                    {group.map((tile, tIdx) => {
                                        const isJoker = tile.val === '☻' || tile.isJoker;
                                        const jokerZone = `joker-${gIdx}-${tIdx}`;
                                        const isHoveringJoker = isJoker && hoverTarget === jokerZone;
                                        
                                        return (
                                        <div key={tile.id} 
                                            data-zone={isJoker ? jokerZone : null}
                                            onPointerDown={(e) => startDrag(e, tile, 'board', gIdx, tIdx)}
                                            onTouchStart={(e) => startDrag(e, tile, 'board', gIdx, tIdx)}
                                            className={`rummi-tile w-12 h-16 sm:w-14 sm:h-20 text-3xl sm:text-4xl mx-0.5 transition-all ${dragData?.tile?.id === tile.id ? 'opacity-20' : ''} ${isHoveringJoker ? 'scale-110 z-50 shadow-[0_0_30px_#fbbf24] ring-4 ring-gold-400' : ''}`}
                                            style={{ color: tile.hex }}>{tile.val}</div>
                                        );
                                    })}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div data-zone="rack" className="relative z-20 p-2 sm:p-4 pt-10 sm:pt-12 flex flex-col items-center pb-6 bg-slate-950 border-t-[3px]" style={{ borderTopColor: `${hex}50`, boxShadow: `0 -20px 50px rgba(0,0,0,0.9)` }}>
                    
                        {tableState?.isTournament && isPlaying && (
                            <div className="absolute right-4 top-[-20px] bg-slate-900 border border-gold-500/50 px-4 py-2 rounded-xl shadow-2xl flex flex-col items-center z-40">
                                <span className="text-[10px] text-slate-400 font-bold uppercase">הניקוד שלך:</span>
                                <span className={`text-xl font-black font-rubik ${myPlayerData?.score < 0 ? 'text-rose-400' : 'text-emerald-400'}`}>{myPlayerData?.score || 0}</span>
                            </div>
                        )}

                        <div className="absolute left-4 top-4 flex flex-col gap-2 z-super-top pointer-events-auto">
                            <div className="flex gap-2 relative">
                                <button onClick={() => {setShowEmojis(!showEmojis); setShowChat(false);}} className="w-10 h-10 rounded-full bg-slate-800 border border-slate-600 text-gold-400 shadow-lg flex items-center justify-center hover:bg-slate-700 transition-colors">
                                    <i className="fa-regular fa-face-smile text-xl"></i>
                                </button>
                                <button onClick={() => {setShowChat(!showChat); setShowEmojis(false);}} className="w-10 h-10 rounded-full bg-slate-800 border border-slate-600 text-blue-400 shadow-lg flex items-center justify-center hover:bg-slate-700 transition-colors">
                                    <i className="fa-regular fa-comment-dots text-xl"></i>
                                </button>

                                {showEmojis && (
                                    <div className="absolute bottom-full mb-2 left-0 bg-slate-900 border border-slate-700 p-2 rounded-2xl shadow-2xl flex flex-wrap w-[140px] gap-2 z-super-top">
                                        {['🍻', '👏', '😠', '🤣', '💔', '🍀', '🤦‍♂️', '🔥'].map(em => (
                                            <button key={em} onClick={() => sendEmoji(em)} className="text-2xl hover:scale-125 transition-transform">{em}</button>
                                        ))}
                                    </div>
                                )}

                                {showChat && (
                                    <div className="absolute bottom-full mb-2 left-0 bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl flex flex-col w-[260px] sm:w-[320px] h-[300px] overflow-hidden z-super-top">
                                        <div className="bg-slate-950 p-3 border-b border-slate-800 flex justify-between items-center">
                                            <h3 className="text-white font-bold text-sm">צ'אט השולחן</h3>
                                            {(user.role === ROLES.OWNER || user.role === ROLES.MANAGER) && (
                                                <button onClick={toggleGlobalChat} className={`text-[10px] px-2 py-1 rounded font-bold transition-colors ${tableState.chatEnabled !== false ? 'bg-rose-900 text-rose-300 hover:bg-rose-800' : 'bg-emerald-900 text-emerald-300 hover:bg-emerald-800'}`}>
                                                    {tableState.chatEnabled !== false ? 'השתק הכל' : 'אפשר צ\'אט'}
                                                </button>
                                            )}
                                        </div>
                                        <div className="flex-1 overflow-y-auto p-3 flex flex-col gap-2 text-sm bg-slate-900/50">
                                            {tableState.chatEnabled === false && (
                                                <div className="text-center text-xs text-rose-400 font-bold bg-rose-900/20 p-2 rounded">הצ'אט הושתק על ידי הנהלת המועדון.</div>
                                            )}
                                            {(tableState.chat || []).map((msg, idx) => (
                                                <div key={idx} className="flex flex-col">
                                                    <span 
                                                        className={`text-[10px] font-bold mb-0.5 ${(user.role === ROLES.OWNER || user.role === ROLES.MANAGER) ? 'cursor-pointer hover:text-rose-400' : ''} ${msg.uid === user.uid ? 'text-blue-400' : 'text-slate-400'}`}
                                                        onClick={() => toggleMutePlayer(msg.uid, msg.username)}
                                                        title={(user.role === ROLES.OWNER || user.role === ROLES.MANAGER) ? 'לחץ להשתקה/שחרור שחקן' : ''}
                                                    >
                                                        {msg.username} {(tableState.mutedPlayers || []).includes(msg.uid) ? '🔇' : ''}
                                                    </span>
                                                    <div className={`px-3 py-2 rounded-xl inline-block ${msg.uid === user.uid ? 'bg-blue-600 text-white rounded-br-none self-end' : 'bg-slate-800 text-slate-200 rounded-bl-none self-start'}`}>{msg.text}</div>
                                                </div>
                                            ))}
                                            <div ref={chatEndRef} />
                                        </div>
                                        <form onSubmit={handleSendChat} className="p-2 bg-slate-950 border-t border-slate-800 flex gap-2">
                                            <input type="text" value={chatMsg} onChange={(e) => setChatMsg(e.target.value)} placeholder="כתוב הודעה..." className="flex-1 bg-slate-900 border border-slate-700 text-white rounded-xl px-3 py-2 text-sm outline-none focus:border-blue-500" disabled={tableState.chatEnabled === false && user.role !== ROLES.OWNER && user.role !== ROLES.MANAGER} />
                                            <button type="submit" className="bg-blue-600 hover:bg-blue-500 text-white w-10 rounded-xl flex items-center justify-center transition-colors"><i className="fa-solid fa-paper-plane text-xs"></i></button>
                                        </form>
                                    </div>
                                )}
                            </div>
                            
                            <div className="flex bg-slate-900 rounded-lg border border-slate-700 shadow-lg overflow-hidden flex-col pointer-events-auto mt-2">
                                <button onClick={handleSortSets} className="p-2 text-slate-300 hover:text-white hover:bg-slate-800 border-b border-slate-800 transition-colors text-xs font-bold" title="סדר קבוצות (7-7-7)">7-7-7</button>
                                <button onClick={handleSortRuns} className="p-2 text-slate-300 hover:text-white hover:bg-slate-800 transition-colors text-xs font-bold" title="סדר רצפים (7-8-9)">7-8-9</button>
                            </div>
                        </div>

                        <div className="absolute top-0 left-1/2 transform -translate-x-1/2 pointer-events-none">
                            {floatingEmojis.filter(e => e.uid === user.uid).map(e => (
                                <div key={e.id} className="absolute emoji-float text-5xl" style={{left: -20}}>{e.emoji}</div>
                            ))}
                        </div>

                        {isPlaying && (
                            <div className="absolute top-[-20px] sm:top-[-24px] flex gap-2 z-30">
                                {!isMyTurn ? (
                                    <div className="bg-slate-900 text-slate-400 px-6 py-2.5 rounded-xl font-bold shadow-2xl border border-slate-800 flex items-center gap-2 text-sm">
                                        <i className="fa-solid fa-hourglass-half fa-spin"></i> ממתין לתור השחקן הבא...
                                    </div>
                                ) : (
                                    <>
                                        <button onClick={handleDrawTile} className="bg-slate-800 hover:bg-slate-700 text-slate-300 px-5 py-2.5 rounded-xl font-bold shadow-2xl border border-slate-600 flex items-center gap-2 text-xs sm:text-sm transition-transform hover:-translate-y-1 font-sans">
                                            <i className="fa-solid fa-layer-group text-gold-400"></i> משיכה (<span className="font-rubik">{tableState.deck?.length || 0}</span>)
                                        </button>
                                        <div className={`px-4 py-2.5 rounded-xl font-black shadow-2xl border flex items-center gap-2 text-xs sm:text-sm ${timeLeft <= 10 ? 'bg-rose-900/80 border-rose-500 text-white animate-pulse' : 'bg-slate-900 border-slate-700 text-slate-300'}`}>
                                            <i className="fa-regular fa-clock"></i> <span className="font-rubik w-5 text-center">{timeLeft}</span>
                                        </div>
                                        <button onClick={() => handleEndTurn(false)} className="text-slate-950 px-6 py-2.5 rounded-xl font-black shadow-[0_0_20px_rgba(16,185,129,0.5)] uppercase text-xs sm:text-sm transition-transform hover:-translate-y-1 font-sans" style={{ backgroundColor: hex }}>
                                            <i className="fa-solid fa-check mr-2"></i> סיום תור
                                        </button>
                                    </>
                                )}
                            </div>
                        )}

                        <div className={`w-[98%] max-w-4xl min-h-[100px] sm:min-h-[130px] bg-gradient-to-b from-slate-800 to-slate-950 rounded-t-3xl border-x-[12px] sm:border-x-[20px] border-b-[10px] sm:border-b-[16px] border-slate-900 shadow-[0_20px_50px_#000] flex flex-wrap justify-center items-end px-2 py-3 sm:py-5 gap-1 relative ${hoverTarget === 'rack' ? `shadow-[0_0_40px_${hex}40]` : ''}`} style={hoverTarget === 'rack' ? {borderColor: `${hex}80`} : {}}>
                            <div className="absolute inset-0 border-t-8 border-black/50 rounded-t-2xl pointer-events-none"></div>

                            {localRack.map((tile, tIdx) => (
                                <div key={tile.id} onPointerDown={(e) => startDrag(e, tile, 'rack', null, tIdx)}
                                    onTouchStart={(e) => startDrag(e, tile, 'rack', null, tIdx)}
                                    className={`rummi-tile w-12 h-16 sm:w-16 sm:h-24 text-3xl sm:text-5xl mx-0.5 z-10 ${dragData?.tile?.id === tile.id ? 'opacity-10 scale-90' : 'hover:-translate-y-3'}`}
                                    style={{ color: tile.hex }}>{tile.val}</div>
                            ))}
                        </div>
                    </div>

                    {dragData && (
                        <div className="fixed dragging-ghost rummi-tile w-16 h-24 sm:w-20 sm:h-28 text-5xl sm:text-6xl z-[99999]"
                            style={{ left: dragPos.x, top: dragPos.y, transform: 'translate(-50%, -50%) rotate(4deg)', color: dragData.tile.hex }}>
                            {dragData.tile.val}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
