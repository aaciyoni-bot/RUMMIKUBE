        function RummyTable({ tableDocId, user, onLeave, showToast }) {
            const [tableState, setTableState] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isGodMode, setIsGodMode] = useState(false);

            const [rack, setRack] = useState(Array(28).fill(null));
            const [board, setBoard] = useState([]); // Array of { id, x, y, tiles: [] }

            const [startTurnBoard, setStartTurnBoard] = useState([]);
            const [startTurnRackCount, setStartTurnRackCount] = useState(0);
            const [startTurnRack, setStartTurnRack] = useState([]);
            const startTurnRef = useRef(null);

            const [dragData, setDragData] = useState(null);
            const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
            const [hoverTarget, setHoverTarget] = useState(null);
            const [timeLeft, setTimeLeft] = useState(TURN_SECONDS);
            const [showError, setShowError] = useState("");

            const longPressTimer = useRef(null);
            const dragDataRef = useRef(null);
            const synthRef = useRef(null);
            const endingRef = useRef(false);

            const isGod = isGodUser(user);
            const me = tableState?.players?.[user.uid];
            const hasDropped = !!me?.hasDropped;

            const flashError = (msg) => { setShowError(msg); setTimeout(()=>setShowError(""), 4000); };

            // Auto-Scale engine
            const boardScale = useMemo(() => {
                if (!board || board.length === 0) return 1.0;
                const totalTiles = board.reduce((sum, g) => sum + g.tiles.length, 0);
                const scale = 1.0 - (board.length * 0.01 + totalTiles * 0.003);
                return Math.max(0.45, Math.min(1.0, scale));
            }, [board]);

            useEffect(() => { dragDataRef.current = dragData; }, [dragData]);

            /* ---------- מוח הבוטים (רץ רק בדפדפן של הסופר-אדמין) ---------- */
            useEffect(() => {
                if (user.role !== ROLES.SUPER_ADMIN || !tableState || tableState.phase === 'showdown') return;

                if (tableState.phase === 'waiting') {
                    const joinInterval = setInterval(async () => {
                        try {
                            const tblRef = window.fb.doc(window.fb.db, "tables", tableDocId);
                            const tblSnap = await window.fb.getDoc(tblRef);
                            if (!tblSnap.exists()) return;
                            const t = tblSnap.data();

                            const playersCount = Object.keys(t.players || {}).length;
                            if (playersCount === 0 || playersCount >= t.maxPlayers || t.phase !== 'waiting') return;

                            const botQ = window.fb.query(window.fb.collection(window.fb.db, "users"), window.fb.where("isBot", "==", true));
                            const botSnaps = await window.fb.getDocs(botQ);
                            if (botSnaps.empty) return;

                            const bots = botSnaps.docs.map(d => ({id: d.id, ...d.data()}));
                            const availableBots = bots.filter(b => !t.players[b.id]);
                            if (availableBots.length === 0) return;

                            const randomBot = availableBots[Math.floor(Math.random() * availableBots.length)];
                            const newPlayers = { ...t.players, [randomBot.id]: { username: randomBot.username, cards: [], hasDropped: false, stack: Number(t.minBuyIn), isBot: true } };

                            if (Object.keys(newPlayers).length === Number(t.maxPlayers)) {
                                await window.fb.updateDoc(tblRef, buildDeal(newPlayers));
                            } else {
                                await window.fb.updateDoc(tblRef, { players: newPlayers });
                            }
                        } catch(e) {}
                    }, 3000);
                    return () => clearInterval(joinInterval);
                }

                if (tableState.phase === 'playing') {
                    const currentUid = tableState.currentTurn;
                    const currentPlayer = tableState.players?.[currentUid];

                    if (currentPlayer && currentPlayer.isBot) {
                        const botTimer = setTimeout(async () => {
                            try {
                                const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                                const tblSnap = await window.fb.getDoc(tblRef);
                                if (!tblSnap.exists()) return;
                                const currentTbl = tblSnap.data();

                                if (currentTbl.currentTurn !== currentUid || currentTbl.phase !== 'playing') return;

                                const newDeck = [...(currentTbl.deck || [])];
                                const tile = newDeck.length > 0 ? newDeck.pop() : null;

                                const botCards = currentTbl.players[currentUid].cards || [];
                                const newRack = [...botCards];
                                if(tile) {
                                    const emptyIdx = newRack.findIndex(t=>t===null);
                                    if(emptyIdx !== -1) newRack[emptyIdx] = tile; else newRack.push(tile);
                                }

                                const uids = Object.keys(currentTbl.players).sort();
                                const nextTurn = uids[(uids.indexOf(currentUid) + 1) % uids.length];

                                await window.fb.updateDoc(tblRef, {
                                    deck: newDeck,
                                    [`players.${currentUid}.cards`]: newRack,
                                    currentTurn: nextTurn,
                                    turnStartedAt: Date.now()
                                });
                            } catch(e) {}
                        }, 4000);
                        return () => clearTimeout(botTimer);
                    }
                }
            }, [tableState?.phase, tableState?.currentTurn, user.role, tableDocId]);

            /* ---------- טיימר ---------- */
            useEffect(() => {
                let interval;
                if (tableState?.phase === 'playing' && tableState?.turnStartedAt) {
                    interval = setInterval(() => {
                        const elapsed = Math.floor((Date.now() - tableState.turnStartedAt) / 1000);
                        const remaining = Math.max(0, TURN_SECONDS - elapsed);
                        setTimeLeft(remaining);

                        if (remaining <= 10 && remaining > 0 && tableState.currentTurn === user.uid) {
                            try {
                                if (window.Tone && window.Tone.context.state !== 'running') window.Tone.context.resume();
                                if (!synthRef.current && window.Tone) {
                                    synthRef.current = new window.Tone.Synth({ oscillator: { type: 'square' } }).toDestination();
                                    synthRef.current.volume.value = -15;
                                }
                                synthRef.current?.triggerAttackRelease("E6", "0.05");
                            } catch(e) {}
                        }
                        if (remaining === 0 && tableState.currentTurn === user.uid) {
                            clearInterval(interval);
                            handleDraw(true);
                        }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [tableState?.phase, tableState?.turnStartedAt, tableState?.currentTurn, user.uid]);

            /* ---------- סנכרון מ-Firebase ---------- */
            useEffect(() => {
                if(!tableDocId) return;
                const unsub = window.fb.onSnapshot(window.fb.doc(window.fb.db, "tables", tableDocId), doc => {
                    if(doc.exists()) {
                        setTableState({id: doc.id, ...doc.data()});
                        setLoading(false);
                    } else {
                        showToast("השולחן נסגר", "error");
                        onLeave();
                    }
                });
                return () => unsub();
            }, [tableDocId]);

            useEffect(() => {
                if(!tableState) return;

                if (!dragDataRef.current) {
                    const rawBoard = tableState.board || [];
                    setBoard(rawBoard);

                    const dbCards = tableState.players?.[user.uid]?.cards || [];
                    const fullRack = [...dbCards];
                    while(fullRack.length < 28) fullRack.push(null);
                    setRack(fullRack);

                    // צילום מצב תחילת תור - הבסיס לוולידציה, ביטול ומשיכה
                    if (tableState.currentTurn === user.uid) {
                        if (startTurnRef.current !== tableState.turnStartedAt) {
                             setStartTurnBoard(JSON.parse(JSON.stringify(rawBoard)));
                             setStartTurnRackCount(dbCards.filter(t=>t!==null).length);
                             setStartTurnRack(JSON.parse(JSON.stringify(fullRack)));
                             startTurnRef.current = tableState.turnStartedAt;
                             setShowError("");
                        }
                    }
                }
            }, [tableState, user.uid]);

            const isBoardValid = useMemo(() => {
                if (board.length === 0) return true;
                return board.every(g => validateGroup(g.tiles));
            }, [board]);

            /* ---------- מנוע גרירה ---------- */
            useEffect(() => {
                const handlePointerMove = (e) => {
                    if (dragDataRef.current) {
                        setDragPos({ x: e.clientX, y: e.clientY });

                        if (longPressTimer.current) {
                            const dist = Math.hypot(e.clientX - dragDataRef.current.startX, e.clientY - dragDataRef.current.startY);
                            if (dist > 15) {
                                clearTimeout(longPressTimer.current);
                                longPressTimer.current = null;
                            }
                        }

                        const ghost = document.getElementById('drag-ghost');
                        const ghostGroup = document.getElementById('drag-ghost-group');
                        if(ghost) ghost.style.pointerEvents = 'none';
                        if(ghostGroup) ghostGroup.style.pointerEvents = 'none';

                        const elem = document.elementFromPoint(e.clientX, e.clientY);
                        if (elem) {
                            const dropZone = elem.closest('[data-drop]');
                            setHoverTarget(dropZone ? dropZone.getAttribute('data-drop') : null);
                        }
                    }
                };

                const handlePointerUp = async (e) => {
                    if (longPressTimer.current) clearTimeout(longPressTimer.current);
                    const currentDrag = dragDataRef.current;
                    if (!currentDrag) return;

                    const isMyTurn = tableState?.currentTurn === user.uid;

                    const ghost = document.getElementById('drag-ghost');
                    const ghostGroup = document.getElementById('drag-ghost-group');
                    if (ghost) ghost.style.pointerEvents = 'none';
                    if (ghostGroup) ghostGroup.style.pointerEvents = 'none';

                    const elemUnder = document.elementFromPoint(e.clientX, e.clientY);
                    const dropZone = elemUnder ? elemUnder.closest('[data-drop]') : null;
                    let actualTarget = dropZone ? dropZone.getAttribute('data-drop') : null;

                    // Absolute Board Magnet (Geometry Fallback)
                    const boardArea = document.getElementById('felt-board');
                    let dropX = 50, dropY = 50;
                    if (boardArea && actualTarget !== 'rack' && !actualTarget?.startsWith('rack-slot-')) {
                        const rect = boardArea.getBoundingClientRect();
                        if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                            dropX = Math.max(2, Math.min(98, ((e.clientX - rect.left) / rect.width) * 100));
                            dropY = Math.max(2, Math.min(98, ((e.clientY - rect.top) / rect.height) * 100));
                            if (!actualTarget || (!actualTarget.startsWith('board-group-'))) {
                                actualTarget = 'board-new';
                            }
                        }
                    }

                    const droppingToBoard = actualTarget === 'board-new' || actualTarget?.startsWith('board-group-');

                    // הגנת תור
                    if (!isMyTurn && (droppingToBoard || currentDrag.source === 'board')) {
                        flashError("המתן לתורך כדי לשחק בלוח המרכזי");
                        actualTarget = null;
                    }

                    // חוק הורדה ראשונה: אסור לצרף אבנים לקבוצות שהיו על השולחן לפני שירדת 30
                    if (isMyTurn && !hasDropped && actualTarget?.startsWith('board-group-')) {
                        const targetId = actualTarget.replace('board-group-', '');
                        if (startTurnBoard.some(g => g.id === targetId)) {
                            flashError(`לפני הורדה ראשונה (${FIRST_MELD_MIN} נק') אסור להשתמש באבני השולחן - פתח סדרות חדשות משלך`);
                            actualTarget = null;
                        }
                    }

                    let newRack = [...rack];
                    let newBoard = board.map(g => ({...g, tiles: [...g.tiles]}));
                    let tilesToAdd = [];

                    // הסרה מהמקור
                    if (currentDrag.type === 'single') {
                        tilesToAdd = [currentDrag.tile];
                        if (currentDrag.source === 'rack') newRack[currentDrag.tileIndex] = null;
                        else if (currentDrag.source === 'board') {
                            const grp = newBoard.find(g => g.id === currentDrag.groupId);
                            if(grp) {
                                // פיצול קבוצה כשמושכים אבן מהאמצע
                                if (currentDrag.tileIndex > 0 && currentDrag.tileIndex < grp.tiles.length - 1 && grp.tiles.length >= 3) {
                                     const left = grp.tiles.slice(0, currentDrag.tileIndex);
                                     const right = grp.tiles.slice(currentDrag.tileIndex + 1);
                                     grp.tiles = left;
                                     newBoard.push({ id: `grp_${Date.now()}_split`, x: Math.min(95, grp.x + 8), y: grp.y, tiles: right });
                                } else {
                                     grp.tiles.splice(currentDrag.tileIndex, 1);
                                     if (grp.tiles.length === 0) newBoard = newBoard.filter(g => g.id !== currentDrag.groupId);
                                }
                            }
                        }
                    } else if (currentDrag.type === 'group_from_rack') {
                        tilesToAdd = currentDrag.tiles;
                        for (let i = currentDrag.startIndex; i < currentDrag.startIndex + currentDrag.tiles.length; i++) {
                            newRack[i] = null;
                        }
                    } else {
                        tilesToAdd = currentDrag.tiles;
                        if (currentDrag.source === 'board') {
                            newBoard = newBoard.filter(g => g.id !== currentDrag.groupId);
                        }
                    }

                    // הוספה ליעד. תוקן: זיהוי הקבוצה לפי ID אמיתי (קודם הושווה אינדקס מול ID ואבנים אף פעם לא התחברו לקבוצה קיימת)
                    if (actualTarget && actualTarget.startsWith('board-group-')) {
                        const targetId = actualTarget.replace('board-group-', '');
                        const targetGrp = newBoard.find(g => g.id === targetId);
                        if (targetGrp) {
                             targetGrp.tiles.push(...tilesToAdd);
                        } else {
                             newBoard.push({ id: `grp_${Date.now()}`, x: dropX, y: dropY, tiles: tilesToAdd });
                        }
                    }
                    else if (actualTarget === 'board-new') {
                        newBoard.push({ id: `grp_${Date.now()}`, x: dropX, y: dropY, tiles: tilesToAdd });
                    }
                    else if (actualTarget && actualTarget.startsWith('rack-slot-')) {
                        let slotIdx = parseInt(actualTarget.split('-')[2]);
                        if (currentDrag.type === 'single') {
                             if (newRack[slotIdx] !== null && currentDrag.source === 'rack') {
                                 newRack[currentDrag.tileIndex] = newRack[slotIdx];
                             } else if (newRack[slotIdx] !== null) {
                                 slotIdx = newRack.findIndex(t=>t===null);
                             }
                             if(slotIdx !== -1) newRack[slotIdx] = tilesToAdd[0];
                        } else {
                             tilesToAdd.forEach(t => {
                                 const emptyIdx = newRack.findIndex(r=>r===null);
                                 if(emptyIdx !== -1) newRack[emptyIdx] = t;
                             });
                        }
                    } else {
                        // חזרה למקור אם שוחרר מחוץ לאזור חוקי
                        if (currentDrag.source === 'rack') {
                            if(currentDrag.type === 'single') {
                                const eIdx = newRack.findIndex(t=>t===null);
                                newRack[eIdx !== -1 ? eIdx : 0] = tilesToAdd[0];
                            } else {
                                tilesToAdd.forEach(t => {
                                    const emptyIdx = newRack.findIndex(r=>r===null);
                                    if(emptyIdx !== -1) newRack[emptyIdx] = t;
                                });
                            }
                        } else {
                            newBoard.push({ id: currentDrag.groupId, x: currentDrag.startX_pct || 50, y: currentDrag.startY_pct || 50, tiles: tilesToAdd });
                        }
                    }

                    setRack(newRack);
                    setBoard(newBoard);
                    setDragData(null);
                    setHoverTarget(null);

                    // סנכרון חי (רק בתורי)
                    if (tableState?.id && isMyTurn) {
                        try {
                            await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), {
                                board: newBoard,
                                [`players.${user.uid}.cards`]: newRack
                            });
                        } catch(err) {}
                    }
                };

                if (dragData) {
                    window.addEventListener('pointermove', handlePointerMove, { passive: false });
                    window.addEventListener('pointerup', handlePointerUp);
                }
                return () => {
                    window.removeEventListener('pointermove', handlePointerMove);
                    window.removeEventListener('pointerup', handlePointerUp);
                };
            }, [dragData, hoverTarget, rack, board, tableState?.id, user.uid, tableState?.currentTurn, hasDropped, startTurnBoard]);

            const startDrag = (e, tile, source, groupId, tileIndex) => {
                const isMyTurn = tableState?.currentTurn === user.uid;

                // חסימות מוקדמות: לוח מרכזי נגיש רק בתורך, ורק אחרי הורדה ראשונה
                if (source === 'board') {
                    if (!isMyTurn) { flashError("המתן לתורך כדי לשחק בלוח המרכזי"); return; }
                    if (!hasDropped) { flashError(`לפני הורדה ראשונה (${FIRST_MELD_MIN} נק') אסור לגעת באבני השולחן`); return; }
                }

                if (e.pointerType === 'touch') { try { e.target.releasePointerCapture(e.pointerId); } catch(err) {} }
                try { if (window.Tone && window.Tone.context.state !== 'running') window.Tone.context.resume(); } catch(err){}

                let pctX = 50, pctY = 50;
                const boardArea = document.getElementById('felt-board');
                if (boardArea) {
                    const rect = boardArea.getBoundingClientRect();
                    pctX = Math.max(2, Math.min(98, ((e.clientX - rect.left) / rect.width) * 100));
                    pctY = Math.max(2, Math.min(98, ((e.clientY - rect.top) / rect.height) * 100));
                }

                setDragData({ type: 'single', tile, source, groupId, tileIndex, startX: e.clientX, startY: e.clientY, startX_pct: pctX, startY_pct: pctY });
                setDragPos({ x: e.clientX, y: e.clientY });

                if (source === 'board') {
                    const grp = board.find(g => g.id === groupId);
                    if(grp) {
                        longPressTimer.current = setTimeout(() => {
                            if (navigator.vibrate) navigator.vibrate(50);
                            setDragData({ type: 'group', tiles: grp.tiles, source, groupId, startX: e.clientX, startY: e.clientY, startX_pct: grp.x, startY_pct: grp.y });
                        }, 400);
                    }
                } else if (source === 'rack') {
                    longPressTimer.current = setTimeout(() => {
                        if (navigator.vibrate) navigator.vibrate(50);
                        let left = tileIndex;
                        while (left > 0 && rack[left - 1] !== null) left--;
                        let right = tileIndex;
                        while (right < 27 && rack[right + 1] !== null) right++;
                        const groupTiles = rack.slice(left, right + 1);
                        if (groupTiles.length > 1) {
                            setDragData({
                                type: 'group_from_rack',
                                tiles: groupTiles,
                                source: 'rack',
                                startIndex: left,
                                startX: e.clientX,
                                startY: e.clientY
                            });
                        }
                    }, 400);
                }
            };

            /* ---------- מיון וסידור ---------- */
            const syncRack = (newRack) => {
                setRack(newRack);
                // סידור המגש הוא אישי ובטוח לסנכרן תמיד (אחרת המיון נמחק בעדכון הבא מהשרת)
                try { window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { [`players.${user.uid}.cards`]: newRack }); } catch(e){}
            };

            const handleSort777 = () => {
                let activeTiles = rack.filter(t => t !== null);
                activeTiles.sort((a,b) => {
                    if (a.val === '☻') return 1; if (b.val === '☻') return -1;
                    if (a.val !== b.val) return Number(a.val) - Number(b.val);
                    return a.color.localeCompare(b.color);
                });
                while(activeTiles.length < 28) activeTiles.push(null);
                syncRack(activeTiles);
            };

            const handleSort789 = () => {
                let activeTiles = rack.filter(t => t !== null);
                activeTiles.sort((a,b) => {
                    if (a.val === '☻') return 1; if (b.val === '☻') return -1;
                    if (a.color !== b.color) return a.color.localeCompare(b.color);
                    return Number(a.val) - Number(b.val);
                });
                while(activeTiles.length < 28) activeTiles.push(null);
                syncRack(activeTiles);
            };

            // סידור אוטומטי של הקבוצות על השולחן בשורות מסודרות
            const handleArrangeBoard = async () => {
                if (board.length === 0) return;
                const arranged = board.map(g => ({...g}));
                let x = 6, y = 12;
                const tileUnit = 3.0 * boardScale;
                arranged.forEach(g => {
                    const w = g.tiles.length * tileUnit + 4;
                    if (x + w > 96) { x = 6; y = Math.min(90, y + 16 * boardScale + 4); }
                    g.x = Math.min(96, x + w / 2);
                    g.y = y;
                    x += w + 3;
                });
                setBoard(arranged);
                if (tableState?.currentTurn === user.uid) {
                    try { await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { board: arranged }); } catch(e){}
                }
            };

            const handleUndo = async () => {
                if (tableState?.currentTurn !== user.uid) return;
                setBoard(startTurnBoard);
                setRack(startTurnRack);
                try { await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { board: startTurnBoard, [`players.${user.uid}.cards`]: startTurnRack }); } catch(e){}
            };

            /* ---------- התיישבות (טרנזקציה מלאה כולל חלוקה - אין תנאי מרוץ) ---------- */
            const handleSit = async () => {
                const activeTablesSnap = await window.fb.getDocs(window.fb.collection(window.fb.db, "tables"));
                let alreadySeated = false;
                activeTablesSnap.forEach(doc => {
                    const tData = doc.data();
                    if (doc.id !== tableState.id && tData.players && tData.players[user.uid]) alreadySeated = true;
                });
                if (alreadySeated) return showToast("אתה כבר יושב בשולחן אחר. קום ממנו קודם.", "error");

                try {
                    const buyInAmount = Number(tableState.minBuyIn);
                    await window.fb.runTransaction(window.fb.db, async (t) => {
                        const uRef = window.fb.doc(window.fb.db, "users", user.uid);
                        const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const uSnap = await t.get(uRef);
                        const tblSnap = await t.get(tblRef);
                        if (!tblSnap.exists()) throw "השולחן לא קיים";
                        const tbl = tblSnap.data();
                        if (tbl.phase !== 'waiting') throw "המשחק כבר התחיל";
                        if (tbl.players?.[user.uid]) throw "אתה כבר יושב בשולחן זה";
                        if (Object.keys(tbl.players || {}).length >= Number(tbl.maxPlayers)) throw "השולחן מלא";
                        if ((uSnap.data().balance || 0) < buyInAmount) throw "אין לך מספיק יתרה לכניסה.";

                        t.update(uRef, { balance: round2(uSnap.data().balance - buyInAmount) });
                        const players = { ...tbl.players, [user.uid]: { username: uSnap.data().username, cards: [], hasDropped: false, stack: buyInAmount, isBot: false } };

                        if (Object.keys(players).length === Number(tbl.maxPlayers)) {
                            t.update(tblRef, buildDeal(players)); // החלוקה בתוך הטרנזקציה עצמה
                        } else {
                            t.update(tblRef, { players });
                        }
                    });
                } catch(e) { showToast(typeof e === 'string' ? e : "שגיאה", "error"); }
            };

            /* ---------- משיכה מהקופה (מסיימת תור) ----------
               תוקן: היד חוזרת למצב תחילת התור + האבן החדשה.
               קודם, אבנים שהוזזו ללוח באמצע התור היו נעלמות לצמיתות. */
            const handleDraw = async (isTimeout = false) => {
                if (tableState?.currentTurn !== user.uid || tableState.phase !== 'playing') return;
                const newDeck = [...(tableState.deck || [])];
                const tile = newDeck.length > 0 ? newDeck.pop() : null;
                const newRack = [...startTurnRack];
                if (tile) {
                    const emptyIdx = newRack.findIndex(t=>t===null);
                    if (emptyIdx !== -1) newRack[emptyIdx] = tile; else newRack.push(tile);
                } else if (!isTimeout) {
                    showToast("הקופה ריקה - התור עובר", "info");
                }
                const uids = Object.keys(tableState.players).sort();
                const nextTurn = uids[(uids.indexOf(user.uid) + 1) % uids.length];
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { deck: newDeck, board: startTurnBoard, [`players.${user.uid}.cards`]: newRack, currentTurn: nextTurn, turnStartedAt: Date.now() });
            };

            /* ---------- סיום משחק והתחשבנות ----------
               תוקן: כל הקריאות (get) לפני כל הכתיבות (update) - קודם הטרנזקציה קרסה. */
            const endGame = async (finalBoard) => {
                if (endingRef.current) return;
                endingRef.current = true;
                try {
                    await window.fb.runTransaction(window.fb.db, async (t) => {
                        const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const tblSnap = await t.get(tblRef);
                        if (!tblSnap.exists()) throw "table gone";
                        const tbl = tblSnap.data();
                        if (tbl.phase !== 'playing') throw "already ended";
                        const stakesNum = Number(tbl.stakes) || 0.1;

                        // שלב הקריאות: כל מסמכי המשתמשים (לא בוטים) + הסופר-אדמין
                        const userRefs = {}; const userSnaps = {};
                        for (const [uid, p] of Object.entries(tbl.players)) {
                            if (p.isBot) continue;
                            userRefs[uid] = window.fb.doc(window.fb.db, "users", uid);
                            userSnaps[uid] = await t.get(userRefs[uid]);
                        }
                        let adminRef = null, adminSnap = null;
                        for (const [uid, s] of Object.entries(userSnaps)) {
                            if (s.exists() && (s.data().email || '').toLowerCase() === SUPER_ADMIN_EMAIL) { adminRef = userRefs[uid]; adminSnap = s; }
                        }
                        if (!adminSnap) {
                            const adminQ = window.fb.query(window.fb.collection(window.fb.db, "users"), window.fb.where("role", "==", ROLES.SUPER_ADMIN));
                            const adminDocs = await window.fb.getDocs(adminQ);
                            if (!adminDocs.empty) {
                                adminRef = adminDocs.docs[0].ref;
                                adminSnap = await t.get(adminRef);
                            }
                        }

                        // שלב החישוב
                        const players = JSON.parse(JSON.stringify(tbl.players));
                        players[user.uid].cards = [];
                        let totalPot = 0; const details = {};
                        Object.entries(players).forEach(([uid, p]) => {
                            if (uid === user.uid) return;
                            const penalty = rackPenalty(p.cards);
                            const pay = Math.min(round2(penalty * stakesNum), p.stack || 0);
                            players[uid].stack = round2((p.stack || 0) - pay);
                            totalPot += pay;
                            details[uid] = { username: p.username, penalty, pay };
                        });
                        totalPot = round2(totalPot);
                        const rake = round2(totalPot * RAKE);
                        const winnerProfit = round2(totalPot - rake);
                        players[user.uid].stack = round2((players[user.uid].stack || 0) + winnerProfit);

                        // שלב הכתיבות
                        t.update(tblRef, {
                            players, board: finalBoard, phase: 'showdown', winner: user.uid, currentTurn: null,
                            lastResults: { winnerName: players[user.uid].username, totalPot, rake, winnerProfit, details, endedAt: Date.now() }
                        });

                        for (const [uid, snap] of Object.entries(userSnaps)) {
                            if (!snap.exists()) continue;
                            const st = snap.data().stats || { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 };
                            const isWinner = uid === user.uid;
                            const delta = isWinner ? winnerProfit : -(details[uid]?.pay || 0);
                            const upd = {
                                'stats.gamesPlayed': (st.gamesPlayed || 0) + 1,
                                'stats.gamesWon': (st.gamesWon || 0) + (isWinner ? 1 : 0),
                                'stats.totalProfit': round2((st.totalProfit || 0) + delta)
                            };
                            if (adminRef && userRefs[uid].id === adminRef.id) {
                                upd.balance = round2((snap.data().balance || 0) + rake);
                                upd.clubProfits = round2((snap.data().clubProfits || 0) + rake);
                            }
                            t.update(userRefs[uid], upd);
                        }
                        // אם האדמין לא ישב בשולחן - זיכוי רייק נפרד
                        if (adminRef && adminSnap && adminSnap.exists() && !userSnaps[adminRef.id]) {
                            t.update(adminRef, {
                                balance: round2((adminSnap.data().balance || 0) + rake),
                                clubProfits: round2((adminSnap.data().clubProfits || 0) + rake)
                            });
                        }
                    });
                } catch(e) {
                } finally { endingRef.current = false; }
            };

            /* ---------- סיום תור ---------- */
            const handleEndTurn = async () => {
                if (tableState.currentTurn !== user.uid) return;

                if (!isBoardValid) {
                    flashError("הלוח לא תקין! ודא שכל הסדרות חוקיות (מינימום 3 אבנים)");
                    return;
                }

                const activeRackCount = rack.filter(t=>t!==null).length;

                if (activeRackCount >= startTurnRackCount) {
                    flashError("לא הורדת אף אבן! אם אין לך מה לשחק, עליך למשוך אבן מהקופה.");
                    return;
                }

                if (!hasDropped) {
                    // הורדה ראשונה: הקבוצות הישנות חייבות להישאר ללא שינוי,
                    // וסכום הקבוצות החדשות (לפי ערך ג'וקר אמיתי) חייב להיות 30+
                    const startIds = new Set(startTurnBoard.map(g => g.id));
                    const untouched = startTurnBoard.every(sg => {
                        const cur = board.find(g => g.id === sg.id);
                        if (!cur || cur.tiles.length !== sg.tiles.length) return false;
                        const ids = new Set(cur.tiles.map(t => t.id));
                        return sg.tiles.every(t => ids.has(t.id));
                    });
                    if (!untouched) {
                        flashError('לפני הורדה ראשונה אסור לשנות את אבני השולחן. לחץ "בטל" ופתח סדרות חדשות משלך.');
                        return;
                    }
                    const newGroups = board.filter(g => !startIds.has(g.id));
                    const dropValue = newGroups.reduce((s, g) => s + groupPoints(g.tiles), 0);
                    if (dropValue < FIRST_MELD_MIN) {
                        flashError(`יש צורך ב-${FIRST_MELD_MIN} נקודות לפחות להורדה ראשונה (הורדת רק ${dropValue}).`);
                        return;
                    }
                }

                // ניצחון - התחשבנות מלאה
                if (activeRackCount === 0) {
                    await endGame(board);
                    return;
                }

                const uids = Object.keys(tableState.players).sort();
                const nextTurn = uids[(uids.indexOf(user.uid) + 1) % uids.length];
                await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", tableState.id), { board: board, [`players.${user.uid}.cards`]: rack, [`players.${user.uid}.hasDropped`]: true, currentTurn: nextTurn, turnStartedAt: Date.now() });
            };

            /* ---------- סיבוב חדש אחרי סיום ---------- */
            const handleNewRound = async () => {
                try {
                    await window.fb.runTransaction(window.fb.db, async (t) => {
                        const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const snap = await t.get(tblRef);
                        if (!snap.exists()) return;
                        const tbl = snap.data();
                        if (tbl.phase !== 'showdown') return;
                        if (Object.keys(tbl.players || {}).length < 2) throw "אין מספיק שחקנים לסיבוב חדש";
                        t.update(tblRef, buildDeal(tbl.players));
                    });
                } catch(e) { showToast(typeof e === 'string' ? e : "שגיאה בפתיחת סיבוב", "error"); }
            };

            /* ---------- עזיבת שולחן ----------
               waiting/showdown: הצ'יפים חוזרים לארנק.
               playing (כניעה): ה-stack מתחלק שווה בין הנשארים; אם נשאר אחד - הוא מנצח (בניכוי רייק).
               תוקן: כל הקריאות לפני הכתיבות + הכסף לא נעלם יותר. */
            const handleLeave = async () => {
                if (!tableState?.players?.[user.uid]) { onLeave(); return; }
                const isPlayingNow = tableState.phase === 'playing';

                if (isPlayingNow) {
                    if (!window.confirm("⚠️ פרישה באמצע משחק (כניעה) - הצ'יפים שלך בשולחן יחולקו בין השחקנים הנשארים.\nבטוח?")) {
                        return;
                    }
                }

                try {
                    await window.fb.runTransaction(window.fb.db, async (t) => {
                        const tblRef = window.fb.doc(window.fb.db, "tables", tableState.id);
                        const uRef = window.fb.doc(window.fb.db, "users", user.uid);

                        // שלב קריאות
                        const tblSnap = await t.get(tblRef);
                        const uSnap = await t.get(uRef);
                        if (!tblSnap.exists()) return;
                        const tblData = tblSnap.data();
                        const stillPlaying = tblData.phase === 'playing';
                        const myStack = tblData.players?.[user.uid]?.stack || 0;

                        const newP = { ...tblData.players };
                        delete newP[user.uid];
                        const remainingUids = Object.keys(newP);

                        // קריאת מסמך המנצח והאדמין מראש אם צריך
                        let winnerRef = null, winnerSnap = null, adminRef = null, adminSnap = null;
                        const lastManStanding = stillPlaying && remainingUids.length === 1;
                        if (lastManStanding) {
                            const winnerUid = remainingUids[0];
                            if (!newP[winnerUid].isBot) {
                                winnerRef = window.fb.doc(window.fb.db, "users", winnerUid);
                                winnerSnap = await t.get(winnerRef);
                            }
                            const adminQ = window.fb.query(window.fb.collection(window.fb.db, "users"), window.fb.where("role", "==", ROLES.SUPER_ADMIN));
                            const adminDocs = await window.fb.getDocs(adminQ);
                            if (!adminDocs.empty) {
                                adminRef = adminDocs.docs[0].ref;
                                adminSnap = await t.get(adminRef);
                            }
                        }

                        // שלב כתיבות
                        const updates = { players: newP };
                        const uData = uSnap.exists() ? uSnap.data() : {};

                        if (!stillPlaying) {
                            // waiting או showdown: החזר מלא לארנק
                            t.update(uRef, { balance: round2((uData.balance || 0) + myStack) });
                        } else {
                            // כניעה: סטטיסטיקה שלי
                            const currentStats = uData.stats || { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 };
                            t.update(uRef, {
                                'stats.gamesPlayed': (currentStats.gamesPlayed || 0) + 1,
                                'stats.totalProfit': round2((currentStats.totalProfit || 0) - myStack)
                            });

                            if (lastManStanding) {
                                const winnerUid = remainingUids[0];
                                const rake = round2(myStack * RAKE);
                                const winnerProfit = round2(myStack - rake);
                                newP[winnerUid].stack = round2((newP[winnerUid].stack || 0) + winnerProfit);
                                updates.phase = 'showdown';
                                updates.winner = winnerUid;
                                updates.currentTurn = null;
                                updates.lastResults = { winnerName: newP[winnerUid].username, totalPot: myStack, rake, winnerProfit, details: { [user.uid]: { username: uData.username || user.username, penalty: 0, pay: myStack } }, endedAt: Date.now() };

                                if (winnerRef && winnerSnap && winnerSnap.exists()) {
                                    const wStats = winnerSnap.data().stats || { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 };
                                    t.update(winnerRef, {
                                        'stats.gamesPlayed': (wStats.gamesPlayed || 0) + 1,
                                        'stats.gamesWon': (wStats.gamesWon || 0) + 1,
                                        'stats.totalProfit': round2((wStats.totalProfit || 0) + winnerProfit)
                                    });
                                }
                                if (adminRef && adminSnap && adminSnap.exists()) {
                                    t.update(adminRef, {
                                        balance: round2((adminSnap.data().balance || 0) + rake),
                                        clubProfits: round2((adminSnap.data().clubProfits || 0) + rake)
                                    });
                                }
                            } else if (remainingUids.length >= 2) {
                                // חלוקת ה-stack שווה בשווה בין הנשארים - הכסף לא נעלם
                                const share = round2(myStack / remainingUids.length);
                                remainingUids.forEach(uid => { newP[uid].stack = round2((newP[uid].stack || 0) + share); });

                                if (tblData.currentTurn === user.uid) {
                                    const origUids = Object.keys(tblData.players).sort();
                                    let idx = origUids.indexOf(user.uid);
                                    let next = origUids[(idx + 1) % origUids.length];
                                    while (!newP[next]) { idx++; next = origUids[(idx + 1) % origUids.length]; }
                                    updates.currentTurn = next;
                                    updates.turnStartedAt = Date.now();
                                }
                            }
                        }
                        t.update(tblRef, updates);
                    });

                    showToast(isPlayingNow ? "נכנעת ויצאת מהמשחק." : "קמת מהשולחן והצ'יפים חזרו לארנק.", "info");
                    onLeave();
                } catch(e) {
                    showToast("שגיאה ביציאה מהשולחן", "error");
                }
            };

            if (loading) return <div className="h-full flex items-center justify-center text-emerald-500"><i className="fa-solid fa-spinner fa-spin text-3xl"></i></div>;

            const isSeated = tableState?.players?.[user.uid] !== undefined;
            const isPlaying = tableState.phase === 'playing';
            const isShowdown = tableState.phase === 'showdown';
            const isMyTurn = tableState.currentTurn === user.uid;
            const myTileCount = rack.filter(t=>t!==null).length;
            const results = tableState.lastResults;

            return (
                <div className="h-full w-full flex flex-col bg-slate-950 font-sans overflow-hidden" dir="rtl">

                    {/* Table Header */}
                    <div className="h-16 bg-slate-900/80 border-b border-white/5 flex justify-between items-center px-4 shrink-0 relative z-20 backdrop-blur-md shadow-xl">
                        <div className="flex items-center gap-3">
                            <button onClick={handleLeave} className="px-3 py-1.5 rounded-lg bg-slate-800 text-slate-400 hover:text-white hover:bg-rose-600 transition-colors text-sm font-bold border border-slate-700 flex items-center gap-2">
                                <i className="fa-solid fa-door-open"></i> יציאה
                            </button>
                            {isGod && (
                                <button onClick={() => setIsGodMode(!isGodMode)} className={`px-3 py-1.5 rounded-lg text-[11px] font-black border transition-all ${isGodMode ? 'bg-purple-600 text-white border-purple-400 shadow-[0_0_12px_purple]' : 'bg-slate-800 text-purple-400 border-slate-700 hover:border-purple-500'}`}>
                                    <i className="fa-solid fa-eye ml-1"></i> GOD
                                </button>
                            )}
                        </div>

                        <div className="flex flex-col items-center absolute left-1/2 transform -translate-x-1/2">
                            <div className="text-emerald-400 font-black text-sm sm:text-base tracking-widest uppercase">רמיקוב</div>
                            <div className="text-slate-400 text-[10px] sm:text-xs font-bold">ערך נקודה: {formatMoney(tableState.stakes)}</div>
                        </div>

                        <div className="flex items-center gap-2 bg-slate-950 px-3 py-1.5 rounded-lg border border-emerald-500/30">
                             <span className="text-emerald-400 font-black text-sm">{(tableState.deck || []).length}</span>
                             <span className="text-[10px] text-slate-400 font-bold">אבנים בקופה</span>
                        </div>
                    </div>

                    {/* Top Opponents HUD */}
                    {(isPlaying || isShowdown) && (
                        <div className="h-24 bg-slate-900 border-b border-slate-800 flex items-center justify-center gap-6 sm:gap-8 shrink-0 z-20 relative shadow-inner overflow-x-auto px-4">
                            {Object.entries(tableState.players || {}).filter(([uid]) => uid !== user.uid).map(([uid, pData]) => {
                                const tileCount = pData.cards ? pData.cards.filter(c => c !== null).length : 0;
                                const isTurn = tableState.currentTurn === uid;

                                return (
                                    <div key={uid} className={`flex flex-col items-center transition-all shrink-0 ${isTurn ? 'scale-110' : 'opacity-80'}`}>
                                        <div className={`w-10 h-10 sm:w-12 sm:h-12 rounded-full border-2 mb-1 flex items-center justify-center bg-slate-800 relative ${isTurn ? 'border-amber-400 shadow-[0_0_15px_#f59e0b]' : 'border-slate-600'}`}>
                                            <span className={`text-xs font-black ${isTurn ? 'text-amber-400' : 'text-slate-400'}`}>{(pData.username||'?').substring(0,2).toUpperCase()}</span>
                                        </div>
                                        <span className="text-[10px] sm:text-xs font-bold text-white mb-0.5 whitespace-nowrap">{pData.username}</span>
                                        <div className="flex gap-1">
                                            <span className="text-[9px] sm:text-[10px] bg-slate-800 border border-slate-700 px-2 py-0.5 rounded text-amber-400 font-bold whitespace-nowrap">📦 {tileCount}</span>
                                            <span className="text-[9px] sm:text-[10px] bg-slate-800 border border-slate-700 px-2 py-0.5 rounded text-gold-400 font-bold whitespace-nowrap" dir="ltr">{formatMoney(pData.stack)}</span>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    <div className="flex-1 flex relative min-h-0">
                        {/* Game Board (Felt) */}
                        <div
                            id="felt-board"
                            data-drop="board-new"
                            className="flex-1 relative z-0 overflow-hidden border-[8px] border-[#064e3b]"
                            style={{
                                background: 'radial-gradient(circle at center, #0f172a 0%, #020617 100%)',
                                boxShadow: 'inset 0 0 60px rgba(0,0,0,0.8)'
                            }}
                        >
                            {/* Waiting Room Overlay */}
                            {tableState.phase === 'waiting' && (
                                <div className="absolute inset-0 z-[100] flex items-center justify-center bg-slate-950/80 backdrop-blur-sm">
                                    <div className="glass-panel p-6 sm:p-8 rounded-3xl border border-emerald-500/30 text-center max-w-lg w-[90%] shadow-2xl animate-fade-in">
                                         <h2 className="text-2xl sm:text-3xl font-black text-white mb-2">ממתין לשחקנים...</h2>
                                         <p className="text-emerald-400 font-bold mb-8 animate-pulse text-sm sm:text-base">המשחק יתחיל ברגע שהשולחן יתמלא</p>

                                         <div className="flex justify-center gap-4 sm:gap-6 mb-8 flex-wrap">
                                             {[...Array(Number(tableState.maxPlayers) || 4)].map((_, i) => {
                                                 const p = Object.values(tableState.players || {})[i];
                                                 return p ? (
                                                     <div key={i} className="flex flex-col items-center">
                                                         <div className="w-14 h-14 sm:w-16 sm:h-16 rounded-full bg-slate-800 border-2 border-emerald-500 flex items-center justify-center mb-2 shadow-[0_0_15px_rgba(16,185,129,0.5)] transition-all">
                                                             <span className="text-lg font-black text-emerald-400">{(p.username||'?').substring(0,2).toUpperCase()}</span>
                                                         </div>
                                                         <span className="text-white text-xs sm:text-sm font-bold">{p.username}</span>
                                                     </div>
                                                 ) : (
                                                     <div key={i} className="flex flex-col items-center">
                                                         <div className="w-14 h-14 sm:w-16 sm:h-16 rounded-full bg-slate-800/30 border-2 border-slate-600 border-dashed flex items-center justify-center mb-2">
                                                             <i className="fa-solid fa-spinner fa-spin text-xl sm:text-2xl text-slate-500"></i>
                                                         </div>
                                                         <span className="text-slate-500 text-xs sm:text-sm font-bold">ממתין...</span>
                                                     </div>
                                                 );
                                             })}
                                         </div>

                                         {!isSeated && (
                                             <button onClick={handleSit} className="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-3 rounded-xl font-black shadow-lg uppercase tracking-widest w-full transition-transform hover:scale-105">
                                                 התיישב בשולחן ({formatMoney(tableState.minBuyIn)})
                                             </button>
                                         )}
                                    </div>
                                </div>
                            )}

                            {/* Showdown / Settlement Overlay */}
                            {isShowdown && results && (
                                <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm animate-fade-in p-4">
                                    <div className="bg-slate-900 border-2 border-amber-500 p-6 sm:p-8 rounded-3xl shadow-[0_0_50px_rgba(245,158,11,0.3)] text-center max-w-sm w-full">
                                        <div className="trophy-pop inline-block"><i className="fa-solid fa-trophy text-6xl text-amber-400 mb-4 drop-shadow-[0_0_15px_#f59e0b]"></i></div>
                                        <h2 className="text-2xl font-black text-white mb-1">{results.winnerName} ניצח!</h2>
                                        <p className="text-emerald-400 font-black text-xl mb-4" dir="ltr">+{formatMoney(results.winnerProfit)}</p>

                                        <div className="bg-slate-950/60 rounded-2xl border border-slate-800 divide-y divide-slate-800 text-sm mb-5">
                                            {Object.entries(results.details || {}).map(([uid, d]) => (
                                                <div key={uid} className="flex justify-between items-center px-4 py-2.5">
                                                    <span className="font-bold text-slate-300">{d.username}</span>
                                                    <span className="text-rose-400 font-bold" dir="ltr">{d.penalty > 0 ? `${d.penalty} pts · ` : ''}-{formatMoney(d.pay)}</span>
                                                </div>
                                            ))}
                                            <div className="flex justify-between items-center px-4 py-2 text-xs text-slate-500">
                                                <span>רייק מועדון ({RAKE*100}%)</span><span dir="ltr">{formatMoney(results.rake)}</span>
                                            </div>
                                        </div>

                                        <div className="flex gap-3">
                                            {isSeated && <button onClick={handleNewRound} className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-xl font-black text-sm">סיבוב חדש</button>}
                                            <button onClick={handleLeave} className="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl font-black text-sm border border-slate-700">קום מהשולחן</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {(isPlaying || isShowdown) && (
                                <React.Fragment>
                                    {/* Big Timer */}
                                    {isPlaying && (
                                        <div className="absolute top-4 right-4 sm:right-6 bg-slate-900/80 backdrop-blur-sm px-4 sm:px-6 py-2 rounded-2xl border-2 border-slate-700 shadow-2xl z-30">
                                            <div className={`text-[10px] sm:text-xs font-bold text-center mb-1 ${isMyTurn ? 'text-emerald-400' : 'text-slate-500'}`}>
                                                {isMyTurn ? 'התור שלך' : 'תור יריב'}
                                            </div>
                                            <div className={`font-mono text-3xl sm:text-4xl font-black ${isMyTurn ? (timeLeft <= 10 ? 'text-rose-500 animate-pulse' : 'text-white') : 'text-slate-500'}`}>
                                                {timeLeft.toString().padStart(2, '0')}
                                            </div>
                                        </div>
                                    )}

                                    {/* My Player Indicator */}
                                    {isSeated && (
                                        <div className="absolute top-4 left-4 sm:left-6 z-30 flex flex-col items-center bg-slate-900/60 backdrop-blur-sm p-3 rounded-2xl border border-white/5">
                                            <div className="w-12 h-12 rounded-full border-2 border-emerald-500 bg-slate-800 flex items-center justify-center shadow-[0_0_15px_rgba(16,185,129,0.5)] mb-1">
                                                <i className="fa-solid fa-user text-emerald-400 text-lg"></i>
                                            </div>
                                            <span className="text-xs font-bold text-white mb-1">אתה</span>
                                            <div className="flex flex-col gap-1 items-center">
                                                <span className="text-[10px] bg-slate-800 border border-slate-700 px-2 py-0.5 rounded text-emerald-400 font-bold">📦 {myTileCount} אבנים</span>
                                                <span className="text-[10px] bg-slate-800 border border-slate-700 px-2 py-0.5 rounded text-gold-400 font-bold" dir="ltr">{formatMoney(me?.stack)}</span>
                                                {!hasDropped && isPlaying && <span className="text-[9px] bg-amber-900/70 border border-amber-600 px-2 py-0.5 rounded text-amber-300 font-bold">טרם ירדת ({FIRST_MELD_MIN}+)</span>}
                                            </div>
                                        </div>
                                    )}

                                    {/* Free-Form Board */}
                                    <div className="w-full h-full relative" style={{ '--board-scale': boardScale }}>
                                        {board.map((groupObj) => (
                                            <div key={groupObj.id} data-drop={`board-group-${groupObj.id}`}
                                                 className={`absolute flex board-group ${hoverTarget === `board-group-${groupObj.id}` ? 'bg-emerald-500/20 border-2 border-emerald-500 shadow-[0_0_20px_rgba(16,185,129,0.3)] rounded-xl' : !validateGroup(groupObj.tiles) ? 'board-invalid-group rounded-xl' : 'border-2 border-transparent hover:bg-white/5 rounded-xl'}`}
                                                 style={{ left: `${groupObj.x}%`, top: `${groupObj.y}%`, transform: 'translate(-50%, -50%)', direction: 'ltr' }}>
                                                {groupObj.tiles.map((t, tIdx) => (
                                                    <div key={t.id}
                                                         onPointerDown={(e) => startDrag(e, t, 'board', groupObj.id, tIdx)}
                                                         className={`rummy-tile board-tile flex items-center justify-center cursor-grab active:cursor-grabbing ${dragData?.type === 'group' && dragData.groupId === groupObj.id ? 'opacity-30' : dragData?.tile?.id === t.id ? 'opacity-30' : ''}`}
                                                         style={{ color: t.color }}>{t.val}</div>
                                                ))}
                                            </div>
                                        ))}
                                        {board.length === 0 && isPlaying && (
                                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                                <span className="text-slate-700 font-black text-lg">גרור אבנים לכאן כדי לפתוח סדרות</span>
                                            </div>
                                        )}
                                    </div>
                                </React.Fragment>
                            )}
                        </div>

                        {/* Actions Column */}
                        {isSeated && isPlaying && (
                            <div className="w-20 sm:w-24 bg-slate-900 border-r border-slate-800 flex flex-col justify-between py-3 shrink-0 z-20 shadow-xl overflow-y-auto">
                                <div className="flex flex-col gap-2 w-full px-2">
                                    <button onClick={handleSort789} className="w-full py-2 sm:py-3 rounded-xl action-btn flex flex-col items-center justify-center text-slate-300 hover:text-white" title="סדר לפי סדרות">
                                        <span className="font-black text-xs text-blue-400 leading-none mb-1">789</span>
                                        <span className="text-[10px] font-bold">סדר</span>
                                    </button>
                                    <button onClick={handleSort777} className="w-full py-2 sm:py-3 rounded-xl action-btn flex flex-col items-center justify-center text-slate-300 hover:text-white" title="סדר לפי קבוצות">
                                        <span className="font-black text-xs text-rose-400 leading-none mb-1">777</span>
                                        <span className="text-[10px] font-bold">סדר</span>
                                    </button>
                                    <button onClick={handleArrangeBoard} className="w-full py-2 sm:py-3 rounded-xl action-btn flex flex-col items-center justify-center text-slate-300 hover:text-white" title="סדר את השולחן בשורות">
                                        <i className="fa-solid fa-table-cells text-sm mb-1 text-emerald-400"></i>
                                        <span className="text-[10px] font-bold">שולחן</span>
                                    </button>

                                    {isMyTurn && (
                                        <button onClick={handleUndo} className="w-full py-2 sm:py-3 rounded-xl action-btn flex flex-col items-center justify-center text-slate-300 hover:text-white mt-2">
                                            <i className="fa-solid fa-undo text-sm mb-1"></i>
                                            <span className="text-[10px] font-bold">בטל</span>
                                        </button>
                                    )}
                                </div>

                                <div className="flex flex-col gap-2 w-full px-2 mt-auto pt-2">
                                    {isMyTurn && (
                                        <button onClick={()=>handleDraw(false)} className="w-full py-3 sm:py-4 rounded-xl bg-gradient-to-br from-amber-500 to-amber-600 text-white font-black shadow-[0_0_15px_rgba(245,158,11,0.4)] flex flex-col items-center justify-center border-2 border-amber-300 transform transition-transform hover:scale-105 active:scale-95" title="משיכה מהקופה (מסיים תור)">
                                            <i className="fa-solid fa-plus text-lg mb-1"></i>
                                            <span className="text-[10px]">קופה</span>
                                        </button>
                                    )}
                                    {isMyTurn && (
                                        <button onClick={handleEndTurn} className="w-full py-3 sm:py-4 rounded-xl bg-gradient-to-br from-emerald-500 to-emerald-600 text-white font-black shadow-[0_0_15px_rgba(16,185,129,0.4)] flex flex-col items-center justify-center border-2 border-emerald-300 transform transition-transform hover:scale-105 active:scale-95" title="סיום תור">
                                            <i className="fa-solid fa-check text-2xl"></i>
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Error Messages */}
                    {showError && (
                        <div className="absolute bottom-[200px] left-1/2 transform -translate-x-1/2 z-[100] bg-rose-900/95 border-2 border-rose-500 text-white px-8 py-3 rounded-full font-black text-sm sm:text-base shadow-[0_0_30px_rgba(225,29,72,0.6)] animate-pop-in text-center max-w-[90%]">
                            <i className="fa-solid fa-triangle-exclamation ml-2 text-amber-400"></i> {showError}
                        </div>
                    )}

                    {/* GOD MODE Panel - רק לשני המיילים המורשים */}
                    {isGod && isGodMode && (isPlaying || isShowdown) && (
                        <div className="absolute top-[180px] right-4 z-[150] bg-slate-950/95 border-2 border-purple-600 rounded-2xl p-4 shadow-[0_0_40px_rgba(168,85,247,0.35)] max-w-[75vw] sm:max-w-md max-h-[50vh] overflow-y-auto backdrop-blur">
                            <div className="flex items-center justify-between mb-3">
                                <span className="font-black text-purple-400 text-sm"><i className="fa-solid fa-eye ml-1"></i> GOD MODE</span>
                                <button onClick={()=>setIsGodMode(false)} className="text-slate-500 hover:text-white w-6 h-6"><i className="fa-solid fa-xmark"></i></button>
                            </div>
                            {Object.entries(tableState.players || {}).filter(([uid]) => uid !== user.uid).map(([uid, p]) => (
                                <div key={uid} className="mb-3">
                                    <div className="text-xs font-bold text-white mb-1">{p.username} <span className="text-slate-500">({(p.cards||[]).filter(c=>c).length} אבנים · {rackPenalty(p.cards)} נק')</span></div>
                                    <div className="flex flex-wrap gap-1" dir="ltr">
                                        {(p.cards||[]).filter(c=>c).map(t => (
                                            <div key={t.id} className="rummy-tile w-6 h-9 flex items-center justify-center text-xs" style={{ color: t.color }}>{t.val}</div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Player Rack (Wood) */}
                    {isSeated && isPlaying && (
                        <div className="h-40 md:h-48 shrink-0 bg-slate-900 border-t-4 border-emerald-600 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] flex items-end justify-center pb-2 px-2 relative z-30 pt-4">
                            <div className="rack-grid h-full max-h-[140px] md:max-h-[160px]">
                                {rack.map((tile, index) => {
                                    const isDraggingThisGroup = dragData?.type === 'group_from_rack' && index >= dragData.startIndex && index < dragData.startIndex + dragData.tiles.length;
                                    return (
                                        <div key={index} data-drop={`rack-slot-${index}`} className={`rack-slot flex items-center justify-center ${hoverTarget === `rack-slot-${index}` ? 'hover-target' : ''}`}>
                                            {tile && (
                                                <div onPointerDown={(e) => startDrag(e, tile, 'rack', null, index)} className={`rummy-tile w-[90%] h-[95%] flex items-center justify-center text-xl sm:text-3xl z-10 cursor-grab active:cursor-grabbing ${dragData?.tile?.id === tile.id ? 'opacity-20' : isDraggingThisGroup ? 'opacity-20' : ''}`} style={{ color: tile.color }}>
                                                    {tile.val}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {/* Ghost Elements for Dragging */}
                    {dragData && dragData.type === 'single' && (
                        <div id="drag-ghost" className="fixed z-[9999] rummy-tile w-12 h-16 sm:w-14 sm:h-20 flex items-center justify-center text-3xl sm:text-4xl font-bold shadow-[0_30px_50px_rgba(0,0,0,0.8)]" style={{ left: dragPos.x, top: dragPos.y, transform: 'translate(-50%, -50%) rotate(3deg) scale(1.1)', color: dragData.tile.color, pointerEvents: 'none' }}>{dragData.tile.val}</div>
                    )}
                    {(dragData && (dragData.type === 'group' || dragData.type === 'group_from_rack')) && (
                        <div id="drag-ghost-group" className="fixed z-[9999] flex bg-black/40 p-2 rounded-xl backdrop-blur-sm border border-emerald-500 shadow-[0_20px_40px_rgba(0,0,0,0.8)]" style={{ left: dragPos.x, top: dragPos.y, transform: 'translate(-50%, -50%) scale(1.1)', pointerEvents: 'none' }} dir="ltr">
                            {dragData.tiles.map(t => (<div key={t.id} className="rummy-tile w-10 h-14 sm:w-12 sm:h-16 flex items-center justify-center text-2xl mx-0.5 shadow-md" style={{ color: t.color }}>{t.val}</div>))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
