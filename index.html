    <style>
        body, html {
            background-color: #020617;
            color: #f8fafc; margin: 0; padding: 0;
            height: 100dvh;
            width: 100vw; overflow: hidden; overscroll-behavior: none;
            touch-action: none;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        .scrollable-content { overflow-y: auto; -webkit-overflow-scrolling: touch; height: 100%; padding-bottom: 150px; pointer-events: auto; touch-action: auto; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        .animate-pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes flashRed { 0%, 100% { border-color: rgba(239, 68, 68, 0.3); box-shadow: none; } 50% { border-color: rgba(239, 68, 68, 0.8); box-shadow: 0 0 15px rgba(239,68,68,0.5); } }
        .board-invalid-group { animation: flashRed 1.5s infinite; border: 2px solid #ef4444 !important; background: rgba(239, 68, 68, 0.05); }

        @keyframes trophyPop { 0% { transform: scale(0) rotate(-20deg); } 70% { transform: scale(1.2) rotate(5deg); } 100% { transform: scale(1) rotate(0); } }
        .trophy-pop { animation: trophyPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        /* New Tile Design (Commercial Look) */
        .rummy-tile {
            background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
            box-shadow: 2px 4px 8px rgba(0,0,0,0.4), inset -1px -2px 3px rgba(0,0,0,0.1), inset 1px 1px 2px rgba(255,255,255,1);
            border-bottom: 5px solid #cbd5e1; border-right: 1px solid #e2e8f0; border-radius: 8px;
            font-family: 'Rubik', sans-serif; font-weight: 900;
            transition: transform 0.1s ease, box-shadow 0.1s ease; user-select: none;
            text-shadow: 0 1px 1px rgba(0,0,0,0.15);
            touch-action: none;
        }
        .rummy-tile:active, .rummy-tile.dragging {
            box-shadow: 0 20px 30px rgba(0,0,0,0.6); transform: scale(1.1) translateY(-8px); z-index: 999;
        }

        .board-tile {
            width: calc(2.25rem * var(--board-scale, 1));
            height: calc(3.5rem * var(--board-scale, 1));
            font-size: calc(1.25rem * var(--board-scale, 1));
            margin-left: calc(2px * var(--board-scale, 1));
            margin-right: calc(2px * var(--board-scale, 1));
        }
        @media (min-width: 640px) {
            .board-tile {
                width: calc(2.75rem * var(--board-scale, 1));
                height: calc(4rem * var(--board-scale, 1));
                font-size: calc(1.75rem * var(--board-scale, 1));
            }
        }

        .board-group {
            padding: calc(0.8rem * var(--board-scale, 1));
            border-radius: calc(0.75rem * var(--board-scale, 1));
            transition: background-color 0.2s, border-color 0.2s;
        }

        /* Commercial Wood Rack */
        .rack-grid {
            display: grid;
            grid-template-columns: repeat(14, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 4px;
            width: 100%; max-width: 900px;
            padding: 8px;
            background: linear-gradient(to bottom, #d4a373 0%, #bc8a5f 40%, #8b5a2b 100%);
            border-bottom: 14px solid #4a2e15; border-top: 1px solid #e6ccb2;
            border-left: 3px solid #704728; border-right: 3px solid #704728;
            border-radius: 12px 12px 6px 6px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 5px 15px rgba(0,0,0,0.3);
            direction: ltr; /* CRITICAL: Fixes RTL number sorting visually */
        }

        .rack-slot {
            aspect-ratio: 9/13;
            background-color: rgba(0,0,0,0.15);
            border-radius: 6px;
            border: 1px dashed rgba(255,255,255,0.1);
            position: relative;
        }
        .rack-slot.hover-target { background-color: rgba(16, 185, 129, 0.4); border-color: rgba(16, 185, 129, 0.8); }

        .action-btn {
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            border: 2px solid #334155;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.1);
            transition: all 0.1s ease;
        }
        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
    </style>

<body class="bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 to-slate-950 h-full w-full">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        /* ================================================================
           הגדרות קלאב - כאן משנים דברים בקלות
           ================================================================ */
        const ROLES = { SUPER_ADMIN: 'super_admin', CLUB_OWNER: 'club_owner', MANAGER: 'manager', AGENT: 'agent', PLAYER: 'player' };

        // GOD MODE - אך ורק שני המיילים האלה. (שים לב: תיקנתי gmail.con ל-gmail.com)
        const GOD_EMAILS = ['aaci.yoni@gmail.com', 'info.bagso@gmail.com'];
        const SUPER_ADMIN_EMAIL = 'aaci.yoni@gmail.com';

        const RAKE = 0.06;            // 6% רייק לקלאב
        const TURN_SECONDS = 60;      // זמן לתור
        const FIRST_MELD_MIN = 30;    // מינימום נקודות להורדה ראשונה

        const BOT_NAMES = ['Alex_Pro', 'TileMaster99', 'RummyKing', 'Sara_Play', 'PokerFace_Dan', 'Lucky_Jim', 'AceOfSpades', 'JokerQueen', 'Max_Bet', 'Fast_Hand'];

        const isGodUser = (u) => u && GOD_EMAILS.includes((u.email || '').toLowerCase().trim());
        const round2 = (n) => Math.round(n * 100) / 100;

        const formatMoney = (amount) => {
            if (amount === undefined || amount === null) return '0.00';
            const num = Number(amount);
            if (isNaN(num)) return String(amount);
            return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        };

        /* ================================================================
           לוגיקת רמיקוב
           ================================================================ */
        const generateDeck = () => {
            const colors = ['#ef4444', '#3b82f6', '#f59e0b', '#0f172a']; // Red, Blue, Orange, Black
            let d = [];
            for (let set=0; set<2; set++) { for(let c=0; c<4; c++) { for(let v=1; v<=13; v++) d.push({id:`t_${set}_${c}_${v}_${Math.random().toString(36).slice(2,8)}`, val:v, color:colors[c]}); } }
            d.push({id:`j1_${Math.random().toString(36).slice(2,8)}`, val:'☻', color:'#ef4444'});
            d.push({id:`j2_${Math.random().toString(36).slice(2,8)}`, val:'☻', color:'#0f172a'});
            return d.sort(()=>Math.random()-0.5);
        };

        // בדיקת חוקיות קבוצה: סט (מספר זהה, צבעים שונים) או סדרה (צבע זהה, רצף)
        const validateGroup = (group) => {
            if (!group || group.length < 3) return false;
            const jokersCount = group.filter(t => t.val === '☻').length;
            const regulars = group.filter(t => t.val !== '☻');
            if (regulars.length === 0) return group.length >= 3;
            if (group.length > 13) return false;

            const isSet = () => {
                if (group.length > 4) return false;
                const expectedVal = regulars[0].val;
                if (!regulars.every(t => t.val === expectedVal)) return false;
                return new Set(regulars.map(t => t.color)).size === regulars.length;
            };

            const isRun = () => {
                const expectedColor = regulars[0].color;
                if (!regulars.every(t => t.color === expectedColor)) return false;
                if (new Set(regulars.map(t => Number(t.val))).size !== regulars.length) return false;
                const sorted = [...regulars].sort((a,b) => Number(a.val) - Number(b.val));
                let gaps = 0;
                for(let i=0; i<sorted.length-1; i++) gaps += (Number(sorted[i+1].val) - Number(sorted[i].val) - 1);
                if (gaps > jokersCount) return false;
                // ג'וקרים עודפים חייבים להאריך את הסדרה בלי לחרוג מגבולות 1-13
                const extra = jokersCount - gaps;
                const lo = Number(sorted[0].val), hi = Number(sorted[sorted.length-1].val);
                return (13 - hi) + (lo - 1) >= extra;
            };

            return isSet() || isRun();
        };

        // חישוב נקודות של קבוצה חוקית - ג'וקר נספר לפי ערך האבן שהוא מחליף (חוק רשמי)
        const groupPoints = (tiles) => {
            const jokers = tiles.filter(t => t.val === '☻').length;
            const regulars = tiles.filter(t => t.val !== '☻');
            if (regulars.length === 0) return 30 * jokers;

            const isSet = tiles.length <= 4 && regulars.every(t => t.val === regulars[0].val) && new Set(regulars.map(t=>t.color)).size === regulars.length;
            if (isSet) return Number(regulars[0].val) * tiles.length;

            // סדרה: ג'וקרים ממלאים חורים, השאר מאריכים למעלה (עד 13) ואז למטה
            const sorted = [...regulars].sort((a,b) => Number(a.val) - Number(b.val));
            let sum = sorted.reduce((s,t) => s + Number(t.val), 0);
            let j = jokers;
            for (let i=0; i<sorted.length-1 && j>0; i++) {
                const gap = Number(sorted[i+1].val) - Number(sorted[i].val) - 1;
                for (let g=1; g<=gap && j>0; g++) { sum += Number(sorted[i].val) + g; j--; }
            }
            let hi = Number(sorted[sorted.length-1].val), lo = Number(sorted[0].val);
            while (j>0 && hi<13) { hi++; sum += hi; j--; }
            while (j>0 && lo>1) { lo--; sum += lo; j--; }
            return sum;
        };

        // קנס אבנים שנשארו ביד בסוף המשחק - ג'וקר = 30 נקודות
        const rackPenalty = (cards) => (cards || []).filter(c => c).reduce((s,c) => s + (c.val === '☻' ? 30 : Number(c.val)), 0);

        // חלוקת קלפים אחידה לכל המקומות (התיישבות, בוטים, סיבוב חדש) - מונעת תנאי מרוץ
        const buildDeal = (players) => {
            const d = generateDeck();
            const uids = Object.keys(players).sort();
            const np = {};
            uids.forEach(uid => {
                const hand = d.splice(0, 14);
                while (hand.length < 28) hand.push(null);
                np[uid] = { ...players[uid], cards: hand, hasDropped: false };
            });
            return { players: np, deck: d, board: [], phase: 'playing', currentTurn: uids[0], turnStartedAt: Date.now(), winner: null, lastResults: null };
        };

        const Coin = ({ amount, className="", size="md" }) => (
            <span className={`inline-flex items-center gap-1 font-bold ${className}`}>
                <i className={`fa-solid fa-coins text-gold-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.5)] ${size==='lg'?'text-xl':''}`}></i>
                {formatMoney(amount)}
            </span>
        );

        /* ================================================================
           אפליקציה ראשית
           ================================================================ */
        function App() {
            const [fbReady, setFbReady] = useState(false);
            const [dbUser, setDbUser] = useState(null);
            const [currentView, setCurrentView] = useState('auth');
            const [tablesDB, setTablesDB] = useState([]);
            const [activeTable, setActiveTable] = useState(null);
            const [toasts, setToasts] = useState([]);

            const viewRef = useRef(currentView);
            useEffect(() => { viewRef.current = currentView; }, [currentView]);

            const showToast = (msg, type = 'info') => {
                const id = Date.now() + Math.random();
                setToasts(prev => [...prev, { id, msg, type }]);
                setTimeout(() => { setToasts(prev => prev.filter(t => t.id !== id)); }, 4000);
            };

            const changeView = (view, tableObj = null) => {
                setCurrentView(view);
                setActiveTable(tableObj);
                if (view !== 'auth' && view !== 'pending') {
                    window.history.pushState({ view, tableId: tableObj?.docId }, "", `?v=${view}`);
                }
            };

            useEffect(() => {
                const handlePopState = (event) => {
                    if (event.state && event.state.view) {
                        setCurrentView(event.state.view);
                        if (event.state.view !== 'table') setActiveTable(null);
                    } else if (dbUser && dbUser.status === 'approved') {
                        setCurrentView('lobby');
                    }
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, [dbUser]);

            useEffect(() => {
                if (window.fb) setFbReady(true);
                else window.addEventListener('firebase-ready', () => setFbReady(true));
            }, []);

            useEffect(() => {
                if (!fbReady) return;
                const unsub = window.fb.onAuthStateChanged(window.fb.auth, async (user) => {
                    if (user) await fetchOrInitUser(user);
                    else { setDbUser(null); setCurrentView('auth'); }
                });
                return () => unsub();
            }, [fbReady]);

            const fetchOrInitUser = async (user) => {
                const ref = window.fb.doc(window.fb.db, "users", user.uid);
                const snap = await window.fb.getDoc(ref);
                if (snap.exists()) {
                    setDbUser({ uid: user.uid, ...snap.data() });
                } else {
                    const email = (user.email || '').toLowerCase();
                    const isSuper = email === SUPER_ADMIN_EMAIL;
                    const isGod = GOD_EMAILS.includes(email);
                    const newUser = {
                        username: user.displayName || 'Player',
                        email: email,
                        role: isSuper ? ROLES.SUPER_ADMIN : ROLES.PLAYER,
                        status: (isSuper || isGod) ? 'approved' : 'pending',
                        balance: isSuper ? 10000000 : 0,
                        clubProfits: 0,
                        isBot: false,
                        stats: { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 }
                    };
                    await window.fb.setDoc(ref, newUser);
                    setDbUser({ uid: user.uid, ...newUser });
                }
            };

            useEffect(() => {
                if (!fbReady || !dbUser?.uid) return;
                const unsubT = window.fb.onSnapshot(window.fb.collection(window.fb.db, "tables"), (s) => {
                    setTablesDB(s.docs.map(d => ({ docId: d.id, ...d.data() })));
                });

                const unsubU = window.fb.onSnapshot(window.fb.doc(window.fb.db, "users", dbUser.uid), (d) => {
                    if(d.exists()) {
                        const data = d.data();
                        setDbUser({ uid: d.id, ...data });
                        if(data.status === 'pending') changeView('pending');
                        else if (viewRef.current === 'auth' || viewRef.current === 'pending') {
                            changeView('lobby');
                        }
                    }
                });
                return () => { unsubT(); unsubU(); };
            }, [fbReady, dbUser?.uid]);

            if (!fbReady) return <div className="h-full w-full flex items-center justify-center text-emerald-500"><i className="fa-solid fa-circle-notch fa-spin text-4xl"></i></div>;

            return (
                <div className="h-full w-full flex flex-col relative overflow-hidden">
                    {/* Header Main */}
                    {dbUser && dbUser.status === 'approved' && currentView !== 'table' && (
                        <nav className="bg-slate-900/90 backdrop-blur-md px-4 py-3 z-40 shrink-0 border-b border-slate-800 shadow-xl flex justify-between items-center">
                            <div className="flex items-center gap-2 sm:gap-4">
                                <button onClick={() => window.fb.signOut(window.fb.auth)} className="w-10 h-10 rounded-xl bg-slate-800 text-slate-400 border border-slate-700 hover:text-white hover:bg-rose-600 transition-colors flex items-center justify-center">
                                    <i className="fa-solid fa-sign-out-alt"></i>
                                </button>

                                {[ROLES.SUPER_ADMIN, ROLES.CLUB_OWNER, ROLES.MANAGER, ROLES.AGENT].includes(dbUser.role) && (
                                    <button onClick={() => changeView(currentView === 'backoffice' ? 'lobby' : 'backoffice')} className={`w-10 h-10 rounded-xl border flex items-center justify-center transition-colors ${currentView === 'backoffice' ? 'bg-blue-600 text-white border-blue-500 shadow-[0_0_10px_rgba(37,99,235,0.5)]' : 'bg-slate-800 text-blue-400 border-slate-700 hover:text-white'}`} title="ניהול מועדון">
                                        <i className="fa-solid fa-chart-line"></i>
                                    </button>
                                )}

                                <button onClick={() => changeView(currentView === 'profile' ? 'lobby' : 'profile')} className={`w-10 h-10 rounded-xl border flex items-center justify-center transition-colors ${currentView === 'profile' ? 'bg-emerald-600 text-white border-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]' : 'bg-slate-800 text-emerald-400 border-slate-700 hover:text-white'}`} title="אזור אישי">
                                    <i className="fa-solid fa-user"></i>
                                </button>

                                <div className="flex-col items-end mr-1 hidden sm:flex">
                                    <span className="text-sm font-bold text-white flex items-center gap-1">
                                        {dbUser.username}
                                        {dbUser.role === ROLES.SUPER_ADMIN && <i className="fa-solid fa-crown text-amber-400 text-[10px]"></i>}
                                    </span>
                                    <Coin amount={dbUser.balance} className="text-sm" />
                                </div>
                            </div>

                            <div className="flex flex-col items-end cursor-pointer" onClick={() => changeView('lobby')}>
                                <h1 className="text-xl sm:text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-300">RUMMIKUBE</h1>
                                <p className="text-[10px] text-slate-400 font-bold tracking-[0.2em] uppercase leading-none mt-[-2px]">Elite Club</p>
                            </div>
                        </nav>
                    )}

                    <main className="flex-1 overflow-hidden relative z-0">
                        {currentView === 'auth' && <AuthView />}
                        {currentView === 'pending' && <PendingView />}
                        {currentView === 'lobby' && <LobbyView user={dbUser} tables={tablesDB} onJoin={(t) => changeView('table', t)} showToast={showToast} />}
                        {currentView === 'profile' && <ProfileView user={dbUser} />}
                        {currentView === 'backoffice' && <BackofficeView user={dbUser} showToast={showToast} />}
                        {currentView === 'table' && <RummyTable tableDocId={activeTable?.docId} user={dbUser} onLeave={() => changeView('lobby')} showToast={showToast} />}
                    </main>

                    {/* Toasts */}
                    <div className="fixed bottom-8 left-1/2 transform -translate-x-1/2 z-[99999] flex flex-col gap-2 pointer-events-none w-[90%] max-w-sm">
                        {toasts.map(t => (
                            <div key={t.id} className={`animate-fade-in px-6 py-3 rounded-2xl shadow-2xl font-bold text-sm text-center border backdrop-blur-md ${t.type === 'error' ? 'bg-rose-900/95 border-rose-500 text-white' : 'bg-slate-800/95 border-emerald-500/50 text-emerald-400'}`}>
                                {t.msg}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function AuthView() {
            return (
                <div className="h-full w-full flex flex-col items-center justify-center p-4">
                    <div className="glass-panel p-10 sm:p-14 rounded-3xl text-center relative z-10 w-full max-w-md animate-fade-in">
                        <h2 className="text-4xl font-black text-white mb-2 tracking-widest drop-shadow-lg">Rummikube</h2>
                        <p className="text-emerald-400 mb-10 font-bold tracking-[0.3em] uppercase text-xs">Elite Private Club</p>
                        <button onClick={()=>window.fb.signInWithPopup(window.fb.auth, window.fb.googleProvider)} className="w-full bg-white hover:bg-slate-100 transition-transform transform hover:scale-105 text-slate-900 font-black py-4 px-6 rounded-xl shadow-xl flex items-center justify-center gap-3">
                            <i className="fa-brands fa-google text-blue-500 text-xl"></i> התחברות לחברים
                        </button>
                    </div>
                </div>
            );

        function PendingView() {

        function LobbyView({ user, tables, onJoin, showToast }) {
            const [showCreate, setShowCreate] = useState(false);
            const [newTableOptions, setNewTableOptions] = useState({ maxPlayers: 4, stakes: 0.10 });

            const handleCreate = async () => {
                const calculatedBuyIn = round2(newTableOptions.stakes * 100);
                await window.fb.addDoc(window.fb.collection(window.fb.db, "tables"), {
                    type: 'rummikub', maxPlayers: newTableOptions.maxPlayers,
                    minBuyIn: calculatedBuyIn, stakes: newTableOptions.stakes,
                    players: {}, board: [], deck: [], phase: 'waiting', winner: null, lastResults: null, createdAt: Date.now()
                });
                setShowCreate(false); showToast("שולחן נפתח בהצלחה!", "success");
            };

            // מחיקת שולחן - הצ'יפים של כל היושבים חוזרים לארנק שלהם (תוקן: קודם הכסף לא חזר)
            const handleDelete = async (e, t) => {
                e.stopPropagation();
                const playersCount = Object.keys(t.players || {}).length;
                const msg = playersCount > 0
                    ? `יש ${playersCount} שחקנים בשולחן. הצ'יפים שלהם יוחזרו לארנק והשולחן יימחק. להמשיך?`
                    : "למחוק שולחן זה?";
                if (!window.confirm(msg)) return;
                try {
                    await window.fb.runTransaction(window.fb.db, async (tr) => {
                        const tblRef = window.fb.doc(window.fb.db, "tables", t.docId);
                        const snap = await tr.get(tblRef);
                        if (!snap.exists()) return;
                        const players = snap.data().players || {};
                        const refunds = [];
                        for (const uid of Object.keys(players)) {
                            const uSnap = await tr.get(window.fb.doc(window.fb.db, "users", uid));
                            if (uSnap.exists()) refunds.push([uSnap.ref, round2((uSnap.data().balance || 0) + (players[uid].stack || 0))]);
                        }
                        refunds.forEach(([ref, bal]) => tr.update(ref, { balance: bal }));
                        tr.delete(tblRef);
                    });
                    showToast("השולחן נמחק והצ'יפים הוחזרו", "info");
                } catch(err) { showToast("שגיאה במחיקת השולחן", "error"); }
            };

            return (
                <div className="scrollable-content p-4 sm:p-6">
                    <div className="max-w-6xl mx-auto animate-fade-in">
                        <div className="flex justify-between items-center mb-8">
                            <h2 className="text-2xl sm:text-3xl font-black text-white flex items-center gap-3">
                                <span className="w-4 h-4 rounded-full bg-emerald-500 shadow-[0_0_15px_#10b981] animate-pulse"></span>
                                שולחנות קאש
                            </h2>
                            {[ROLES.SUPER_ADMIN, ROLES.CLUB_OWNER, ROLES.MANAGER].includes(user.role) && (
                                <button onClick={()=>setShowCreate(!showCreate)} className="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg transition-transform hover:scale-105 flex items-center text-sm">
                                    <i className="fa-solid fa-plus ml-2"></i> שולחן חדש
                                </button>
                            )}
                        </div>

                        {showCreate && (
                            <div className="glass-panel p-6 rounded-2xl mb-8 animate-pop-in border border-emerald-500/30">
                                <h3 className="text-lg font-bold text-white mb-4">הגדרות שולחן חדש</h3>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                                    <div>
                                        <label className="text-slate-400 text-sm font-bold mb-1 block">שחקנים מקסימום</label>
                                        <select value={newTableOptions.maxPlayers} onChange={(e)=>setNewTableOptions({...newTableOptions, maxPlayers: parseInt(e.target.value)})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-emerald-500 font-bold">
                                            <option value={2}>2 שחקנים</option>
                                            <option value={3}>3 שחקנים</option>
                                            <option value={4}>4 שחקנים</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-slate-400 text-sm font-bold mb-1 block">ערך נקודה ב-₪ (Stakes)</label>
                                        <select value={newTableOptions.stakes} onChange={(e)=>setNewTableOptions({...newTableOptions, stakes: parseFloat(e.target.value)})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-emerald-500 font-bold">
                                            <option value={0.10}>0.10 ₪ (10 אגורות)</option>
                                            <option value={0.50}>0.50 ₪ (50 אגורות)</option>
                                            <option value={1}>1.00 ₪</option>
                                            <option value={2}>2.00 ₪</option>
                                            <option value={5}>5.00 ₪</option>
                                            <option value={10}>10.00 ₪</option>
                                        </select>
                                        <p className="text-emerald-400 text-xs mt-2 font-bold" dir="ltr">
                                            * דמי כניסה מחושבים אוטומטית (X100): {formatMoney(newTableOptions.stakes * 100)} ₪
                                        </p>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 pt-4 border-t border-slate-700">
                                    <button onClick={()=>setShowCreate(false)} className="px-6 py-2 text-slate-400 hover:text-white font-bold transition-colors">ביטול</button>
                                    <button onClick={handleCreate} className="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-2 rounded-xl font-bold shadow-lg">אשר ופתח</button>
                                </div>
                            </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {tables.filter(t => t.type === 'rummikub').sort((a,b)=>(a.createdAt||0)-(b.createdAt||0)).map(t => (
                                <div key={t.docId} onClick={()=>onJoin(t)} className="glass-panel p-6 rounded-3xl cursor-pointer hover:-translate-y-2 hover:shadow-[0_15px_40px_rgba(16,185,129,0.2)] transition-all group border border-white/10 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-full h-1 bg-gradient-to-r from-emerald-400 to-teal-500 opacity-50 group-hover:opacity-100 transition-opacity"></div>

                                    {[ROLES.SUPER_ADMIN, ROLES.CLUB_OWNER].includes(user.role) && (
                                        <button onClick={(e) => handleDelete(e, t)} className="absolute top-3 left-3 w-8 h-8 rounded bg-slate-800/80 text-slate-500 hover:text-rose-400 transition-colors flex items-center justify-center z-10" title="מחק שולחן">
                                            <i className="fa-solid fa-trash text-xs"></i>
                                        </button>
                                    )}

                                    {t.players && t.players[user.uid] && (
                                        <div className="absolute top-3 right-3 bg-emerald-500/20 border border-emerald-500 text-emerald-400 text-[10px] px-2 py-0.5 rounded-full animate-pulse font-bold z-10 shadow-[0_0_10px_#10b981]">
                                            🟢 אתה יושב כאן
                                        </div>
                                    )}

                                    <div className="flex justify-between items-start mb-4 mt-2">
                                        <div>
                                            <h3 className="text-xl font-black text-white tracking-wide" dir="ltr">Stakes: {formatMoney(t.stakes)}</h3>
                                            <p className="text-slate-400 text-sm font-bold mt-1 flex items-center gap-1">כניסה: <Coin amount={t.minBuyIn} /></p>
                                        </div>
                                        <div className={`px-3 py-1 rounded-full text-sm font-bold border flex items-center gap-1.5 ${Object.keys(t.players||{}).length === t.maxPlayers ? 'border-rose-500/50 text-rose-400 bg-rose-500/10' : 'border-emerald-500/50 text-emerald-400 bg-emerald-500/10'}`}>
                                            <i className="fa-solid fa-users"></i> {Object.keys(t.players||{}).length}/{t.maxPlayers}
                                        </div>
                                    </div>

                                    <div className="flex -space-x-2 mb-6 h-8 items-center">
                                        {Object.values(t.players || {}).length > 0 ? (
                                            Object.values(t.players || {}).map((p, i) => (
                                                <div key={i} className={`w-8 h-8 rounded-full border-2 border-slate-800 flex items-center justify-center text-[10px] text-white font-bold shadow-md ${p.isBot ? 'bg-purple-900' : 'bg-slate-700'}`} title={p.username}>
                                                    {(p.username||'??').substring(0,2).toUpperCase()}
                                                </div>
                                            ))
                                        ) : (
                                            <span className="text-xs text-slate-500 font-bold ml-2">השולחן ריק</span>
                                        )}
                                    </div>

                                    <div className="flex justify-end items-center">
                                        <button className="bg-slate-700 text-white px-6 py-2 rounded-lg font-bold text-sm group-hover:bg-emerald-600 transition-colors shadow-md">
                                            {t.phase === 'playing' ? 'צפה במשחק' : 'היכנס לשולחן'}
                                        </button>
                                    </div>
                                </div>
                            ))}
                            {tables.filter(t=>t.type==='rummikub').length === 0 && <div className="col-span-full text-center py-20 text-slate-500 font-bold text-xl glass-panel rounded-3xl border-dashed">אין שולחנות פעילים כרגע.</div>}
                        </div>
                    </div>
                </div>
            );
        }

        /* ================================================================
           Backoffice
           ================================================================ */
        function BackofficeView({ user, showToast }) {
            const [usersList, setUsersList] = useState([]);
            const [selectedUser, setSelectedUser] = useState('');
            const [transferAmount, setTransferAmount] = useState('');

            useEffect(() => {
                const unsub = window.fb.onSnapshot(window.fb.collection(window.fb.db, "users"), (snap) => {
                    setUsersList(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => unsub();
            }, []);

            const handleCreateBots = async () => {
                try {
                    for (let i = 0; i < 20; i++) {
                        const botName = BOT_NAMES[i % BOT_NAMES.length] + Math.floor(Math.random() * 100);
                        await window.fb.addDoc(window.fb.collection(window.fb.db, "users"), {
                            username: botName, email: `bot${i}@rummikube.com`, role: ROLES.PLAYER,
                            status: 'approved', balance: 50000, isBot: true,
                            stats: { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 }
                        });
                    }
                    showToast("20 בוטים נוצרו בהצלחה לטסטים!", "success");
                } catch (e) { showToast("שגיאה ביצירת בוטים", "error"); }
            };

            const handleDeleteBots = async () => {
                if(!window.confirm("בטוח שברצונך למחוק את כל הבוטים מהמערכת?")) return;
                try {
                    const botQ = window.fb.query(window.fb.collection(window.fb.db, "users"), window.fb.where("isBot", "==", true));
                    const snaps = await window.fb.getDocs(botQ);
                    for (const d of snaps.docs) { await window.fb.deleteDoc(d.ref); }
                    showToast("כל הבוטים נמחקו בהצלחה.", "info");
                } catch(e) { showToast("שגיאה במחיקת בוטים", "error"); }
            };

            const handleApprove = async (uid) => {
                try { await window.fb.updateDoc(window.fb.doc(window.fb.db, "users", uid), { status: 'approved' }); showToast("שחקן אושר", "success"); }
                catch(e) { showToast("שגיאה באישור", "error"); }
            };

            const handleReject = async (u) => {
                if (!window.confirm(`לדחות ולמחוק את ${u.username}?`)) return;
                try { await window.fb.deleteDoc(window.fb.doc(window.fb.db, "users", u.id)); showToast("הבקשה נדחתה", "info"); }
                catch(e) { showToast("שגיאה בדחייה", "error"); }
            };

            const handleTransfer = async (isDeposit) => {
                if (!selectedUser) return showToast("בחר שחקן", "error");
                const amount = parseFloat(transferAmount);
                if (!amount || amount <= 0) return showToast("סכום לא חוקי", "error");

                try {
                    await window.fb.runTransaction(window.fb.db, async (transaction) => {
                        const ownerRef = window.fb.doc(window.fb.db, "users", user.uid);
                        const targetRef = window.fb.doc(window.fb.db, "users", selectedUser);
                        const ownerSnap = await transaction.get(ownerRef);
                        const targetSnap = await transaction.get(targetRef);

                        let ownerBal = ownerSnap.data().balance || 0;
                        let targetBal = targetSnap.data().balance || 0;

                        if (isDeposit) {
                            if (ownerBal < amount) throw "אין לך מספיק יתרה במועדון להפקדה זו.";
                            ownerBal -= amount; targetBal += amount;
                        } else {
                            if (targetBal < amount) throw "לשחקן אין מספיק יתרה למשיכה זו.";
                            ownerBal += amount; targetBal -= amount;
                        }
                        transaction.update(ownerRef, { balance: round2(ownerBal) });
                        transaction.update(targetRef, { balance: round2(targetBal) });
                    });
                    showToast(`פעולת ה${isDeposit?'הפקדה':'משיכה'} בוצעה בהצלחה`, "success");
                    setTransferAmount('');
                } catch (e) { showToast(typeof e === 'string' ? e : "שגיאה בפעולה", "error"); }
            };

            const pendingUsers = usersList.filter(u => u.status === 'pending');
            const approvedPlayers = usersList.filter(u => u.status === 'approved' && u.id !== user.uid);

            return (
                <div className="scrollable-content bg-slate-950 p-4 sm:p-6">
                    <div className="max-w-5xl mx-auto w-full animate-fade-in">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-slate-800/50 pb-6">
                            <div>
                                <h2 className="text-2xl font-bold text-white mb-1">ניהול מועדון</h2>
                                <p className="text-sm text-slate-400">ניהול יתרות, אישורים והפקת דוחות סליקה.</p>
                            </div>
                            <div className="flex flex-wrap items-center gap-3 w-full md:w-auto">
                                {[ROLES.SUPER_ADMIN].includes(user.role) && (
                                    <React.Fragment>
                                        <button onClick={handleCreateBots} className="bg-purple-600 hover:bg-purple-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-lg shadow-purple-900/50 transition-all flex items-center gap-2"><i className="fa-solid fa-robot"></i> יצר אווטארים לטסטים</button>
                                        <button onClick={handleDeleteBots} className="bg-slate-800 hover:bg-rose-900/80 border border-slate-700 text-slate-400 hover:text-white px-3 py-2 rounded-lg text-sm font-bold transition-all"><i className="fa-solid fa-trash-alt"></i> מחק אווטארים</button>
                                    </React.Fragment>
                                )}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                            <div className="bg-slate-900 rounded-xl p-5 border border-slate-800">
                                <h3 className="text-slate-400 text-xs font-medium mb-1.5">היתרה האישית שלך</h3>
                                <p className="text-2xl font-bold text-white" dir="ltr">{formatMoney(user.balance)}</p>
                            </div>
                            <div className="bg-slate-900 rounded-xl p-5 border border-slate-800">
                                <h3 className="text-slate-400 text-xs font-medium mb-1.5">סך הכל אצל שחקנים</h3>
                                <p className="text-2xl font-bold text-blue-400" dir="ltr">{formatMoney(approvedPlayers.reduce((sum, p) => sum + (p.balance || 0), 0))}</p>
                            </div>
                            <div className="bg-slate-900 rounded-xl p-5 border border-slate-800">
                                <h3 className="text-slate-400 text-xs font-medium mb-1.5">רווחי מועדון (Rake {RAKE*100}%)</h3>
                                <p className="text-2xl font-bold text-amber-400" dir="ltr">{formatMoney(user.clubProfits || 0)}</p>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div className="bg-slate-900 rounded-xl border border-slate-800 p-5 h-fit">
                                <h3 className="font-bold text-white mb-5 text-sm flex items-center gap-2"><i className="fa-solid fa-money-bill-transfer text-emerald-500"></i> העברת צ'יפים לשחקן</h3>
                                <div className="space-y-4">
                                    <div>
                                        <select value={selectedUser} onChange={(e)=>setSelectedUser(e.target.value)} className="w-full bg-slate-950 text-sm text-slate-200 border border-slate-700 rounded-lg p-3 outline-none focus:border-slate-500">
                                            <option value="">-- בחר מהרשימה --</option>
                                            {approvedPlayers.map(p => (<option key={p.id} value={p.id}>{p.username} {p.isBot? '(Bot)':''} ({p.email}) - {formatMoney(p.balance)}</option>))}
                                        </select>
                                    </div>
                                    <div>
                                        <input type="number" step="0.01" value={transferAmount} onChange={(e)=>setTransferAmount(e.target.value)} placeholder="סכום..." className="w-full bg-slate-950 text-sm text-slate-200 border border-slate-700 rounded-lg p-3 outline-none focus:border-slate-500" />
                                    </div>
                                    <div className="flex gap-2 pt-2">
                                        <button onClick={()=>handleTransfer(true)} className="flex-1 bg-emerald-600/90 hover:bg-emerald-500 text-white py-2.5 rounded-lg text-sm font-medium transition-colors">
                                            הפקד <i className="fa-solid fa-arrow-down ml-1"></i>
                                        </button>
                                        <button onClick={()=>handleTransfer(false)} className="flex-1 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white py-2.5 rounded-lg text-sm font-medium transition-colors">
                                            משוך <i className="fa-solid fa-arrow-up ml-1 text-slate-400"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div className="flex flex-col gap-6">
                                <div className="bg-slate-900 rounded-xl border border-slate-800 p-5 flex flex-col max-h-[300px]">
                                    <h3 className="font-bold text-white mb-4 text-sm flex items-center gap-2"><i className="fa-solid fa-user-check text-amber-500"></i> בקשות הצטרפות <span className="text-amber-400">({pendingUsers.length})</span></h3>
                                    <div className="flex-1 overflow-y-auto space-y-2 pr-1">
                                        {pendingUsers.length === 0 && <div className="text-center text-slate-500 text-sm py-6 font-medium">אין בקשות בהמתנה.</div>}
                                        {pendingUsers.map(u => (
                                            <div key={u.id} className="bg-slate-950 p-3 rounded-lg border border-slate-800 flex justify-between items-center">
                                                <div>
                                                    <div className="font-medium text-slate-200 text-sm">{u.username}</div>
                                                    <div className="text-slate-500 text-[10px]" dir="ltr">{u.email}</div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={()=>handleApprove(u.id)} className="bg-blue-600/90 hover:bg-blue-500 text-white px-4 py-1.5 rounded-md text-xs font-medium transition-colors">אשר קבלה</button>
                                                    <button onClick={()=>handleReject(u)} className="bg-slate-800 hover:bg-rose-900 text-slate-400 hover:text-white px-3 py-1.5 rounded-md text-xs font-medium transition-colors border border-slate-700"><i className="fa-solid fa-xmark"></i></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        /* ================================================================
