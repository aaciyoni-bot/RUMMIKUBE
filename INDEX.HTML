<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rummikube - VIP Club</title>
    
    <!-- Tailwind CSS (לעיצוב יוקרתי) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (כדי שהדפדפן יבין ריאקט) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <style>
        /* הסתרת פסי גלילה למראה קזינו חלק */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { margin: 0; padding: 0; overflow: hidden; background-color: #020617; }
        
        /* אפקטים לאריחים */
        .tile-grab:active { cursor: grabbing !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        //        const firebaseConfig = {
            apiKey: "AIzaSyDOWDeF5YKZ-LH8c9lM-eb6gFjFDXfIZQs",
            authDomain: "rummikube-b2188.firebaseapp.com",
            projectId: "rummikube-b2188",
            storageBucket: "rummikube-b2188.firebasestorage.app",
            messagingSenderId: "825997058278",
            appId: "1:825997058278:web:6a544f6d3fd6b1f80f1b27"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database(); // שימוש ב-Realtime Database של גוגל

        //        const IconWrapper = ({ children, size = 24, className = '', fill = 'none' }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Shield = (props) => <IconWrapper {...props}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></IconWrapper>;
        const Users = (props) => <IconWrapper {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconWrapper>;
        const Play = (props) => <IconWrapper {...props}><polygon points="6 3 20 12 6 21 6 3"/></IconWrapper>;
        const Plus = (props) => <IconWrapper {...props}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></IconWrapper>;
        const Search = (props) => <IconWrapper {...props}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconWrapper>;
        const Settings = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></IconWrapper>;
        const Coins = (props) => <IconWrapper {...props}><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></IconWrapper>;
        const LogOut = (props) => <IconWrapper {...props}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></IconWrapper>;
        const ChevronRight = (props) => <IconWrapper {...props}><polyline points="9 18 15 12 9 6"/></IconWrapper>;
        const Lock = (props) => <IconWrapper {...props}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></IconWrapper>;
        const Menu = (props) => <IconWrapper {...props}><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></IconWrapper>;
        const Grid = (props) => <IconWrapper {...props}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></IconWrapper>;
        const Move = (props) => <IconWrapper {...props}><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="19 9 22 12 19 15"/><polyline points="9 19 12 22 15 19"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></IconWrapper>;

        //        const MOCK_USER = { id: 'u1', name: 'אביב_רמי', avatar: '🧔🏻‍♂️', wallet: 2500 };
        const MOCK_CLUBS = [{ id: 'c1', name: 'מועדון רמי תל אביב', members: 142, role: 'member', owner: 'יוסי', chips: 1500 }];
        const MOCK_TABLES = [{ id: 't1', name: 'שולחן 1 - מתחילים', stakes: '1', type: 'רמי קלאסי', players: 2, maxPlayers: 4, minBuyIn: 100 }];

        function App() {
          const [currentView, setCurrentView] = useState('login'); 
          const [activeClub, setActiveClub] = useState(null);
          const [activeTable, setActiveTable] = useState(null);

          //          // האבנים של השחקן (מקומיות בלבד, אף אחד אחר לא רואה אותן)
          const [rackTiles, setRackTiles] = useState([
            { id: 't1', num: 7, color: 'text-red-600' },
            { id: 't2', num: 8, color: 'text-red-600' },
            { id: 't3', num: 9, color: 'text-red-600' },
            { id: 't4', num: 4, color: 'text-blue-700' },
            { id: 't5', num: 13, color: 'text-amber-500' },
          ]);

          // הקבוצות שעל השולחן (מסונכרן מול השרת)
          const [boardGroups, setBoardGroups] = useState([]);

          //          // מתחבר לשרת ברגע שנכנסים למשחק
          useEffect(() => {
            const boardRef = db.ref('tables/table_1/board');
            
            // המאזין שיעדכן את השולחן ברגע שמישהו אחר משחק!
            boardRef.on('value', (snapshot) => {
              const data = snapshot.val();
              if (data) {
                setBoardGroups(data);
              } else {
                setBoardGroups([]); // שולחן ריק
              }
            });

            return () => boardRef.off(); // ניתוק בעת יציאה
          }, []);

          const handleLogin = () => setCurrentView('dashboard');
          const enterClub = (club) => { setActiveClub(club); setCurrentView('club'); };
          const enterTable = (table) => { setActiveTable(table); setCurrentView('table'); };
          const backToClub = () => { setActiveTable(null); setCurrentView('club'); };

          //          // מתחילים לגרור אריח
          const handleDragStart = (e, source, tile, groupIndex = null) => {
            e.dataTransfer.setData('application/json', JSON.stringify({ source, tile, groupIndex }));
            e.dataTransfer.effectAllowed = 'move';
          };

          // מאפשרים שחרור (Drop)
          const handleDragOver = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
          };

          // שחרור אריח על משטח הלוח הכללי (יוצר קבוצה חדשה)
          const handleDropOnBoard = (e) => {
            e.preventDefault();
            e.stopPropagation();
            const dataString = e.dataTransfer.getData('application/json');
            if (!dataString) return;
            const data = JSON.parse(dataString);
            
            let newGroups = [...boardGroups];

            if (data.source === 'rack') {
              // מוריד מהמעמד הפרטי
              setRackTiles(prev => prev.filter(t => t.id !== data.tile.id));
              // מוסיף לשולחן כקבוצה חדשה
              newGroups.push([data.tile]);
            } else if (data.source === 'board') {
              // מוציא מהקבוצה הקודמת
              newGroups[data.groupIndex] = newGroups[data.groupIndex].filter(t => t.id !== data.tile.id);
              // פותח קבוצה חדשה
              newGroups.push([data.tile]);
              // מנקה קבוצות ריקות
              newGroups = newGroups.filter(g => g && g.length > 0);
            }

            // *** העדכון לענן (FIREBASE) - זה מה שמאפשר מולטיפלייר! ***
            db.ref('tables/table_1/board').set(newGroups);
          };

          // שחרור אריח בתוך קבוצה ספציפית על הלוח
          const handleDropOnGroup = (e, targetGroupIndex) => {
            e.preventDefault();
            e.stopPropagation();
            const dataString = e.dataTransfer.getData('application/json');
            if (!dataString) return;
            const data = JSON.parse(dataString);

            let newGroups = [...boardGroups];

            if (data.source === 'rack') {
              setRackTiles(prev => prev.filter(t => t.id !== data.tile.id));
              newGroups[targetGroupIndex] = [...(newGroups[targetGroupIndex] || []), data.tile];
            } else if (data.source === 'board') {
              if (data.groupIndex === targetGroupIndex) return; // לא קרה כלום
              newGroups[data.groupIndex] = newGroups[data.groupIndex].filter(t => t.id !== data.tile.id);
              newGroups[targetGroupIndex] = [...(newGroups[targetGroupIndex] || []), data.tile];
              newGroups = newGroups.filter(g => g && g.length > 0);
            }

            // *** שידור הפעולה לשרת ***
            db.ref('tables/table_1/board').set(newGroups);
          };

          // החזרת אריח מהלוח חזרה למעמד הפרטי
          const handleDropOnRack = (e) => {
            e.preventDefault();
            const dataString = e.dataTransfer.getData('application/json');
            if (!dataString) return;
            const data = JSON.parse(dataString);
            
            if (data.source === 'board') {
              let newGroups = [...boardGroups];
              newGroups[data.groupIndex] = newGroups[data.groupIndex].filter(t => t.id !== data.tile.id);
              newGroups = newGroups.filter(g => g && g.length > 0);
              
              // עדכון ענן
              db.ref('tables/table_1/board').set(newGroups);
              // הוספה חזרה ליד
              setRackTiles(prev => [...prev, data.tile]);
            }
          };

          //          const LoginScreen = () => (
            <div className="flex flex-col items-center justify-center min-h-screen p-6 relative overflow-hidden">
              <div className="absolute top-[-10%] left-[-10%] w-64 h-64 bg-yellow-600/20 rounded-full blur-[100px]" />
              <div className="w-24 h-24 bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-2xl flex items-center justify-center mb-8 rotate-3">
                <Shield size={48} className="text-slate-950" />
              </div>
              <h1 className="text-4xl font-extrabold mb-2 tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 to-yellow-600">RUMMIKUBE</h1>
              <button onClick={handleLogin} className="w-full max-w-sm mt-12 bg-gradient-to-r from-yellow-500 to-yellow-600 text-slate-950 font-bold py-4 rounded-xl shadow-[0_4px_20px_rgba(234,179,8,0.3)]">התחברות מהירה</button>
            </div>
          );

          const DashboardScreen = () => (
            <div className="flex flex-col min-h-screen">
              <div className="p-5 mt-4">
                <h2 className="text-lg font-bold text-slate-300 mb-4">המועדונים שלי</h2>
                {MOCK_CLUBS.map(club => (
                  <div key={club.id} onClick={() => enterClub(club)} className="bg-slate-900 p-5 rounded-2xl border border-slate-800 flex items-center justify-between cursor-pointer">
                    <div className="flex items-center gap-4">
                      <div className="w-14 h-14 bg-slate-800 rounded-xl flex items-center justify-center"><Shield size={28} className="text-slate-400" /></div>
                      <div><h3 className="font-bold text-lg text-slate-100">{club.name}</h3></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );

          const ClubScreen = () => (
            <div className="flex flex-col min-h-screen">
              <div className="p-5 flex-1">
                <h2 className="text-lg font-bold text-slate-300 mb-6">שולחנות פעילים</h2>
                {MOCK_TABLES.map(table => (
                  <div key={table.id} className="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden">
                    <div className="p-4 border-b border-slate-800/50">
                      <h3 className="font-bold text-slate-200">{table.name}</h3>
                    </div>
                    <div className="p-4 flex justify-between items-center">
                      <div><span className="block text-xs text-slate-500">שחקנים</span><span className="font-bold">{table.players}/{table.maxPlayers}</span></div>
                      <button onClick={() => enterTable(table)} className="bg-yellow-500 text-slate-950 px-6 py-2.5 rounded-xl font-bold flex items-center gap-2"><Play size={16} fill="currentColor" /> שחק</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );

          //          const GameTableScreen = () => (
            <div className="flex flex-col h-[100dvh] bg-[#080d14] text-white relative font-sans overflow-hidden">
              
              {/* Header */}
              <div className="absolute top-0 w-full z-30 flex justify-between items-center p-4 bg-gradient-to-b from-black/90 to-transparent">
                <button onClick={backToClub} className="bg-black/50 p-2 rounded-full"><ChevronRight size={24} className="rotate-180" /></button>
                <div className="font-extrabold tracking-widest">{activeTable?.name}</div>
                <button className="bg-black/50 p-2 rounded-full"><Menu size={24} /></button>
              </div>

              {/* הלוח המרכזי שבו הקובייות מונחות */}
              <div 
                className="flex-1 relative flex flex-col items-center justify-center pt-20 pb-44 px-4"
                onDragOver={handleDragOver}
                onDrop={handleDropOnBoard}
              >
                {/* שולחן לבד ירוק יוקרתי */}
                <div className="absolute inset-2 md:inset-10 rounded-[80px] bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-[#0f6b40] via-[#084226] to-[#041a0f] border-[12px] border-[#1a100b] shadow-[inset_0_0_80px_rgba(0,0,0,1)] flex flex-col p-8 overflow-y-auto no-scrollbar ring-4 ring-[#3b2313]/40">
                  
                  {/* לוגו מרכזי שקוף */}
                  <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-20 pointer-events-none">
                    <span className="text-emerald-400 font-black text-4xl tracking-[0.3em] rotate-[-30deg] block">RUMMIKUBE</span>
                  </div>

                  {/* ציור הקבוצות שעל השולחן */}
                  <div className="relative w-full h-full flex flex-wrap content-start gap-6 z-10 p-4">
                    {boardGroups.map((group, groupIdx) => (
                      <div 
                        key={`group-${groupIdx}`} 
                        className="flex gap-1 p-3 rounded-xl bg-black/20 border border-white/5 min-w-[70px] min-h-[90px] transition-all hover:bg-black/40"
                        onDragOver={handleDragOver}
                        onDrop={(e) => handleDropOnGroup(e, groupIdx)}
                      >
                        {group.length === 0 && <span className="text-white/20 text-xs my-auto mx-2">גרור לכאן</span>}
                        
                        {group.map(tile => (
                          <div 
                            key={`board-${tile.id}`} 
                            draggable
                            onDragStart={(e) => handleDragStart(e, 'board', tile, groupIdx)}
                            className="relative w-12 h-16 rounded-[10px] bg-gradient-to-b from-[#ffffff] to-[#e0e0e0] flex items-center justify-center shadow-[1px_3px_8px_rgba(0,0,0,0.6),inset_0_2px_4px_rgba(255,255,255,1)] border border-gray-300 cursor-grab active:cursor-grabbing transform hover:-translate-y-1 transition-transform"
                          >
                            <span className={`text-3xl font-black ${tile.color}`} style={{ textShadow: '1px 1px 0px rgba(255,255,255,0.8), -1px -1px 0px rgba(0,0,0,0.2)' }}>{tile.num}</span>
                          </div>
                        ))}
                      </div>
                    ))}
                  </div>

                  {/* הודעת הדרכה כשריק */}
                  {boardGroups.length === 0 && (
                    <div className="absolute bottom-1/4 left-1/2 -translate-x-1/2 flex flex-col items-center opacity-40 animate-pulse pointer-events-none">
                      <Move size={32} className="text-white mb-2" />
                      <span className="text-white font-medium">גרור אבנים מהמעמד אל השולחן</span>
                    </div>
                  )}
                </div>
              </div>

              {/* אזור המעמד של השחקן (Rack) */}
              <div className="absolute bottom-0 w-full h-44 bg-gradient-to-t from-black to-transparent z-40 flex flex-col justify-end pb-2">
                {/* כפתורים */}
                <div className="flex justify-between items-center mb-4 px-6 z-50">
                  <button className="bg-black/60 p-2 rounded-xl text-slate-200 border border-white/20 shadow-lg text-sm flex gap-2"><Grid size={16}/> סדר</button>
                  <button className="bg-yellow-500 text-slate-950 px-6 py-2.5 rounded-xl font-extrabold shadow-lg border border-yellow-700">סיום תור</button>
                </div>

                {/* מדף עץ והאבנים של השחקן */}
                <div className="relative flex justify-center items-end px-2" onDragOver={handleDragOver} onDrop={handleDropOnRack}>
                  <div className="absolute bottom-0 w-[98%] h-12 bg-gradient-to-b from-[#5c3a21] to-[#1f1006] rounded-t-xl border-t border-[#8c5a35]/40" />
                  
                  <div className="flex gap-2 z-10 px-4 overflow-x-auto pb-4 pt-4 no-scrollbar items-end min-h-[5rem] w-full justify-center">
                    {rackTiles.map((tile, idx) => (
                      <div 
                        key={`rack-${tile.id}`} 
                        draggable
                        onDragStart={(e) => handleDragStart(e, 'rack', tile)}
                        className="relative w-12 h-16 md:w-14 md:h-20 rounded-[10px] bg-gradient-to-b from-white to-[#e3e3e3] flex flex-col items-center justify-center shadow-[2px_6px_12px_rgba(0,0,0,0.6),inset_0_2px_4px_rgba(255,255,255,1)] border border-gray-300 cursor-grab active:cursor-grabbing transform hover:-translate-y-4 hover:scale-110 transition-all duration-200"
                        style={{ zIndex: rackTiles.length - idx }}
                      >
                        <span className={`text-4xl font-black ${tile.color} tracking-tighter`} style={{ textShadow: '1px 1px 0px rgba(255,255,255,0.9), -1px -1px 0px rgba(0,0,0,0.25)' }}>{tile.num}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          );

          return (
            <div className="max-w-md mx-auto h-[100dvh] w-full shadow-2xl overflow-hidden bg-slate-950 font-sans selection:bg-yellow-500/30 text-white">
              {currentView === 'login' && <LoginScreen />}
              {currentView === 'dashboard' && <DashboardScreen />}
              {currentView === 'club' && <ClubScreen />}
              {currentView === 'table' && <GameTableScreen />}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
