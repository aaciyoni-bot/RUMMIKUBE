<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rummikube - Private Club</title>
    
    <!-- Tailwind CSS (לעיצוב) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (ללוגיקה) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (כדי שהדפדפן יבין את שפת ה-JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* הסתרת פס הגלילה לשולחן נקי */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { margin: 0; padding: 0; overflow: hidden; background-color: #020617; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- אייקונים פנימיים (SVG) ---
        const IconWrapper = ({ children, size = 24, className = '', fill = 'none' }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Shield = (props) => <IconWrapper {...props}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></IconWrapper>;
        const Users = (props) => <IconWrapper {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconWrapper>;
        const Play = (props) => <IconWrapper {...props}><polygon points="6 3 20 12 6 21 6 3"/></IconWrapper>;
        const Plus = (props) => <IconWrapper {...props}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></IconWrapper>;
        const Search = (props) => <IconWrapper {...props}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconWrapper>;
        const Settings = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></IconWrapper>;
        const Coins = (props) => <IconWrapper {...props}><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></IconWrapper>;
        const LogOut = (props) => <IconWrapper {...props}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></IconWrapper>;
        const ChevronRight = (props) => <IconWrapper {...props}><polyline points="9 18 15 12 9 6"/></IconWrapper>;
        const Lock = (props) => <IconWrapper {...props}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></IconWrapper>;
        const Menu = (props) => <IconWrapper {...props}><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></IconWrapper>;
        const Grid = (props) => <IconWrapper {...props}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></IconWrapper>;
        const Move = (props) => <IconWrapper {...props}><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="19 9 22 12 19 15"/><polyline points="9 19 12 22 15 19"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></IconWrapper>;

        const MOCK_USER = { id: 'u1', name: 'אביב_רמי', avatar: '🧔🏻‍♂️', wallet: 2500 };
        const MOCK_CLUBS = [
          { id: 'c1', name: 'מועדון רמי תל אביב', members: 142, role: 'member', owner: 'יוסי', chips: 1500 },
          { id: 'c2', name: 'Rummikube VIP', members: 89, role: 'admin', owner: 'אביב_רמי', chips: 10000 },
        ];
        const MOCK_TABLES = [
          { id: 't1', name: 'שולחן 1 - מתחילים', stakes: '1', type: 'רמי קלאסי', players: 2, maxPlayers: 4, minBuyIn: 100 },
          { id: 't2', name: 'שולחן 2 - מקצוענים', stakes: '5', type: 'ג\'ין רמי', players: 4, maxPlayers: 4, minBuyIn: 500 },
        ];

        function App() {
          const [currentView, setCurrentView] = useState('login'); 
          const [activeClub, setActiveClub] = useState(null);
          const [activeTable, setActiveTable] = useState(null);

          // האבנים שלי (ביד)
          const [rackTiles, setRackTiles] = useState([
            { id: 't1', num: 7, color: 'text-red-600', bgColor: 'bg-[#fdfdfd]' },
            { id: 't2', num: 8, color: 'text-red-600', bgColor: 'bg-[#fdfdfd]' },
            { id: 't3', num: 9, color: 'text-red-600', bgColor: 'bg-[#fdfdfd]' },
            { id: 't4', num: 4, color: 'text-blue-700', bgColor: 'bg-[#fdfdfd]' },
            { id: 't5', num: 4, color: 'text-amber-500', bgColor: 'bg-[#fdfdfd]' },
            { id: 't6', num: 13, color: 'text-slate-900', bgColor: 'bg-[#fdfdfd]' },
            { id: 't7', num: 2, color: 'text-blue-700', bgColor: 'bg-[#fdfdfd]' },
          ]);

          // הקבוצות על השולחן
          const [boardGroups, setBoardGroups] = useState([
            [
              { id: 'b1', num: 1, color: 'text-amber-500', bgColor: 'bg-[#fdfdfd]' },
              { id: 'b2', num: 2, color: 'text-amber-500', bgColor: 'bg-[#fdfdfd]' },
              { id: 'b3', num: 3, color: 'text-amber-500', bgColor: 'bg-[#fdfdfd]' },
            ]
          ]);

          const handleLogin = () => setCurrentView('dashboard');
          const handleLogout = () => { setActiveClub(null); setCurrentView('login'); };
          const enterClub = (club) => { setActiveClub(club); setCurrentView('club'); };
          const backToDashboard = () => { setActiveClub(null); setCurrentView('dashboard'); };
          const enterTable = (table) => {
            if (table.players < table.maxPlayers) {
              setActiveTable(table);
              setCurrentView('table');
            }
          };
          const backToClub = () => { setActiveTable(null); setCurrentView('club'); };

          const handleDragStart = (e, source, tile, groupIndex = null) => {
            e.dataTransfer.setData('application/json', JSON.stringify({ source, tile, groupIndex }));
            e.dataTransfer.effectAllowed = 'move';
          };

          const handleDragOver = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
          };

          const handleDropOnBoard = (e) => {
            e.preventDefault();
            e.stopPropagation();
            const dataString = e.dataTransfer.getData('application/json');
            if (!dataString) return;
            const data = JSON.parse(dataString);
            
            if (data.source === 'rack') {
              setRackTiles(prev => prev.filter(t => t.id !== data.tile.id));
              setBoardGroups(prev => [...prev, [data.tile]]);
            } else if (data.source === 'board') {
              setBoardGroups(prev => {
                const newGroups = [...prev];
                newGroups[data.groupIndex] = newGroups[data.groupIndex].filter(t => t.id !== data.tile.id);
                newGroups.push([data.tile]);
                return newGroups.filter(g => g.length > 0);
              });
            }
          };

          const handleDropOnGroup = (e, targetGroupIndex) => {
            e.preventDefault();
            e.stopPropagation();
            const dataString = e.dataTransfer.getData('application/json');
            if (!dataString) return;
            const data = JSON.parse(dataString);

            if (data.source === 'rack') {
              setRackTiles(prev => prev.filter(t => t.id !== data.tile.id));
              setBoardGroups(prev => {
                const newGroups = [...prev];
                newGroups[targetGroupIndex] = [...newGroups[targetGroupIndex], data.tile];
                return newGroups;
              });
            } else if (data.source === 'board') {
              if (data.groupIndex === targetGroupIndex) return;
              setBoardGroups(prev => {
                const newGroups = [...prev];
                newGroups[data.groupIndex] = newGroups[data.groupIndex].filter(t => t.id !== data.tile.id);
                newGroups[targetGroupIndex] = [...newGroups[targetGroupIndex], data.tile];
                return newGroups.filter(g => g.length > 0);
              });
            }
          };

          const LoginScreen = () => (
            <div className="flex flex-col items-center justify-center min-h-screen bg-slate-950 p-6 text-white relative overflow-hidden">
              <div className="absolute top-[-10%] left-[-10%] w-64 h-64 bg-yellow-600/20 rounded-full blur-[100px] pointer-events-none" />
              <div className="w-24 h-24 bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-2xl flex items-center justify-center mb-8 shadow-[0_0_40px_rgba(234,179,8,0.3)] rotate-3">
                <Shield size={48} className="text-slate-950" />
              </div>
              <h1 className="text-4xl font-extrabold mb-2 tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 via-yellow-400 to-yellow-600">RUMMIKUBE</h1>
              <p className="text-slate-400 mb-12 font-medium tracking-wide">המועדון הפרטי שלך</p>
              <div className="w-full max-w-sm space-y-4 z-10">
                <button onClick={handleLogin} className="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 text-slate-950 font-bold text-lg py-4 rounded-xl shadow-[0_4px_20px_rgba(234,179,8,0.3)] hover:scale-[1.02] transition-all">התחברות מהירה</button>
              </div>
            </div>
          );

          const DashboardScreen = () => (
            <div className="flex flex-col min-h-screen bg-slate-950 text-white pb-20">
              <header className="flex justify-between items-center p-5 bg-slate-900 border-b border-slate-800 sticky top-0 z-10">
                <div className="flex items-center gap-3">
                  <div className="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center text-2xl border-2 border-slate-700">{MOCK_USER.avatar}</div>
                  <div><div className="font-bold text-lg">{MOCK_USER.name}</div><div className="text-xs text-slate-400">שחקן מורשה</div></div>
                </div>
                <button onClick={handleLogout} className="p-2 text-slate-500 hover:text-white"><LogOut size={20} /></button>
              </header>
              <div className="px-5 flex-1 mt-6">
                <h2 className="text-lg font-bold text-slate-300 mb-4">המועדונים שלי</h2>
                <div className="space-y-4">
                  {MOCK_CLUBS.map(club => (
                    <div key={club.id} onClick={() => enterClub(club)} className="bg-slate-900 p-5 rounded-2xl border border-slate-800 flex items-center justify-between cursor-pointer hover:bg-slate-800 shadow-md">
                      <div className="flex items-center gap-4">
                        <div className="w-14 h-14 bg-gradient-to-br from-slate-800 to-slate-700 border border-slate-600 rounded-xl flex items-center justify-center shadow-inner">
                          <Shield size={28} className={club.role === 'admin' ? 'text-yellow-500' : 'text-slate-400'} />
                        </div>
                        <div>
                          <h3 className="font-bold text-lg text-slate-100">{club.name}</h3>
                          <div className="flex items-center text-xs text-slate-400 gap-3 mt-1">
                            <span><Users size={12} className="inline" /> {club.members}</span>
                            <span className={club.role === 'admin' ? 'text-yellow-500 font-medium' : ''}>{club.role === 'admin' ? 'מנהל' : 'חבר'}</span>
                          </div>
                        </div>
                      </div>
                      <ChevronRight size={20} className="text-slate-500" />
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );

          const ClubScreen = () => (
            <div className="flex flex-col min-h-screen bg-slate-950 text-white">
              <header className="bg-slate-900 border-b border-slate-800 sticky top-0 z-20 shadow-md">
                <div className="flex justify-between items-center p-4 pb-2">
                  <button onClick={backToDashboard} className="text-yellow-500 font-medium flex items-center gap-1"><ChevronRight size={20} className="rotate-180" /> חזור</button>
                </div>
                <div className="px-5 pb-5 pt-2 flex justify-between items-end">
                  <div>
                    <h1 className="text-2xl font-bold text-slate-100">{activeClub?.name}</h1>
                    <p className="text-sm text-slate-400 mt-1">מנהל: {activeClub?.owner}</p>
                  </div>
                  <div className="bg-slate-950 px-4 py-2 rounded-xl border border-yellow-500/30 flex items-center gap-2 shadow-inner">
                    <Coins size={18} className="text-yellow-500" />
                    <span className="font-bold text-yellow-400 text-lg">{activeClub?.chips.toLocaleString()}</span>
                  </div>
                </div>
              </header>
              <div className="p-5 flex-1 overflow-y-auto pb-20">
                <h2 className="text-lg font-bold text-slate-300 mb-6">שולחנות פעילים</h2>
                <div className="space-y-5">
                  {MOCK_TABLES.map(table => {
                    const isFull = table.players >= table.maxPlayers;
                    return (
                      <div key={table.id} className="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-lg">
                        <div className="p-4 border-b border-slate-800/50 flex justify-between items-center bg-slate-800/30">
                          <div><h3 className="font-bold text-slate-200">{table.name}</h3></div>
                          <div className="text-left"><span className="block text-xs text-slate-400">נקודה</span><span className="font-bold text-yellow-500">{table.stakes} <Coins size={12} className="inline opacity-70"/></span></div>
                        </div>
                        <div className="p-4">
                          <div className="flex justify-between items-center mb-4">
                            <div className="flex gap-6">
                              <div><span className="block text-xs text-slate-500 mb-1">שחקנים</span><span className="font-bold text-slate-200">{table.players}/{table.maxPlayers}</span></div>
                              <div><span className="block text-xs text-slate-500 mb-1">מינימום</span><span className="font-bold text-slate-200">{table.minBuyIn}</span></div>
                            </div>
                            <button className={`px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 ${isFull ? 'bg-slate-800 text-slate-500' : 'bg-yellow-500 text-slate-950 hover:bg-yellow-400'}`} onClick={() => enterTable(table)} disabled={isFull}>
                              {isFull ? <Lock size={16} /> : <Play size={16} fill="currentColor" />} {isFull ? 'מלא' : 'שחק'}
                            </button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );

          const GameTableScreen = () => (
            <div className="flex flex-col h-[100dvh] bg-[#080d14] text-white relative font-sans overflow-hidden select-none">
              
              <div className="absolute top-0 w-full z-30 flex justify-between items-center p-4 bg-gradient-to-b from-black/90 to-transparent">
                <button onClick={backToClub} className="bg-black/50 p-2 rounded-full text-white hover:bg-black/70 border border-white/10 z-50">
                  <ChevronRight size={24} className="rotate-180" />
                </button>
                <div className="flex flex-col items-center">
                  <span className="font-extrabold text-white tracking-widest text-lg drop-shadow-md">{activeTable?.name}</span>
                </div>
                <button className="bg-black/50 p-2 rounded-full text-white hover:bg-black/70 border border-white/10 z-50">
                  <Menu size={24} />
                </button>
              </div>

              <div 
                className="flex-1 relative flex flex-col items-center justify-center pt-20 pb-44 px-4"
                onDragOver={handleDragOver}
                onDrop={handleDropOnBoard}
              >
                <div className="absolute inset-2 md:inset-10 rounded-[60px] md:rounded-[120px] bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-[#0f6b40] via-[#084226] to-[#041a0f] border-[12px] border-[#1a100b] shadow-[inset_0_0_80px_rgba(0,0,0,1)] ring-4 ring-[#3b2313]/40 flex flex-col items-center p-8 overflow-y-auto no-scrollbar">
                  
                  <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 rounded-full border border-white/5 flex items-center justify-center opacity-30 pointer-events-none">
                    <span className="text-emerald-400 font-black text-3xl tracking-[0.3em] rotate-[-30deg]">RUMMIKUBE</span>
                  </div>

                  <div className="relative w-full h-full flex flex-wrap content-start gap-6 z-10 p-4">
                    {boardGroups.map((group, groupIdx) => (
                      <div 
                        key={groupIdx} 
                        className="flex gap-1 p-3 rounded-2xl bg-black/20 border border-white/10 min-w-[60px] min-h-[80px] transition-all hover:bg-black/40"
                        onDragOver={handleDragOver}
                        onDrop={(e) => handleDropOnGroup(e, groupIdx)}
                      >
                        {group.length === 0 && <span className="text-white/20 text-xs my-auto mx-2">גרור לכאן</span>}
                        {group.map(tile => (
                          <div 
                            key={tile.id} 
                            draggable
                            onDragStart={(e) => handleDragStart(e, 'board', tile, groupIdx)}
                            className={`relative w-12 h-16 rounded-[10px] ${tile.bgColor} flex items-center justify-center shadow-[1px_3px_8px_rgba(0,0,0,0.6),inset_0_2px_4px_rgba(255,255,255,1)] border border-gray-300 cursor-grab active:cursor-grabbing transform hover:-translate-y-1`}
                          >
                            <div className="absolute top-0 w-full h-1/3 bg-gradient-to-b from-white/90 to-transparent rounded-t-[10px] pointer-events-none" />
                            <span className={`text-3xl font-black ${tile.color}`} style={{ textShadow: '1px 1px 0px rgba(255,255,255,0.8), -1px -1px 0px rgba(0,0,0,0.2)' }}>{tile.num}</span>
                          </div>
                        ))}
                      </div>
                    ))}
                  </div>

                  {boardGroups.length === 0 && (
                    <div className="absolute bottom-10 flex flex-col items-center opacity-50 animate-pulse pointer-events-none">
                      <Move size={32} className="text-white mb-2" />
                      <span className="text-white font-medium">גרור אבנים מהמעמד אל השולחן</span>
                    </div>
                  )}
                </div>
              </div>

              <div className="absolute bottom-0 w-full h-40 bg-gradient-to-t from-black via-[#1a1a1a] to-transparent z-40 flex flex-col justify-end pb-2">
                <div className="flex justify-between items-center mb-4 px-6 drop-shadow-xl z-50">
                  <button className="bg-black/60 backdrop-blur-md px-4 py-2 rounded-xl text-slate-200 border border-white/20 shadow-lg active:scale-95 text-sm flex gap-2 items-center"><Grid size={16}/> סדר</button>
                  <div className="flex gap-3">
                    <button className="bg-gradient-to-b from-emerald-500 to-emerald-700 text-white px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg border border-emerald-800 active:scale-95">+ קופה</button>
                    <button className="bg-gradient-to-b from-yellow-400 to-yellow-600 text-slate-950 px-6 py-2.5 rounded-xl font-extrabold text-sm shadow-lg border border-yellow-700 active:scale-95">סיום תור</button>
                  </div>
                </div>

                <div className="relative flex justify-center items-end px-2">
                  <div className="absolute bottom-0 w-[98%] h-12 bg-gradient-to-b from-[#5c3a21] via-[#3d2311] to-[#1f1006] rounded-t-xl border-t-2 border-[#8c5a35]/40 border-x-2 border-x-[#4a2e19]" />
                  <div 
                    className="flex gap-2 z-10 px-4 overflow-x-auto pb-4 pt-4 no-scrollbar items-end min-h-[5rem] w-full justify-center"
                    onDragOver={handleDragOver}
                    onDrop={(e) => {
                      e.preventDefault();
                      const dataString = e.dataTransfer.getData('application/json');
                      if (!dataString) return;
                      const data = JSON.parse(dataString);
                      if (data.source === 'board') {
                        setBoardGroups(prev => {
                          const newGroups = [...prev];
                          newGroups[data.groupIndex] = newGroups[data.groupIndex].filter(t => t.id !== data.tile.id);
                          return newGroups.filter(g => g.length > 0);
                        });
                        setRackTiles(prev => [...prev, data.tile]);
                      }
                    }}
                  >
                    {rackTiles.map((tile, idx) => (
                      <div 
                        key={tile.id} 
                        draggable
                        onDragStart={(e) => handleDragStart(e, 'rack', tile)}
                        className={`relative w-12 h-16 md:w-14 md:h-[4.5rem] rounded-[10px] ${tile.bgColor} flex flex-col items-center justify-center shadow-[2px_6px_12px_rgba(0,0,0,0.6),inset_0_2px_4px_rgba(255,255,255,1)] border border-gray-300 cursor-grab active:cursor-grabbing transform hover:-translate-y-4 hover:scale-110 transition-all duration-200`}
                        style={{ zIndex: rackTiles.length - idx }}
                      >
                        <div className="absolute top-0 w-full h-1/2 bg-gradient-to-b from-white/90 to-transparent rounded-t-[10px] pointer-events-none" />
                        <span className={`text-4xl md:text-5xl font-black ${tile.color} tracking-tighter`} style={{ textShadow: '1px 1px 0px rgba(255,255,255,0.9), -1px -1px 0px rgba(0,0,0,0.25)' }}>{tile.num}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

            </div>
          );

          return (
            <div className="max-w-md mx-auto h-[100dvh] w-full shadow-2xl overflow-hidden bg-slate-950 font-sans">
              {currentView === 'login' && <LoginScreen />}
              {currentView === 'dashboard' && <DashboardScreen />}
              {currentView === 'club' && <ClubScreen />}
              {currentView === 'table' && <GameTableScreen />}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
